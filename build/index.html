class TeleportTrace {
  constructor(x1, y1, x2, y2, color) {
    this.x1 = x1; this.y1 = y1;
    this.x2 = x2; this.y2 = y2;
    this.color = color || '#ff8';
    this.life = 24;
    this.maxLife = 24;
    this.done = false;
  }
  update() {
    this.life--;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    const t = this.life / this.maxLife;
    const x1 = this.x1 - cam.x, y1 = this.y1 - cam.y;
    const x2 = this.x2 - cam.x, y2 = this.y2 - cam.y;
    ctx.save();
    ctx.globalAlpha = t;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 2 + (1 - t) * 3;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 18;
    ctx.setLineDash([8, 5]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x1, y1, 3 + (1 - t) * 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(x2, y2, 5 + (1 - t) * 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class SmokeGrenade {
  constructor(x, y, platforms) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = -4 - Math.random() * 3;
    this.landed = false;
    this.platforms = platforms;
    this.life = 300; // 5 seconds
    this.maxLife = 300;
    this.radius = 60;
    this.done = false;
    this.puffs = [];
  }
  update() {
    if (!this.landed) {
      this.vy += 0.35;
      this.x += this.vx;
      this.y += this.vy;
      // Check platform collision when falling
      if (this.vy > 0) {
        for (const p of this.platforms) {
          if (this.x > p.x && this.x < p.x + p.w &&
              this.y >= p.y && this.y - this.vy < p.y + 4) {
            this.y = p.y;
            this.landed = true;
            break;
          }
        }
      }
      return;
    }
    this.life--;
    if (this.life <= 0) this.done = true;
    // Spawn smoke puffs
    if (this.life > 30 && Math.random() < 0.4) {
      this.puffs.push({
        ox: (Math.random() - 0.5) * this.radius * 1.2,
        oy: (Math.random() - 0.5) * 20 - 5,
        r: 4 + Math.random() * 8,
        vy: -0.2 - Math.random() * 0.5,
        life: 20 + Math.random() * 15
      });
    }
    for (let i = this.puffs.length - 1; i >= 0; i--) {
      const p = this.puffs[i];
      p.oy += p.vy;
      p.r += 0.15;
      p.life--;
      if (p.life <= 0) this.puffs.splice(i, 1);
    }
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;

    // Draw the grenade body while airborne
    if (!this.landed) {
      const spin = this.graceTimer * 0.3;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(spin);
      // Body
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      // Top cap
      ctx.fillStyle = '#555';
      ctx.fillRect(-2, -8, 4, 4);
      // Fuse spark
      ctx.fillStyle = '#fa0';
      ctx.globalAlpha = 0.6 + Math.random() * 0.4;
      ctx.beginPath();
      ctx.arc(0, -9, 2 + Math.random(), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
      return;
    }

    const fade = Math.min(1, this.life / 30);
    // Ground haze
    ctx.globalAlpha = fade * 0.15;
    ctx.fillStyle = '#c8b8d8';
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.radius, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Landed grenade body (fading)
    if (this.life > this.maxLife - 30) {
      const gFade = (this.life - (this.maxLife - 30)) / 30;
      ctx.globalAlpha = gFade * 0.8;
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(sx, sy - 3, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#555';
      ctx.fillRect(sx - 2, sy - 11, 4, 4);
    }
    // Smoke puffs
    for (const p of this.puffs) {
      const a = Math.min(1, p.life / 8) * fade * 0.35;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(sx + p.ox, sy + p.oy, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ── Effect (particles) ───────────────────────────────────────
class Effect {
  constructor(x, y, color, count, speed, life) {
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + 1;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - 1,
        life: life + Math.random() * life * 0.5,
        color,
        size: randInt(2, 5)
      });
    }
    this.done = false;
  }
  update() {
    let alive = 0;
    for (const p of this.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
      if (p.life > 0) alive++;
    }
    if (alive === 0) this.done = true;
  }
  render(ctx, cam) {
    for (const p of this.particles) {
      if (p.life <= 0) continue;
      ctx.globalAlpha = Math.min(1, p.life / 10);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - cam.x, p.y - cam.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// ── ScreenFlash — full-screen color overlay (screen-space) ──
class ScreenFlash {
  constructor(color, maxAlpha, duration) {
    this.color = color;
    this.maxAlpha = maxAlpha || 0.55;
    this.life = duration || 14;
    this.maxLife = this.life;
    this.done = false;
  }
  update() {
    this.life--;
    if (this.life <= 0) this.done = true;
  }
  render(ctx /*, cam unused — screen space */) {
    const t = this.life / this.maxLife;
    // Sharp spike at start, quick fade
    const alpha = t < 0.3 ? this.maxAlpha : this.maxAlpha * ((t - 0.3) / 0.7);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ── FlamePool (fire ninja ground flame) ──────────────────────
class FlamePool {
  constructor(x, y, damage) {
    this.x = x; this.y = y;
    this.w = 28; this.h = 12;
    this.damage = damage;
    this.life = 180;
    this.maxLife = 180;
    this.done = false;
    this.hitTimer = 0;
  }
  update(game) {
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    if (this.hitTimer > 0) this.hitTimer--;
    if (this.hitTimer <= 0) {
      for (const e of game.enemies) {
        if (!e.dead && rectOverlap(this, e)) {
          e.takeDamage(this.damage, game, this.x + this.w / 2);
          e.burnTimer = Math.max(e.burnTimer || 0, 60);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h, '#f80', 4, 2, 8));
          this.hitTimer = 20;
        }
      }
      if (game.boss && !game.boss.dead && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.damage, game, this.x + this.w / 2);
        game.boss.burnTimer = Math.max(game.boss.burnTimer || 0, 60);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h, '#f80', 4, 2, 8));
        this.hitTimer = 20;
      }
    }
  }
  render(ctx, cam) {
    const alpha = Math.min(1, this.life / 30);
    const cx = this.x + this.w / 2 - cam.x;
    const cy = this.y + this.h / 2 - cam.y;
    // Flickering flame glow
    ctx.globalAlpha = alpha * 0.4;
    ctx.fillStyle = '#f80';
    ctx.beginPath();
    ctx.arc(cx, cy - 4, 14 + Math.sin(this.life * 0.3) * 3, 0, Math.PI * 2);
    ctx.fill();
    // Core
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = '#fc3';
    ctx.beginPath();
    ctx.arc(cx, cy - 2, 8 + Math.sin(this.life * 0.5) * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class KanjiEffect {
  constructor(x, y, color, cam) {
    this.sx = x - (cam ? cam.x : 0);
    this.sy = y - (cam ? cam.y : 0);
    this.color = color;
    this.life = 80; this.maxLife = 80; this.done = false;
  }
  update() { this.life--; if (this.life <= 0) this.done = true; }
  render(ctx, cam) {
    const progress = 1 - this.life / this.maxLife;
    const scale = progress < 0.15 ? progress / 0.15 : 1;
    const alpha = this.life < 30 ? this.life / 30 : 1;
    const cx = this.sx;
    const cy = this.sy - progress * 20;

    // Full-screen dark overlay for dramatic contrast
    const overlayAlpha = alpha * 0.4;
    ctx.save();
    ctx.globalAlpha = overlayAlpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = alpha;
    const fontSize = Math.floor(60 * scale);
    ctx.font = `bold ${fontSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 25 + 10 * Math.sin(Date.now() * 0.01);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText('死', cx, cy);
    ctx.fillStyle = this.color;
    ctx.fillText('死', cx, cy);
    // Second pass for extra glow intensity
    ctx.globalAlpha = alpha * 0.5;
    ctx.shadowBlur = 40;
    ctx.fillText('死', cx, cy);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

class TextEffect {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 40; this.done = false;
  }
  update() { this.y -= 1.2; this.life--; if (this.life <= 0) this.done = true; }
  render(ctx, cam) {
    ctx.globalAlpha = Math.min(1, this.life / 15);
    ctx.fillStyle = this.color;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(this.text, this.x - cam.x, this.y - cam.y);
    ctx.globalAlpha = 1;
  }
}

class DamageNumber {
  constructor(x, y, amount, element) {
    this.x = x + (Math.random() - 0.5) * 14;
    this.y = y - 4 + (Math.random() - 0.5) * 6;
    this.amount = Math.round(amount);
    this.text = String(this.amount);
    const elColors = {
      fire: '#f93', ghost: '#c8a', water: '#6af', crystal: '#aef',
      wind: '#bfb', lightning: '#ff8', spiky: '#f86', physical: '#faa',
    };
    this.color = element && elColors[element] ? elColors[element] : '#fff';
    this.baseSize = Math.min(24, 10 + Math.ceil(amount / 4));
    this.life = 40;
    this.maxLife = 40;
    this.vy = -1.8;
    this.done = false;
    this.scale = 1.6;
  }
  update() {
    this.y += this.vy;
    this.vy *= 0.96;
    this.scale = Math.max(1, this.scale - 0.1);
    this.life--;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    const alpha = this.life < 12 ? this.life / 12 : 1;
    const sz = Math.round(this.baseSize * this.scale);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${sz}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText(this.text, this.x - cam.x + 1, this.y - cam.y + 1);
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, this.x - cam.x, this.y - cam.y);
    ctx.restore();
  }
}

// ── x2 Orb Break Check ──────────────────────────────────────
function checkX2OrbBreak(pl, game, ex, ey) {
  if (pl.x2OrbCounter >= 100 && pl.items && pl.items.x2Orb) {
    pl.items.x2Orb = false;
    pl.x2OrbBreaking = 60; // 1-second shatter animation
    // Shatter particles (yellow/gold fragments)
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const speed = 2 + Math.random() * 3;
      game.effects.push(new Effect(
        pl.x + pl.w / 2, pl.y + pl.h / 2,
        i % 2 === 0 ? '#ff0' : '#fa0', 6, 2 + Math.random() * 2, 30
      ));
    }
    game.effects.push(new TextEffect(pl.x + pl.w / 2, pl.y - 20, 'x2 Orb BROKE!', '#f44'));
    // Glass shatter sound
    SFX.play(1200, 'square', 0.06, 0.12, -800);
    SFX.noise(0.15, 0.12);
    SFX.play(800, 'triangle', 0.1, 0.08, -400);
  }
}

// ── Orb (item drop) ──────────────────────────────────────────
class Orb {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    // Size by rarity: T1=common, T2=uncommon, T3=mid, T4=rare
    const tierRadius = { heal: 6, maxhp: 7, ultcharge: 7, damage: 8, elDmg: 8, speed: 8, reach: 8, armor: 9, element: 9, bubbleshield: 8 };
    this.radius = tierRadius[type] || 5;
    this.w = this.radius * 2; this.h = this.radius * 2;
    this.vy = -3;
    this.life = 480;
    this.done = false;
    this.grounded = false;
    this.vx = 0;
    this.rare = ['damage', 'elDmg', 'speed', 'reach', 'armor', 'element'].includes(type);
    this.tick = 0;
  }
  update(game) {
    if (this.done) return;
    this.life--;
    this.tick++;
    if (this.life <= 0) { this.done = true; return; }
    const _bonusLabel = { heal: 'HP', maxhp: 'MAX HP', ultcharge: 'ULT CHARGE', damage: 'ATTACK', elDmg: 'ELEMENTAL', speed: 'SPEED', reach: 'REACH', armor: 'ARMOR', element: 'SPECIAL', bubbleshield: 'SHIELD' };
    const _bonusColor = { heal: '#f44', maxhp: '#4f4', ultcharge: '#ff0', damage: '#f80', elDmg: '#c4f', speed: '#0f0', reach: '#fa0', armor: '#88f', element: '#f0f', bubbleshield: '#4af' };

    // Attraction to player if nearby
    const pl = game.player;
    const px = pl.x + pl.w / 2;
    const py = pl.y + pl.h / 2;
    const ox = this.x + this.w / 2;
    const oy = this.y + this.h / 2;
    const dx = px - ox;
    const dy = py - oy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Skip attraction and pickup if player is already full of this resource
    //const full = (this.type === 'heal' && pl.hp >= pl.maxHp) ||
    //             (this.type === 'ultcharge' && (pl.ultimateReady || pl.ultimateActive)) ||
    //             (this.type === 'bubbleshield' && pl.bubbleShieldTimer > 0);
    //if (full) return;

    // Collectors: chain strikes, golems, trimerangs, bubbles attract orbs to player
    const magnetRange = pl.items && pl.items.redMagnet ? 240 : 64;
    let attracted = dist < magnetRange;
    if (!attracted) {
      // Chain strikes auto-grab
      if (pl.chainStriking || pl.stormChaining) {
        if (dist < 200) {
          this.done = true;
          SFX.pickup();
          pl.jumpsLeft = pl.maxJumps + (pl.bubbleBuffTimer > 0 ? 1 : 0);
          if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(5);
          const _m = (pl.items && pl.items.x2Orb) ? 2 : 1;
          if (_m === 2) { pl.x2OrbCounter++; checkX2OrbBreak(pl, game, ox, oy); }
          switch (this.type) {
            case 'heal': pl.hp = Math.min(pl.hp + 5 * _m, pl.maxHp); game.effects.push(new Effect(ox, oy, '#f44', 6, 2, 10)); break;
            case 'maxhp': pl.maxHp += 1 * _m; pl.hp = Math.min(pl.hp + 1 * _m, pl.maxHp); game.effects.push(new Effect(ox, oy, '#4f4', 8, 3, 12)); break;
            case 'damage': pl.bonusDamage += 1 * _m; game.effects.push(new Effect(ox, oy, '#f80', 8, 3, 12)); break;
            case 'elDmg': pl.bonusElemental += 1 * _m; game.effects.push(new Effect(ox, oy, '#c4f', 8, 3, 12)); break;
            case 'speed': pl.bonusSpeed += 1 * _m; game.effects.push(new Effect(ox, oy, '#0f0', 8, 3, 12)); break;
            case 'reach': pl.bonusReach += 1 * _m; game.effects.push(new Effect(ox, oy, '#fa0', 8, 3, 12)); break;
            case 'ultcharge': if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(50 * _m); game.effects.push(new Effect(ox, oy, '#ff0', 8, 3, 12)); break;
            case 'armor': pl.bonusArmor += 1 * _m; game.effects.push(new Effect(ox, oy, '#88f', 8, 3, 12)); break;
            case 'element': pl.bonusMana += 1 * _m; pl.maxMana += 1 * _m; pl.mana = pl.maxMana; pl.specialCooldown = 0; game.effects.push(new Effect(ox, oy, '#f0f', 8, 3, 12)); break;
            case 'bubbleshield': pl.bubbleShieldTimer = pl.bubbleShieldMax; game.effects.push(new Effect(ox, oy, '#4af', 18, 5, 18)); break;
          }
          if (_bonusLabel[this.type]) game.effects.push(new TextEffect(ox, oy - 15, '+' + _bonusLabel[this.type], _bonusColor[this.type]));
          return;
        }
      }
    }

    if (attracted) {
      const attractStrength = 0.7;
      this.vx += (dx / dist) * attractStrength;
      this.vy += (dy / dist) * attractStrength * 0.5;
      const maxSpeed = 6;
      const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
      if (speed > maxSpeed) {
        this.vx = this.vx * maxSpeed / speed;
        this.vy = this.vy * maxSpeed / speed;
      }
      this.x += this.vx;
      this.y += this.vy;
    }

    // Pickup
    if (rectOverlap(this, game.player)) {
      this.done = true;
      SFX.pickup();
      const pl = game.player;
      pl.jumpsLeft = pl.maxJumps + (pl.bubbleBuffTimer > 0 ? 1 : 0);
      if (!pl.ultimateReady && !pl.ultimateActive) {
        pl.addUltimateCharge(5);
      }
      const _m = (pl.items && pl.items.x2Orb) ? 2 : 1;
      if (_m === 2) { pl.x2OrbCounter++; checkX2OrbBreak(pl, game, pl.x + pl.w/2, pl.y + pl.h/2); }
      switch (this.type) {
        case 'heal':
          pl.hp = Math.min(pl.hp + 5 * _m, pl.maxHp);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f44', 6, 2, 10));
          break;
        case 'maxhp':
          pl.maxHp += 1 * _m;
          pl.hp = Math.min(pl.hp + 1 * _m, pl.maxHp);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#4f4', 8, 3, 12));
          break;
        case 'damage':
          pl.bonusDamage += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f80', 8, 3, 12));
          break;
        case 'elDmg':
          pl.bonusElemental += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#c4f', 8, 3, 12));
          break;
        case 'speed':
          pl.bonusSpeed += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#0f0', 8, 3, 12));
          break;
        case 'reach':
          pl.bonusReach += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#fa0', 8, 3, 12));
          break;
        case 'ultcharge':
          if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(50 * _m);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#ff0', 8, 3, 12));
          break;
        case 'armor':
          pl.bonusArmor += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#88f', 8, 3, 12));
          break;
        case 'element':
          pl.bonusMana += 1 * _m;
          pl.maxMana += 1 * _m;
          pl.mana = pl.maxMana;
          pl.specialCooldown = 0;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f0f', 8, 3, 12));
          break;
        case 'bubbleshield':
          pl.bubbleShieldTimer = pl.bubbleShieldMax;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#4af', 18, 5, 18));
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#fff', 8, 3, 12));
          break;
      }
      if (_bonusLabel[this.type]) game.effects.push(new TextEffect(pl.x + pl.w/2, pl.y - 10, '+' + _bonusLabel[this.type], _bonusColor[this.type]));
    }

    // Collector pickups: golems, trimerangs, bubbles grab orbs for the player
    if (!this.done) {
      let collected = false;
      let cx = ox, cy = oy;
      // Trimerangs (wind)
      if (!collected && pl.ninjaType === 'wind' && game.trimerangs) {
        for (const t of game.trimerangs) {
          if (t.done) continue;
          const td = Math.sqrt((t.x - ox) ** 2 + (t.y - oy) ** 2);
          if (td < t.radius + 8) { collected = true; cx = t.x; cy = t.y; break; }
        }
      }
      // Bubbles (bubble)
      if (!collected && pl.ninjaType === 'bubble') {
        for (const b of game.bubbles) {
          if (b.done) continue;
          if (rectOverlap(this, b)) { collected = true; cx = b.x + b.w / 2; cy = b.y + b.h / 2; break; }
        }
      }
      if (collected) {
        this.done = true;
        SFX.pickup();
        pl.jumpsLeft = pl.maxJumps + (pl.bubbleBuffTimer > 0 ? 1 : 0);
        if (!pl.ultimateReady && !pl.ultimateActive) {
          pl.addUltimateCharge(5);
        }
        const _m = (pl.items && pl.items.x2Orb) ? 2 : 1;
        if (_m === 2) { pl.x2OrbCounter++; checkX2OrbBreak(pl, game, cx, cy); }
        switch (this.type) {
          case 'heal':
            pl.hp = Math.min(pl.hp + 5 * _m, pl.maxHp);
            game.effects.push(new Effect(cx, cy, '#f44', 6, 2, 10));
            break;
          case 'maxhp':
            pl.maxHp += 1 * _m;
            pl.hp = Math.min(pl.hp + 1 * _m, pl.maxHp);
            game.effects.push(new Effect(cx, cy, '#4f4', 8, 3, 12));
            break;
          case 'damage':
            pl.bonusDamage += 1 * _m;
            game.effects.push(new Effect(cx, cy, '#f80', 8, 3, 12));
            break;
          case 'elDmg':
            pl.bonusElemental += 1 * _m;
            game.effects.push(new Effect(cx, cy, '#c4f', 8, 3, 12));
            break;
          case 'speed':
            pl.bonusSpeed += 1 * _m;
            game.effects.push(new Effect(cx, cy, '#0f0', 8, 3, 12));
            break;
          case 'reach':
            pl.bonusReach += 1 * _m;
            game.effects.push(new Effect(cx, cy, '#fa0', 8, 3, 12));
            break;
          case 'ultcharge':
            if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(50 * _m);
            game.effects.push(new Effect(cx, cy, '#ff0', 8, 3, 12));
            break;
          case 'armor':
            pl.bonusArmor += 1 * _m;
            game.effects.push(new Effect(cx, cy, '#88f', 8, 3, 12));
            break;
          case 'element':
            pl.bonusMana += 1 * _m;
            pl.maxMana += 1 * _m;
            pl.mana = pl.maxMana;
            pl.specialCooldown = 0;
            game.effects.push(new Effect(cx, cy, '#f0f', 8, 3, 12));
            break;
          case 'bubbleshield':
            pl.bubbleShieldTimer = pl.bubbleShieldMax;
            game.effects.push(new Effect(cx, cy, '#4af', 18, 5, 18));
            game.effects.push(new Effect(cx, cy, '#fff', 8, 3, 12));
            break;
        }
        if (_bonusLabel[this.type]) game.effects.push(new TextEffect(cx, cy - 15, '+' + _bonusLabel[this.type], _bonusColor[this.type]));
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const flash = this.life < 90 && Math.floor(this.life / 6) % 2;
    if (flash) return;
    const colors = { heal: '#f44', maxhp: '#4f4', damage: '#f80', elDmg: '#c4f', speed: '#0f0', reach: '#fa0', ultcharge: '#ff0', armor: '#88f', element: '#f0f', bubbleshield: '#4af' };
    const r = this.radius;
    const cx = sx + r;
    const cy = sy + r;
    // Rainbow color for element orb
    const orbColor = this.type === 'element' ? 'hsl(' + (this.tick * 3 % 360) + ',100%,60%)' : colors[this.type];
    // Rare orb: pulsing outer glow + rotating sparkles
    if (this.rare) {
      const pulse = 1 + 0.2 * Math.sin(this.tick * 0.1);
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = orbColor;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 2.2 * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 4; i++) {
        const angle = this.tick * 0.05 + i * Math.PI / 2;
        const spx = cx + Math.cos(angle) * r * 1.8;
        const spy = cy + Math.sin(angle) * r * 1.8;
        ctx.beginPath();
        ctx.arc(spx, spy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = orbColor;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    const fontSize = Math.max(8, r * 1.4) | 0;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    const icons = { heal: '♥', maxhp: '+', damage: '!', elDmg: '✷', shield: '◆', shieldrecharge: '◇', shuriken: '✦', speed: '»', reach: '↔', ultcharge: '★', armor: '■', element: '◈' };
    ctx.fillText(icons[this.type], cx - fontSize * 0.35, cy + fontSize * 0.35);
  }
}

// ── BossItem (boss drop pickup) ──────────────────────────────
class BossItem {
  constructor(x, y, itemId) {
    this.x = x; this.y = y;
    this.w = 16; this.h = 16;
    this.vy = -4;
    this.vx = 0;
    this.itemId = itemId;
    this.def = BOSS_ITEMS[itemId];
    this.life = 9999; // doesn't expire
    this.done = false;
    this.grounded = false;
    this.bobTimer = 0;
  }
  update(game) {
    if (this.done) return;
    this.bobTimer++;
    // Gravity until grounded
    if (!this.grounded) {
      this.vy += 0.3;
      this.y += this.vy;
      this.x += this.vx;
      for (const p of game.platforms) {
        if (this.vy > 0 && this.y + this.h > p.y && this.y + this.h - this.vy <= p.y &&
            this.x + this.w > p.x && this.x < p.x + p.w) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
          break;
        }
      }
    }
    // Attraction to player
    const pl = game.player;
    const px = pl.x + pl.w / 2, py = pl.y + pl.h / 2;
    const ox = this.x + this.w / 2, oy = this.y + this.h / 2;
    const dx = px - ox, dy = py - oy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 80) {
      const s = 1.2;
      this.x += (dx / dist) * s;
      this.y += (dy / dist) * s;
    }
    // Pickup
    if (rectOverlap(this, pl)) {
      this.done = true;
      SFX.victory();
      triggerHitstop(8);
      pl.items[this.itemId] = true;
      if (this.itemId === 'deathsKey') pl.deathsKeyUsed = false;
      // A Friend's Letter: if RONIN boss is active, make it friendly (fade handled in boss update)
      if (this.itemId === 'friendsLetter' && game.boss && !game.boss.dead && game.boss.bossType === 'deflector') {
        game.boss.friendly = true;
        game.boss.friendlyFade = 120;
        game.boss.vx = 0;
        game.effects.push(new TextEffect(game.boss.x + game.boss.w / 2, game.boss.y - 20, 'FRIEND!', '#fda'));
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#fda', 25, 6, 25));
        recordBestiaryKill(game.boss.bossType, false, true);
      }
      game.itemPickupOverlay = { itemId: this.itemId, timer: 180 };
      game.effects.push(new Effect(ox, oy, this.def.color, 20, 5, 25));
      game.effects.push(new Effect(ox, oy, '#fff', 12, 3, 20));
      // Record vault discovery
      recordItemFound(this.itemId);
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y + Math.sin(this.bobTimer * 0.06) * 4;
    const cx = sx + this.w / 2, cy = sy + this.h / 2;
    // Outer glow ring
    const glowA = 0.25 + Math.sin(this.bobTimer * 0.08) * 0.15;
    ctx.globalAlpha = glowA;
    const rGrad = ctx.createRadialGradient(cx, cy, 4, cx, cy, 22);
    rGrad.addColorStop(0, this.def.color);
    rGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI * 2);
    ctx.fill();
    // Rotating sparkle rays
    ctx.globalAlpha = glowA * 0.6;
    ctx.strokeStyle = this.def.color;
    ctx.lineWidth = 1;
    const angle = this.bobTimer * 0.04;
    for (let i = 0; i < 4; i++) {
      const a = angle + i * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 10, cy + Math.sin(a) * 10);
      ctx.lineTo(cx + Math.cos(a) * 18, cy + Math.sin(a) * 18);
      ctx.stroke();
    }
    // Box with gradient
    ctx.globalAlpha = 1;
    const bGrad = ctx.createLinearGradient(sx, sy, sx, sy + this.h);
    bGrad.addColorStop(0, '#333');
    bGrad.addColorStop(1, '#111');
    ctx.fillStyle = bGrad;
    ctx.fillRect(sx, sy, this.w, this.h);
    ctx.strokeStyle = this.def.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, this.w, this.h);
    // Icon
    ctx.shadowColor = this.def.color;
    ctx.shadowBlur = 6;
    drawItemIcon(ctx, this.itemId, cx, cy, this.w * 0.8, this.def.color);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ── SlamRing (ground slam shockwave) ─────────────────────────
class SlamRing {
  constructor(x, y, color, accentColor) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.accentColor = accentColor;
    this.radius = 8;
    this.maxRadius = 100;
    this.life = 20;
    this.maxLife = 20;
    this.done = false;
  }
  update() {
    this.life--;
    this.radius += (this.maxRadius - 8) / this.maxLife;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const alpha = this.life / this.maxLife;
    // Outer ring
    ctx.save();
    ctx.globalAlpha = alpha * 0.6;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.radius, this.radius * 0.35, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Inner ring
    ctx.globalAlpha = alpha * 0.4;
    ctx.strokeStyle = this.accentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.radius * 0.7, this.radius * 0.25, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ── EarthCrater (persistent damaging ground crater from earth slam) ──
class EarthCrater {
  constructor(x, y, damage, game) {
    this.x = x;
    this.y = y;
    this.damage = damage;
    this.game = game;
    this.radius = 60;
    this.life = 180;
    this.maxLife = 180;
    this.done = false;
    this.hitTimer = 0;
    // Pre-generate random rock chunks jutting out of the ground
    this.rocks = [];
    for (let i = 0; i < 7; i++) {
      const spread = (i / 6 - 0.5) * 2; // -1 to 1 across the width
      const rx = spread * this.radius * (0.6 + Math.random() * 0.4);
      const rw = 6 + Math.random() * 10;
      const rh = 10 + Math.random() * 18;
      const tilt = (Math.random() - 0.5) * 0.4;
      const shade = Math.floor(Math.random() * 3); // 0=dark, 1=mid, 2=light
      this.rocks.push({ rx, rw, rh, tilt, shade });
    }
  }
  update() {
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    if (this.hitTimer > 0) this.hitTimer--;
    if (this.hitTimer <= 0) {
      const game = this.game;
      const cx = this.x, cy = this.y;
      const r = this.radius;
      for (const e of game.enemies) {
        if (e.dead) continue;
        const dx = (e.x + e.w / 2) - cx;
        const dy = (e.y + e.h) - cy;
        if (dx * dx + dy * dy < r * r && Math.abs(dy) < 24) {
          e.takeDamage(this.damage, game, cx, 'physical');
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h, '#a87', 4, 2, 6));
          this.hitTimer = 30;
          break;
        }
      }
      if (this.hitTimer <= 0 && game.boss && !game.boss.dead) {
        const dx = (game.boss.x + game.boss.w / 2) - cx;
        const dy = (game.boss.y + game.boss.h) - cy;
        if (dx * dx + dy * dy < r * r && Math.abs(dy) < 24) {
          game.boss.takeDamage(this.damage, game, cx, 'physical');
          game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h, '#a87', 4, 2, 6));
          this.hitTimer = 30;
        }
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const alpha = Math.min(1, this.life / 30);
    const colors = ['#5a3a1a', '#8b5e3c', '#c8a878'];
    ctx.save();
    ctx.globalAlpha = alpha;
    // Draw each rock chunk jutting upward from the ground
    for (const rock of this.rocks) {
      const bx = sx + rock.rx;
      const by = sy;
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(rock.tilt);
      // Rock body — irregular polygon pointing up
      ctx.fillStyle = colors[rock.shade];
      ctx.beginPath();
      ctx.moveTo(-rock.rw / 2, 0);
      ctx.lineTo(-rock.rw * 0.3, -rock.rh);
      ctx.lineTo(rock.rw * 0.2, -rock.rh * 0.85);
      ctx.lineTo(rock.rw / 2, 0);
      ctx.closePath();
      ctx.fill();
      // Highlight edge
      ctx.strokeStyle = '#e8d0b0';
      ctx.lineWidth = 1;
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.moveTo(-rock.rw * 0.3, -rock.rh);
      ctx.lineTo(rock.rw * 0.2, -rock.rh * 0.85);
      ctx.stroke();
      // Dark edge
      ctx.strokeStyle = '#3a2210';
      ctx.globalAlpha = alpha * 0.6;
      ctx.beginPath();
      ctx.moveTo(-rock.rw / 2, 0);
      ctx.lineTo(-rock.rw * 0.3, -rock.rh);
      ctx.stroke();
      ctx.globalAlpha = alpha;
      ctx.restore();
    }
    // Dust/debris at base
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = '#a08060';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 2, this.radius * 0.7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── SpinningScythe (orbiting scythe during shadow chain strike) ──
class SpinningScythe {
  constructor(owner, isUlt, game) {
    this.owner = owner;
    this.game = game;
    this.sc = isUlt ? 1.5 : 1.2;
    this.damage = owner.type.attackDamage + owner.bonusElemental;
    // World position — starts offset from owner
    const angle = Math.random() * Math.PI * 2;
    this.x = owner.x + owner.w / 2 + Math.cos(angle) * 60;
    this.y = owner.y + owner.h / 2 + Math.sin(angle) * 40;
    // Hitbox size for collision
    this.w = 48 * this.sc;
    this.h = 48 * this.sc;
    // Drift velocity — wanders on its own
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 1.5;
    this.driftTimer = 0;
    this.spinAngle = 0;
    this.spinSpeed = 0.3;
    this.done = false;
    this.fadeAlpha = 1;
    this.life = 180; // minimum 3 seconds at 60fps
    this.chaining = true; // extends life while true
    this.returning = false;
    this.returnTimer = 0;
    this.hitCooldowns = new Map(); // target -> frames until can hit again
  }
  recall() {
    this.chaining = false;
    // Don't start fading until minimum life expires
  }
  update() {
    // While chaining, reset life to at least 180 so it persists
    if (this.chaining) {
      this.life = Math.max(this.life, 180);
    } else {
      this.life--;
    }
    // Start return fade in last 25 frames
    if (!this.chaining && this.life <= 25) {
      this.returning = true;
      this.returnTimer = this.life;
      this.fadeAlpha = Math.max(0, this.life / 25);
      this.spinSpeed = 0.45;
    }
    if (this.life <= 0) { this.done = true; return; }

    // Wander — change drift direction periodically
    this.driftTimer--;
    if (this.driftTimer <= 0) {
      this.driftTimer = 30 + Math.random() * 40;
      this.vx = (Math.random() - 0.5) * 3;
      this.vy = (Math.random() - 0.5) * 2;
    }
    this.x += this.vx;
    this.y += this.vy;

    // Soft leash — gently pulled toward owner if too far
    const ox = this.owner.x + this.owner.w / 2;
    const oy = this.owner.y + this.owner.h / 2;
    const dx = ox - this.x, dy = oy - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const leashDist = this.chaining ? 120 : 80;
    if (dist > leashDist) {
      const pull = 0.03 * (dist - leashDist) / dist;
      this.vx += dx * pull;
      this.vy += dy * pull;
    }
    // Dampen velocity
    this.vx *= 0.97;
    this.vy *= 0.97;

    // Bob up and down slowly
    this.y += Math.sin(Date.now() * 0.004) * 0.3;

    this.spinAngle += this.spinSpeed;

    // Hit detection — damage enemies and boss
    // Hitbox centered on scythe position
    const hb = { x: this.x - this.w / 2, y: this.y - this.h / 2, w: this.w, h: this.h };
    // Tick down cooldowns
    for (const [target, cd] of this.hitCooldowns) {
      if (cd <= 1) this.hitCooldowns.delete(target);
      else this.hitCooldowns.set(target, cd - 1);
    }
    const game = this.game;
    if (game) {
      for (const e of game.enemies) {
        if (!e.dead && !this.hitCooldowns.has(e) && rectOverlap(hb, e)) {
          e.takeDamage(this.damage, game, this.x);
          this.hitCooldowns.set(e, 20);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a4e', 8, 3, 10));
          triggerHitstop(2);
        }
      }
      if (game.boss && !game.boss.dead && !this.hitCooldowns.has(game.boss) && rectOverlap(hb, game.boss)) {
        game.boss.takeDamage(this.damage, game, this.x);
        this.hitCooldowns.set(game.boss, 20);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#a4e', 10, 4, 12));
        triggerHitstop(2);
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const px = this.x - cam.x;
    const py = this.y - cam.y;
    const sc = this.sc;
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.008);
    ctx.save();
    ctx.globalAlpha = 0.9 * this.fadeAlpha;
    ctx.translate(px, py);
    ctx.rotate(this.spinAngle);
    // Purple spin trail
    ctx.globalAlpha = 0.12 * this.fadeAlpha;
    ctx.fillStyle = '#a040ff';
    ctx.shadowColor = '#c060ff';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(0, 0, 30 * sc, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.9 * this.fadeAlpha;
    // Handle
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.moveTo(-20 * sc, -2);
    ctx.lineTo(20 * sc, -1);
    ctx.lineTo(20 * sc, 1);
    ctx.lineTo(-20 * sc, 2);
    ctx.closePath();
    ctx.fill();
    // Grip wraps
    ctx.fillStyle = '#6a2a8a';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-14 + i * 9, -2.5, 4, 5);
    }
    // Blade 1
    ctx.fillStyle = '#ddd';
    ctx.shadowColor = '#a040ff';
    ctx.shadowBlur = 14 * pulse;
    ctx.beginPath();
    ctx.moveTo(18 * sc, -2);
    ctx.bezierCurveTo(28 * sc, -10 * sc, 32 * sc, -24 * sc, 20 * sc, -36 * sc);
    ctx.bezierCurveTo(16 * sc, -22 * sc, 18 * sc, -11 * sc, 18 * sc, -2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(160,64,255,0.35)';
    ctx.fill();
    // Blade 2 (opposite)
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.moveTo(-18 * sc, 2);
    ctx.bezierCurveTo(-28 * sc, 10 * sc, -32 * sc, 24 * sc, -20 * sc, 36 * sc);
    ctx.bezierCurveTo(-16 * sc, 22 * sc, -18 * sc, 11 * sc, -18 * sc, 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(160,64,255,0.35)';
    ctx.fill();
    // Edge glow
    ctx.strokeStyle = '#c080ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(18 * sc, -2);
    ctx.bezierCurveTo(28 * sc, -10 * sc, 32 * sc, -24 * sc, 20 * sc, -36 * sc);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-18 * sc, 2);
    ctx.bezierCurveTo(-28 * sc, 10 * sc, -32 * sc, 24 * sc, -20 * sc, 36 * sc);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Center gem
    ctx.fillStyle = '#c060ff';
    ctx.shadowColor = '#e080ff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(0, 0, 3.5 * sc, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// === js/entities.js ===
// ── Platform ─────────────────────────────────────────────────
class Platform {
  constructor(x, y, w, h, color) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.color = color || '#666';
    this.thin = false;
  }
  render(ctx, cam) {
    ctx.fillStyle = this.color;
    if (this.thin) {
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 4);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      for (let dx = 0; dx < this.w; dx += 12) {
        ctx.fillRect(this.x - cam.x + dx, this.y - cam.y, 6, 2);
      }
    } else {
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, this.h);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 3);
    }
  }
}

// ── Spike (environmental hazard) ─────────────────────────────
class Spike {
  constructor(x, y, w) {
    this.x = x; this.y = y;
    this.w = w; this.h = 12;
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    ctx.fillStyle = '#c33';
    const spikeW = 12;
    for (let dx = 0; dx < this.w; dx += spikeW) {
      ctx.beginPath();
      ctx.moveTo(sx + dx, sy + this.h);
      ctx.lineTo(sx + dx + spikeW / 2, sy);
      ctx.lineTo(sx + dx + spikeW, sy + this.h);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#f66';
    for (let dx = 0; dx < this.w; dx += spikeW) {
      ctx.fillRect(sx + dx + spikeW / 2 - 1, sy, 2, 3);
    }
  }
}

// Rope: hanging structure that refills normal jumps when touched.
class Rope {
  constructor(x, y, h) {
    this.x = x;
    this.y = y;
    this.w = 24;
    this.h = h || 140;
    this.touching = false;
    this.pulse = 0;
  }

  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const mid = sx + this.w / 2;
    ctx.save();
    ctx.strokeStyle = '#caa66a';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(mid, sy);
    const segments = 7;
    for (let i = 1; i <= segments; i++) {
      const py = sy + (this.h / segments) * i;
      const px = mid + Math.sin(i * 1.7 + this.pulse * 0.18) * 3;
      ctx.lineTo(px, py);
    }
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,240,180,0.65)';
    ctx.lineWidth = 1.5;
    for (let y = sy + 16; y < sy + this.h; y += 24) {
      ctx.beginPath();
      ctx.moveTo(mid - 7, y);
      ctx.lineTo(mid + 7, y + 8);
      ctx.stroke();
    }

    ctx.fillStyle = '#6b4b2a';
    ctx.fillRect(mid - 12, sy - 4, 24, 8);
    ctx.restore();
  }
}

// === js/stone.js ===
// ── Earth Constructs (Earth ninja ability) ───────────────────

// ── EarthWall — trapezoid wall, blocks projectiles, can be punched to launch ──
class EarthWall {
  constructor(x, y, wave) {
    this.w = TILE; this.h = TILE * 3;
    this.x = x; this.y = y;
    this.wave = wave;
    this.hp = 6; this.maxHp = 6;
    this.vx = 0; this.vy = 0;
    this.grounded = false;
    this.done = false;
    this.launched = false;
    this.damageCd = 0;
    this.hitSet = new Set();
    this.topW = TILE * 0.7;
    this.botW = TILE * 1.4;
    this.launchDmg = 5 * wave;
  }
  isCollidable() { return !this.launched; }
  takeDamage(amt) { if (this.damageCd <= 0) { this.hp -= amt; this.damageCd = 20; } }
  launch(facing) {
    this.vx = facing * 9;
    this.vy = -1;
    this.launched = true;
  }
  update(game) {
    if (this.damageCd > 0) this.damageCd--;
    // Block enemy projectiles while stationary
    if (!this.launched) {
      for (const p of game.projectiles) {
        if (p.done || p.owner === 'player') continue;
        if (rectOverlap(this, p)) {
          p.done = true;
          game.effects.push(new Effect(p.x, p.y, '#a87', 6, 2, 10));
        }
      }
    }
    // Gravity + movement
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL) this.vy = MAX_FALL;
    this.x += this.vx;
    this.y += this.vy;
    if (this.launched) this.vx *= 0.97;
    this.grounded = false;
    // Platform collision (including thin platforms for top landing)
    for (const p of game.platforms) {
      if (p.thin) {
        // Land on thin platforms from above
        if (this.vy > 0 && rectOverlap(this, p) && this.y + this.h - this.vy <= p.y + 2) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
        }
        continue;
      }
      if (rectOverlap(this, p)) {
        if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
        } else if (this.vx > 0 && this.x + this.w - this.vx <= p.x) {
          this.x = p.x - this.w; this.vx = 0;
        } else if (this.vx < 0 && this.x - this.vx >= p.x + p.w - 4) {
          this.x = p.x + p.w; this.vx = 0;
        }
      }
    }
    // Damage enemies when launched
    if (this.launched) {
      for (const e of game.enemies) {
        if (!e.dead && !this.hitSet.has(e) && rectOverlap(this, e)) {
          e.takeDamage(this.launchDmg, game, this.x + this.w / 2, undefined, 'boulder');
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a87', 10, 3, 12));
          if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(2);
          this.hitSet.add(e);
          e.stunTimer = Math.max(e.stunTimer, 40);
        }
      }
      if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.launchDmg, game, this.x + this.w / 2, undefined, 'boulder');
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#a87', 14, 4, 16));
        if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(3);
        this.hitSet.add(game.boss);
        game.boss.stunTimer = Math.max(game.boss.stunTimer, 25);
      }
      if (Math.abs(this.vx) < 0.5 && this.grounded) {
        this.launched = false;
        this.vx = 0;
      }
    }
    if (this.y > CANVAS_H + 200) this.done = true;
    if (this.hp <= 0) this.explode(game);
  }
  explode(game) {
    this.done = true;
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#a87', 15, 5, 18));
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#c8a878', 10, 4, 14));
    damageInRadius(game, this.x + this.w / 2, this.y + this.h / 2, 70, 3 * this.wave);
    triggerHitstop(4);
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const cx = sx + this.w / 2;
    const topW = this.topW;
    const botW = this.botW;
    // Trapezoid body
    ctx.fillStyle = '#8b5e3c';
    ctx.beginPath();
    ctx.moveTo(cx - botW / 2, sy + this.h);
    ctx.lineTo(cx - topW / 2, sy);
    ctx.lineTo(cx + topW / 2, sy);
    ctx.lineTo(cx + botW / 2, sy + this.h);
    ctx.closePath();
    ctx.fill();
    // Stone texture lines
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      const t = i / 4;
      const lw = topW + (botW - topW) * t;
      const ly = sy + this.h * t;
      ctx.beginPath();
      ctx.moveTo(cx - lw / 2, ly);
      ctx.lineTo(cx + lw / 2, ly);
      ctx.stroke();
    }
    // Top cap
    ctx.fillStyle = '#c8a878';
    ctx.beginPath();
    ctx.moveTo(cx - topW / 2, sy);
    ctx.lineTo(cx + topW / 2, sy);
    ctx.lineTo(cx + topW / 2 + 2, sy + 6);
    ctx.lineTo(cx - topW / 2 - 2, sy + 6);
    ctx.closePath();
    ctx.fill();
    // Green accent
    ctx.fillStyle = '#2e9e2e';
    ctx.fillRect(cx - topW / 2 + 2, sy + 2, topW - 4, 3);
    if (this.hp < this.maxHp) renderHpBar(ctx, cam, this);
  }
}

// ── EarthBoulder — rises from ground, can be punched/jumped on/ground pounded ──
class EarthBoulder {
  constructor(x, groundY, targetY, wave) {
    const size = Math.round(TILE * 1.3);
    this.w = size; this.h = size;
    this.x = x - size / 2;
    this.y = groundY - size;
    this.wave = wave;
    this.hp = 8; this.maxHp = 8;
    this.vx = 0; this.vy = 0;
    this.grounded = false;
    this.done = false;
    this.damageCd = 0;
    this.hitSet = new Set();
    this.targetY = targetY;
    this.rising = true;
    this.riseSpeed = 10;
    this.hovering = false;
    this.hoverTimer = 120;
    this.launched = false;
    this.pounded = false;
    this.launchDmg = 6 * wave;
  }
  isCollidable() { return this.hovering && !this.launched && !this.pounded; }
  takeDamage(amt) { if (this.damageCd <= 0) { this.hp -= amt; this.damageCd = 20; } }
  launchAt(tx, ty) {
    this.launched = true;
    this.rising = false;
    this.hovering = false;
    const dx = tx - (this.x + this.w / 2);
    const dy = ty - (this.y + this.h / 2);
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    this.vx = (dx / d) * 10;
    this.vy = (dy / d) * 10;
    this.launchTimer = 0;
    SFX.hit();
  }
  groundPound() {
    this.pounded = true;
    this.rising = false;
    this.hovering = false;
    this.vx = 0;
    this.vy = 14;
    this.launchDmg = 8 * this.wave;
  }
  update(game) {
    if (this.damageCd > 0) this.damageCd--;
    // Destroy enemy projectiles on contact
    for (const p of game.projectiles) {
      if (p.done || p.owner === 'player') continue;
      if (rectOverlap(this, p)) {
        p.done = true;
        game.effects.push(new Effect(p.x, p.y, '#a87', 6, 2, 10));
      }
    }
    if (this.rising) {
      this.y -= this.riseSpeed;
      if (this.y <= this.targetY) {
        this.y = this.targetY;
        this.rising = false;
        this.hovering = true;
      }
      // Rising damage to enemies in the way
      for (const e of game.enemies) {
        if (!e.dead && !this.hitSet.has(e) && rectOverlap(this, e)) {
          e.takeDamage(3 * this.wave, game, this.x + this.w / 2);
          const rDir = Math.sign(e.x + e.w / 2 - (this.x + this.w / 2)) || 1;
          e.vx += rDir * 10;
          e.vy = -6;
          e.knockbackTimer = Math.max(e.knockbackTimer, 14);
          this.hitSet.add(e);
          e.stunTimer = Math.max(e.stunTimer, 30);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a87', 8, 3, 10));
        }
      }
      // Check for merge with other hovering/rising boulders while rising
      for (const b of game.stoneBlocks) {
        if (b === this || b.done || !(b instanceof EarthBoulder)) continue;
        if (!(b.hovering || b.rising)) continue;
        if (rectOverlap(this, b)) {
          const newSize = Math.round(Math.sqrt(this.w * this.w + b.w * b.w));
          this.w = newSize; this.h = newSize;
          this.hp = Math.min(this.hp + b.hp, this.maxHp * 2);
          this.maxHp = Math.max(this.maxHp, this.hp);
          this.launchDmg = Math.round(this.launchDmg * 1.5);
          this.x = (this.x + b.x) / 2;
          this.y = (this.y + b.y) / 2;
          b.done = true;
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#c8a878', 12, 4, 14));
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#2e9e2e', 8, 3, 10));
          triggerHitstop(3);
          SFX.hit();
          break;
        }
      }
      return;
    }
    if (this.hovering) {
      this.hoverTimer--;
      this.y += Math.sin(game.tick * 0.08) * 0.3;
      // Check for merge with other hovering/rising boulders
      for (const b of game.stoneBlocks) {
        if (b === this || b.done || !(b instanceof EarthBoulder)) continue;
        if (!(b.hovering || b.rising)) continue;
        if (rectOverlap(this, b)) {
          // Merge: absorb the other boulder
          const newSize = Math.round(Math.sqrt(this.w * this.w + b.w * b.w));
          this.w = newSize; this.h = newSize;
          this.hp = Math.min(this.hp + b.hp, this.maxHp * 2);
          this.maxHp = Math.max(this.maxHp, this.hp);
          this.launchDmg = Math.round(this.launchDmg * 1.5);
          this.hoverTimer = Math.max(this.hoverTimer, 80);
          this.x = (this.x + b.x) / 2;
          this.y = (this.y + b.y) / 2;
          b.done = true;
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#c8a878', 12, 4, 14));
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#2e9e2e', 8, 3, 10));
          triggerHitstop(3);
          SFX.hit();
          break;
        }
      }
      if (this.hoverTimer <= 0) { this.hovering = false; }
      return;
    }
    if (this.launched) {
      this.launchTimer++;
      if (this.launchTimer > 20) {
        this.vy += GRAVITY;
        if (this.vy > MAX_FALL) this.vy = MAX_FALL;
      }
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.99;
      for (const e of game.enemies) {
        if (!e.dead && !this.hitSet.has(e) && rectOverlap(this, e)) {
          e.takeDamage(this.launchDmg, game, this.x + this.w / 2, undefined, 'boulder');
          // Extra boulder knockback on top of sword KB
          const bDir = Math.sign(this.vx) || Math.sign(e.x + e.w / 2 - (this.x + this.w / 2));
          e.vx += bDir * 8;
          e.knockbackTimer = Math.max(e.knockbackTimer, 14);
          e.stunTimer = Math.max(e.stunTimer, 40);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a87', 12, 4, 14));
          if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(2);
          this.hitSet.add(e);
          this.hp -= 2;
        }
      }
      if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.launchDmg, game, this.x + this.w / 2, undefined, 'boulder');
        const bDir = Math.sign(this.vx) || Math.sign(game.boss.x + game.boss.w / 2 - (this.x + this.w / 2));
        game.boss.vx += bDir * 6;
        game.boss.knockbackTimer = Math.max(game.boss.knockbackTimer, 14);
        game.boss.stunTimer = Math.max(game.boss.stunTimer, 25);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#a87', 16, 5, 18));
        if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(3);
        this.hitSet.add(game.boss);
        this.hp -= 3;
      }
      // Hit platform — only crash on ground (thick platforms)
      // Falling boulders smash through thin platforms dealing damage
      if (!this._hitPlats) this._hitPlats = new Set();
      for (const p of game.platforms) {
        if (!rectOverlap(this, p)) continue;
        if (p.thin) {
          if (this.vy > 0 && !this._hitPlats.has(p)) {
            this._hitPlats.add(p);
            damageInRadius(game, this.x + this.w / 2, p.y, 60, this.launchDmg);
            game.effects.push(new Effect(this.x + this.w / 2, p.y, '#a87', 8, 3, 10));
            triggerScreenShake(2, 4);
          }
        } else {
          this.hp = 0; break;
        }
      }
      if (Math.abs(this.vx) < 1 && Math.abs(this.vy) < 1) this.hp = 0;
      if (this.y > CANVAS_H + 200 || this.x < -200 || this.x > game.levelW + 200) this.done = true;
      if (this.hp <= 0) this.explode(game);
      return;
    }
    // Natural fall (pounded or hover expired)
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL) this.vy = MAX_FALL;
    this.x += this.vx;
    this.y += this.vy;
    this.grounded = false;
    if (!this._poundedPlats) this._poundedPlats = new Set();
    for (const p of game.platforms) {
      if (!rectOverlap(this, p)) continue;
      if (this.pounded) {
        // Pounded boulders smash through thin platforms, explode on thick (ground)
        if (this.vy > 0 && !this._poundedPlats.has(p)) {
          this._poundedPlats.add(p);
          const impactX = this.x + this.w / 2;
          const impactY = p.y;
          damageInRadius(game, impactX, impactY, 80, this.launchDmg);
          game.effects.push(new Effect(impactX, impactY, '#a87', 14, 5, 16));
          game.effects.push(new EarthCrater(impactX, impactY, Math.ceil(this.launchDmg * 0.4), game));
          triggerScreenShake(4, 6);
          SFX.slam();
          if (p.y >= 480) {
            // Hit actual ground floor — explode
            triggerHitstop(5);
            this.hp = 0;
          }
        }
      } else {
        // Non-pounded: land normally on thick platforms
        if (p.thin) continue;
        if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          if (this.vy > 6) {
            damageInRadius(game, this.x + this.w / 2, this.y + this.h, 80, this.launchDmg);
            game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h, '#a87', 14, 5, 16));
            triggerHitstop(5);
            triggerScreenShake(5, 8);
            SFX.slam();
            this.hp = 0;
          }
          this.vy = 0;
          this.grounded = true;
        }
      }
    }
    if (this.y > CANVAS_H + 200) this.done = true;
    if (this.hp <= 0) this.explode(game);
  }
  explode(game) {
    this.done = true;
    const radius = Math.max(80, this.w * 2);
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#a87', 15, 5, 18));
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#c8a878', 10, 4, 14));
    damageInRadius(game, this.x + this.w / 2, this.y + this.h / 2, radius, 3 * this.wave);
    triggerHitstop(4);
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const r = this.w / 2;
    const cx = sx + r;
    const cy = sy + r;
    // Boulder body
    ctx.fillStyle = '#8b5e3c';
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    // Cracks
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.3, cy - r * 0.5);
    ctx.lineTo(cx + r * 0.2, cy + r * 0.1);
    ctx.lineTo(cx + r * 0.5, cy + r * 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + r * 0.1, cy - r * 0.6);
    ctx.lineTo(cx - r * 0.1, cy);
    ctx.stroke();
    // Highlight
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#c8a878';
    ctx.beginPath();
    ctx.arc(cx - r * 0.2, cy - r * 0.3, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Green accent gem
    ctx.fillStyle = '#2e9e2e';
    ctx.beginPath();
    ctx.arc(cx, cy - r * 0.3, 4, 0, Math.PI * 2);
    ctx.fill();
    if (this.hp < this.maxHp) renderHpBar(ctx, cam, this);
  }
}

// ── IceBlock — crystal special, freezes enemies, deflects projectiles, shatterable ──
class IceBlock {
  constructor(x, y, facing, wave, baseDmg, midair) {
    this.w = Math.round(TILE * 1.4);
    this.h = Math.round(TILE * 1.4);
    this.x = x - this.w / 2;
    this.y = y - this.h;
    this.wave = wave;
    this.baseDmg = baseDmg;
    this.hp = 3; this.maxHp = 3;
    this.vx = 0; this.vy = 0;
    this.done = false;
    this.grounded = false;
    this.damageCd = 0;
    this.timer = 360; // 6 seconds lifetime
    this.frozenEnemies = new Set();
    this.falling = !!midair;
    this.facing = facing;
    this.landed = false;
    this.freezeCooldown = 0;
    this.shimmer = 0;
    this.hoverPause = midair ? 25 : 0;

    this.sliding = false;
    this.slideTimer = 0;
    this.slideHitSet = new Set();
    this.autoSlideOnLand = false;
  }

  isCollidable() { return this.landed; }

  playerHit(game, dmg = 1) {
    if (this.done) return;
    if (this.falling) {
      // Hit while airborne — cancel fall, launch horizontally
      this.falling = false;
      this.sliding = true;
      this.vx = this.facing * 13;
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#aff', 12, 5, 12));
      triggerHitstop(2);
      SFX.hit();
      return;
    }
    if (!this.sliding && this.landed) {
      // Hit while grounded — send the block sliding forward
      this.sliding = true;
      this.vx = this.facing * 11;
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#aff', 12, 5, 12));
      triggerHitstop(2);
      SFX.hit();
    }
  }

  shatter(game) {
    this.done = true;
    // Launch 3 DiamondShards from the ice block position
    if (!game.diamondShards) game.diamondShards = [];
    for (let i = 0; i < 3; i++) {
      const sx = this.x + this.w / 2;
      const sy = this.y + this.h / 2 + (i - 1) * 16;
      game.diamondShards.push(new DiamondShard(sx, sy, 'player', game));
    }
    // Visual explosion
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#aff', 18, 6, 18));
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#fff', 12, 4, 14));
    triggerHitstop(4);
    triggerScreenShake(3, 5);
    SFX.parry();
    // Ice shards particles
    for (let i = 0; i < 8; i++) {
      game.effects.push(new Effect(
        this.x + this.w / 2 + (Math.random() - 0.5) * this.w,
        this.y + this.h / 2 + (Math.random() - 0.5) * this.h,
        '#cff', 4 + Math.random() * 4, 2, 12
      ));
    }
  }

  update(game) {
    if (this.damageCd > 0) this.damageCd--;
    if (this.freezeCooldown > 0) this.freezeCooldown--;
    this.shimmer += 0.06;
    this.timer--;

    // Deflect enemy projectiles
    for (const p of game.projectiles) {
      if (p.done || p.owner === 'player') continue;
      if (rectOverlap(this, p)) {
        p.vx = -p.vx;
        p.vy = -p.vy;
        p.owner = 'player';
        p.reflected = true;
        p.color = '#aff';
        game.effects.push(new Effect(p.x, p.y, '#aff', 6, 2, 8));
        SFX.reflect();
      }
    }

    // Falling behavior (midair spawn — acts like boulder)
    if (this.falling) {
      // Brief hover before falling
      if (this.hoverPause > 0) {
        this.hoverPause--;
        this.vy = 0;
        this.vx = 0;
        return;
      }
      this.vy += GRAVITY;
      if (this.vy > MAX_FALL) this.vy = MAX_FALL;
      this.x += this.vx;
      this.y += this.vy;

      // Freeze + damage enemies while falling
      for (const e of game.enemies) {
        if (e.dead || this.frozenEnemies.has(e)) continue;
        if (rectOverlap(this, e)) {
          e.takeDamage(this.baseDmg, game, this.x + this.w / 2);
          e.freezeTimer = Math.max(e.freezeTimer, 90);
          const dir = Math.sign(e.x + e.w / 2 - (this.x + this.w / 2)) || 1;
          e.vx += dir * 6;
          e.vy = -4;
          e.knockbackTimer = Math.max(e.knockbackTimer, 12);
          e.stunTimer = Math.max(e.stunTimer, 40);
          this.frozenEnemies.add(e);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#aff', 10, 4, 12));
        }
      }
      if (game.boss && !game.boss.dead && !this.frozenEnemies.has(game.boss) && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.baseDmg, game, this.x + this.w / 2);
        game.boss.freezeTimer = Math.max(game.boss.freezeTimer, 50);
        game.boss.stunTimer = Math.max(game.boss.stunTimer, 25);
        this.frozenEnemies.add(game.boss);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#aff', 12, 4, 14));
      }

      // Land on platforms
      for (const p of game.platforms) {
        if (p.thin) continue;
        if (rectOverlap(this, p) && this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          const impactVy = this.vy;
          this.y = p.y - this.h;
          this.vy = 0;
          this.vx = 0;
          this.falling = false;
          this.landed = true;
          this.grounded = true;
          if (impactVy > 6) {
            damageInRadius(game, this.x + this.w / 2, p.y, 70, this.baseDmg);
            triggerScreenShake(3, 5);
          }
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h, '#aff', 10, 4, 12));
          SFX.slam();
          break;
        }
      }
      // Also land on thin platforms from above
      for (const p of game.platforms) {
        if (!p.thin) continue;
        if (rectOverlap(this, p) && this.vy > 0 && this.y + this.h - this.vy <= p.y + 2) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.vx = 0;
          this.falling = false;
          this.landed = true;
          this.grounded = true;
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h, '#aff', 10, 4, 12));
          SFX.slam();
          break;
        }
      }

      if (this.y > CANVAS_H + 200) this.done = true;
      return;
    }

    // Grounded: if not landed yet (spawned on ground), snap to ground
    if (!this.landed && !this.sliding) {
      // Apply gravity to settle
      this.vy += GRAVITY;
      if (this.vy > MAX_FALL) this.vy = MAX_FALL;
      this.y += this.vy;
      for (const p of game.platforms) {
        if (rectOverlap(this, p) && this.vy >= 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.landed = true;
          this.grounded = true;
          break;
        }
      }
      if (this.y > CANVAS_H + 200) { this.done = true; return; }
    }

    // Sliding physics — block moves after player hit, shatters on enemy/wall contact
    if (this.sliding) {
      this.vy += GRAVITY;
      if (this.vy > MAX_FALL) this.vy = MAX_FALL;
      this.x += this.vx;
      this.y += this.vy;
      this.grounded = false;

      // Platform collision
      for (const p of game.platforms) {
        if (!rectOverlap(this, p)) continue;
        if (p.thin) {
          if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 2) {
            this.y = p.y - this.h;
            this.vy = 0;
            this.grounded = true;
          }
          continue;
        }
        if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          // Floor — land and keep sliding
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
        } else if (this.vx > 0 && this.x + this.w - this.vx <= p.x + 2) {
          // Right wall — shatter
          this.shatter(game);
          return;
        } else if (this.vx < 0 && this.x - this.vx >= p.x + p.w - 2) {
          // Left wall — shatter
          this.shatter(game);
          return;
        }
      }

      // Enemy collision → shatter + damage + freeze
      for (const e of game.enemies) {
        if (e.dead) continue;
        if (rectOverlap(this, e)) {
          const kbDir = Math.sign(this.vx) || 1;
          e.takeDamage(this.baseDmg * 2, game, this.x + this.w / 2, 'crystal');
          e.freezeTimer = Math.max(e.freezeTimer || 0, 90);
          e.stunTimer = Math.max(e.stunTimer || 0, 40);
          e.vx += kbDir * 8;
          e.vy = -3;
          if (e.knockbackTimer !== undefined) e.knockbackTimer = Math.max(e.knockbackTimer, 12);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#aff', 12, 4, 14));
          this.shatter(game);
          return;
        }
      }
      if (game.boss && !game.boss.dead && rectOverlap(this, game.boss)) {
        const kbDir = Math.sign(this.vx) || 1;
        game.boss.takeDamage(this.baseDmg, game, this.x + this.w / 2, 'crystal');
        game.boss.freezeTimer = Math.max(game.boss.freezeTimer || 0, 50);
        game.boss.stunTimer = Math.max(game.boss.stunTimer || 0, 25);
        game.boss.vx = (game.boss.vx || 0) + kbDir * 5;
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#aff', 14, 5, 16));
        this.shatter(game);
        return;
      }

      // Ice friction — very slippery, decelerates slowly
      if (this.grounded) this.vx *= 0.96;
      if (Math.abs(this.vx) < 0.4 && this.grounded) {
        this.vx = 0;
        this.sliding = false;
      }

      // Slide ice-chip particles along the floor
      if (this.grounded && Math.random() < 0.4) {
        game.effects.push(new Effect(
          this.x + Math.random() * this.w,
          this.y + this.h,
          '#cff', 2, 1, 8
        ));
      }

      if (this.y > CANVAS_H + 200) { this.done = true; return; }
      return;
    }

    // Freeze enemies on contact (grounded)
    if (this.landed && this.freezeCooldown <= 0) {
      for (const e of game.enemies) {
        if (e.dead) continue;
        if (rectOverlap(this, e)) {
          e.freezeTimer = Math.max(e.freezeTimer, 60);
          e.stunTimer = Math.max(e.stunTimer, 30);
          this.frozenEnemies.add(e);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#aff', 4, 2, 6));
        }
      }
      if (game.boss && !game.boss.dead && rectOverlap(this, game.boss)) {
        game.boss.freezeTimer = Math.max(game.boss.freezeTimer, 40);
        game.boss.stunTimer = Math.max(game.boss.stunTimer, 20);
        this.frozenEnemies.add(game.boss);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#aff', 4, 2, 6));
      }
      this.freezeCooldown = 30;
    }

    // Auto-shatter if all frozen enemies are dead (and at least one was frozen)
    if (this.frozenEnemies.size > 0 && !this.done) {
      let allDead = true;
      for (const e of this.frozenEnemies) {
        if (!e.dead) { allDead = false; break; }
      }
      if (allDead) this.shatter(game);
    }

    // Time expired
    if (this.timer <= 0 && !this.done) this.shatter(game);

    // Frost particles
    if (this.landed && this.timer > 30 && Math.random() < 0.3) {
      game.effects.push(new Effect(
        this.x + Math.random() * this.w,
        this.y + Math.random() * this.h,
        '#cff', 2, 1, 10
      ));
    }
  }

  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const cx = sx + this.w / 2;
    const cy = sy + this.h / 2;
    const pulse = Math.sin(this.shimmer) * 0.08;

    ctx.save();
    ctx.globalAlpha = 0.75 + pulse;
    // Main ice body
    ctx.fillStyle = '#88eeff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 8;
    ctx.fillRect(sx + 2, sy + 2, this.w - 4, this.h - 4);
    ctx.shadowBlur = 0;

    // Glass-like highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(sx + 4, sy + 4, this.w * 0.4, this.h * 0.3);

    // Inner crystal lines
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sx + this.w * 0.2, sy + this.h * 0.3);
    ctx.lineTo(sx + this.w * 0.5, sy + this.h * 0.6);
    ctx.lineTo(sx + this.w * 0.8, sy + this.h * 0.35);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx + this.w * 0.35, sy + this.h * 0.7);
    ctx.lineTo(sx + this.w * 0.65, sy + this.h * 0.5);
    ctx.stroke();

    // Frost border
    ctx.strokeStyle = '#cff';
    ctx.lineWidth = 2;
    ctx.strokeRect(sx + 1, sy + 1, this.w - 2, this.h - 2);

    // Cracks for damage
    if (this.hp < this.maxHp) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      if (this.hp <= 2) {
        ctx.beginPath();
        ctx.moveTo(cx - 8, cy - 10);
        ctx.lineTo(cx + 2, cy);
        ctx.lineTo(cx + 10, cy + 8);
        ctx.stroke();
      }
      if (this.hp <= 1) {
        ctx.beginPath();
        ctx.moveTo(cx + 6, cy - 8);
        ctx.lineTo(cx - 4, cy + 4);
        ctx.lineTo(cx - 10, cy + 12);
        ctx.stroke();
      }
    }

    ctx.globalAlpha = 1;
    ctx.restore();

    // Flashing when about to expire
    if (this.timer < 60 && Math.floor(this.timer / 6) % 2 === 0) {
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#fff';
      ctx.fillRect(sx, sy, this.w, this.h);
      ctx.restore();
    }

    if (this.hp < this.maxHp) renderHpBar(ctx, cam, this);
  }
}

// ── Bubble (Bubble ninja ability) ─────────────────────────────
class Bubble {
  constructor(x, y, dmg) {
    this.x = x; this.y = y;
    this.w = 32; this.h = 32;
    this.life = 360;
    this.done = false;
    this.bobPhase = Math.random() * Math.PI * 2;
    this.baseY = y;
    this.consumed = false;
    this.dmg = dmg || 2;
  }
  update(game) {
    this.bobPhase += 0.03;
    this.y = this.baseY + Math.sin(this.bobPhase) * 5;
    this.baseY -= 0.15;
    // Homing: slowly drift toward nearest enemy
    if (this.homing) {
      const cx = this.x + 16, cy = this.y + 16;
      const target = findNearestTarget(cx, cy, game);
      if (target) {
        const tx = target.x + target.w / 2, ty = target.y + target.h / 2;
        const dx = tx - cx, dy = ty - cy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 0) {
          this.x += (dx / d) * 1.2;
          this.baseY += (dy / d) * 1.2;
        }
      }
    }
    this.life--;
    if (this.life <= 0) this.pop(game);
    for (const e of game.enemies) {
      if (!e.dead && (e._contactDmgCd || 0) <= 0 && rectOverlap(this, e)) {
        e.takeDamage(this.dmg, game);
        e._contactDmgCd = 10;
        if (this.soaking) e.soakTimer = Math.max(e.soakTimer || 0, 300);
        if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(1);
      }
    }
    if (game.boss && !game.boss.dead && (game.boss._contactDmgCd || 0) <= 0 && rectOverlap(this, game.boss)) {
      game.boss.takeDamage(this.dmg, game);
      game.boss._contactDmgCd = 10;
      if (this.soaking) game.boss.soakTimer = Math.max(game.boss.soakTimer || 0, 200);
      if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(1);
    }
  }
  pop(game) {
    this.done = true;
    let damage = 1;
    for (const b of game.bubbles) {
      if (!b.done) damage += 1;
    }
    game.effects.push(new Effect(this.x + 16, this.y + 16, '#6af', 8, 3, 15));
    damageInRadius(game, this.x + 16, this.y + 16, 80, this.dmg);
    // Fire projectile at nearest target
    const cx = this.x + 16, cy = this.y + 16;
    const nearest = findNearestTarget(cx, cy, game);
    if (nearest) {
      const dx = (nearest.x + nearest.w / 2) - cx;
      const dy = (nearest.y + nearest.h / 2) - cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 0) {
        const bp = new Projectile(cx, cy, (dx / d) * 6, (dy / d) * 6, '#4af', damage + this.dmg, 'player');
        bp.fromSpecial = true;
        game.projectiles.push(bp);
      }
    }
  }
  render(ctx, cam) {
    const alpha = this.life < 60 ? this.life / 60 : 1;
    ctx.globalAlpha = alpha * (this.consumed ? 0.3 : 0.5);
    ctx.fillStyle = this.consumed ? '#8cf' : '#4af';
    ctx.beginPath();
    ctx.arc(this.x + 16 - cam.x, this.y + 16 - cam.y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#8cf';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = alpha * 0.5;
    ctx.beginPath();
    ctx.arc(this.x + 9 - cam.x, this.y + 9 - cam.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ── SmallBubble (short burst bubble for Bubble Ninja attack) ─
class SmallBubble extends Bubble {
  constructor(x, y, facing, dmg) {
    super(x, y, dmg);
    this.w = 16;
    this.h = 16;
    this.life = 150;
    this.facing = facing;
    this.baseY = y;
    this.bobPhase = 0;
    this.vx = 6 * facing + (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1.2;
  }
  update(game) {
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.life--;
    if (this.life <= 0) this.pop(game);
    for (const e of game.enemies) {
      if (!e.dead && rectOverlap(this, e)) {
        e.takeDamage(this.dmg, game);
        this.done = true;
        game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#8cf', 6, 2, 8));
      }
    }
    if (game.boss && !game.boss.dead && rectOverlap(this, game.boss)) {
      game.boss.takeDamage(this.dmg, game);
      this.done = true;
      game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#8cf', 8, 2, 10));
    }
  }
  render(ctx, cam) {
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#8cf';
    ctx.beginPath();
    ctx.arc(this.x + 8 - cam.x, this.y + 8 - cam.y, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}
