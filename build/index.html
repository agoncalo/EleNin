// ── Trimerang (Wind Ninja special) ───────────────────────────
class Trimerang {
  constructor(x, y, vx, vy, owner) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.owner = owner;
    this.radius = 18;
    this.angle = 0;
    this.spin = 0.22 + Math.random() * 0.08;
    this.life = 9999;
    this.done = false;
    this.hitSet = new Set();
    this.turnSpeed = 0.012 + Math.random() * 0.008;
    this.turnDir = Math.random() < 0.5 ? 1 : -1;
    // Orbit state for ultimate
    this.orbiting = false;
    this.orbitTimer = 0;
    this.orbitAngle = Math.random() * Math.PI * 2;
    this.orbitRadius = 60 + Math.random() * 30;
    this.burstAngle = 0;
    this.burstPhase = 0;
  }
  update(game) {
    const pl = game.player;

    // Orbiting mode: circle the player before bursting outward
    if (this.orbiting) {
      this.orbitTimer--;
      this.orbitAngle += 0.12;
      // Orbit around player
      const targetX = pl.x + pl.w / 2 + Math.cos(this.orbitAngle) * this.orbitRadius;
      const targetY = pl.y + pl.h / 2 + Math.sin(this.orbitAngle) * this.orbitRadius;
      this.x = lerp(this.x, targetX, 0.3);
      this.y = lerp(this.y, targetY, 0.3);
      this.angle += this.spin * 1.5;
      // Still damage enemies while orbiting
      this._damageEnemies(game);
      if (this.orbitTimer <= 0) {
        // Burst outward
        this.orbiting = false;
        this.hitSet.clear();
        const burstSpeed = 12;
        this.vx = Math.cos(this.burstAngle) * burstSpeed;
        this.vy = Math.sin(this.burstAngle) * burstSpeed;
        this.life = 180;
        this.burstPhase = 60; // fly straight before homing
        game.effects.push(new Effect(this.x, this.y, '#bfb', 10, 4, 12));
      }
      return;
    }

    // Burst phase: fly straight, no homing, no player catch
    if (this.burstPhase > 0) {
      this.burstPhase--;
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.97;
      this.vy *= 0.97;
      this.angle += this.spin;
      this.life--;
      if (this.life <= 0) { this.done = true; return; }
      this._damageEnemies(game);
      return;
    }

    // Normal homing behavior
    let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    speed *= 0.985;
    let tx, ty;
    if (this.homingEnemy) {
      // Home toward nearest enemy
      let best = null, bestDist = Infinity;
      for (const e of game.enemies) {
        if (e.dead) continue;
        const d = Math.hypot((e.x + e.w / 2) - this.x, (e.y + e.h / 2) - this.y);
        if (d < bestDist) { bestDist = d; best = e; }
      }
      if (game.boss && !game.boss.dead) {
        const d = Math.hypot((game.boss.x + game.boss.w / 2) - this.x, (game.boss.y + game.boss.h / 2) - this.y);
        if (d < bestDist) { bestDist = d; best = game.boss; }
      }
      if (best) { tx = best.x + best.w / 2; ty = best.y + best.h / 2; }
      else { tx = this.x + this.vx; ty = this.y + this.vy; }
    } else {
      tx = pl.x + pl.w / 2;
      ty = pl.y + pl.h / 2;
    }
    const dx = tx - this.x;
    const dy = ty - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const accel = Math.min(0.18, dist / 900);
    const ax = (dx / dist) * accel;
    const ay = (dy / dist) * accel;
    this.vx += ax;
    this.vy += ay;
    const maxSpeed = 10;
    const newSpd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (newSpd > maxSpeed) {
      this.vx *= maxSpeed / newSpd;
      this.vy *= maxSpeed / newSpd;
    }
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.spin;
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    this._damageEnemies(game);
    // If player touches it, end (only for player-homing trimerangs)
    if (!this.homingEnemy && Math.hypot((pl.x + pl.w / 2) - this.x, (pl.y + pl.h / 2) - this.y) < this.radius + Math.max(pl.w, pl.h) / 2) {
      this.done = true;
      game.effects.push(new Effect(this.x, this.y, '#fff', 12, 4, 16));
    }
    if (!this._destroyEffect && this.done) {
      game.effects.push(new Effect(this.x, this.y, '#bff', 14, 4, 18));
      this._destroyEffect = true;
    }
  }
  _damageEnemies(game) {
    for (const e of game.enemies) {
      if (!e.dead && !this.hitSet.has(e) && Math.hypot((e.x + e.w / 2) - this.x, (e.y + e.h / 2) - this.y) < this.radius + Math.max(e.w, e.h) / 2) {
        e.takeDamage(game.player.type.attackDamage + game.player.bonusElemental + game.player.windPower, game, this.x, undefined, 'shuriken');
        if(!e.grounded && !e.flying) e.juggleState = true;
        this.hitSet.add(e);
        if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(2);
        game.effects.push(new Effect(this.x, this.y, '#bfb', 8, 3, 10));
      }
    }
    if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && Math.hypot((game.boss.x + game.boss.w / 2) - this.x, (game.boss.y + game.boss.h / 2) - this.y) < this.radius + Math.max(game.boss.w, game.boss.h) / 2) {
      game.boss.takeDamage(game.player.type.attackDamage + game.player.bonusElemental + game.player.windPower, game, this.x, undefined, 'shuriken');
      if(!game.boss.grounded && !game.boss.flying) game.boss.juggleState = true;
      this.hitSet.add(game.boss);
      if (!game.player.ultimateReady && !game.player.ultimateActive) game.player.addUltimateCharge(3);
      game.effects.push(new Effect(this.x, this.y, '#bfb', 10, 4, 12));
    }
  }
  render(ctx, cam) {
    ctx.save();
    ctx.translate(this.x - cam.x, this.y - cam.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = 0.92;
    ctx.beginPath();
    let a = 0;
    ctx.moveTo(Math.cos(a) * this.radius, Math.sin(a) * this.radius);
    for (let i = 1; i <= 3; i++) {
      a = (i * Math.PI * 2) / 3;
      ctx.lineTo(Math.cos(a) * this.radius, Math.sin(a) * this.radius);
    }
    ctx.closePath();
    ctx.fillStyle = '#bfb';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ── DiamondShard (Crystal Ninja special) ─────────────────────
class DiamondShard {
  constructor(x, y, owner, game) {
    this.x = x; this.y = y;
    this.owner = owner;
    this.w = 20; this.h = 20;
    this.radius = 14;
    this.done = false;
    this.life = 300;
    this.hitSet = new Set();
    // Aim at nearest enemy on spawn — fixed direction, no rotation
    this.maxSpeed = 7;
    this.speed = 0; // starts frozen, builds momentum
    let target = null;
    let minDist = Infinity;
    const pFacing = game && game.player ? game.player.facing : 1;
    if (game) {
      for (const e of game.enemies) {
        if (e.dead) continue;
        const dx = (e.x + e.w / 2) - x;
        const dy = (e.y + e.h / 2) - y;
        // Skip enemies directly behind the ninja (within ~90° cone behind)
        if (dx * pFacing < 0 && Math.abs(dy) < Math.abs(dx)) continue;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < minDist) { minDist = d; target = e; }
      }
      if (game.boss && !game.boss.dead) {
        const dx = (game.boss.x + game.boss.w / 2) - x;
        const dy = (game.boss.y + game.boss.h / 2) - y;
        if (!(dx * pFacing < 0 && Math.abs(dy) < Math.abs(dx))) {
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < minDist) { minDist = d; target = game.boss; }
        }
      }
    }
    if (target) {
      const dx = (target.x + target.w / 2) - x;
      const dy = (target.y + target.h / 2) - y;
      this.angle = Math.atan2(dy, dx) + Math.PI / 2; // point tip toward enemy
    } else {
      const facing = game && game.player ? game.player.facing : 1;
      this.angle = facing > 0 ? Math.PI / 2 + Math.PI / 2 : -Math.PI / 2 + Math.PI / 2;
    }
    this.dirX = Math.sin(this.angle); // travel direction from angle
    this.dirY = -Math.cos(this.angle);
  }
  update(game) {
    // Build momentum gradually
    if (this.speed < this.maxSpeed) {
      this.speed += 0.25;
      if (this.speed > this.maxSpeed) this.speed = this.maxSpeed;
    }
    this.x += this.dirX * this.speed;
    this.y += this.dirY * this.speed;
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    // Deflect enemy projectiles on contact
    for (const p of game.projectiles) {
      if (p.done || p.owner === 'player' || p.owner === 'boss') continue;
      const dx = p.x - this.x;
      const dy = p.y - this.y;
      if (Math.sqrt(dx * dx + dy * dy) < this.radius + 10) {
        p.vx = -p.vx;
        p.vy = -p.vy;
        p.owner = 'player';
        p.reflected = true;
        p.color = '#aff';
        game.effects.push(new Effect(p.x, p.y, '#aff', 6, 2, 8));
        SFX.reflect();
      }
    }
    // Damage enemies — disappear on impact, slow them down
    for (const e of game.enemies) {
      if (!e.dead && !this.hitSet.has(e)) {
        const dx = (e.x + e.w / 2) - this.x;
        const dy = (e.y + e.h / 2) - this.y;
        if (Math.sqrt(dx * dx + dy * dy) < this.radius + Math.max(e.w, e.h) / 2) {
          const dmg = game.player.type.attackDamage + game.player.bonusElemental + 1;
          if (e.takeDamage(dmg, game, this.x)) {
            e.launchIceSlide(game, this.x, dmg);
          }
          game.effects.push(new Effect(this.x, this.y, '#aff', 8, 3, 10));
          triggerHitstop(3);
          this.done = true;
          return;
        }
      }
    }
    // Damage boss — disappear on impact, slow them down
    if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss)) {
      const dx = (game.boss.x + game.boss.w / 2) - this.x;
      const dy = (game.boss.y + game.boss.h / 2) - this.y;
      if (Math.sqrt(dx * dx + dy * dy) < this.radius + Math.max(game.boss.w, game.boss.h) / 2) {
        const dmg = game.player.type.attackDamage + game.player.bonusElemental + 1;
        if (game.boss.takeDamage(dmg, game, this.x)) {
          game.boss.launchIceSlide(game, this.x, dmg);
        }
        game.effects.push(new Effect(this.x, this.y, '#aff', 10, 4, 12));
        triggerHitstop(3);
        this.done = true;
        return;
      }
    }
    // Done when off-screen far
    if (this.x < game.camera.x - 200 || this.x > game.camera.x + CANVAS_W + 200 ||
        this.y < game.camera.y - 200 || this.y > game.camera.y + CANVAS_H + 200) {
      this.done = true;
    }
  }
  render(ctx, cam) {
    ctx.save();
    ctx.translate(this.x - cam.x, this.y - cam.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = 0.7 + (this.speed / this.maxSpeed) * 0.25;
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(0, -this.radius);
    ctx.lineTo(this.radius * 0.6, 0);
    ctx.lineTo(0, this.radius);
    ctx.lineTo(-this.radius * 0.6, 0);
    ctx.closePath();
    ctx.fillStyle = '#aff';
    ctx.shadowColor = '#0ff';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Inner facet
    ctx.beginPath();
    ctx.moveTo(0, -this.radius * 0.5);
    ctx.lineTo(this.radius * 0.25, 0);
    ctx.lineTo(0, this.radius * 0.5);
    ctx.lineTo(-this.radius * 0.25, 0);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ── Projectile ───────────────────────────────────────────────
class Projectile {
  constructor(x, y, vx, vy, color, damage, owner) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.w = 8; this.h = 6;
    this.color = color;
    this.damage = damage;
    this.owner = owner; // 'player' or 'enemy'
    this.done = false;
    this.life = 180;
    this.reflected = false;
    this.bouncy = false;
    this.piercing = false;
    this.hitSet = new Set();
  }
  _dropOrDie() { this.done = true; }
  update(game) {
    // Orbiting mode: circle the player, bypass terrain
    if (this.orbiting) {
      const pl = game.player;
      this.orbitAngle += this.orbitSpeed;
      this.x = pl.x + pl.w / 2 + Math.cos(this.orbitAngle) * this.orbitRadius - this.w / 2;
      this.y = pl.y + pl.h / 2 + Math.sin(this.orbitAngle) * this.orbitRadius - this.h / 2;
      this.life--;
      if (this.life <= 0) { this.done = true; return; }
      // Water trail particles
      if (this.life % 3 === 0) {
        game.effects.push(new Effect(
          this.x + this.w / 2 + (Math.random() - 0.5) * 6,
          this.y + this.h / 2 + (Math.random() - 0.5) * 6,
          '#48f', 3, 1.2, 8
        ));
      }
      // Hit enemies while orbiting
      for (const e of game.enemies) {
        if (!e.dead && !this.hitSet.has(e) && rectOverlap(this, e)) {
          e.takeDamage(this.damage, game, this.x);
          if(!e.grounded && !e.flying) e.juggleState = true;
          if (this.soaking) {
            e.soakTimer = Math.max(e.soakTimer, 300);
            game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#48f', 8, 3, 12));
          }
          this.hitSet.add(e);
          if (!game.player.ultimateReady && !game.player.ultimateActive) {
            game.player.addUltimateCharge(2);
          }
        }
      }
      // Hit boss while orbiting
      if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.damage, game, this.x);
        if(!game.boss.grounded && !game.boss.flying) game.boss.juggleState = true;
        if (this.soaking) {
          game.boss.soakTimer = Math.max(game.boss.soakTimer, 300);
          game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#48f', 10, 4, 14));
        }
        this.hitSet.add(game.boss);
        if (!game.player.ultimateReady && !game.player.ultimateActive) {
          game.player.addUltimateCharge(3);
        }
      }
      return;
    }
    if (this.bouncy) this.vy += 0.15 * (this.gravScale || 1);
    // Homing shuriken: gently steer toward nearest enemy
    if (this.homing && this.owner === 'player') {
      const target = findNearestTarget(this.x, this.y, game, 0);
      if (target) {
        const tdx = (target.x + target.w / 2) - (this.x + this.w / 2);
        const tdy = (target.y + target.h / 2) - (this.y + this.h / 2);
        const td = Math.sqrt(tdx * tdx + tdy * tdy);
        if (td > 0) {
          const sp = Math.sqrt(this.vx * this.vx + this.vy * this.vy) || 8;
          this.vx += (tdx / td) * 0.6;
          this.vy += (tdy / td) * 0.6;
          const ns = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          if (ns > 0) { this.vx = (this.vx / ns) * sp; this.vy = (this.vy / ns) * sp; }
        }
      }
    }
    this.x += this.vx;
    this.y += this.vy;
    // Dropped shuriken: fall with gravity, sit on platforms, wait for pickup
    if (this.dropped) {
      this.dropLife--;
      if (this.dropLife <= 0) { this.done = true; return; }
      this.vy += GRAVITY * 0.5;
      if (this.vy > MAX_FALL) this.vy = MAX_FALL;
      this.y += this.vy;
      // Land on platforms
      for (const p of game.platforms) {
        if (p.thin && this.vy < 0) continue;
        if (this.x + this.w > p.x && this.x < p.x + p.w && this.y + this.h > p.y && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          this.vy = 0;
          break;
        }
      }
      return;
    }
    this.life--;
    if (this.life <= 0) {
      if (this.isKunai && this.owner === 'player') this._kunaiExplode(game);
      // Player shurikens drop instead of disappearing
      if (this.isShuriken && this.owner === 'player' && !this.isKunai) {
        this.dropped = true;
        this.dropLife = 300; // 5 seconds to pick up
        this.vx = 0;
        this.vy = 0;
        return;
      }
      this.done = true; return;
    }
    if (this.isFireball && this.life % 2 === 0) {
      game.effects.push(new Effect(
        this.x + this.w / 2 + (Math.random() - 0.5) * 6,
        this.y + this.h / 2 + (Math.random() - 0.5) * 6,
        Math.random() > 0.5 ? '#f80' : '#f50', 4, 1.5, 6
      ));
    }
    // Fire projectiles leave flame trails on the ground
    if (this.isFireball && this.owner === 'player' && this.life % 8 === 0) {
      const flameDmg = Math.max(1, Math.floor(this.damage / 3));
      game.flamePools.push(new FlamePool(this.x + this.w / 2 - 14, this.y + this.h / 2, flameDmg));
    }
    // Hit platforms (skip thin platforms; bouncy only collides downward)
    if (this.owner !== 'boss' || (this.bouncy && this.bouncesLeft > 0)) {
      for (const p of game.platforms) {
        if (p.thin) continue;
        if (this.isKunai || this.noPlat || (this.isShuriken && this.piercing)) continue; // Kunai/mecha/piercing shurikens pass through platforms
        if (rectOverlap(this, p)) {
          if (this.bouncy && (this.bouncesLeft > 0 || this.life > 30)) {
            // Only bounce off the top of platforms (falling down onto them)
            if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 6) {
              this.y = p.y - this.h; this.vy = -this.vy * 0.75;
              if (this.bouncesLeft > 0) this.bouncesLeft--;
              this.life -= 25;
            }
            return;
          }
          this._dropOrDie();
          if (this.isKunai && this.owner === 'player') this._kunaiExplode(game);
          if (this.done) game.effects.push(new Effect(this.x, this.y, this.color, 4, 2, 10));
          return;
        }
      }
    }
    // bounce off level walls and floor (not ceiling)
    if (this.owner === 'boss' && this.bouncy && this.bouncesLeft > 0) {
      if (this.x < 0) { this.x = 0; this.vx = Math.abs(this.vx) * 0.85; this.bouncesLeft--; }
      if (this.x + this.w > game.levelW) { this.x = game.levelW - this.w; this.vx = -Math.abs(this.vx) * 0.85; this.bouncesLeft--; }
      if (this.y + this.h > 480) { this.y = 480 - this.h; this.vy = -Math.abs(this.vy) * 0.75; this.bouncesLeft--; }
    }
    // Enemy/boss projectiles blocked by earth constructs
    if ((this.owner === 'enemy' || this.owner === 'boss') && !this.fromConstruct) {
      for (const b of game.stoneBlocks) {
        if (!b.done && rectOverlap(this, b)) {
          this.done = true;
          game.effects.push(new Effect(this.x, this.y, '#a87', 6, 2, 10));
          return;
        }
      }
    }
    if (this.owner === 'player') {
      for (const e of game.enemies) {
        if (!e.dead && !this.hitSet.has(e) && rectOverlap(this, e)) {

          // Kunai is unblockable — skip all shield/deflect checks
          if (!this.isKunai) {
            // Shielded: block projectiles within shield arc (stops even piercing, no pip loss)
            if (e.type === 'shielded' && e.shieldHp > 0 && e._shieldBlocks(this.x, undefined, game)) {
              e.shieldFlash = 6;
              e.shieldBump = 6;
              const shAng = e.shieldAngle;
              game.effects.push(new Effect(
                e.x + e.w / 2 + Math.cos(shAng) * e.w * 0.6, e.y + e.h / 2 + Math.sin(shAng) * e.w * 0.6, '#5ff', 8, 3, 10
              ));
              this._dropOrDie();
              return;
            }
            // Protector: block projectiles within shield arc (stops even piercing, no pip loss)
            if (e.type === 'protector' && e.shieldHp > 0 && e._shieldBlocks(this.x, undefined, game)) {
              e.shieldFlash = 6;
              e.shieldBump = 6;
              const shAng = e.shieldAngle;
              game.effects.push(new Effect(
                e.x + e.w / 2 + Math.cos(shAng) * e.w * 0.6, e.y + e.h / 2 + Math.sin(shAng) * e.w * 0.6, '#4f8', 8, 3, 10
              ));
              this._dropOrDie();
              return;
            }

            // Deflector: deflect projectiles back (always deflects when ready, any direction)
            if (e.type === 'deflector' && e.deflectReady && !e.freezeTimer) {
              e.deflectReady = false;
              e.deflectTimer = e.big ? 50 : 80;
              e.deflectFlash = 12;
              this.vx = -this.vx * 1.2;
              this.vy = (Math.random() - 0.5) * 2;
              this.owner = 'enemy';
              this.damage = Math.max(this.damage, 3);
              this.color = '#aaf';
              this.hitSet.clear();
              game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h * 0.4, '#eef', 10, 4, 12));
              SFX.hit();
              triggerHitstop(4);
              return;
            }
          }

          const _srcType = (this.isShuriken || this.isKunai) ? 'shuriken' : undefined;
          const _dmgHit = e.takeDamage(this.damage, game, this.x, undefined, _srcType);
          if (!this.fromSpecial) game.player.mana = Math.min(game.player.mana + 0.25, game.player.maxMana);
          // Kunai explosion: AoE blast on impact
          if (this.isKunai) {
            this._kunaiExplode(game, e);
          }
          // Freeze dust: freeze + ice slide on hit (skip if healed/resisted)
          if (this.freezeDust && _dmgHit) {
            e.launchIceSlide(game, this.x, this.damage);
          }
          // Soaking: apply soak on hit
          if (this.soaking) {
            e.soakTimer = Math.max(e.soakTimer, 300);
            game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#48f', 8, 3, 12));
          }
          // Shadow paralyse: electric stun on hit
          if (this.shadowParalyse) {
            if (e.element === 'lightning') {
              e.hp = Math.min(e.hp + 2, e.maxHp);
              game.effects.push(new TextEffect(e.x + e.w / 2, e.y - 10, '+2', '#ff0'));
            } else {
              e.paralyseTimer = Math.max(e.paralyseTimer, 45);
              e.vx = 0;
              e.vy = 0;
              game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#ff0', 8, 3, 12));
            }
          }
          // Pushback effect (skip if ice sliding)
          if (!this.freezeDust) {
            const dx = e.x + e.w / 2 - (this.x + this.w / 2);
            const dy = e.y + e.h / 2 - (this.y + this.h / 2);
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const pushStrength = 6;
            e.vx += (dx / dist) * pushStrength;
            e.vy += (dy / dist) * (pushStrength * 0.3);
          }
          this.hitSet.add(e);
          if (game.player.ninjaType === 'fire') {
            e.burnTimer = 150;
            game.player.comboMeter = Math.min(game.player.comboMeter + 1, 10);
            game.player.comboTimer = 180;
            if (game.player.comboMeter >= 10) {
              e.burnTimer = 150;
            }
            if (game.player.comboMeter >= 8 && !game.player.fireArmor) {
              game.player.fireArmor = true;
              game.player.fireArmorTimer = 300;
              SFX.armor();
              game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f93', 15, 4, 20));
            }
          }
          // Ultimate charge gain: projectile hit
          if (!game.player.ultimateReady && !game.player.ultimateActive) {
            game.player.addUltimateCharge(2);
          }
          if (!this.piercing) { this._dropOrDie(); return; }
          game.effects.push(new Effect(this.x, this.y, this.color, 4, 2, 8));
        }
      }
      // Hit boss
      if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && rectOverlap(this, game.boss)) {
        // Kunai is unblockable — skip all shield/deflect checks for bosses
        if (!this.isKunai) {
          // Shielded boss: block projectiles within shield arc (no pip loss)
          if (game.boss.bossType === 'shielded' && game.boss.shieldHp > 0 && game.boss._shieldBlocks(this.x, undefined, game)) {
            game.boss.shieldFlash = 6;
            game.boss.shieldBump = 8;
            const shAng = game.boss.shieldAngle;
            game.effects.push(new Effect(
              game.boss.x + game.boss.w / 2 + Math.cos(shAng) * game.boss.w * 0.7, game.boss.y + game.boss.h / 2 + Math.sin(shAng) * game.boss.w * 0.7, '#5ff', 8, 3, 10
            ));
            this._dropOrDie();
            return;
          }
          // Protector boss: block projectiles within shield arc (no pip loss)
          if (game.boss.bossType === 'protector' && game.boss.shieldHp > 0 && game.boss._shieldBlocks(this.x, undefined, game)) {
            game.boss.shieldFlash = 6;
            game.boss.shieldBump = 8;
            const shAng = game.boss.shieldAngle;
            game.effects.push(new Effect(
              game.boss.x + game.boss.w / 2 + Math.cos(shAng) * game.boss.w * 0.7, game.boss.y + game.boss.h / 2 + Math.sin(shAng) * game.boss.w * 0.7, '#4f8', 8, 3, 10
            ));
            this._dropOrDie();
            return;
          }
          // Deflector boss: deflect projectiles back when ready
          if (game.boss.bossType === 'deflector' && game.boss.deflectReady && !game.boss.freezeTimer) {
            game.boss.deflectReady = false;
            game.boss.deflectFlash = 12;
            this.vx = -this.vx * 1.2;
            this.vy = (Math.random() - 0.5) * 2;
            this.owner = 'enemy';
            this.damage = Math.max(this.damage, 3);
            this.color = '#aaf';
            this.hitSet.clear();
            game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h * 0.4, '#eef', 10, 4, 12));
            SFX.hit();
            triggerHitstop(4);
            return;
          }
        }
        const _bossSrcType = (this.isShuriken || this.isKunai) ? 'shuriken' : undefined;
        const _bossDmgHit = game.boss.takeDamage(this.damage, game, this.x, undefined, _bossSrcType);
        if (!this.fromSpecial) game.player.mana = Math.min(game.player.mana + 0.25, game.player.maxMana);
        // Kunai explosion on boss hit
        if (this.isKunai) {
          this._kunaiExplode(game);
        }
        // Freeze dust: freeze + slide boss on hit (skip if healed/resisted)
        if (this.freezeDust && _bossDmgHit) {
          game.boss.launchIceSlide(game, this.x, this.damage);
        }
        // Soaking: apply soak on boss hit
        if (this.soaking) {
          game.boss.soakTimer = Math.max(game.boss.soakTimer, 300);
          game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#48f', 10, 4, 14));
        }
        // Shadow paralyse: electric stun boss on hit
        if (this.shadowParalyse) {
          game.boss.paralyseTimer = Math.max(game.boss.paralyseTimer, 30);
          game.boss.vx = 0;
          game.boss.vy = 0;
          game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#ff0', 10, 4, 14));
        }
        this.hitSet.add(game.boss);
        if (game.player.ninjaType === 'fire') {
          game.boss.burnTimer = 150;
          game.player.comboMeter = Math.min(game.player.comboMeter + 1, 10);
          game.player.comboTimer = 180;
          if (game.player.comboMeter >= 10) {
            game.boss.burnTimer = 150;
          }
          if (game.player.comboMeter >= 8 && !game.player.fireArmor) {
            game.player.fireArmor = true;
            game.player.fireArmorTimer = 300;
            SFX.armor();
            game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f93', 15, 4, 20));
          }
        }
        // Ultimate charge gain: projectile hit boss
        if (!game.player.ultimateReady && !game.player.ultimateActive) {
          game.player.addUltimateCharge(3);
        }
        if (!this.piercing) { this._dropOrDie(); return; }
        game.effects.push(new Effect(this.x, this.y, this.color, 4, 2, 8));
      }
    } else {
      const pl = game.player;
      if (rectOverlap(this, pl.getHurtbox())) {
        const isBoss = this.owner === 'boss';
        let srcType = this.sourceType || null;
        if (!srcType && isBoss && game.boss) srcType = game.boss.bossType;
        const ki = { type: srcType || 'enemy', element: this.element || null, isBoss: isBoss };
        pl.takeDamage(this.damage, game, this.element || null, ki);
        this.done = true;
      }
    }
  }

  _kunaiExplode(game, skipEnemy) {
    if (this._kunaiExploded) return;
    this._kunaiExploded = true;
    const kx = this.x + this.w / 2, ky = this.y + this.h / 2;
    const maxShur = this.kunaiMaxShurikens || 3;
    const radius = 50 + maxShur * 10;
    const dmg = Math.round((this.kunaiDmg || this.damage) * (1 + maxShur * 0.15));
    // Massive multi-layered explosion
    game.effects.push(new Effect(kx, ky, '#fff', 12, 10, 18));
    game.effects.push(new Effect(kx, ky, '#f44', 25, 8, 25));
    game.effects.push(new Effect(kx, ky, '#fa3', 20, 6, 22));
    game.effects.push(new Effect(kx, ky, '#ff0', 15, 5, 20));
    game.effects.push(new Effect(kx, ky, '#f66', 10, 3, 30));
    // Ring of sparks
    for (let a = 0; a < 12; a++) {
      const angle = (a / 12) * Math.PI * 2;
      const rx = kx + Math.cos(angle) * radius * 0.4;
      const ry = ky + Math.sin(angle) * radius * 0.4;
      game.effects.push(new Effect(rx, ry, a % 2 === 0 ? '#f80' : '#ff0', 4, 3, 14));
    }
    // Shockwave ring effect
    game.effects.push(new Effect(kx, ky, '#f88', 30, 12, 12));
    SFX.hit();
    //SFX.play(80, 'sawtooth', 0.4, 0.3, 0);
    //SFX.play(150, 'square', 0.2, 0.2, 0.05);
    triggerHitstop(6);
    for (const e2 of game.enemies) {
      if (!e2.dead && e2 !== skipEnemy) {
        const edx = (e2.x + e2.w / 2) - kx, edy = (e2.y + e2.h / 2) - ky;
        const ed = Math.sqrt(edx * edx + edy * edy);
        if (ed < radius) {
          e2.takeDamage(dmg, game, kx);
          const push = 12 * (1 - ed / radius);
          if (ed > 0) { e2.vx += (edx / ed) * push; e2.vy -= 4 * (1 - ed / radius); }
        }
      }
    }
    if (game.boss && !game.boss.dead) {
      const bdx = (game.boss.x + game.boss.w / 2) - kx, bdy = (game.boss.y + game.boss.h / 2) - ky;
      const bd = Math.sqrt(bdx * bdx + bdy * bdy);
      if (bd < radius) game.boss.takeDamage(dmg, game, kx);
    }
  }

  render(ctx, cam) {
    const sx = this.x - cam.x, sy = this.y - cam.y;

    if (this.freezeDust) {
      // Sparkly dust cloud
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#aff';
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 6;
      for (let i = 0; i < 4; i++) {
        const ox = Math.sin(this.life * 0.3 + i * 1.5) * 4;
        const oy = Math.cos(this.life * 0.4 + i * 1.2) * 3;
        ctx.fillRect(sx + ox, sy + oy, 3, 3);
      }
      ctx.shadowBlur = 0;
      ctx.restore();
      return;
    }
    if (this.isFireball) {
      ctx.save();
      const cx = sx + this.w / 2, cy = sy + this.h / 2;
      const r = this.w / 2 + 2;
      // Trailing flame tail
      const tailLen = 20;
      const dir = this.vx > 0 ? 1 : -1;
      const grad = ctx.createLinearGradient(
        cx - dir * tailLen, cy, cx + dir * 8, cy
      );
      grad.addColorStop(0, 'rgba(255,80,0,0)');
      grad.addColorStop(0.4, 'rgba(255,120,0,0.4)');
      grad.addColorStop(1, 'rgba(255,200,50,0.6)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(cx - dir * tailLen * 0.3, cy, tailLen, 14, 0, 0, Math.PI * 2);
      ctx.fill();
      // Outer glow
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#f50';
      ctx.beginPath();
      ctx.arc(cx, cy, r + 6 + Math.sin(this.life * 1.2) * 3, 0, Math.PI * 2);
      ctx.fill();
      // Core
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#f80';
      ctx.beginPath();
      ctx.arc(cx, cy, r + Math.sin(this.life * 1.2) * 3, 0, Math.PI * 2);
      ctx.fill();
      // Hot center
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = '#fe4';
      ctx.beginPath();
      ctx.arc(cx + dir * 3, cy, r * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }
    if (this.piercing) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(sx + this.w / 2, sy + this.h / 2, this.w * 0.9, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (this.isShuriken) {
      ctx.save();
      const scx = sx + this.w / 2, scy = sy + this.h / 2;
      ctx.translate(scx, scy);
      if (this.dropped) {
        // Dropped: blink when expiring soon, no spin, add glow
        if (this.dropLife < 60 && Math.floor(this.dropLife / 4) % 2 === 0) { ctx.restore(); return; }
        ctx.globalAlpha = Math.min(1, this.dropLife / 60);
        ctx.shadowColor = '#ff0';
        ctx.shadowBlur = 6;
      } else {
        ctx.rotate(this.life * 0.4);
      }
      ctx.fillStyle = '#ccc';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(-1, -5, 2, 5);
        ctx.rotate(Math.PI / 2);
      }
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.arc(0, 0, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      return;
    }
    ctx.fillStyle = this.color;
    ctx.fillRect(sx, sy, this.w, this.h);
    // trail
    ctx.globalAlpha = 0.4;
    ctx.fillRect(this.x - this.vx - cam.x, this.y - this.vy - cam.y, this.w, this.h);
    if (this.piercing) {
      ctx.globalAlpha = 0.2;
      ctx.fillRect(this.x - this.vx * 2 - cam.x, this.y - this.vy * 2 - cam.y, this.w, this.h);
    }
    ctx.globalAlpha = 1;
  }
}

// ── HitLine — telegraph laser; the scanline IS the hurtbox ───
class HitLine {
  constructor(x, y, vx, vy, color, damage, owner, opts) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.damage = damage;
    this.owner = owner;
    opts = opts || {};
    this.element = opts.element || null;
    this.maxTimer = opts.maxTimer || 50;
    this.timer = 0;
    this.done = false;
    // Spread support: multiple rays fanned around base direction
    this.count = opts.count || 1;
    this.arc = opts.arc || 0.35;
    // Flash frames after firing before going away
    this.flashDur = 12;
    this.fired = false;
  }
  update(game) {
    if (this.fired) {
      this.timer++;
      if (this.timer >= this.flashDur) this.done = true;
      return;
    }
    this.timer++;
    if (this.timer >= this.maxTimer) {
      this._fire(game);
    }
  }
  // Returns the unit direction angle(s) for each ray
  _angles() {
    const base = Math.atan2(this.vy, this.vx);
    const out = [];
    const n = this.count;
    for (let i = 0; i < n; i++) {
      const off = n > 1 ? (i - (n - 1) / 2) * (this.arc / Math.max(n - 1, 1)) : 0;
      out.push(base + off);
    }
    return out;
  }
  _fire(game) {
    this.fired = true;
    this.hitPlayer = false;
    this.timer = 0; // reuse timer for flash countdown
    const angles = this._angles();
    const pl = game.player;
    if (pl.invincibleTimer <= 0) {
      const pcx = pl.x + pl.w / 2;
      const pcy = pl.y + pl.h / 2;
      const threshold = Math.max(pl.w, pl.h) / 2 + 5;
      for (const a of angles) {
        const dirX = Math.cos(a), dirY = Math.sin(a);
        const tDot = (pcx - this.x) * dirX + (pcy - this.y) * dirY;
        if (tDot >= 0) {
          const closestX = this.x + dirX * tDot;
          const closestY = this.y + dirY * tDot;
          const dist = Math.sqrt((pcx - closestX) ** 2 + (pcy - closestY) ** 2);
          if (dist < threshold) {
            pl.takeDamage(this.damage, game, this.element || null,
              { type: 'shooter', element: this.element, isBoss: (this.owner === 'boss') });
            this.hitPlayer = true;
            // Extra impact on top of normal takeDamage feedback
            triggerHitstop(10);
            triggerScreenShake(7, 14);
            game.effects.push(new ScreenFlash(this.color, 0.38, 16));
            // Burst of particles at player position
            game.effects.push(new Effect(pcx, pcy, this.color, 14, 5, 16));
            game.effects.push(new Effect(pcx, pcy, '#fff', 6, 3, 10));
            break; // only hit once even with spread
          }
        }
      }
    }
    // Miss feedback: origin burst + light shake so the player reads the timing
    if (!this.hitPlayer) {
      triggerHitstop(3);
      triggerScreenShake(3, 8);
      game.effects.push(new Effect(this.x, this.y, this.color, 8, 4, 12));
      game.effects.push(new Effect(this.x, this.y, '#fff', 3, 2, 8));
    }
  }
  render(ctx, cam) {
    const angles = this._angles();
    const sx = this.x - cam.x, sy = this.y - cam.y;
    const lineLen = 700;

    if (this.fired) {
      // Brief solid flash on fire — thicker and longer if it hit
      const fade = 1 - this.timer / this.flashDur;
      ctx.save();
      if (this.hitPlayer) {
        // Two-pass: wide white core + colored halo
        ctx.globalAlpha = fade * 0.7;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 10;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 40;
        for (const a of angles) {
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(sx + Math.cos(a) * lineLen, sy + Math.sin(a) * lineLen);
          ctx.stroke();
        }
        ctx.globalAlpha = fade * 0.95;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 0;
      } else {
        ctx.globalAlpha = fade * 0.9;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 24;
      }
      for (const a of angles) {
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(sx + Math.cos(a) * lineLen, sy + Math.sin(a) * lineLen);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
      return;
    }

    const t = this.timer / this.maxTimer; // 0..1
    // Build-up: dashed → solid, thin → thick, faint → bright
    const alpha = t < 0.6 ? (t / 0.6) * 0.55 : 0.55 + (t - 0.6) / 0.4 * 0.45;
    const lw = t < 0.7 ? 1 + t * 2 : 3 + (t - 0.7) / 0.3 * 2;
    const dashLen = Math.max(2, 12 - t * 10);
    const gapLen = Math.max(1, 8 - t * 7);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = lw;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6 + t * 14;
    ctx.setLineDash([dashLen, gapLen]);
    for (const a of angles) {
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + Math.cos(a) * lineLen, sy + Math.sin(a) * lineLen);
      ctx.stroke();
    }
    ctx.setLineDash([]);

    // Origin flash in final frames
    if (t > 0.75) {
      const fAlpha = (t - 0.75) / 0.25;
      ctx.globalAlpha = fAlpha * 0.85;
      ctx.fillStyle = this.color;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(sx, sy, 5 + fAlpha * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ── Grenade — lobbed explosive thrown by bouncers ─────────────
class Grenade {
  constructor(x, y, vx, vy, color, damage, owner, opts) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.w = 10; this.h = 10;
    this.color = color;
    this.damage = damage;
    this.owner = owner;
    opts = opts || {};
    this.element = opts.element || null;
    this.gravScale = opts.gravScale !== undefined ? opts.gravScale : 0.55;
    this.fuseTimer = opts.fuseTimer !== undefined ? opts.fuseTimer : 90;
    this.maxFuse = this.fuseTimer;
    this.explodeRadius = opts.explodeRadius || 65;
    this.bouncesLeft = opts.bouncesLeft !== undefined ? opts.bouncesLeft : 3;
    this.done = false;
    this.angle = 0;
    this.spin = (Math.random() < 0.5 ? 1 : -1) * (0.06 + Math.random() * 0.08);
    this.resting = false; // fuse only ticks when resting
  }
  update(game) {
    // Fuse only counts down once the grenade has come to rest
    if (this.resting) {
      this.fuseTimer--;
      if (this.fuseTimer <= 0) {
        this._explode(game);
        return;
      }
    }

    this.vy += GRAVITY * this.gravScale;
    if (this.vy > MAX_FALL) this.vy = MAX_FALL;
    this.x += this.vx;
    this.y += this.vy;
    if (!this.resting) this.angle += this.spin;

    // Platform bounce / land
    for (const p of game.platforms) {
      if (rectOverlap(this, p)) {
        if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          if (this.bouncesLeft > 0) {
            this.vy *= -0.5;
            this.vx *= 0.8;
            this.bouncesLeft--;
            game.effects.push(new Effect(
              this.x + this.w / 2, this.y + this.h,
              this.color, 4, 1.5, 6
            ));
          } else {
            // No bounces left — come to rest and start fuse
            this.vy = 0;
            this.vx = 0;
            this.resting = true;
          }
        }
      }
    }

    // Slide to a stop on ground
    if (this.resting) {
      this.vx *= 0.85;
      if (Math.abs(this.vx) < 0.1) this.vx = 0;
    }

    // Cull if far off-screen
    if (this.x < game.camera.x - 300 || this.x > game.camera.x + CANVAS_W + 300 ||
        this.y > game.camera.y + CANVAS_H + 300) {
      this.done = true;
    }
  }
  _explode(game) {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    const r = this.explodeRadius;

    if (this.owner === 'enemy' || this.owner === 'boss') {
      // Damage player
      const pl = game.player;
      const pdx = pl.x + pl.w / 2 - cx;
      const pdy = pl.y + pl.h / 2 - cy;
      if (Math.sqrt(pdx * pdx + pdy * pdy) <= r) {
        if (pl.invincibleTimer <= 0) {
          pl.takeDamage(this.damage, game, this.element || null,
            { type: 'bouncer', element: this.element, isBoss: (this.owner === 'boss') });
        }
      }
    } else {
      // Damage enemies
      const dmgEnemy = (e) => {
        const ex = e.x + e.w / 2, ey = e.y + e.h / 2;
        if (Math.sqrt((ex - cx) ** 2 + (ey - cy) ** 2) <= r) e.takeDamage(this.damage, game, cx);
      };
      for (const e of game.enemies) if (!e.dead) dmgEnemy(e);
      if (game.boss && !game.boss.dead) dmgEnemy(game.boss);
    }

    // Explosion VFX
    game.effects.push(new Effect(cx, cy, this.color, 30, 9, 22));
    game.effects.push(new Effect(cx, cy, '#fff', 18, 6, 14));
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      game.effects.push(new Effect(
        cx + Math.cos(a) * r * 0.45,
        cy + Math.sin(a) * r * 0.45,
        this.color, 12, 3, 12
      ));
    }
    if (typeof triggerHitstop === 'function') triggerHitstop(5);
    this.done = true;
  }
  render(ctx, cam) {
    const sx = this.x - cam.x, sy = this.y - cam.y;
    const cx2 = sx + this.w / 2, cy2 = sy + this.h / 2;
    const fuse = this.fuseTimer;
    // Flickering only applies once fuse is actually counting down
    const flickering = this.resting && fuse < 22 && (Math.floor(fuse / 3) % 2 === 0);

    ctx.save();
    ctx.translate(cx2, cy2);
    ctx.rotate(this.angle);

    // Body
    ctx.globalAlpha = flickering ? 0.45 : 0.92;
    ctx.fillStyle = this.color;
    ctx.shadowColor = flickering ? '#ff0' : this.color;
    ctx.shadowBlur = flickering ? 18 : 5;
    ctx.beginPath();
    ctx.arc(0, 0, this.w / 2 + 1, 0, Math.PI * 2);
    ctx.fill();

    // Dark equator band
    ctx.globalAlpha = 0.45;
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-(this.w / 2 + 1), 0);
    ctx.lineTo(this.w / 2 + 1, 0);
    ctx.stroke();

    // Pin/cap
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = '#bbb';
    ctx.fillRect(-2, -(this.h / 2 + 3), 4, 4);

    ctx.shadowBlur = 0;
    ctx.restore();

    // Fuse arc (shows only once resting, when < half fuse left)
    if (this.resting && fuse < this.maxFuse * 0.55) {
      const t = 1 - fuse / (this.maxFuse * 0.55);
      ctx.save();
      ctx.globalAlpha = 0.55 * t;
      ctx.strokeStyle = '#ff0';
      ctx.lineWidth = 2;
      ctx.shadowColor = '#ff0';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(cx2, cy2, this.w / 2 + 6, -Math.PI / 2, -Math.PI / 2 + t * Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }
}

// === js/pickups.js ===
class TimedPickupOrb extends Orb {
  constructor(x, y, type, opts = {}) {
    super(x, y, type);
    this.w = opts.w || 20;
    this.h = opts.h || 20;
    this.radius = opts.radius || Math.max(this.w, this.h) / 2;
    this.life = opts.life || 600;
    this.maxLife = this.life;
    this.bobTimer = opts.bobTimer ?? Math.random() * Math.PI * 2;
    this.bobSpeed = opts.bobSpeed || 0.06;
    this.done = false;
    this.vx = 0;
    this.vy = 0;
    this.grounded = true;
    this.rare = false;
  }

  tickPickup() {
    if (this.done) return false;
    this.bobTimer += this.bobSpeed;
    this.life--;
    if (this.life <= 0) {
      this.done = true;
      return false;
    }
    return true;
  }

  drawState(cam, bobAmount = 6) {
    if (this.done) return null;
    if (this.life < 120 && Math.floor(this.life / 8) % 2) return null;
    return {
      alpha: this.life < 60 ? this.life / 60 : 1,
      x: this.x - cam.x,
      y: this.y + Math.sin(this.bobTimer) * bobAmount - cam.y,
    };
  }
}

class ShurikenPickupOrb extends TimedPickupOrb {
  constructor(x, y) {
    super(x, y, 'shuriken', { life: 600, bobSpeed: 0.06, w: 20, h: 20 });
  }

  static spawnInterval(game) {
    const collectMode = game.currentObjective && game.currentObjective.type === 'collect';
    return collectMode ? 120 : ((game.player.items && game.player.items.tripleShuriken) ? 150 : 300);
  }

  static spawnPhase() {
    return 60;
  }

  static maxOnScreen(game) {
    return game.currentObjective && game.currentObjective.type === 'collect' ? 6 : 3;
  }

  update(game) {
    if (!this.tickPickup()) return;
    const pl = game.player;
    if (!rectOverlap(pl, this)) return;

    this.done = true;
    SFX.pickup();
    const cx = pl.x + pl.w / 2;
    const cy = pl.y + pl.h / 2;
    if (this.isObjectiveCache(game)) {
      this.collectObjectiveCache(game, cx, cy);
      return;
    }
    this.fireShurikens(game, pl, cx, cy);
  }

  isObjectiveCache(game) {
    return game.currentObjective && game.currentObjective.type === 'collect' &&
      !game.bossActive && !game.boss &&
      game.bossOrbsCollected < game.bossOrbsRequired;
  }

  collectObjectiveCache(game, cx, cy) {
    game.bossOrbCharge = game.bossOrbChargeMax;
    game.effects.push(new Effect(cx, cy, '#ccc', 10, 4, 15));
    game.effects.push(new TextEffect(cx, cy - 22, '\u2726 CACHE!', '#ccc'));
  }

  fireShurikens(game, pl, cx, cy) {
    const color = (pl.ninjaType === 'fire') ? '#f93' :
      (pl.ninjaType === 'crystal') ? '#aff' :
      (pl.ninjaType === 'storm') ? '#48f' : '#ccc';
    const dmg = pl.type.attackDamage + pl.shurikenLevel;
    for (let i = 0; i < pl.maxShurikens; i++) {
      const isLastKunai = pl.items.theKunai && i === pl.maxShurikens - 1;
      const sProj = fireProjectileAtNearestEnemy({
        x: cx, y: cy, game, speed: 8 + i * 1.5, color: isLastKunai ? '#f66' : color,
        damage: dmg, owner: 'player', width: 8, height: 6, facing: pl.facing,
        piercing: true, preferBoss: true, ignoreLOS: true,
      });
      if (!sProj) continue;
      this.applyShurikenTraits(sProj, pl, dmg, isLastKunai);
      if (pl.items.tripleShuriken) this.fireTripleShurikens(game, pl, cx, cy, color, dmg, isLastKunai, sProj);
    }
    SFX.shuriken();
    game.effects.push(new Effect(cx, cy, '#ccc', 12, 5, 18));
    game.effects.push(new TextEffect(cx, cy - 22, '\u2726 SHURIKENS!', '#ccc'));
  }

  fireTripleShurikens(game, pl, cx, cy, color, dmg, isLastKunai, sourceProjectile) {
    for (const triOff of [0.25, -0.25]) {
      const tProj = fireProjectileAtNearestEnemy({
        x: cx, y: cy, game, speed: 8, color: isLastKunai ? '#f66' : color,
        damage: dmg, owner: 'player', width: 8, height: 6, facing: pl.facing,
        piercing: true, preferBoss: true, ignoreLOS: true,
      });
      if (!tProj) continue;
      this.applyShurikenTraits(tProj, pl, dmg, false);
      const ta = Math.atan2(sourceProjectile.vy, sourceProjectile.vx) + triOff;
      const tsp = Math.sqrt(sourceProjectile.vx * sourceProjectile.vx + sourceProjectile.vy * sourceProjectile.vy);
      tProj.vx = Math.cos(ta) * tsp;
      tProj.vy = Math.sin(ta) * tsp;
    }
  }

  applyShurikenTraits(projectile, pl, dmg, isKunai) {
    projectile.isShuriken = true;
    if (pl.ninjaType === 'crystal') projectile.freezeDust = true;
    if (pl.ninjaType === 'shadow' || pl.ninjaType === 'storm') projectile.shadowParalyse = true;
    if (pl.items.homingShuriken) projectile.homing = true;
    if (!isKunai) return;
    projectile.isKunai = true;
    projectile.kunaiDmg = dmg * 2;
    projectile.kunaiMaxShurikens = pl.maxShurikens;
    projectile.life = 30;
  }

  render(ctx, cam) {
    const state = this.drawState(cam);
    if (!state) return;
    ctx.save();
    ctx.globalAlpha = state.alpha;
    ctx.translate(state.x + 10, state.y + 10);
    ctx.rotate(this.bobTimer * 1.5);
    ctx.fillStyle = '#e0e0e0';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#ccc';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const b = a + Math.PI / 4;
      ctx.lineTo(Math.cos(a) * 9, Math.sin(a) * 9);
      ctx.lineTo(Math.cos(b) * 4, Math.sin(b) * 4);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

class BubbleShieldPickupOrb extends TimedPickupOrb {
  constructor(x, y) {
    super(x, y, 'bubbleshield', { life: 900, bobSpeed: 0.05, w: 20, h: 20 });
  }

  static spawnInterval() {
    return 1200;
  }

  static spawnPhase() {
    return 600;
  }

  static maxOnScreen() {
    return 1;
  }

  update(game) {
    if (!this.tickPickup()) return;
    const pl = game.player;
    if (!rectOverlap(pl, this) || pl.bubbleShieldTimer > 0) return;

    this.done = true;
    SFX.pickup();
    pl.bubbleShieldTimer = pl.bubbleShieldMax;
    const cx = pl.x + pl.w / 2;
    const cy = pl.y + pl.h / 2;
    game.effects.push(new Effect(cx, cy, '#4af', 18, 5, 18));
    game.effects.push(new Effect(cx, cy, '#fff', 8, 3, 12));
    game.effects.push(new TextEffect(cx, cy - 22, '\u2B22 SHIELD!', '#4af'));
  }

  render(ctx, cam) {
    const state = this.drawState(cam);
    if (!state) return;
    ctx.save();
    ctx.globalAlpha = state.alpha;
    ctx.translate(state.x + 10, state.y + 10);
    ctx.shadowColor = '#4af';
    ctx.shadowBlur = 12;
    ctx.fillStyle = 'rgba(60,180,255,0.35)';
    ctx.strokeStyle = '#aef';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.lineTo(8, -10);
    ctx.lineTo(10, -6);
    ctx.lineTo(10, 1);
    ctx.lineTo(0, 10);
    ctx.lineTo(-10, 1);
    ctx.lineTo(-10, -6);
    ctx.lineTo(-8, -10);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = state.alpha * 0.8;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-4, -1); ctx.lineTo(4, -1); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

  // Hurtbox is slightly smaller than the rendered sprite
  getHurtbox() {
    return { x: this.x + 3, y: this.y + 3, w: this.w - 6, h: this.h - 4 };
  }

  get type() { return NINJA_TYPES[this.ninjaType]; }

  _updateActionCharges() {
    const max = this.actionChargeMax || 3;
    const recharge = this.actionRechargeMax || 180;
    if (this.attackCharges === undefined) this.attackCharges = max;
    if (this.specialCharges === undefined) this.specialCharges = max;
    this.attackCharges = max;
    this.attackRechargeTimer = 0;
    if (this.attackFocus === undefined) this.attackFocus = 1;
    if (this.attackFocus < 1) {
      const drop = this.attackFocusDrop || 0.30;
      const focusRecharge = this.attackFocusRechargeMax || 300;
      this.attackFocus = Math.min(1, this.attackFocus + drop / focusRecharge);
    } else {
      this.attackFocus = 1;
    }
    if (this.specialCharges < max) {
      this.specialRechargeTimer = (this.specialRechargeTimer || 0) + 1;
      if (this.specialRechargeTimer >= recharge) {
        this.specialRechargeTimer = 0;
        this.specialCharges = Math.min(max, this.specialCharges + 1);
      }
    } else {
      this.specialRechargeTimer = 0;
    }
  }

  _spendActionCharge(kind, game) {
    if (kind === 'attack') return true;
    const prop = kind === 'special' ? 'specialCharges' : 'attackCharges';
    if (this[prop] === undefined) this[prop] = this.actionChargeMax || 3;
    if (this[prop] <= 0) {
      if (game) game.effects.push(new TextEffect(this.x + this.w / 2, this.y - 12, 'COOLDOWN', '#aaa'));
      if (typeof SFX !== 'undefined' && SFX.miss) SFX.miss();
      return false;
    }
    this[prop]--;
    return true;
  }

  _consumeAttackFocus() {
    if (this.attackFocus === undefined) this.attackFocus = 1;
    this._attackDamageMult = Math.max(this.attackFocusMin || 0.10, Math.min(1, this.attackFocus));
    this.attackFocus = Math.max(this.attackFocusMin || 0.10, this.attackFocus - (this.attackFocusDrop || 0.30));
  }

  _applyAttackFocusDamage(dmg) {
    const mult = Math.max(this.attackFocusMin || 0.10, Math.min(1, this._attackDamageMult || this.attackFocus || 1));
    return Math.max(1, Math.ceil(dmg * mult));
  }

  // Mecha hand punch hit detection
  _mechaHandHit(game, g, hand) {
    // Hitbox spans from golem body top down to hand position for full coverage
    const topY = Math.min(g.y, hand.y - 32);
    const botY = Math.max(g.y + g.h, hand.y + 32);
    const hitBox = { x: hand.x - 32, y: topY, w: 64, h: botY - topY };
    const dmg = (this.type.attackDamage + this.bonusElemental) * 3;
    const gcx = g.x + g.w / 2;
    for (const e of game.enemies) {
      if (!e.dead && rectOverlap(hitBox, e)) {
        e.takeDamage(dmg, game, gcx);
        const kbDir = Math.sign(e.x + e.w / 2 - gcx) || g.facing;
        e.vx = kbDir * 16; e.vy = -10;
        game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#4a8', 12, 4, 14));
      }
    }
    if (game.boss && !game.boss.dead && rectOverlap(hitBox, game.boss)) {
      game.boss.takeDamage(dmg, game, gcx);
      game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#4a8', 16, 5, 18));
    }
    SFX.hit();
    triggerHitstop(3);
  }

  // Ultimate activation — starts the Rondo-of-Blood-style cutscene float
  activateUltimate(game) {
    this.ultimateActive = true;
    this.ultimateReady = false;
    this.ultCutscene = true;
    this.ultCutsceneTimer = 60; // ~1 second float-up before the effect
    this.ultFloatY = this.y - 60; // float up 60px
    this.vx = 0;
    this.vy = 0;
    this.invincibleTimer = 999; // invincible during cutscene
    SFX.victory();
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#fff', 30, 8, 30));
    recordUltimate(this.ninjaType);
  }

  // Called when float phase ends — triggers the actual ultimate effect
  triggerUltimateEffect(game) {
    this.ultCutscene = false;
    switch (this.ninjaType) {
      case 'fire':
        // Meteors rain from the sky — 12 meteors over 3 seconds + 1 big finisher
        this.ultimateTimer = 210;
        this.fireArmor = true;
        this.fireArmorTimer = 270;
        this.fireMeteors = [];
        this.fireMeteorTimer = 0;
        for (let i = 0; i < 12; i++) {
          const delay = i * 15;
          // Target enemies when possible, otherwise scatter randomly
          const aliveEnemies = game.enemies.filter(e => !e.dead);
          let targetX, targetY;
          if (aliveEnemies.length > 0 && i < 8) {
            const target = aliveEnemies[i % aliveEnemies.length];
            targetX = target.x + target.w / 2 + randInt(-30, 30);
            targetY = target.y + target.h / 2 + randInt(-10, 10);
          } else if (game.boss && !game.boss.dead && i >= 8) {
            targetX = game.boss.x + game.boss.w / 2 + randInt(-20, 20);
            targetY = game.boss.y + game.boss.h / 2 + randInt(-10, 10);
          } else {
            targetX = game.camera.x + randInt(100, CANVAS_W - 100);
            targetY = randInt(350, 480);
          }
          const fromLeft = Math.random() < 0.5;
          const offsetX = randInt(150, 300) * (fromLeft ? -1 : 1);
          const startX = targetX + offsetX;
          const startY = game.camera.y - randInt(40, 120);
          this.fireMeteors.push({
            delay,
            x: startX,
            y: startY,
            targetX,
            targetY,
            active: false,
            done: false,
            trail: [],
            speed: 6 + Math.random() * 3,
            size: 10 + randInt(0, 8),
            fromLeft
          });
        }
        // Big finisher meteor — targets center of action
        {
          const bigDelay = 12 * 15 + 20;
          let bigTargetX, bigTargetY;
          if (game.boss && !game.boss.dead) {
            bigTargetX = game.boss.x + game.boss.w / 2;
            bigTargetY = game.boss.y + game.boss.h / 2;
          } else {
            const alive = game.enemies.filter(e => !e.dead);
            if (alive.length > 0) {
              let cx = 0, cy = 0;
              for (const e of alive) { cx += e.x + e.w / 2; cy += e.y + e.h / 2; }
              bigTargetX = cx / alive.length;
              bigTargetY = cy / alive.length;
            } else {
              bigTargetX = this.x + this.w / 2;
              bigTargetY = this.y + this.h / 2 + 40;
            }
          }
          const bigFromLeft = Math.random() < 0.5;
          this.fireMeteors.push({
            delay: bigDelay,
            x: bigTargetX + randInt(200, 400) * (bigFromLeft ? -1 : 1),
            y: game.camera.y - randInt(80, 160),
            targetX: bigTargetX,
            targetY: bigTargetY,
            active: false,
            done: false,
            trail: [],
            speed: 4,
            size: 28,
            fromLeft: bigFromLeft,
            big: true
          });
        }
        SFX.bossSpawn();
        break;

      case 'earth':
        // Summon shmup-boss mecha — big head + hand frame that follows
        this.ultimateTimer = 480; // 8 seconds
        {
        const hcx = this.x + this.w / 2, hcy = this.y - 20;
        this.earthGolem = {
          timer: 480,
          facing: this.facing,
          x: this.x - 24,
          y: this.y - 40,
          w: 112,
          h: 100,
          hp: 50,
          maxHp: 50,
          contactCd: 0,
          // Hand frame follows head with lag
          frameX: hcx,
          frameY: hcy + 140,
          leftHand:  { offX: 0, punchTimer: 0 },
          rightHand: { offX: 0, punchTimer: 0 },
          punchCooldown: 0,
          punchSide: 1,
          missileCooldown: 0,
          ballCooldown: 0,
        };
        }
        SFX.slam();
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#4a8', 25, 6, 20));
        break;

      case 'bubble':
        // Spawn a bubble on every enemy — float and damage them, underwater background
        this.ultimateTimer = 300; // 5 seconds
        {
          const trapped = [];
          for (const e of game.enemies) {
            if (!e.dead) {
              trapped.push({ enemy: e, floatY: e.y, baseY: e.y, bobPhase: Math.random() * Math.PI * 2 });
            }
          }
          if (game.boss && !game.boss.dead) {
            trapped.push({ enemy: game.boss, floatY: game.boss.y, baseY: game.boss.y, bobPhase: Math.random() * Math.PI * 2 });
          }
          this.bubbleUlt = {
            timer: 300,
            trapped,
            underwaterAlpha: 0,
            damageTick: 0,
            bubbleParticles: []
          };
        }
        SFX.special();
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#4af', 25, 6, 20));
        break;

      case 'shadow':
        // Screen goes dark, glowing eyes appear + purple paralysis on all enemies
        this.ultimateTimer = 360; // 6 seconds of buff after cutscene
        this.shadowDarkness = 0;
        this.shadowEyesTimer = 60; // eyes visible for 60 frames
        this.shadowUltBuff = true;
        // Massive initial shadow strike around the player
        damageInRadius(game, this.x + this.w / 2, this.y + this.h / 2, 200, (this.type.attackDamage + this.bonusElemental) * 3);
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#a4e', 40, 10, 30));
        this.shadowStealth = 300;
        this.backstabReady = true;
        // Apply purple paralysis to ALL enemies (including lightning elementals)
        for (const e of game.enemies) {
          if (!e.dead) {
            e.purpleParalyseTimer = 150; // ~2.5 seconds
            e.vx = 0;
            e.vy = 0;
            game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a040ff', 10, 3, 14));
          }
        }
        if (game.boss && !game.boss.dead) {
          game.boss.purpleParalyseTimer = 90; // shorter for boss
          game.boss.vx = 0;
          game.boss.vy = 0;
          game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#a040ff', 14, 4, 16));
        }
        SFX.backstab();
        break;

      case 'crystal': {
        // Shatter glass effect + summon ice/crystal castle
        this.ultimateTimer = 240; // 4 seconds
        this.crystalShatter = 30; // 30 frames of shatter cutscene
        // Freeze all enemies during shatter
        for (const e of game.enemies) {
          if (!e.dead) e.freezeTimer = 90;
        }
        if (game.boss && !game.boss.dead) game.boss.freezeTimer = 60;
        // Create glass shards for visual
        this.crystalShards = [];
        for (let i = 0; i < 24; i++) {
          this.crystalShards.push({
            x: this.x + this.w / 2 + randInt(-40, 40),
            y: this.y + this.h / 2 + randInt(-40, 40),
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 0.5) * 12,
            size: 4 + Math.random() * 8,
            angle: Math.random() * Math.PI * 2,
            spin: (Math.random() - 0.5) * 0.3,
            life: 30
          });
        }
        // Summon the crystal castle centered on player (fills the screen)
        const castleW = 300, castleH = 600;
        const castleX = this.x + this.w / 2 - castleW / 2;
        const castleY = this.y + this.h - castleH;
        this.crystalCastle = true;
        game.crystalCastle = new CrystalCastle(
          castleX, castleY, castleW, castleH,
          this.type.attackDamage + this.bonusElemental, this.wave || 1
        );
        // Lock ninja to castle center
        this.vx = 0; this.vy = 0;
        SFX.parry();
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#fff', 30, 8, 25));
        break;
      }

      case 'wind':
        // Giant bow fires 5 arrows upward, they crash down on enemies
        this.ultimateTimer = 300; // 5 seconds total
        this.windPower = 10;
        this.windBow = {
          timer: 300,
          phase: 'bow',    // 'bow' -> 'fire' -> 'rain'
          bowAlpha: 0,
          bowScale: 0,
          bowTimer: 60,    // bow appears for 1 second
          arrows: [],
          arrowsFired: false,
          centerX: this.x + this.w / 2,
          centerY: this.y + this.h / 2
        };
        // Center camera on player
        game.camera.x = this.x + this.w / 2 - CANVAS_W / 2;
        game.camera.y = this.y + this.h / 2 - CANVAS_H / 2;
        SFX.bossSpawn();
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#bfb', 25, 6, 20));
        this.invincibleTimer = 300;
        break;

      case 'storm':
        // Rain ultimate: soak all enemies, no damage
        this.ultimateTimer = 360; // 6 seconds of rain
        this.stormRaindrops = [];
        // Immediately soak all visible enemies
        for (const e of game.enemies) {
          if (!e.dead) e.soakTimer = 420;
        }
        if (game.boss && !game.boss.dead) game.boss.soakTimer = 420;
        SFX.special();
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#48f', 25, 6, 20));
        break;
    }
    // End invincibility boost (set to just a brief window after cutscene)
    if (this.ninjaType !== 'wind') {
      this.invincibleTimer = 30;
    }
  }

  addUltimateCharge(amount) {
    if (!this.ultimateReady && !this.ultimateActive) {
      this.ultimateCharge = Math.min(this.ultimateCharge + amount, this.ultimateMax);
      if (this.ultimateCharge >= this.ultimateMax) {
        this.ultimateCharge = this.ultimateMax;
        this.ultimateReady = true;
      }
    }
  }

  switchNinja(type) {
    if (this.ninjaType === type) return;
    if (this.ultCutscene || this.earthGolem || this.bubbleRide || this.bubbleUlt || this.windBow || this.crystalCastle) return; // Can't switch during ultimate cutscene, golem, bubble, wind bow, or crystal castle
    this.ninjaType = type;
    try { localStorage.setItem('elenin_lastNinja', type); } catch(e) {}
    this.comboMeter = 0;
    this.comboTimer = 0;
    this.fireArmor = false;
    this.fireArmorTimer = 0;
    this.bubbleBuffTimer = 0;
    this.backstabReady = false;
    this.shadowStealth = 0;
    this.chainStriking = false;
    if (this._spinScythe) { this._spinScythe.recall(); this._spinScythe = null; }
    this.parrying = false;
    this.parryCombo = 0;
    this.parryComboTimer = 0;
    this.crystalCastle = false;
    this.crystalShatter = 0;
    this.crystalShards = null;
    this.windPower = 0;
    this.windDashing = false;
    this.windDashTimer = 0;
    this.stormChaining = false;
    this.stormChainHit = new Set();
    this.stormAfterimages = [];
    this.staggerChaining = false;
    this.staggerChainHit = new Set();
    // Set mana capacity per ninja
    this.maxMana = (MANA_CAPS[type] || 2) + this.bonusMana;
    this.mana = this.maxMana;
  }

  update(game) {
    // Apply highest pending damage from last frame
    this._applyPendingDamage(game);
    this._updateActionCharges();

    // HP no longer fuels actions; attack and magic use separate recharge pips.
    this.focusRegenTimer = 0;

    // Bubble shield countdown
    if (this.bubbleShieldTimer > 0) this.bubbleShieldTimer--;

    // Smooth display bars
    this.displayHp = lerp(this.displayHp, this.hp, 0.12);
    this.displayShield = lerp(this.displayShield, this.shield, 0.12);

    // x2 Orb break animation timer
    if (this.x2OrbBreaking > 0) this.x2OrbBreaking--;

    // ── Ultimate cutscene float phase ──
    if (this.ultCutscene) {
      this.ultCutsceneTimer--;
      // Float upward smoothly
      this.y = lerp(this.y, this.ultFloatY, 0.08);
      this.vx = 0;
      this.vy = 0;
      // Sparkle effects during float
      if (this.ultCutsceneTimer % 6 === 0) {
        const col = this.type.color;
        game.effects.push(new Effect(
          this.x + this.w / 2 + randInt(-20, 20),
          this.y + this.h / 2 + randInt(-20, 20),
          col, 6, 2, 12
        ));
      }
      if (this.ultCutsceneTimer <= 0) {
        this.triggerUltimateEffect(game);
      }
      return; // Skip all normal update during cutscene
    }

    // ── Death respawn delay ──
    if (this.deathTimer > 0) {
      this.deathTimer--;
      if (this.deathTimer <= 0) {
        if (game && typeof game._retryCurrentRoom === 'function') {
          game._retryCurrentRoom();
          return;
        }
        this.hp = this.maxHp;
        this.x = 100; this.y = 200;
        this.vx = 0; this.vy = 0;
        this.invincibleTimer = 90;
        this.statusBurn = 0; this.statusFreeze = 0; this.statusFloat = 0;
        this.statusParalyse = 0; this.statusStun = 0; this.statusCurse = 0; this.statusBleed = 0;
      }
      return;
    }

    // ── Ultimate active updates ──
    if (this.ultimateActive) {
      this.ultimateTimer--;

      // Fire: update meteors
      if (this.ninjaType === 'fire') {
        this.fireMeteorTimer++;
        for (const m of this.fireMeteors) {
          if (m.done) continue;
          if (this.fireMeteorTimer < m.delay) continue;
          if (!m.active) {
            m.active = true;
            // Start from above at diagonal
            const offsetX = randInt(150, 300) * (m.fromLeft ? -1 : 1);
            m.x = m.targetX + offsetX;
            m.y = game.camera.y - randInt(40, 80);
          }
          // Move toward ground at angle
          const dx = m.targetX - m.x;
          const dy = m.targetY - m.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d > 0) {
            m.x += (dx / d) * m.speed;
            m.y += (dy / d) * m.speed;
          }
          // Trail
          m.trail.push({ x: m.x, y: m.y, life: 15 });
          // Impact
          if (m.y >= m.targetY - 10 || d < 12) {
            m.done = true;
            if (m.big) {
              damageInRadius(game, m.targetX, m.targetY, 150, (this.type.attackDamage + this.bonusElemental + 6) * 3, m.targetX);
              // Big meteor stun
              for (const e of game.enemies) {
                if (e.dead) continue;
                const sdx = (e.x + e.w / 2) - m.targetX, sdy = (e.y + e.h / 2) - m.targetY;
                if (Math.sqrt(sdx * sdx + sdy * sdy) < 150) e.stunTimer = Math.max(e.stunTimer, 120);
              }
              if (game.boss && !game.boss.dead) {
                const sdx = (game.boss.x + game.boss.w / 2) - m.targetX, sdy = (game.boss.y + game.boss.h / 2) - m.targetY;
                if (Math.sqrt(sdx * sdx + sdy * sdy) < 150) game.boss.stunTimer = Math.max(game.boss.stunTimer, 90);
              }
              if (game.boss && game.boss.health <= 0) {
                game.effects.push(new KanjiEffect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#f33', game.camera));
              }
              game.effects.push(new Effect(m.targetX, m.targetY, '#fff', 30, 10, 24));
              game.effects.push(new Effect(m.targetX, m.targetY, '#f93', 40, 8, 22));
              game.effects.push(new Effect(m.targetX, m.targetY, '#f44', 25, 6, 18));
              for (let i = 0; i < 12; i++) {
                game.effects.push(new Effect(
                  m.targetX + randInt(-60, 60), m.targetY + randInt(-40, 20),
                  i % 2 === 0 ? '#f93' : '#f44', 8 + randInt(0, 6), 3, 14
                ));
              }
              SFX.bossSpawn();
              triggerHitstop(12);
            } else {
              damageInRadius(game, m.targetX, m.targetY, 80, this.type.attackDamage + this.bonusElemental + 6, m.targetX);
              // Regular meteor stun
              for (const e of game.enemies) {
                if (e.dead) continue;
                const sdx = (e.x + e.w / 2) - m.targetX, sdy = (e.y + e.h / 2) - m.targetY;
                if (Math.sqrt(sdx * sdx + sdy * sdy) < 80) e.stunTimer = Math.max(e.stunTimer, 50);
              }
              if (game.boss && !game.boss.dead) {
                const sdx = (game.boss.x + game.boss.w / 2) - m.targetX, sdy = (game.boss.y + game.boss.h / 2) - m.targetY;
                if (Math.sqrt(sdx * sdx + sdy * sdy) < 80) game.boss.stunTimer = Math.max(game.boss.stunTimer, 30);
              }
              game.effects.push(new Effect(m.targetX, m.targetY, '#f93', 20, 6, 18));
              game.effects.push(new Effect(m.targetX, m.targetY, '#f44', 14, 4, 12));
              SFX.slam();
              triggerHitstop(4);
            }
          }
        }
        // Decay trails
        for (const m of this.fireMeteors) {
          for (const t of m.trail) t.life--;
          m.trail = m.trail.filter(t => t.life > 0);
        }
      }

      // Earth: update shmup-boss mecha with orbiting hands
      if (this.ninjaType === 'earth' && this.earthGolem) {
        const g = this.earthGolem;
        g.timer--;
        const cx = g.x + g.w / 2;
        const cy = g.y + g.h / 2;

        // Move mecha with input
        let moveX = 0, moveY = 0;
        if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left || gpState.axes[0] < -0.3) moveX = -1;
        if (keys['ArrowRight'] || keys['KeyD'] || touchState.right || gpState.axes[0] > 0.3) moveX = 1;
        if (keys['ArrowUp'] || keys['KeyW'] || touchState.up || gpState.axes[1] < -0.3) moveY = -1;
        if (keys['ArrowDown'] || keys['KeyS'] || touchState.down || gpState.axes[1] > 0.3) moveY = 1;
        if (moveX !== 0) g.facing = moveX;
        g.x += moveX * 2.5;
        g.y += moveY * 2.5 + Math.sin(game.tick * 0.05) * 0.5;
        g.x = Math.max(0, Math.min(game.levelW - g.w, g.x));
        g.y = Math.max(-50, Math.min(480 - g.h, g.y));
        this.x = g.x + g.w / 2 - this.w / 2;
        this.y = g.y + g.h - this.h - 8;
        this.vy = 0;
        this.grounded = false;

        // Hand frame follows head with smooth lag
        const headCX = cx, headCY = g.y + 20;
        const frameTargX = headCX;
        const frameTargY = headCY + 140; // gap below head (2x scale)
        g.frameX += (frameTargX - g.frameX) * 0.08;
        g.frameY += (frameTargY - g.frameY) * 0.08;

        const lh = g.leftHand, rh = g.rightHand;
        const handSpacing = 140;

        // Punch offsets (lunge forward then return)
        if (lh.punchTimer > 0) {
          lh.punchTimer--;
          lh.offX = Math.sin((lh.punchTimer / 20) * Math.PI) * 160 * g.facing;
          if (lh.punchTimer === 10) {
            lh.x = g.frameX - handSpacing + lh.offX;
            lh.y = g.frameY;
            this._mechaHandHit(game, g, lh);
          }
        } else {
          lh.offX *= 0.7;
        }
        if (rh.punchTimer > 0) {
          rh.punchTimer--;
          rh.offX = Math.sin((rh.punchTimer / 20) * Math.PI) * 160 * g.facing;
          if (rh.punchTimer === 10) {
            rh.x = g.frameX + handSpacing + rh.offX;
            rh.y = g.frameY;
            this._mechaHandHit(game, g, rh);
          }
        } else {
          rh.offX *= 0.7;
        }
        // World positions for hands
        lh.x = g.frameX - handSpacing + lh.offX;
        lh.y = g.frameY;
        rh.x = g.frameX + handSpacing + rh.offX;
        rh.y = g.frameY;

        // Contact damage (body)
        if (g.contactCd > 0) g.contactCd--;
        if (g.contactCd <= 0) {
          const golemBox = { x: g.x, y: g.y, w: g.w, h: g.h };
          for (const e of game.enemies) {
            if (!e.dead && rectOverlap(golemBox, e)) {
              e.takeDamage(this.type.attackDamage + this.bonusElemental + 3, game, cx);
              const kbDir = Math.sign(e.x + e.w / 2 - cx) || 1;
              e.vx = kbDir * 14; e.vy = -8;
              g.contactCd = 15;
              break;
            }
          }
          if (g.contactCd <= 0 && game.boss && !game.boss.dead && rectOverlap({ x: g.x, y: g.y, w: g.w, h: g.h }, game.boss)) {
            game.boss.takeDamage(this.type.attackDamage + this.bonusElemental + 3, game, cx);
            g.contactCd = 15;
          }
        }

        // Punch: attack button — alternating hand lunges forward
        if (g.punchCooldown > 0) g.punchCooldown--;
        if (g.punchCooldown <= 0 && (consumePress('KeyZ') || consumePress('KeyJ') || justPressed['MouseAttack'] || gpJust[GP_ATTACK])) {
          const hand = g.punchSide > 0 ? rh : lh;
          hand.punchTimer = 20;
          g.punchCooldown = 24;
          g.punchSide *= -1; // alternate
          SFX.attack();
        }

        // Missiles: special button — 2 rockets in facing direction
        if (g.missileCooldown > 0) g.missileCooldown--;
        if (g.missileCooldown <= 0 && (consumePress('KeyX') || consumePress('KeyK') || justPressed['MouseSpecial'] || gpJust[GP_SPECIAL])) {
          g.missileCooldown = 28;
          const px = cx + g.facing * (g.w / 2 + 4);
          const dmg = this.type.attackDamage + this.bonusElemental + 5;
          const p1 = new Projectile(px, cy - 10, g.facing * 9, -1.5, '#f84', dmg, 'player');
          const p2 = new Projectile(px, cy + 10, g.facing * 9,  1.5, '#f84', dmg, 'player');
          p1.isMissile = true; p2.isMissile = true;
          p1.noPlat = true; p2.noPlat = true;
          game.projectiles.push(p1, p2);
          SFX.shuriken();
        }

        // Yellow ball burst: shuriken button — radial shmup-boss pattern
        if (g.ballCooldown > 0) g.ballCooldown--;
        if (g.ballCooldown <= 0 && (consumePress('KeyC') || consumePress('KeyL') || consumePress('MouseShuriken') || touchJust.shuriken || gpJust[GP_SHURIKEN])) {
          g.ballCooldown = 40;
          const count = 12;
          const dmg = this.type.attackDamage + this.bonusElemental + 2;
          for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 / count) * i;
            const spd = 5;
            const bp = new Projectile(cx, cy, Math.cos(a) * spd, Math.sin(a) * spd, '#ff0', dmg, 'player');
            bp.noPlat = true;
            game.projectiles.push(bp);
          }
          SFX.slam();
          game.effects.push(new Effect(cx, cy, '#ff0', 16, 5, 16));
        }

        // Golem expires
        if (g.timer <= 0) {
          game.effects.push(new Effect(cx, cy, '#aaa', 20, 6, 20));
          SFX.slam();
          this.earthGolem = null;
        }
      }

      // Wind: giant bow fires arrows upward, they crash down
      if (this.ninjaType === 'wind' && this.windBow) {
        const wb = this.windBow;
        wb.timer--;
        // Keep player centered and frozen
        this.vx = 0;
        this.vy = 0;

        if (wb.phase === 'bow') {
          // Bow appears and grows
          wb.bowAlpha = Math.min(wb.bowAlpha + 0.04, 1);
          wb.bowScale = Math.min(wb.bowScale + 0.03, 1);
          wb.bowTimer--;
          // Wind particles around bow
          if (game.tick % 3 === 0) {
            game.effects.push(new Effect(
              wb.centerX + randInt(-60, 60),
              wb.centerY + randInt(-80, 80),
              '#bfb', 4, 2, 12
            ));
          }
          if (wb.bowTimer <= 0) {
            wb.phase = 'fire';
            // Create 30 arrows that launch upward in a wide volley
            for (let i = 0; i < 30; i++) {
              const spreadX = (i - 14.5) * 12 + randInt(-8, 8);
              wb.arrows.push({
                x: wb.centerX + spreadX * 0.4,
                y: wb.centerY - 60,
                vx: spreadX * 0.03,
                vy: -16 - Math.random() * 6,
                phase: 'up',    // 'up' -> 'pause' -> 'down'
                pauseTimer: 20 + Math.floor(i / 3) * 4 + randInt(0, 6),
                targetX: 0,
                targetY: 0,
                trail: [],
                done: false,
                hitSet: new Set(),
                size: 0.8 + Math.random() * 0.4
              });
            }
            SFX.shuriken();
          }
        } else if (wb.phase === 'fire') {
          // Update arrows
          let allDone = true;
          for (const a of wb.arrows) {
            if (a.done) continue;
            allDone = false;
            if (a.phase === 'up') {
              a.x += a.vx;
              a.y += a.vy;
              a.vy += 0.4; // decelerate
              a.trail.push({ x: a.x, y: a.y, life: 20 });
              // Wind trail particles
              if (game.tick % 2 === 0) {
                game.effects.push(new Effect(a.x, a.y, '#8d8', 2, 1, 8));
              }
              if (a.vy >= 0) {
                a.phase = 'pause';
                // Pick a target — pool enemies AND boss together
                const targets = [];
                for (const e of game.enemies) {
                  if (!e.dead) targets.push(e);
                }
                if (game.boss && !game.boss.dead) targets.push(game.boss);
                if (targets.length > 0) {
                  const target = targets[Math.floor(Math.random() * targets.length)];
                  a.targetX = target.x + target.w / 2 + randInt(-20, 20);
                  a.targetY = target.y + target.h / 2;
                } else {
                  a.targetX = wb.centerX + randInt(-100, 100);
                  a.targetY = wb.centerY + 60;
                }
              }
            } else if (a.phase === 'pause') {
              // Brief pause at apex
              a.pauseTimer--;
              a.size = Math.min(a.size + 0.05, 2); // arrow grows slightly
