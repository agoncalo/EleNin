    if (this.contactTick <= 0 && !game.player.slamming && rectOverlap(this, game.player.getHurtbox())) {
      const kbDir = Math.sign(game.player.x + game.player.w / 2 - (this.x + this.w / 2)) || 1;
      const isCharging = (this.bossType === 'shielded' || this.bossType === 'protector') && this.chargeState === 'charging';
      if (isCharging) {
        game.player.vx = kbDir * 22;
        game.player.vy = -5;
        game.player.knockbackTimer = 14;
        const chargeDmg = Math.round(this.contactDmg * 1.5);
        game.player.takeDamage(chargeDmg, game, this.element || null, { type: this.bossType, element: this.element, isBoss: true });
        this.chargeState = 'recoil';
        this.chargeTimer = 0;
        this.vx = -this.facing * speed * 3;
        this.vy = -8;
      } else {
        game.player.vx = kbDir * 18;
        game.player.vy = -9;
        game.player.knockbackTimer = 12;
        game.player.takeDamage(this.contactDmg, game, this.element || null, { type: this.bossType, element: this.element, isBoss: true });
      }
      this.contactTick = 45;
    }
  }

  takeDamage(amount, game, fromX, attackElement, sourceType) {
    if (this.dead) return false;
    if (this.friendly) return false;
    // Ghost: immune to blade & shuriken
    if (this.element === 'ghost' && (sourceType === 'sword' || sourceType === 'shuriken')) {
      this.flashTimer = 4;
      game.effects.push(new TextEffect(this.x + this.w / 2 - 16, this.y - 10, 'IMMUNE', '#6f6'));
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#8f8', 6, 2, 10));
      return false;
    }
    // Spiky: reflect sword damage back to player
    if (this.element === 'spiky' && sourceType === 'sword' && game && game.player) {
      const reflDmg = Math.max(1, Math.round(amount * 0.5));
      game.player.takeDamage(reflDmg, game, 'spike', { type: this.bossType, element: 'spiky', isBoss: true });
      game.effects.push(new TextEffect(this.x + this.w / 2 - 16, this.y - 10, 'REFLECT', '#f86'));
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f64', 8, 3, 10));
      this.flashTimer = 6;
      amount = Math.max(1, Math.round(amount * 0.5));
    }
    // Attacker boss: invulnerable when enemies nearby
    if (this.attackerInvulnerable) {
      this.flashTimer = 4;
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f44', 6, 2, 8));
      return false;
    }
    // Shield check — only swords remove shield pips
    let shieldBlocked = false;
    if (sourceType === 'sword' && this._shieldBlocks(fromX, undefined, game)) {
      shieldBlocked = true;
      const pickaxeHits = (game && game.player && game.player.items.pickaxe) ? 2 : 1;
      this.shieldHp -= pickaxeHits;
      this.shieldFlash = 6;
      this.shieldBump = 8;
      const shieldColor = this.bossType === 'protector' ? '#4f8' : '#5ff';
      const shAng = this.shieldAngle;
      game.effects.push(new Effect(this.x + this.w / 2 + Math.cos(shAng) * this.w * 0.7, this.y + this.h / 2 + Math.sin(shAng) * this.w * 0.7, shieldColor, 6, 3, 10));
      if (this.shieldHp <= 0) {
        this.shieldHp = 0;
        this.stunTimer = Math.max(this.stunTimer, 120);
        this.chargeState = 'idle';
        this.chargeTimer = 0;
        game.effects.push(new TextEffect(this.x + this.w / 2, this.y - 10, 'SHIELD BREAK', shieldColor));
      }
      amount = Math.max(1, Math.round(amount * 0.25));
    }
    this.hp -= amount;
    this.hp = Math.round(this.hp);
    if (!shieldBlocked) this.flashTimer = 8;
    const atkEl = game && game.player ? NINJA_ATTACK_ELEMENTS[game.player.ninjaType] : null;
    game.effects.push(new DamageNumber(this.x + this.w / 2, this.y, amount, atkEl));
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f88', 6, 3, 10));
    // Boss knockback (slight — bosses are heavy, flyer/flyshooter get more)
    const bDir = (fromX !== undefined) ? Math.sign(this.x + this.w / 2 - fromX) : this.facing * -1;
    const bossKb = (this.bossType === 'flyer' || this.bossType === 'flyshooter') ? 12 : 2;
    this.vx += bDir * bossKb;
    if (this.bossType === 'flyer' || this.bossType === 'flyshooter') {
      this.vy = -bossKb * 0.3;
      this.knockbackTimer = 10;
      this.flyerDashState = 'idle';
      this.flyerDashTimer = 0;
    }
    if (this.hp <= 0) {
      this.dead = true;
      this.onDeath(game);
    }
    return true;
  }

  // Boss version: weaker slide (bosses are heavy)
  launchIceSlide(game, fromX, dmg) {
    if (this.dead) return;
    this.freezeTimer = Math.max(this.freezeTimer, 30);
    this.iceSliding = true;
    this.iceSlideDmg = 0;
    const dir = (fromX !== undefined) ? Math.sign(this.x + this.w / 2 - fromX) : 1;
    this.vx = dir * 5;
    if (!this.flying) this.vy = -2;
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#aff', 10, 4, 14));
  }

  onDeath(game) {
    SFX.bossDie();
    triggerHitstop(10);
    triggerScreenShake(8, 15);
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f44', 30, 6, 30));
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#ff0', 20, 5, 25));
    // Track boss kill for bestiary
    recordBestiaryKill(this.bossType, false, true);
    // Auto-grant boss item (shown in bucket choice menu)
    const allItemIds = Object.keys(BOSS_ITEMS);
    const pl = game.player;
    const uncollected = allItemIds.filter(id => !pl.items[id]);
    if (uncollected.length > 0) {
      const itemId = uncollected[Math.floor(Math.random() * uncollected.length)];
      pl.items[itemId] = true;
      if (itemId === 'deathsKey') pl.deathsKeyUsed = false;
      game.bossRewardItem = itemId;
      recordItemFound(itemId);
    } else {
      game.bossRewardItem = null;
    }
  }

  render(ctx, cam, game) {
    // Charge dash trails
    if (this.chargeTrails && this.chargeTrails.length) {
      const trailColor = this.bossType === 'protector' ? '#4f8' : (this.bossType === 'flyer' || this.bossType === 'flyshooter') ? '#8c8' : '#5ff';
      for (const t of this.chargeTrails) {
        ctx.save();
        ctx.globalAlpha = (t.life / 12) * 0.4;
        ctx.fillStyle = trailColor;
        ctx.fillRect(t.x - cam.x, t.y - cam.y, t.w, t.h);
        ctx.restore();
      }
    }
    if (this.dead) return;
    // Friendly fade alpha
    const _fading = this.friendlyFade > 0 && this.friendlyFade < 120;
    if (_fading) ctx.save();
    if (_fading) ctx.globalAlpha = this.friendlyFade / 120;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;

    // Aura glow
    ctx.fillStyle = this.phase === 2 ? 'rgba(255,50,50,0.25)' : 'rgba(200,50,50,0.12)';
    ctx.fillRect(sx - 6, sy - 6, this.w + 12, this.h + 12);

    if (this.element && this.elementColors) {
      const tick = game ? game.tick : 0;
      if (this.element === 'ghost') {
        // Ghost boss: greenish scary aura
        ctx.save();
        ctx.globalAlpha = 0.15 + 0.1 * Math.sin(tick * 0.07);
        ctx.shadowColor = '#0f0';
        ctx.shadowBlur = 24;
        ctx.fillStyle = '#3a5';
        ctx.fillRect(sx - 6, sy - 6, this.w + 12, this.h + 12);
        ctx.restore();
        if (Math.random() < 0.35) {
          const px = this.x + Math.random() * this.w;
          const py = this.y + this.h * 0.3 + Math.random() * this.h * 0.5;
          game.effects.push(new Effect(px, py, '#8f8', 2, 0.8, 14));
        }
      }
    }

    const bodyColor = this.freezeTimer > 0 ? '#88eeff' : (this.flashTimer > 0 ? '#fff' : (this.phase === 2 ? '#d11' : this.color));

    // Ghost boss: transparent body
    if (this.element === 'ghost') {
      ctx.save();
      ctx.globalAlpha = 0.35 + 0.1 * Math.sin((game ? game.tick : 0) * 0.08);
    }

    // --- Type-specific body rendering ---
    if (this.bossType === 'attacker') {
      // Orb body (like regular attacker, but bigger)
      const orbCx = sx + this.w / 2;
      const orbCy = sy + this.h / 2;
      const orbR = this.w / 2;
      ctx.globalAlpha = this.attackerInvulnerable ? (0.4 + 0.15 * Math.sin((game ? game.tick : 0) * 0.08)) : 0.2;
      ctx.fillStyle = '#f44';
      ctx.beginPath();
      ctx.arc(orbCx, orbCy, orbR + 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = this.freezeTimer > 0 ? '#88eeff' : (this.flashTimer > 0 ? '#fff' : (this.attackerInvulnerable ? '#c22' : '#644'));
      ctx.beginPath();
      ctx.arc(orbCx, orbCy, orbR, 0, Math.PI * 2);
      ctx.fill();
      // Inner eye
      ctx.fillStyle = this.attackerInvulnerable ? '#f88' : '#866';
      ctx.beginPath();
      ctx.arc(orbCx, orbCy, orbR * 0.4, 0, Math.PI * 2);
      ctx.fill();
      // Crown horns on orb
      ctx.fillStyle = '#ff0';
      ctx.fillRect(sx + 8, sy - 6, 6, 8);
      ctx.fillRect(sx + this.w - 14, sy - 6, 6, 8);
      ctx.fillRect(sx + this.w / 2 - 3, sy - 10, 6, 12);
    } else if (this.bossType === 'protector') {
      // Armored knight body
      ctx.fillStyle = bodyColor;
      ctx.fillRect(sx, sy, this.w, this.h);
      // Helmet with visor
      ctx.fillStyle = '#5a7';
      ctx.fillRect(sx - 3, sy - 8, this.w + 6, 14);
      // Visor slit
      ctx.fillStyle = '#1a3';
      ctx.fillRect(sx + 6, sy - 4, this.w - 12, 5);
      // Glowing eyes behind visor
      const eyePulse = 0.7 + 0.3 * Math.sin((game ? game.tick : 0) * 0.1);
      ctx.save();
      ctx.shadowColor = '#4f8';
      ctx.shadowBlur = 10;
      ctx.fillStyle = `rgba(100,255,150,${eyePulse})`;
      ctx.fillRect(sx + 12, sy - 4, 7, 4);
      ctx.fillRect(sx + this.w - 19, sy - 4, 7, 4);
      ctx.shadowBlur = 0;
      ctx.restore();
      // Helmet crest/plume
      ctx.fillStyle = '#3d8';
      ctx.fillRect(sx + this.w / 2 - 3, sy - 16, 6, 10);
      ctx.fillRect(sx + this.w / 2 - 5, sy - 16, 10, 4);
      // Shoulder pauldrons
      ctx.fillStyle = '#4a7';
      ctx.fillRect(sx - 8, sy + 6, 10, 14);
      ctx.fillRect(sx + this.w - 2, sy + 6, 10, 14);
      ctx.fillStyle = '#8d8';
      ctx.fillRect(sx - 6, sy + 9, 3, 3);
      ctx.fillRect(sx + this.w + 1, sy + 9, 3, 3);
      // Chest plate
      ctx.fillStyle = '#4a7';
      ctx.fillRect(sx + 3, sy + 6, this.w - 6, this.h - 18);
      ctx.fillStyle = '#6c9';
      ctx.fillRect(sx + 4, sy + 7, this.w - 8, 4);
      ctx.fillStyle = '#3a6';
      ctx.fillRect(sx + this.w / 2 - 1, sy + 11, 2, this.h - 28);
      // Belt
      ctx.fillStyle = '#2a5';
      ctx.fillRect(sx, sy + this.h - 16, this.w, 5);
      ctx.fillStyle = '#8d8';
      ctx.fillRect(sx + this.w / 2 - 4, sy + this.h - 16, 8, 5);
      // Greaves
      ctx.fillStyle = '#4a7';
      ctx.fillRect(sx + 3, sy + this.h - 11, this.w / 2 - 5, 11);
      ctx.fillRect(sx + this.w / 2 + 2, sy + this.h - 11, this.w / 2 - 5, 11);
      // Floating tower shield that tracks toward player
      const bpAng = this.shieldAngle;
      const bpDist = this.w * 0.7 + (this.shieldBump > 0 ? Math.sin(this.shieldBump * 1.2) * 5 : 0);
      const bpEcx = sx + this.w / 2, bpEcy = sy + this.h / 2;
      const bpShX = bpEcx + Math.cos(bpAng) * bpDist;
      const bpShY = bpEcy + Math.sin(bpAng) * bpDist;
      if (this.shieldHp > 0) {
        const shieldAlpha = 0.5 + 0.5 * (this.shieldHp / this.shieldMax);
        ctx.save();
        ctx.translate(bpShX, bpShY);
        ctx.rotate(bpAng);
        ctx.globalAlpha = shieldAlpha;
        const bpShFlash = this.shieldFlash > 0;
        // Shield body
        ctx.fillStyle = bpShFlash ? '#fff' : '#3b7';
        ctx.fillRect(-3, -(this.h * 0.6 + 4), 11, this.h * 1.2 + 8);
        // Shield border
        ctx.strokeStyle = bpShFlash ? '#fff' : '#2a5';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-2.5, -(this.h * 0.6 + 3.5), 10, this.h * 1.2 + 7);
        // Shield emblem (cross)
        ctx.fillStyle = bpShFlash ? '#fff' : '#8d8';
        ctx.fillRect(1, -(this.h * 0.35), 3, this.h * 0.7);
        ctx.fillRect(-2, -1.5, 9, 3);
        ctx.restore();
      } else {
        // Broken shield stub
        ctx.save();
        ctx.translate(bpShX, bpShY);
        ctx.rotate(bpAng);
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#2a5';
        ctx.fillRect(-1, -5, 7, 10);
        ctx.restore();
        ctx.globalAlpha = 1;
      }
      // Boss protector charge indicators
      if (this.shieldHp > 0) {
        if (this.chargeState === 'prepare') {
          const pulse = Math.sin(this.chargeTimer * 0.4) * 0.4 + 0.6;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = '#ff0';
          ctx.font = 'bold 18px monospace';
          ctx.fillText('!', sx + this.w / 2 - 5, sy - 20);
          ctx.globalAlpha = 1;
        } else if (this.chargeState === 'stunned') {
          const scx = sx + this.w / 2, scy = sy - 12;
          ctx.save();
          ctx.font = '14px monospace';
          ctx.fillStyle = '#ff0';
          for (let i = 0; i < 3; i++) {
            const a = (game.tick * 0.08) + i * (Math.PI * 2 / 3);
            ctx.globalAlpha = 0.6 + 0.3 * Math.sin(game.tick * 0.15 + i);
            ctx.fillText('*', scx + Math.cos(a) * 16 - 4, scy + Math.sin(a) * 8);
          }
          ctx.restore();
        } else if (this.chargeState === 'charging') {
          // Windshield arc effect
          const wcx = sx + this.w / 2, wcy = sy + this.h / 2;
          const ang = Math.atan2(this._chargeVy, this._chargeVx);
          ctx.save();
          ctx.translate(wcx, wcy);
          ctx.rotate(ang);
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = '#4f8';
          ctx.beginPath();
          ctx.arc(this.w * 0.4, 0, this.h * 0.7, -Math.PI * 0.5, Math.PI * 0.5);
          ctx.lineTo(this.w * 0.4, 0);
          ctx.fill();
          ctx.globalAlpha = 0.7 + 0.2 * Math.sin(this.chargeTimer * 0.8);
          ctx.strokeStyle = '#afa';
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(this.w * 0.4, 0, this.h * 0.7, -Math.PI * 0.5, Math.PI * 0.5);
          ctx.stroke();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = '#dfd';
          ctx.lineWidth = 2.5;
          for (let i = -4; i <= 4; i++) {
            const oy = i * 8;
            ctx.beginPath();
            ctx.moveTo(-this.w * 0.7, oy);
            ctx.lineTo(this.w * 0.3, oy);
            ctx.stroke();
          }
          ctx.restore();
          ctx.globalAlpha = 1;
        }
      }
    } else if (this.bossType === 'deflector') {
      // Ronin samurai body
      ctx.fillStyle = bodyColor;
      ctx.fillRect(sx, sy, this.w, this.h);
      // Kasa (farmer hat)
      ctx.fillStyle = '#aac';
      ctx.beginPath();
      ctx.moveTo(sx - 14, sy + 4);
      ctx.lineTo(sx + this.w / 2, sy - 26);
      ctx.lineTo(sx + this.w + 14, sy + 4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#889';
      ctx.fillRect(sx - 14, sy + 1, this.w + 28, 5);
      // Headband
      ctx.fillStyle = '#aac';
      ctx.fillRect(sx + 3, sy + 6, this.w - 6, 4);
      // Belt / sash
      ctx.fillStyle = '#aac';
      ctx.fillRect(sx + 3, sy + this.h - 14, this.w - 6, 4);
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(sx + 3, sy + this.h - 13, this.w - 6, 1);
      // Eyes
      ctx.fillStyle = '#ff0';
      const reyeX = this.facing > 0 ? sx + 28 : sx + 6;
      ctx.fillRect(reyeX, sy + 14, 8, 8);
      ctx.fillRect(reyeX + 14, sy + 14, 8, 8);
      ctx.fillStyle = '#200';
      ctx.fillRect(reyeX + 2, sy + 17, 4, 4);
      ctx.fillRect(reyeX + 16, sy + 17, 4, 4);
      // Katana held in front, angled upward
      const bLen = 52;
      ctx.save();
      const gripX = this.facing > 0 ? sx + this.w - 2 : sx + 2;
      const gripY = sy + this.h * 0.45;
      ctx.translate(gripX, gripY);
      ctx.rotate(this.facing > 0 ? -Math.PI * 0.35 : (-Math.PI + Math.PI * 0.35));
      ctx.fillStyle = this.deflectReady ? '#dde' : '#889';
      ctx.beginPath();
      ctx.moveTo(6, -2.5);
      ctx.lineTo(6 + bLen, -1);
      ctx.lineTo(6 + bLen + 6, 0);
      ctx.lineTo(6 + bLen, 1);
      ctx.lineTo(6, 2.5);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(8, -2);
      ctx.lineTo(6 + bLen + 4, 0);
      ctx.stroke();
      ctx.fillStyle = '#aa8';
      ctx.fillRect(3, -6, 5, 12);
      ctx.fillStyle = '#aac';
      ctx.fillRect(-7, -3, 11, 6);
      ctx.fillStyle = '#222';
      for (let i = 0; i < 3; i++) ctx.fillRect(-5 + i * 3, -3, 1, 6);
      ctx.restore();
      // Deflect glow
      if (this.deflectReady) {
        ctx.globalAlpha = 0.3 + 0.15 * Math.sin(game ? game.tick * 0.1 : 0);
        ctx.fillStyle = '#aaf';
        ctx.beginPath();
        ctx.arc(gripX, gripY - bLen * 0.25, bLen * 0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      // Boss deflect flash — full body pulse when deflecting
      if (this.deflectFlash > 0) {
        this.deflectFlash--;
        ctx.save();
        const df = this.deflectFlash / 12;
        ctx.globalAlpha = 0.6 * df;
        ctx.fillStyle = '#aaf';
        ctx.fillRect(sx - 6, sy - 6, this.w + 12, this.h + 12);
        ctx.globalAlpha = 0.5 * df;
        ctx.strokeStyle = '#ccf';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(sx + this.w / 2, sy + this.h / 2, this.w * (1.5 - df), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    } else {
      // Default boss body (walker, shooter, jumper, bouncer, shielded, flyer, flyshooter)
      ctx.fillStyle = bodyColor;
      ctx.fillRect(sx, sy, this.w, this.h);

      // Flying wings
      if (this.flying) {
        ctx.fillStyle = this.color;
        ctx.fillRect(sx - 8, sy + 6, 8, this.h - 12);
        ctx.fillRect(sx + this.w, sy + 6, 8, this.h - 12);
        if (this.flyerDashState === 'prepare') {
          const pulse = Math.sin(this.flyerDashTimer * 0.4) * 0.4 + 0.6;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = '#ff0';
          ctx.font = 'bold 18px monospace';
          ctx.fillText('!', sx + this.w / 2 - 5, sy - 14);
          ctx.globalAlpha = 1;
        }
      }

      // Floating shield that tracks toward player
      if (this.shieldHp > 0) {
        const bsAng = this.shieldAngle;
        const bsDist = this.w * 0.65 + (this.shieldBump > 0 ? Math.sin(this.shieldBump * 1.2) * 4 : 0);
        const bsEcx = sx + this.w / 2, bsEcy = sy + this.h / 2;
        const shieldAlpha = 0.4 + 0.3 * (this.shieldHp / this.shieldMax) + (this.shieldBump > 0 ? 0.2 : 0);
        ctx.save();
        ctx.translate(bsEcx + Math.cos(bsAng) * bsDist, bsEcy + Math.sin(bsAng) * bsDist);
        ctx.rotate(bsAng);
        ctx.fillStyle = this.shieldFlash > 0 ? '#fff' : `rgba(100,220,255,${shieldAlpha})`;
        ctx.fillRect(-3, -(this.h * 0.55), 6, this.h * 1.1);
        ctx.strokeStyle = this.shieldFlash > 0 ? '#fff' : `rgba(150,240,255,${shieldAlpha * 0.6})`;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-3, -(this.h * 0.55), 6, this.h * 1.1);
        ctx.restore();
        // Shielded boss charge indicators
        if (this.chargeState === 'prepare') {
          const pulse = Math.sin(this.chargeTimer * 0.4) * 0.4 + 0.6;
          ctx.globalAlpha = pulse;
          ctx.fillStyle = '#ff0';
          ctx.font = 'bold 18px monospace';
          ctx.fillText('!', sx + this.w / 2 - 5, sy - 14);
          ctx.globalAlpha = 1;
        } else if (this.chargeState === 'stunned') {
          const scx = sx + this.w / 2, scy = sy - 8;
          ctx.save();
          ctx.font = '14px monospace';
          ctx.fillStyle = '#ff0';
          for (let i = 0; i < 3; i++) {
            const a = (game.tick * 0.08) + i * (Math.PI * 2 / 3);
            ctx.globalAlpha = 0.6 + 0.3 * Math.sin(game.tick * 0.15 + i);
            ctx.fillText('*', scx + Math.cos(a) * 16 - 4, scy + Math.sin(a) * 8);
          }
          ctx.restore();
        } else if (this.chargeState === 'charging') {
          const wcx = sx + this.w / 2, wcy = sy + this.h / 2;
          const ang = Math.atan2(this._chargeVy, this._chargeVx);
          ctx.save();
          ctx.translate(wcx, wcy);
          ctx.rotate(ang);
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = '#5ff';
          ctx.beginPath();
          ctx.arc(this.w * 0.4, 0, this.h * 0.7, -Math.PI * 0.5, Math.PI * 0.5);
          ctx.lineTo(this.w * 0.4, 0);
          ctx.fill();
          ctx.globalAlpha = 0.7 + 0.2 * Math.sin(this.chargeTimer * 0.8);
          ctx.strokeStyle = '#aff';
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(this.w * 0.4, 0, this.h * 0.7, -Math.PI * 0.5, Math.PI * 0.5);
          ctx.stroke();
          ctx.globalAlpha = 0.5;
          ctx.strokeStyle = '#dff';
          ctx.lineWidth = 2.5;
          for (let i = -4; i <= 4; i++) {
            const oy = i * 8;
            ctx.beginPath();
            ctx.moveTo(-this.w * 0.7, oy);
            ctx.lineTo(this.w * 0.3, oy);
            ctx.stroke();
          }
          ctx.restore();
          ctx.globalAlpha = 1;
        }
      }

      // Eyes
      ctx.fillStyle = '#ff0';
      const eyeX = this.facing > 0 ? sx + 28 : sx + 6;
      ctx.fillRect(eyeX, sy + 14, 8, 8);
      ctx.fillRect(eyeX + 14, sy + 14, 8, 8);
      ctx.fillStyle = '#200';
      ctx.fillRect(eyeX + 2, sy + 17, 4, 4);
      ctx.fillRect(eyeX + 16, sy + 17, 4, 4);

      // Crown / horns
      ctx.fillStyle = '#ff0';
      ctx.fillRect(sx + 8, sy - 6, 6, 8);
      ctx.fillRect(sx + this.w - 14, sy - 6, 6, 8);
      ctx.fillRect(sx + this.w / 2 - 3, sy - 10, 6, 12);

      // Shooter boss: gun barrel
      if (this.bossType === 'shooter') {
        const gunColor = this.element ? this.elementColors.accent : '#ff4';
        const bDir = this.facing;
        const barrelLen = 18;
        const barrelW = 4;
        const gx = sx + (bDir > 0 ? this.w : 0);
        const gy = sy + this.h * 0.45;
        // Barrel
        ctx.fillStyle = '#555';
        ctx.fillRect(bDir > 0 ? gx : gx - barrelLen, gy - barrelW, barrelLen, barrelW * 2);
        // Muzzle
        ctx.fillStyle = gunColor;
        ctx.fillRect(bDir > 0 ? gx + barrelLen - 4 : gx - barrelLen, gy - barrelW - 1, 4, barrelW * 2 + 2);
        // Mount
        ctx.fillStyle = '#666';
        ctx.fillRect(gx - 3, gy - 2, 6, 5);
        // Headband
        ctx.fillStyle = gunColor;
        ctx.fillRect(sx + 4, sy + 2, this.w - 8, 4);
      }

      // Bouncer boss: mortar cannon
      if (this.bossType === 'bouncer') {
        const cannonColor = this.element ? this.elementColors.body : '#c5c';
        const muzzleColor = this.element ? this.elementColors.accent : '#f6f';
        const bDir = this.facing;
        const cannonAngle = -(Math.PI * 0.35);
        const barrelLen = 22;
        const barrelW = 5;
        const bx = sx + (bDir > 0 ? this.w - 4 : 4);
        const by = sy + this.h * 0.3;
        ctx.save();
        ctx.translate(bx, by);
        ctx.rotate(bDir > 0 ? cannonAngle : Math.PI - cannonAngle);
        // Barrel
        ctx.fillStyle = '#555';
        ctx.fillRect(0, -barrelW, barrelLen, barrelW * 2);
        // Muzzle ring
        ctx.fillStyle = muzzleColor;
        ctx.fillRect(barrelLen - 4, -barrelW - 2, 4, barrelW * 2 + 4);
        ctx.restore();
        // Base mount
        ctx.fillStyle = '#666';
        ctx.fillRect(bx - 4, by - 2, 8, 5);
        // Headband
        ctx.fillStyle = cannonColor;
        ctx.fillRect(sx + 4, sy + 2, this.w - 8, 4);
      }
    }

    // Restore ghost transparency
    if (this.element === 'ghost') ctx.restore();

    // Soak drip particles
    if (this.soakTimer > 0 && Math.random() < 0.15) {
      game.effects.push(new Effect(this.x + Math.random() * this.w, this.y + this.h, '#48f', 3, 1, 8));
    }

    // Elemental aura (matches Enemy render)
    if (this.element && this.elementColors) {
      const tick = game ? game.tick : 0;
      if (this.element !== 'ghost') {
        {
          ctx.save();
          ctx.globalAlpha = 0.18 + 0.08 * Math.sin(tick * 0.06);
          ctx.fillStyle = this.elementColors.glow;
          ctx.beginPath();
          ctx.arc(sx + this.w / 2, sy + this.h / 2, this.w * 0.85, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          if (Math.random() < 0.25) {
            const px = this.x + Math.random() * this.w;
            const py = this.y + this.h * 0.3 + Math.random() * this.h * 0.5;
            game.effects.push(new Effect(px, py, this.elementColors.particle, 1, 0.8, 12));
          }
        }
        const pipX = sx + this.w / 2;
        const pipY = sy - 36;
        ctx.fillStyle = this.elementColors.accent;
        ctx.beginPath();
        ctx.moveTo(pipX, pipY - 4);
        ctx.lineTo(pipX + 3, pipY);
        ctx.lineTo(pipX, pipY + 4);
        ctx.lineTo(pipX - 3, pipY);
        ctx.closePath();
        ctx.fill();
      }
    }

    if (this.phase === 2) {
      ctx.fillStyle = '#f44';
      ctx.font = '10px monospace';
      ctx.fillText('ENRAGED!', sx + this.w / 2 - 28, sy - 34);
    }

    // Crystal ninja: melee warning "!"
    if (game && game.player && game.player.ninjaType === 'crystal') {
      const dx = (this.x + this.w / 2) - (game.player.x + game.player.w / 2);
      const dy = (this.y + this.h / 2) - (game.player.y + game.player.h / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100 && this.contactTick <= 0) {
        const pulse = Math.sin(game.tick * 0.3) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 18px monospace';
        ctx.fillText('!', sx + this.w / 2 - 5, sy - 18);
        ctx.globalAlpha = 1;
      }
    }

    // Boss melee sword (not for deflector — has its own katana)
    if (this.contactTick > 30 && this.bossType !== 'deflector' && this.bossType !== 'attacker') {
      const sl = 24;
      const sw = 5;
      const swordX = this.facing > 0 ? sx + this.w : sx - sl;
      const swordY = sy + this.h / 2 - sw / 2;
      ctx.fillStyle = '#dde';
      ctx.fillRect(swordX, swordY, sl, sw);
      ctx.fillStyle = this.color;
      ctx.fillRect(this.facing > 0 ? sx + this.w - 3 : sx, swordY - 3, 4, sw + 6);
    }

    // Shield pips for boss (match HP bar width)
    if (this.shieldMax > 0) {
      const pipColor = this.bossType === 'protector' ? '#4f8' : '#5ff';
      const barW = this.w + 20;
      const pipW = Math.max(2, Math.floor(barW / this.shieldMax) - 1);
      const pipGap = barW / this.shieldMax;
      const bpipBump = this.shieldBump > 0 ? Math.sin(this.shieldBump * 1.5) * 3 : 0;
      const pipStartX = sx + this.w / 2 - barW / 2 + bpipBump;
      for (let i = 0; i < this.shieldMax; i++) {
        ctx.fillStyle = i < this.shieldHp ? pipColor : '#234';
        ctx.fillRect(pipStartX + i * pipGap, sy - 32, pipW, 3);
      }
    }

    // Protector boss: healing aura ring
    if (this.bossType === 'protector' && this.auraRadius > 0) {
      ctx.save();
      ctx.globalAlpha = 0.15 + 0.05 * Math.sin((game ? game.tick : 0) * 0.05);
      ctx.strokeStyle = '#4f4';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx + this.w / 2, sy + this.h / 2, this.auraRadius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = 'rgba(80,200,80,0.06)';
      ctx.fill();
      ctx.restore();
    }

    // Attacker boss: invulnerability aura
    if (this.bossType === 'attacker') {
      ctx.save();
      const aR = this.attackerAuraRadius;
      if (this.attackerInvulnerable) {
        ctx.globalAlpha = 0.2 + 0.1 * Math.sin((game ? game.tick : 0) * 0.08);
        ctx.strokeStyle = '#f44';
        ctx.lineWidth = 3;
      } else {
        ctx.globalAlpha = 0.08;
        ctx.strokeStyle = '#888';
        ctx.lineWidth = 1;
      }
      ctx.beginPath();
      ctx.arc(sx + this.w / 2, sy + this.h / 2, aR, 0, Math.PI * 2);
      ctx.stroke();
      if (this.attackerInvulnerable) {
        ctx.fillStyle = 'rgba(255,80,80,0.06)';
        ctx.fill();
      }
      ctx.restore();
    }

    // Boss HP bar (above head)
    {
      const barW = this.w + 20;
      const barH = 6;
      const barX = sx + this.w / 2 - barW / 2;
      const barY = sy - 24;
      ctx.fillStyle = '#400';
      ctx.fillRect(barX, barY, barW, barH);
      const displayRatio = this.displayHp / this.maxHp;
      const hpRatio = this.hp / this.maxHp;
      if (displayRatio > hpRatio) {
        ctx.fillStyle = '#f84';
        ctx.fillRect(barX, barY, barW * displayRatio, barH);
      }
      ctx.fillStyle = this.phase === 2 ? '#f22' : '#e44';
      ctx.fillRect(barX, barY, barW * hpRatio, barH);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(barX, barY, barW, barH);
    }

    // General stun stars (boulders, slams, meteors, etc.)
    if (this.stunTimer > 0) {
      const scx = sx + this.w / 2, scy = sy - 8;
      ctx.save();
      ctx.font = '14px monospace';
      ctx.fillStyle = '#ff0';
      for (let i = 0; i < 3; i++) {
        const a = (game.tick * 0.08) + i * (Math.PI * 2 / 3);
        ctx.globalAlpha = 0.6 + 0.3 * Math.sin(game.tick * 0.15 + i);
        ctx.fillText('*', scx + Math.cos(a) * 16 - 4, scy + Math.sin(a) * 8);
      }
      ctx.restore();
    }
    // Restore fade alpha
    if (_fading) ctx.restore();
  }
}

// â”€â”€ Runtime Tracking â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let achievementData = loadAchievements();
let bestiaryData = loadBestiary();

// Per-session tracking (persisted via achievements)
let totalKillsAll = achievementData._totalKills || 0;
const ninjaKills = achievementData._ninjaKills || {};
for (const n of NINJA_ORDER) { if (!ninjaKills[n]) ninjaKills[n] = 0; }

// Toast queue
const achievementToasts = [];
let currentToast = null;
let toastTimer = 0;

function unlockAchievement(id) {
  if (achievementData[id]) return;
  if (typeof game !== 'undefined' && game.cheated && id !== 'discovered_cheats' && id !== 'cheater_ending') return;
  achievementData[id] = Date.now();
  achievementData._totalKills = totalKillsAll;
  achievementData._ninjaKills = ninjaKills;
  saveAchievements(achievementData);
  const def = ACHIEVEMENT_DEFS.find(a => a.id === id);
  if (def) achievementToasts.push(def);
}

function recordKill(ninjaType) {
  if (typeof game !== 'undefined' && game.cheated) return;
  totalKillsAll++;
  ninjaKills[ninjaType] = (ninjaKills[ninjaType] || 0) + 1;
  // Check milestones
  if (totalKillsAll >= 1) unlockAchievement('kills_1');
  if (totalKillsAll >= 10) unlockAchievement('kills_10');
  if (totalKillsAll >= 100) unlockAchievement('kills_100');
  if (totalKillsAll >= 1000) unlockAchievement('kills_1000');
  if (ninjaKills[ninjaType] >= 100) unlockAchievement(`kills_${ninjaType}_100`);
  // Save periodically
  achievementData._totalKills = totalKillsAll;
  achievementData._ninjaKills = ninjaKills;
}

function recordBestiaryKill(enemyType, isBig, isBoss, element) {
  if (typeof game !== 'undefined' && game.cheated) return;
  const key = isBoss ? `boss_${enemyType}` : (isBig ? `big_${enemyType}` : enemyType);
  const isNew = !bestiaryData[key];
  if (isNew) {
    bestiaryData[key] = { kills: 0, type: enemyType, big: isBig, boss: isBoss };
  }
  bestiaryData[key].kills++;
  // Track elemental variant kills
  if (element) {
    if (!bestiaryData[key].elementKills) bestiaryData[key].elementKills = {};
    bestiaryData[key].elementKills[element] = (bestiaryData[key].elementKills[element] || 0) + 1;
    // Track elemental bestiary entry (per type Ã— element)
    const elKey = `elem_${element}_${enemyType}`;
    const elNew = !bestiaryData[elKey];
    if (elNew) {
      bestiaryData[elKey] = { kills: 0, element: element, type: enemyType };
    }
    bestiaryData[elKey].kills++;
    if (elNew) {
      const elName = element.charAt(0).toUpperCase() + element.slice(1);
      const stats = ENEMY_STATS[enemyType];
      achievementToasts.push({ icon: '\uD83D\uDCD6', name: 'New Bestiary Entry', desc: `${elName} ${stats.name}`, isBestiary: true });
    }
  }
  saveBestiary(bestiaryData);
  if (isNew) {
    const stats = ENEMY_STATS[enemyType];
    const label = isBoss ? BOSS_NAMES[enemyType] + ' (Boss)' : (isBig ? 'Big ' : '') + stats.name;
    achievementToasts.push({ icon: '\uD83D\uDCD6', name: 'New Bestiary Entry', desc: label, isBestiary: true });
  }
  // Check bestiary full
  checkBestiaryFull();
}

function checkBestiaryFull() {
  // Need all 10 base + 10 big + 10 boss = 30 entries
  const allKeys = [];
  for (const t of ENEMY_TIERS) {
    allKeys.push(t, `big_${t}`, `boss_${t}`);
  }
  const hasFull = allKeys.every(k => bestiaryData[k] && bestiaryData[k].kills > 0);
  if (hasFull) unlockAchievement('bestiary_full');
}

function recordWaveClear(waveNum, ninjaType) {
  unlockAchievement(`wave_${waveNum}`);
  unlockAchievement(`wave_${ninjaType}_${waveNum}`);
}

function recordUltimate(ninjaType) {
  unlockAchievement(`ult_${ninjaType}`);
}

function recordGameOver(totalKills) {
  unlockAchievement('game_over_1');
  if (totalKills === 0) unlockAchievement('game_over_no_kills');
}

function recordGoodEnding() { unlockAchievement('good_ending'); }
function recordCheaterEnding() { unlockAchievement('cheater_ending'); }
function recordCheatUsed() { unlockAchievement('discovered_cheats'); }

function recordItemFound(itemId) {
  if (typeof game !== 'undefined' && game.cheated) return;
  if (!vaultData[itemId]) {
    vaultData[itemId] = Date.now();
    saveVault(vaultData);
    unlockAchievement('item_' + itemId);
    // Check if all items collected
    const allKeys = Object.keys(BOSS_ITEMS);
    if (allKeys.every(k => vaultData[k])) unlockAchievement('item_collector');
  }
}

// â”€â”€ Pause Menu State â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const pauseMenu = {
  active: false,
  selected: 0,     // 0=resume, 1=guide, 2=bestiary, 3=vault, 4=achievements
  popup: null,      // 'guide' | 'bestiary' | 'vault' | 'achievements' | null
  vaultScroll: 0,
  popupScroll: 0,
  guideNinja: 0,    // index into NINJA_ORDER
  bestiaryIdx: 0,   // current bestiary grid cursor
  bestiaryDetail: false, // showing detail view
  clearCacheConfirm: false, // clear cache confirmation state
  itemTooltipActive: false, // showing item tooltip panel
  itemTooltipIdx: 0,        // which item is selected in tooltip
};

const PAUSE_OPTIONS = ['Resume', 'Ninja Guide', 'Bestiary', 'Vault', 'Achievements', 'Music', 'SFX'];

function togglePause() {
  if (pauseMenu.itemTooltipActive) {
    pauseMenu.itemTooltipActive = false;
    return;
  }
  if (pauseMenu.popup) {
    pauseMenu.popup = null;
    pauseMenu.popupScroll = 0;
    return;
  }
  pauseMenu.active = !pauseMenu.active;
  pauseMenu.selected = 0;
  pauseMenu.popupScroll = 0;
  pauseMenu.itemTooltipActive = false;
}

function pauseUpdate() {
  if (!pauseMenu.active) return;

  if (pauseMenu.popup) {
    updatePopup();
    return;
  }

  // Item tooltip mode
  if (pauseMenu.itemTooltipActive) {
    const pl = typeof game !== 'undefined' ? game.player : null;
    const itemKeys = pl ? Object.keys(pl.items).filter(k => pl.items[k]) : [];
    if (itemKeys.length === 0) { pauseMenu.itemTooltipActive = false; return; }
    if (consumePress('ArrowUp') || consumePress('KeyW')) {
      pauseMenu.itemTooltipIdx = (pauseMenu.itemTooltipIdx + itemKeys.length - 1) % itemKeys.length;
    }
    if (consumePress('ArrowDown') || consumePress('KeyS')) {
      pauseMenu.itemTooltipIdx = (pauseMenu.itemTooltipIdx + 1) % itemKeys.length;
    }
    if (consumePress('ArrowRight') || consumePress('KeyD') || consumePress('Escape') || consumePress('Backspace')) {
      pauseMenu.itemTooltipActive = false;
      return;
    }
    return;
  }

  // Navigate menu
  if (consumePress('ArrowUp') || consumePress('KeyW')) {
    pauseMenu.selected = (pauseMenu.selected + PAUSE_OPTIONS.length - 1) % PAUSE_OPTIONS.length;
  }
  if (consumePress('ArrowDown') || consumePress('KeyS')) {
    pauseMenu.selected = (pauseMenu.selected + 1) % PAUSE_OPTIONS.length;
  }
  // Left arrow: open item tooltip if items exist
  if (consumePress('ArrowLeft') || consumePress('KeyA')) {
    const pl = typeof game !== 'undefined' ? game.player : null;
    const itemKeys = pl ? Object.keys(pl.items).filter(k => pl.items[k]) : [];
    if (itemKeys.length > 0) {
      pauseMenu.itemTooltipActive = true;
      pauseMenu.itemTooltipIdx = 0;
      return;
    }
  }
  if (consumePress('Enter') || consumePress('Space') || consumePress('KeyZ') || consumePress('KeyJ')) {
    const sel = pauseMenu.selected;
    if (sel === 0) { pauseMenu.active = false; return; }
    if (sel === 1) { pauseMenu.popup = 'guide'; pauseMenu.guideNinja = 0; pauseMenu.popupScroll = 0; }
    if (sel === 2) { pauseMenu.popup = 'bestiary'; pauseMenu.bestiaryIdx = 0; pauseMenu.bestiaryDetail = false; pauseMenu.popupScroll = 0; }
    if (sel === 3) { pauseMenu.popup = 'vault'; pauseMenu.vaultScroll = 0; }
    if (sel === 4) { pauseMenu.popup = 'achievements'; pauseMenu.popupScroll = 0; }
    if (sel === 5) { Music.setMuted(!Music.muted); }
    if (sel === 6) { SFX.muted = !SFX.muted; }
  }
}

function updatePopup() {
  // Bestiary detail: ESC goes back to grid, not close popup
  if (pauseMenu.popup === 'bestiary' && pauseMenu.bestiaryDetail) {
    if (consumePress('Escape') || consumePress('Backspace')) {
      pauseMenu.bestiaryDetail = false;
      return;
    }
  }
  // Close popup
  if (consumePress('Escape') || consumePress('Backspace')) {
    pauseMenu.popup = null;
    pauseMenu.popupScroll = 0;
    return;
  }

  if (pauseMenu.popup === 'guide') {
    if (consumePress('ArrowLeft') || consumePress('KeyA')) {
      pauseMenu.guideNinja = (pauseMenu.guideNinja + 6) % 7;
    }
    if (consumePress('ArrowRight') || consumePress('KeyD')) {
      pauseMenu.guideNinja = (pauseMenu.guideNinja + 1) % 7;
    }
  }

  if (pauseMenu.popup === 'bestiary' && !pauseMenu.bestiaryDetail) {
    const entries = getBestiaryEntries();
    const cols = 10;
    if (consumePress('ArrowLeft') || consumePress('KeyA')) {
      pauseMenu.bestiaryIdx = Math.max(0, pauseMenu.bestiaryIdx - 1);
    }
    if (consumePress('ArrowRight') || consumePress('KeyD')) {
      pauseMenu.bestiaryIdx = Math.min(entries.length - 1, pauseMenu.bestiaryIdx + 1);
    }
    if (consumePress('ArrowUp') || consumePress('KeyW')) {
      pauseMenu.bestiaryIdx = Math.max(0, pauseMenu.bestiaryIdx - cols);
    }
    if (consumePress('ArrowDown') || consumePress('KeyS')) {
      pauseMenu.bestiaryIdx = Math.min(entries.length - 1, pauseMenu.bestiaryIdx + cols);
    }
    if (consumePress('Enter') || consumePress('Space') || consumePress('KeyZ') || consumePress('KeyJ')) {
      const e = entries[pauseMenu.bestiaryIdx];
      const d = bestiaryData[e.key];
      if (d && d.kills > 0) pauseMenu.bestiaryDetail = true;
    }
  }

  if (pauseMenu.popup === 'vault') {
    const itemKeys = Object.keys(BOSS_ITEMS);
    if (consumePress('ArrowUp') || consumePress('KeyW')) {
      pauseMenu.vaultScroll = Math.max(0, pauseMenu.vaultScroll - 1);
    }
    if (consumePress('ArrowDown') || consumePress('KeyS')) {
      pauseMenu.vaultScroll = Math.min(itemKeys.length - 1, pauseMenu.vaultScroll + 1);
    }
  }

  if (pauseMenu.popup === 'achievements') {
    // Clear cache confirmation
    if (pauseMenu.clearCacheConfirm) {
      if (consumePress('KeyY')) {
        localStorage.removeItem(ACHIEVEMENTS_KEY);
        localStorage.removeItem(BESTIARY_KEY);
        localStorage.removeItem(VAULT_KEY);
        localStorage.removeItem('elenin_lastNinja');
        achievementData = {};
        bestiaryData = {};
        vaultData = {};
        pauseMenu.clearCacheConfirm = false;
        pauseMenu.popupScroll = 0;
        return;
      }
      if (consumePress('KeyN') || consumePress('Escape') || consumePress('Backspace')) {
        pauseMenu.clearCacheConfirm = false;
        return;
      }
      return; // Block other inputs during confirmation
    }
    if (consumePress('ArrowUp') || consumePress('KeyW')) {
      pauseMenu.popupScroll = Math.max(0, pauseMenu.popupScroll - 1);
    }
    if (consumePress('ArrowDown') || consumePress('KeyS')) {
      pauseMenu.popupScroll = Math.min(ACHIEVEMENT_DEFS.length - 1, pauseMenu.popupScroll + 1);
    }
    if (consumePress('KeyX') || consumePress('Delete')) {
      pauseMenu.clearCacheConfirm = true;
    }
  }
}

function getBestiaryEntries() {
  const entries = [];
  // Row: Normal
  for (const t of ENEMY_TIERS) entries.push({ key: t, type: t, big: false, boss: false, element: null });
  // Row: Big
  for (const t of ENEMY_TIERS) entries.push({ key: `big_${t}`, type: t, big: true, boss: false, element: null });
  // Row: Boss
  for (const t of ENEMY_TIERS) entries.push({ key: `boss_${t}`, type: t, big: false, boss: true, element: null });
  // One row per element
  for (const el of ENEMY_ELEMENTS) {
    for (const t of ENEMY_TIERS) {
      entries.push({ key: `elem_${el}_${t}`, type: t, big: false, boss: false, element: el });
    }
  }
  return entries;
}

// â”€â”€ Render Helpers â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function drawBox(ctx, x, y, w, h, bgAlpha) {
  ctx.fillStyle = `rgba(0,0,0,${bgAlpha || 0.85})`;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
}

function drawText(ctx, text, x, y, color, font) {
  ctx.fillStyle = color || '#fff';
  ctx.font = font || '12px monospace';
  ctx.fillText(text, x, y);
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  return lines;
}

// â”€â”€ Toast Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderToast(ctx) {
  if (!currentToast && achievementToasts.length > 0) {
    currentToast = achievementToasts.shift();
    toastTimer = 180; // 3 seconds
  }
  if (!currentToast) return;
  toastTimer--;
  if (toastTimer <= 0) { currentToast = null; return; }

  const alpha = toastTimer > 150 ? (180 - toastTimer) / 30 : (toastTimer < 30 ? toastTimer / 30 : 1);
  ctx.save();
  ctx.globalAlpha = alpha;
  const tw = 300, th = 50;
  const tx = CANVAS_W / 2 - tw / 2;
  const ty = 50;
  drawBox(ctx, tx, ty, tw, th, 0.9);
  const isBestiary = currentToast.isBestiary;
  const accent = isBestiary ? '#6af' : '#ffd700';
  ctx.fillStyle = accent;
  ctx.strokeStyle = accent;
  ctx.lineWidth = 2;
  ctx.strokeRect(tx, ty, tw, th);
  ctx.font = 'bold 11px monospace';
  ctx.fillText(isBestiary ? '\uD83D\uDCD6 New Bestiary Entry!' : '\u2606 Achievement Unlocked!', tx + 10, ty + 18);
  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.fillText(isBestiary ? `${currentToast.icon} ${currentToast.desc}` : `${currentToast.icon} ${currentToast.name}`, tx + 10, ty + 36);
  ctx.restore();
}

// â”€â”€ Pause Menu Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderPauseMenu(ctx) {
  if (!pauseMenu.active) return;

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (pauseMenu.popup) {
    renderPopup(ctx);
    return;
  }

  // Main menu box
  const bw = 280, bh = 296;
  const bx = CANVAS_W / 2 - bw / 2;
  const by = CANVAS_H / 2 - bh / 2;
  drawBox(ctx, bx, by, bw, bh);

  // Title
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 20px monospace';
  const title = 'PAUSED';
  const ttw = ctx.measureText(title).width;
  ctx.fillText(title, CANVAS_W / 2 - ttw / 2, by + 32);

  // Options
  ctx.font = '14px monospace';
  for (let i = 0; i < PAUSE_OPTIONS.length; i++) {
    const oy = by + 60 + i * 32;
    if (i === pauseMenu.selected) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(bx + 20, oy - 14, bw - 40, 24);
      ctx.fillStyle = '#ffd700';
      ctx.fillText('\u25B6 ', bx + 24, oy + 2);
    }
    ctx.fillStyle = i === pauseMenu.selected ? '#fff' : '#aaa';
    ctx.fillText(PAUSE_OPTIONS[i], bx + 44, oy + 2);
    // Show ON/OFF for Music and SFX
    if (PAUSE_OPTIONS[i] === 'Music' || PAUSE_OPTIONS[i] === 'SFX') {
      const isOn = PAUSE_OPTIONS[i] === 'Music' ? !Music.muted : !SFX.muted;
      ctx.fillStyle = isOn ? '#4f4' : '#f44';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(isOn ? 'ON' : 'OFF', bx + bw - 30, oy + 2);
      ctx.textAlign = 'left';
      ctx.font = '14px monospace';
    }
  }

  // Footer
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  const pl = typeof game !== 'undefined' ? game.player : null;
  const hasItems = pl && Object.keys(pl.items).filter(k => pl.items[k]).length > 0;
  const footerHint = hasItems
    ? 'ESC to close \u2022 \u2190 Items \u2022 \u2191\u2193 Navigate \u2022 Enter/Z to select'
    : 'ESC to close \u2022 \u2191\u2193 Navigate \u2022 Enter/Z to select';
  ctx.fillText(footerHint, bx + 16, by + bh - 12);

  game.renderItemBar(pl);

  // Item tooltip panel (left side)
  if (pauseMenu.itemTooltipActive) {
    renderItemTooltip(ctx);
  }
}

function renderItemTooltip(ctx) {
  const pl = typeof game !== 'undefined' ? game.player : null;
  if (!pl) return;
  const itemKeys = Object.keys(pl.items).filter(k => pl.items[k]);
  if (itemKeys.length === 0) return;

  const idx = Math.min(pauseMenu.itemTooltipIdx, itemKeys.length - 1);
  const iconSize = 30;
  const pad = 4;
  const totalH = itemKeys.length * iconSize + (itemKeys.length - 1) * pad;
  const startY = Math.round((CANVAS_H - totalH) / 2);

  // Draw item list (same positions as HUD)
  for (let i = 0; i < itemKeys.length; i++) {
    const key = itemKeys[i];
    const def = BOSS_ITEMS[key];
    if (!def) continue;
    const icx = 8, icy = startY + i * (iconSize + pad);
    const isSel = i === idx;
    const dimmed = key === 'deathsKey' && pl.deathsKeyUsed;

    // Selection highlight
    if (isSel) {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.strokeRect(icx - 2, icy - 2, iconSize + 4, iconSize + 4);
    }

    // Dim non-selected
    if (!isSel) {
      ctx.globalAlpha = 0.5;
    }
    if (dimmed) ctx.globalAlpha = 0.3;

    // Background
    ctx.shadowColor = def.color;
    ctx.shadowBlur = isSel ? 12 : 6;
    const grad = ctx.createLinearGradient(icx, icy, icx, icy + iconSize);
    grad.addColorStop(0, 'rgba(40,40,50,0.85)');
    grad.addColorStop(1, 'rgba(15,15,20,0.95)');
    ctx.fillStyle = grad;
    ctx.fillRect(icx, icy, iconSize, iconSize);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = def.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(icx + 1, icy + 1, iconSize - 2, iconSize - 2);
    // Corner highlights
    ctx.fillStyle = def.color;
    const a = dimmed ? 0.15 : 0.5;
    ctx.globalAlpha = isSel ? a : a * 0.5;
    ctx.fillRect(icx + 1, icy + 1, 4, 1);
    ctx.fillRect(icx + 1, icy + 1, 1, 4);
    ctx.fillRect(icx + iconSize - 5, icy + iconSize - 2, 4, 1);
    ctx.fillRect(icx + iconSize - 2, icy + iconSize - 5, 1, 4);
    ctx.globalAlpha = dimmed ? 0.3 : (isSel ? 1 : 0.5);
    drawItemIcon(ctx, key, icx + iconSize / 2, icy + iconSize / 2, iconSize * 0.75, def.color);
    // x2 Orb crack overlay
    if (key === 'x2Orb' && pl.x2OrbCounter > 0) {
      const crackPct = pl.x2OrbCounter / 100;
      ctx.globalAlpha = crackPct * 0.7;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(icx + iconSize * 0.3, icy + iconSize * 0.2);
      ctx.lineTo(icx + iconSize * 0.5, icy + iconSize * 0.55);
      ctx.lineTo(icx + iconSize * 0.4, icy + iconSize * 0.8);
      ctx.stroke();
      if (crackPct > 0.5) {
        ctx.beginPath();
        ctx.moveTo(icx + iconSize * 0.5, icy + iconSize * 0.55);
        ctx.lineTo(icx + iconSize * 0.7, icy + iconSize * 0.4);
        ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Tooltip box to the right of the item list
  const selKey = itemKeys[idx];
  const selDef = BOSS_ITEMS[selKey];
  if (!selDef) return;

  const tipX = 8 + iconSize + 10;
  const selItemY = startY + idx * (iconSize + pad);
  const tipW = 240;
  const tipH = 80;
  // Vertically center tooltip on item, clamp to screen
  let tipY = selItemY + iconSize / 2 - tipH / 2;
  tipY = Math.max(4, Math.min(CANVAS_H - tipH - 4, tipY));

  // Box background
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(tipX, tipY, tipW, tipH);
  ctx.strokeStyle = selDef.color;
  ctx.lineWidth = 2;
  ctx.strokeRect(tipX, tipY, tipW, tipH);

  // Connector line from item to tooltip
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(8 + iconSize, selItemY + iconSize / 2);
  ctx.lineTo(tipX, tipY + tipH / 2);
  ctx.stroke();

  // Icon in box
  const tiX = tipX + 20;
  const tiY = tipY + 22;
  ctx.shadowColor = selDef.color;
  ctx.shadowBlur = 8;
  drawItemIcon(ctx, selKey, tiX, tiY, 24, selDef.color);
  ctx.shadowBlur = 0;

  // Name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(selDef.name, tipX + 38, tipY + 18);

  // Description (word-wrap)
  ctx.fillStyle = '#ccc';
  ctx.font = '10px monospace';
  let descText = selDef.desc;
  // x2 Orb: append durability
  if (selKey === 'x2Orb') {
    const remaining = 100 - (pl.x2OrbCounter || 0);
    descText += ` (${remaining} orbs left)`;
  }
  // Death's Key: append used status
  if (selKey === 'deathsKey' && pl.deathsKeyUsed) {
    descText += ' [USED]';
  }
  const descLines = wrapText(ctx, descText, tipW - 16);
  for (let li = 0; li < descLines.length; li++) {
    ctx.fillText(descLines[li], tipX + 8, tipY + 36 + li * 13);
  }

  // Navigation hint
  ctx.fillStyle = '#555';
  ctx.font = '9px monospace';
  ctx.fillText('\u2191\u2193 Browse \u2022 \u2192/ESC Close', tipX + 8, tipY + tipH - 6);
}

// â”€â”€ Popup Render â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderPopup(ctx) {
  if (pauseMenu.popup === 'guide') renderGuidePopup(ctx);
  else if (pauseMenu.popup === 'bestiary') renderBestiaryPopup(ctx);
  else if (pauseMenu.popup === 'vault') renderVaultPopup(ctx);
  else if (pauseMenu.popup === 'achievements') renderAchievementsPopup(ctx);

function renderGuidePopup(ctx) {
  const bw = 700, bh = 400;
  const bx = CANVAS_W / 2 - bw / 2;
  const by = CANVAS_H / 2 - bh / 2;
  drawBox(ctx, bx, by, bw, bh);

  const ninjaKey = NINJA_ORDER[pauseMenu.guideNinja];
  const nt = NINJA_TYPES[ninjaKey];
  const guide = NINJA_GUIDE[ninjaKey];

  // Title
  ctx.fillStyle = nt.color;
  ctx.font = 'bold 18px monospace';
  ctx.fillText(nt.name, bx + 20, by + 30);

  // Color swatch
  ctx.fillStyle = nt.color;
  ctx.fillRect(bx + bw - 60, by + 14, 20, 20);
  ctx.fillStyle = nt.accentColor;
  ctx.fillRect(bx + bw - 36, by + 14, 20, 20);

  // Ninja tabs
  const tabY = by + 48;
  for (let i = 0; i < 7; i++) {
    const tk = NINJA_ORDER[i];
    const tt = NINJA_TYPES[tk];
    const tx = bx + 20 + i * 96;
    const sel = i === pauseMenu.guideNinja;
    ctx.fillStyle = sel ? tt.color : 'rgba(255,255,255,0.1)';
    ctx.fillRect(tx, tabY, 88, 22);
    ctx.fillStyle = sel ? '#fff' : '#888';
    ctx.font = sel ? 'bold 10px monospace' : '10px monospace';
    ctx.fillText(`${i + 1}:${tk.substring(0, 5)}`, tx + 6, tabY + 15);
  }

  // Stats
  let cy = tabY + 42;
  ctx.font = '12px monospace';
  ctx.fillStyle = '#ccc';
  ctx.fillText(`ATK: ${Math.round(nt.attackDamage)}  SPD: ${Math.round(nt.speed * 10) / 10}  JUMP: ${Math.round(Math.abs(nt.jumpPower) * 10) / 10}  KEY: [${nt.key}]`, bx + 24, cy);

  cy += 24;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 12px monospace';
  ctx.fillText(`Element: ${guide.element}`, bx + 24, cy);

  cy += 22;
  ctx.fillStyle = '#8cf';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('Special:', bx + 24, cy);
  ctx.fillStyle = '#ccc';
  ctx.font = '11px monospace';
  const specLines = wrapText(ctx, guide.special, bw - 60);
  for (const line of specLines) {
    cy += 14;
    ctx.fillText(line, bx + 24, cy);
  }

  cy += 20;
  ctx.fillStyle = '#f93';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('Ultimate:', bx + 24, cy);
  ctx.fillStyle = '#ccc';
  ctx.font = '11px monospace';
  const ultLines = wrapText(ctx, guide.ultimate, bw - 60);
  for (const line of ultLines) {
    cy += 14;
    ctx.fillText(line, bx + 24, cy);
  }

  cy += 20;
  ctx.fillStyle = '#8d8';
  ctx.font = 'bold 11px monospace';
  ctx.fillText('Mechanic:', bx + 24, cy);
  ctx.fillStyle = '#ccc';
  ctx.font = '11px monospace';
  const mechLines = wrapText(ctx, guide.mechanic, bw - 60);
  for (const line of mechLines) {
    cy += 14;
    ctx.fillText(line, bx + 24, cy);
  }

  cy += 20;
  ctx.fillStyle = '#aaa';
  ctx.font = 'italic 11px monospace';
  const tipLines = wrapText(ctx, 'Tip: ' + guide.tips, bw - 60);
  for (const line of tipLines) {
    cy += 14;
    ctx.fillText(line, bx + 24, cy);
  }

  // Lore
  if (guide.lore) {
    cy += 20;
    ctx.fillStyle = '#b8a060';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('Lore:', bx + 24, cy);
    ctx.fillStyle = '#a89868';
    ctx.font = 'italic 11px monospace';
    const loreLines = wrapText(ctx, guide.lore, bw - 60);
    for (const line of loreLines) {
      cy += 14;
      ctx.fillText(line, bx + 24, cy);
    }
  }

  // Footer
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('\u2190\u2192 Switch Ninja \u2022 ESC/Backspace to go back', bx + 16, by + bh - 12);
}

function drawMiniEnemy(ctx, cx, cy, w, h, entry) {
  const stats = ENEMY_STATS[entry.type];
  const bodyColor = entry.element ? ELEMENT_COLORS[entry.element].body : stats.color;
  if (entry.type === 'attacker') {
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.arc(cx + w / 2, cy + h / 2, w * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#866';
    ctx.beginPath();
    ctx.arc(cx + w / 2, cy + h / 2, w * 0.13, 0, Math.PI * 2);
    ctx.fill();
    if (entry.element) {
      ctx.fillStyle = ELEMENT_COLORS[entry.element].accent;
      ctx.beginPath();
      ctx.moveTo(cx + w / 2, cy + 2); ctx.lineTo(cx + w / 2 + 3, cy + 5);
      ctx.lineTo(cx + w / 2, cy + 8); ctx.lineTo(cx + w / 2 - 3, cy + 5);
      ctx.closePath(); ctx.fill();
    }
    return;
  }
  const bx_ = cx + 4, by_ = cy + (entry.boss ? 2 : (entry.big ? 3 : 5));
  const bw_ = w - 8, bh_ = h - (entry.boss ? 4 : (entry.big ? 5 : 8));
  ctx.fillStyle = bodyColor;
  ctx.fillRect(bx_, by_, bw_, bh_);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx_ + bw_ * 0.5, by_ + bh_ * 0.2, 2, 2);
  ctx.fillRect(bx_ + bw_ * 0.5 + 4, by_ + bh_ * 0.2, 2, 2);
  // Headband (non-elemental only)
  if (!entry.element) {
    ctx.fillStyle = '#c33';
    ctx.fillRect(bx_, by_ + bh_ * 0.15, bw_, 2);
  }
  // Type accents
  switch (entry.type) {
    case 'shooter':
      ctx.fillStyle = entry.element ? ELEMENT_COLORS[entry.element].accent : '#ff4';
      ctx.fillRect(bx_ + bw_, by_ + bh_ / 2 - 1, 3, 2); break;
    case 'jumper':
      ctx.fillStyle = '#ff0';
      ctx.fillRect(bx_ + 1, by_ + bh_ - 1, 3, 2);
      ctx.fillRect(bx_ + bw_ - 4, by_ + bh_ - 1, 3, 2); break;
    case 'bouncer':
      ctx.fillStyle = '#f6f';
      ctx.fillRect(bx_ + 1, by_, bw_ - 2, 2); break;
    case 'shielded':
      ctx.fillStyle = '#5cf';
      ctx.fillRect(bx_ + bw_ - 1, by_ - 1, 2, bh_ + 2); break;
    case 'deflector':
      ctx.fillStyle = '#aac';
      ctx.beginPath();
      ctx.moveTo(bx_ - 1, by_ + 2);
      ctx.lineTo(bx_ + bw_ / 2, by_ - 5);
      ctx.lineTo(bx_ + bw_ + 1, by_ + 2);
      ctx.closePath(); ctx.fill(); break;
    case 'protector':
      ctx.fillStyle = '#5a7';
      ctx.fillRect(bx_ - 1, by_ - 2, bw_ + 2, 4);
      ctx.fillStyle = '#3d8';
      ctx.fillRect(bx_ + bw_ / 2 - 1, by_ - 5, 2, 4); break;
    case 'flyer':
      ctx.fillStyle = '#bdb';
      ctx.fillRect(bx_ - 3, by_ + 2, 3, bh_ - 4);
      ctx.fillRect(bx_ + bw_, by_ + 2, 3, bh_ - 4); break;
    case 'flyshooter':
      ctx.fillStyle = '#dba';
      ctx.fillRect(bx_ - 3, by_ + 2, 3, bh_ - 4);
      ctx.fillRect(bx_ + bw_, by_ + 2, 3, bh_ - 4);
      ctx.fillStyle = entry.element ? ELEMENT_COLORS[entry.element].accent : '#fa4';
      ctx.fillRect(bx_ + bw_ + 3, by_ + bh_ / 2 - 1, 3, 2); break;
  }
  // Big indicator
  if (entry.big) {
    ctx.strokeStyle = '#ff0'; ctx.lineWidth = 1.5;
    ctx.strokeRect(bx_, by_, bw_, bh_);
  }
  // Boss indicator
  if (entry.boss) {
    ctx.fillStyle = '#f44';
    ctx.fillRect(bx_ + bw_ / 2 - 4, by_ - 3, 8, 3);
    ctx.fillRect(bx_ + bw_ / 2 - 5, by_ - 5, 2, 3);
    ctx.fillRect(bx_ + bw_ / 2 + 3, by_ - 5, 2, 3);
    ctx.fillRect(bx_ + bw_ / 2 - 1, by_ - 5, 2, 3);
  }
  // Element pip + aura
  if (entry.element) {
    const elC = ELEMENT_COLORS[entry.element];
    if (entry.element === 'ghost') {
      // Ghost: translucent shimmer
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#c8a8e8';
      ctx.fillRect(bx_ - 2, by_ - 2, bw_ + 4, bh_ + 4);
      ctx.globalAlpha = 1;
    } else if (entry.element === 'spiky') {
      // Spiky: small thorns around body
      ctx.fillStyle = '#f86';
      const tl = 3;
      ctx.fillRect(bx_ - tl, by_ + bh_ * 0.3, tl, 2);
      ctx.fillRect(bx_ - tl, by_ + bh_ * 0.6, tl, 2);
      ctx.fillRect(bx_ + bw_, by_ + bh_ * 0.3, tl, 2);
      ctx.fillRect(bx_ + bw_, by_ + bh_ * 0.6, tl, 2);
      ctx.fillRect(bx_ + bw_ * 0.3, by_ - tl, 2, tl);
      ctx.fillRect(bx_ + bw_ * 0.6, by_ - tl, 2, tl);
    } else {
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = elC.glow;
      ctx.beginPath();
      ctx.arc(bx_ + bw_ / 2, by_ + bh_ / 2, bw_ * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    const px = cx + w / 2, py = cy + 3;
    ctx.fillStyle = elC.accent;
    ctx.beginPath();
    ctx.moveTo(px, py - 3); ctx.lineTo(px + 2, py);
    ctx.lineTo(px, py + 3); ctx.lineTo(px - 2, py);
    ctx.closePath(); ctx.fill();
  }
}

function renderBestiaryPopup(ctx) {
  const bw = 700, bh = 450;
  const bx = CANVAS_W / 2 - bw / 2;
  const by = CANVAS_H / 2 - bh / 2;
  drawBox(ctx, bx, by, bw, bh);

  const entries = getBestiaryEntries();
  const idx = pauseMenu.bestiaryIdx;
  const entry = entries[idx];
  const data = bestiaryData[entry.key];
  const discovered = data && data.kills > 0;

  if (pauseMenu.bestiaryDetail && discovered) {
    renderBestiaryDetail(ctx, bx, by, bw, bh, entry, data);
    return;
  }

  // Grid view
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('Bestiary', bx + 20, by + 28);
  const totalDisc = entries.filter(e => bestiaryData[e.key] && bestiaryData[e.key].kills > 0).length;
  ctx.fillStyle = '#888';
  ctx.font = '11px monospace';
  ctx.fillText(`${totalDisc}/${entries.length}`, bx + 130, by + 28);

  const cols = 10;
  const cellW = 40, cellH = 33;
  const gapX = 4, gapY = 3;
  const labelW = 70;
  const gridW = cols * (cellW + gapX);
  const gridStartX = bx + (bw - gridW - labelW) / 2 + labelW;
  const gridStartY = by + 56;

  // Column headers
  ctx.font = '7px monospace';
  for (let c = 0; c < cols; c++) {
    const type = ENEMY_TIERS[c];
    const stats = ENEMY_STATS[type];
    const hx = gridStartX + c * (cellW + gapX) + cellW / 2;
    ctx.fillStyle = stats.color;
    ctx.fillText(type.substring(0, 5).toUpperCase(), hx - 11, gridStartY - 5);
  }

  // Row labels
  const rowLabels = ['Normal', 'Big', 'Boss', 'Fire', 'Ghost', 'Water', 'Crystal', 'Wind', 'Lightn.', 'Spiky'];
  for (let r = 0; r < 10; r++) {
    const ry = gridStartY + r * (cellH + gapY);
    ctx.fillStyle = r < 3 ? '#aaa' : ELEMENT_COLORS[ENEMY_ELEMENTS[r - 3]].accent;
    ctx.font = '8px monospace';
    ctx.fillText(rowLabels[r], gridStartX - labelW + 4, ry + cellH / 2 + 3);
  }

  // Separator between base and elemental rows
  const sepY = gridStartY + 3 * (cellH + gapY) - 2;
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(gridStartX - labelW + 4, sepY);
  ctx.lineTo(gridStartX + gridW - gapX, sepY);
  ctx.stroke();

  // Grid cells
  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    const row = Math.floor(i / cols);
    const col = i % cols;
    const cx = gridStartX + col * (cellW + gapX);
    const cy = gridStartY + row * (cellH + gapY);
    const d = bestiaryData[e.key];
    const disc = d && d.kills > 0;
    const isSel = i === idx;

    ctx.fillStyle = disc ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.02)';
    ctx.fillRect(cx, cy, cellW, cellH);

    if (isSel) {
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.strokeRect(cx - 1, cy - 1, cellW + 2, cellH + 2);
    }

    if (disc) {
      drawMiniEnemy(ctx, cx, cy, cellW, cellH, e);
    } else {
      ctx.fillStyle = '#333';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('?', cx + cellW / 2 - 4, cy + cellH / 2 + 4);
    }
  }

  // Selected entry label
  const footY = by + bh - 36;
  if (discovered) {
    let name;
    if (entry.element) {
      const elName = entry.element.charAt(0).toUpperCase() + entry.element.slice(1);
      name = `${elName} ${ENEMY_STATS[entry.type].name}`;
    } else {
      name = entry.boss ? BOSS_NAMES[entry.type] + ' (Boss)' : (entry.big ? 'Big ' : '') + ENEMY_STATS[entry.type].name;
    }
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.fillText(name, bx + 20, footY);
    ctx.fillStyle = '#4f4';
    ctx.font = '10px monospace';
    ctx.fillText(`Kills: ${data.kills}`, bx + 20, footY + 14);
  } else {
    ctx.fillStyle = '#555';
    ctx.font = '12px monospace';
    ctx.fillText('??? \u2014 Not yet discovered', bx + 20, footY);
  }

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('Arrows: Navigate \u2022 Enter: Details \u2022 ESC: Back', bx + 260, by + bh - 6);
}

function renderBestiaryDetail(ctx, bx, by, bw, bh, entry, data) {
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('Bestiary', bx + 20, by + 28);

  const detY = by + 48;

  if (entry.element) {
    const elColors = ELEMENT_COLORS[entry.element];
    const elName = entry.element.charAt(0).toUpperCase() + entry.element.slice(1);
    const stats = ENEMY_STATS[entry.type];
    ctx.fillStyle = elColors.accent;
    ctx.font = 'bold 16px monospace';
    ctx.fillText(`${elName} ${stats.name}`, bx + 40, detY + 20);

    // Larger preview
    const prevX = bx + bw - 140;
    const prevY = detY + 10;
    drawMiniEnemy(ctx, prevX, prevY, 48, 48, entry);

    let sy = detY + 50;
    ctx.fillStyle = '#4f4';
    ctx.font = '12px monospace';
    ctx.fillText(`Kills: ${data.kills}`, bx + 40, sy);

    sy += 24;
    ctx.fillStyle = '#ccc';
    ctx.font = '11px monospace';
    const ELEMENT_DESCS = {
      fire: 'Immune to burn \u2014 fire damage heals it. Weak to water.',
      ghost: 'Immune to blade & shuriken. Only abilities can damage it. Inflicts Curse.',
      water: 'Fully immune to burn. Resists fire. Weak to wind and lightning.',
      crystal: 'Heals from crystal attacks. Weak to fire.',
      wind: 'Resists water. Healed by wind attacks.',
      lightning: 'Strong against water. Healed by lightning.',
      spiky: 'Reflects sword damage back at you. Higher contact damage. Inflicts Bleed.',
    };
    const desc = `${elName} variant of ${stats.name}. ${ELEMENT_DESCS[entry.element] || ''}`;
    const descLines = wrapText(ctx, desc, bw - 80);
    for (const line of descLines) {
      ctx.fillText(line, bx + 40, sy);
      sy += 15;
    }

    sy += 10;
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    ctx.fillText('Interactions vs this element:', bx + 40, sy);
    sy += 14;
    for (const atkEl of ['fire', 'earth', 'water', 'crystal', 'wind', 'lightning', 'steel']) {
      if (!ELEMENT_MATRIX[atkEl]) continue;
      const result = ELEMENT_MATRIX[atkEl][entry.element];
      if (result === 'normal') continue;
      const atkName = atkEl.charAt(0).toUpperCase() + atkEl.slice(1);
      ctx.fillStyle = result === 'resist' ? ELEMENT_COLORS[entry.element].accent : '#4f4';
      ctx.fillText(`${atkName} \u2192 ${result.toUpperCase()}`, bx + 50, sy);
      sy += 13;
    }
  } else {
    const stats = ENEMY_STATS[entry.type];
    ctx.fillStyle = stats.color;
    ctx.font = 'bold 16px monospace';
    const nameStr = entry.boss ? BOSS_NAMES[entry.type] + ' (Boss)' : (entry.big ? 'Big ' : '') + stats.name;
    ctx.fillText(nameStr, bx + 40, detY + 20);

    // Larger preview
    const prevX = bx + bw - 140;
    const prevY = detY + 10;
    const prevW = entry.boss ? 64 : (entry.big ? 52 : 44);
    const prevH = entry.boss ? 64 : (entry.big ? 52 : 44);
    drawMiniEnemy(ctx, prevX, prevY, prevW, prevH, entry);

    let sy = detY + 50;
    ctx.font = '12px monospace';
    const waveScale = entry.boss ? 10 : (entry.big ? 2 : 1);
    const baseHp = stats.hp * waveScale;
    const baseDmg = entry.boss ? Math.round(4) : (entry.big ? stats.dmg + 3 : stats.dmg);
    ctx.fillStyle = '#e44';
    ctx.fillText(`Base HP: ${Math.round(baseHp)}`, bx + 40, sy);
    ctx.fillStyle = '#fa0';
    ctx.fillText(`Base DMG: ${Math.round(baseDmg)}`, bx + 200, sy);

    sy += 20;
    ctx.fillStyle = '#4f4';
    ctx.fillText(`Your Kills: ${data.kills}`, bx + 40, sy);

    if (data.elementKills) {
      sy += 18;
      ctx.font = '10px monospace';
      let elStr = 'Elemental kills:';
      for (const el of ENEMY_ELEMENTS) {
        if (data.elementKills[el]) elStr += ` ${el}:${data.elementKills[el]}`;
      }
      ctx.fillStyle = '#aaa';
      ctx.fillText(elStr, bx + 40, sy);
    }

    sy += 24;
    ctx.fillStyle = '#ccc';
    ctx.font = '11px monospace';
    const desc = BESTIARY_DESCS[entry.type] || 'A dangerous enemy.';
    const descLines = wrapText(ctx, desc, bw - 80);
    for (const line of descLines) {
      ctx.fillText(line, bx + 40, sy);
      sy += 15;
    }

    sy += 10;
    ctx.fillStyle = '#888';
    ctx.font = '10px monospace';
    if (entry.boss) {
      ctx.fillText('Boss variant: 10x HP, larger body, phase 2 at 50% HP.', bx + 40, sy);
      sy += 14;
      ctx.fillText(`Boss name: ${BOSS_NAMES[entry.type]}`, bx + 40, sy);
    } else if (entry.big) {
      ctx.fillText('Big variant: 2x HP, +3 DMG, larger body, 50% knockback resist.', bx + 40, sy);
    }

    sy += 20;
    const tierIdx = ENEMY_TIERS.indexOf(entry.type);
    ctx.fillStyle = '#666';
    ctx.fillText(`Tier: ${tierIdx + 1}/${ENEMY_TIERS.length}`, bx + 40, sy);
  }

  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('ESC/Backspace: Back to grid', bx + 16, by + bh - 12);
}

// ── Vault Popup ───────────────────────────────────────────────────────
function renderVaultPopup(ctx) {
  const bw = 700, bh = 420;
  const bx = CANVAS_W / 2 - bw / 2;
  const by = CANVAS_H / 2 - bh / 2;
  drawBox(ctx, bx, by, bw, bh);

  const itemKeys = Object.keys(BOSS_ITEMS);
  const found = itemKeys.filter(k => vaultData[k]).length;
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText(`Vault (${found}/${itemKeys.length})`, bx + 20, by + 28);

  const listY = by + 44;
  const listH = bh - 70;
  const rowH = 34;
  const visible = Math.floor(listH / rowH);
  const scroll = pauseMenu.vaultScroll;
  const startIdx = Math.max(0, Math.min(scroll, itemKeys.length - visible));

  ctx.save();
  ctx.beginPath();
  ctx.rect(bx, listY, bw, listH);
  ctx.clip();

  for (let i = startIdx; i < Math.min(startIdx + visible, itemKeys.length); i++) {
    const id = itemKeys[i];
    const def = BOSS_ITEMS[id];
    const owned = !!vaultData[id];
    const ry = listY + (i - startIdx) * rowH;

    // Highlight current scroll position
    if (i === scroll) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(bx + 8, ry, bw - 16, rowH - 2);
    }

    // Icon box
    const ibx = bx + 14, iby = ry + 3, ibs = 26;
    if (owned) {
      ctx.shadowColor = def.color;
      ctx.shadowBlur = 8;
    }
    const ibGrad = ctx.createLinearGradient(ibx, iby, ibx, iby + ibs);
    ibGrad.addColorStop(0, owned ? def.color : '#333');
    ibGrad.addColorStop(1, owned ? '#111' : '#1a1a1a');
    ctx.fillStyle = ibGrad;
    ctx.fillRect(ibx, iby, ibs, ibs);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = owned ? def.color : '#555';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ibx, iby, ibs, ibs);
    // Corner accents when owned
    if (owned) {
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.fillRect(ibx + 1, iby + 1, 3, 1);
      ctx.fillRect(ibx + 1, iby + 1, 1, 3);
      ctx.globalAlpha = 1;
    }
    if (owned) {
      drawItemIcon(ctx, id, ibx + ibs / 2, iby + ibs / 2, ibs * 0.7, def.color);
    } else {
      ctx.fillStyle = '#555';
      ctx.font = '14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', ibx + ibs / 2, iby + ibs / 2 + 1);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    }

    // Name
    ctx.fillStyle = owned ? '#fff' : '#555';
    ctx.font = owned ? 'bold 12px monospace' : '12px monospace';
    ctx.fillText(owned ? def.name : '???', bx + 48, ry + 16);

    // Description
    ctx.fillStyle = owned ? '#aaa' : '#444';
    ctx.font = '10px monospace';
    ctx.fillText(owned ? def.desc : '—', bx + 48, ry + 28);
  }

  ctx.restore();

  // Scrollbar
  if (itemKeys.length > visible) {
    const sbH = listH * (visible / itemKeys.length);
    const sbY = listY + (startIdx / itemKeys.length) * listH;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(bx + bw - 8, sbY, 4, sbH);
  }

  // Footer
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('\u2191\u2193 Scroll \u2022 ESC/Backspace to go back', bx + 16, by + bh - 12);
}

function renderAchievementsPopup(ctx) {
  const bw = 700, bh = 420;
  const bx = CANVAS_W / 2 - bw / 2;
  const by = CANVAS_H / 2 - bh / 2;
  drawBox(ctx, bx, by, bw, bh);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  const unlocked = ACHIEVEMENT_DEFS.filter(a => achievementData[a.id]).length;
  ctx.fillText(`Achievements (${unlocked}/${ACHIEVEMENT_DEFS.length})`, bx + 20, by + 28);

  // Scrollable list
  const listY = by + 44;
  const listH = bh - 70;
  const rowH = 28;
  const visible = Math.floor(listH / rowH);
  const scroll = pauseMenu.popupScroll;
  const startIdx = Math.max(0, Math.min(scroll, ACHIEVEMENT_DEFS.length - visible));

  ctx.save();
  ctx.beginPath();
  ctx.rect(bx, listY, bw, listH);
  ctx.clip();

  for (let i = startIdx; i < Math.min(startIdx + visible, ACHIEVEMENT_DEFS.length); i++) {
    const a = ACHIEVEMENT_DEFS[i];
    const done = !!achievementData[a.id];
    const ry = listY + (i - startIdx) * rowH;

    // Highlight current scroll position
    if (i === scroll) {
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(bx + 8, ry, bw - 16, rowH - 2);
    }

    // Icon & name
    ctx.fillStyle = done ? '#ffd700' : '#444';
    ctx.font = '14px monospace';
    ctx.fillText(a.icon, bx + 16, ry + 18);

    ctx.fillStyle = done ? '#fff' : '#555';
    ctx.font = done ? 'bold 11px monospace' : '11px monospace';
    ctx.fillText(a.name, bx + 44, ry + 15);

    // Description
    ctx.fillStyle = done ? '#aaa' : '#444';
    ctx.font = '10px monospace';
    ctx.fillText(a.desc, bx + 44, ry + 25);

    // Checkmark
    if (done) {
      ctx.fillStyle = '#4f4';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('\u2713', bx + bw - 30, ry + 18);
    }
  }

  ctx.restore();

  // Scrollbar
  if (ACHIEVEMENT_DEFS.length > visible) {
    const sbH = listH * (visible / ACHIEVEMENT_DEFS.length);
    const sbY = listY + (startIdx / ACHIEVEMENT_DEFS.length) * listH;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(bx + bw - 8, sbY, 4, sbH);
  }

  // Footer
  ctx.fillStyle = '#666';
  ctx.font = '10px monospace';
  ctx.fillText('\u2191\u2193 Scroll \u2022 X/Del: Clear Cache \u2022 ESC/Backspace to go back', bx + 16, by + bh - 12);

  // Clear cache confirmation overlay
  if (pauseMenu.clearCacheConfirm) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(bx, by, bw, bh);
    const cx = CANVAS_W / 2;
    const cy = CANVAS_H / 2;
    drawBox(ctx, cx - 180, cy - 50, 360, 100);
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Clear all saved data?', cx, cy - 15);
    ctx.fillStyle = '#ccc';
    ctx.font = '12px monospace';
    ctx.fillText('Achievements, Bestiary & Vault will be reset.', cx, cy + 5);
    ctx.fillStyle = '#4f4';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('Y = Confirm    N = Cancel', cx, cy + 30);
    ctx.textAlign = 'left';
  }
}

    }
    const tw = 70, th = 50;
    const cx = tentX - cam.x;
    const by = tentGroundY - cam.y;

    // Tent body (triangle)
    ctx.fillStyle = '#8b5e3c';
    ctx.beginPath();
    ctx.moveTo(cx - tw / 2, by);
    ctx.lineTo(cx, by - th);
    ctx.lineTo(cx + tw / 2, by);
    ctx.closePath();
    ctx.fill();

    // Tent outline
    ctx.strokeStyle = '#5a3420';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx - tw / 2, by);
    ctx.lineTo(cx, by - th);
    ctx.lineTo(cx + tw / 2, by);
    ctx.stroke();

    // Center seam
    ctx.strokeStyle = '#6b4228';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx, by - th);
    ctx.lineTo(cx, by);
    ctx.stroke();

    // Door flap (open, slight gap)
    ctx.fillStyle = '#704a2a';
    ctx.beginPath();
    ctx.moveTo(cx - 2, by);
    ctx.lineTo(cx - 10, by - 28);
    ctx.lineTo(cx - 2, by - 28);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 2, by);
    ctx.lineTo(cx + 10, by - 28);
    ctx.lineTo(cx + 2, by - 28);
    ctx.closePath();
    ctx.fill();

    // Pole tip
    ctx.fillStyle = '#c8b070';
    ctx.beginPath();
    ctx.arc(cx, by - th - 2, 2.5, 0, Math.PI * 2);
    ctx.fill();

  spawnEnemy() {
    const waveDef = WAVE_DEFS[this.wave - 1];
    let totalW = 0;
    for (const e of waveDef.pool) totalW += e.weight;
    let r = Math.random() * totalW;
    let pick = waveDef.pool[0];
    for (const e of waveDef.pool) {
      r -= e.weight;
      if (r <= 0) { pick = e; break; }
    }
    // Miniboss types: only one alive at a time
    if (pick.type === 'protector' || pick.type === 'attacker' || pick.type === 'deflector') {
      for (const e of this.enemies) {
        if (!e.dead && e.type === pick.type) return;
      }
    }
    // Protector/attacker minibosses: only spawn once per wave
    if (pick.big && (pick.type === 'protector' || pick.type === 'attacker')) {
      if (this.spawnedMiniboss.has(pick.type)) return;
    }
    const isFlying = (pick.type === 'flyer' || pick.type === 'flyshooter');
    const side = Math.random() < 0.5 ? -1 : 1;
    const spawnDist = this.levelW < 1000 ? randInt(150, 300) : randInt(350, 550);
    let x = this.player.x + side * spawnDist;
    let y = isFlying ? randInt(50, 250) : -40;
    if (this.levelType === 'tower') y = Math.min(this.player.y - 100, 200);
    const xMin = this.levelType === 'tower' ? 120 : 40;
    const xMax = this.levelType === 'tower' ? 840 : this.levelW - 60;
    x = Math.max(xMin, Math.min(xMax, x));
    const e = new Enemy(x, y, pick.type, !!pick.big, this.wave);
    // Elemental variant chance
    if (Math.random() < ELEMENTAL_SPAWN_CHANCE + (this.wave - 1) * 0.03) {
      e.element = ENEMY_ELEMENTS[Math.floor(Math.random() * ENEMY_ELEMENTS.length)];
      e.elementColors = ELEMENT_COLORS[e.element];
      e.color = e.elementColors.body;
    }
    if (pick.big && (pick.type === 'protector' || pick.type === 'attacker')) {
      this.spawnedMiniboss.add(pick.type);
    }
    this.enemies.push(e);
    this.effects.push(new Effect(x + e.w / 2, y + e.h / 2, e.element ? e.elementColors.particle : '#fff', 6, 3, 10));
  }

  spawnBoss() {
    const waveDef = WAVE_DEFS[this.wave - 1];
    let bx = Math.min(this.player.x + 300, this.levelW - 100);
    let by = this.levelType === 'tower' ? 100 : 300;
    this.boss = new Boss(bx, by, waveDef.boss, this.wave);
    // Elemental variant chance
    if (Math.random() < ELEMENTAL_SPAWN_CHANCE) {
      this.boss.element = ENEMY_ELEMENTS[Math.floor(Math.random() * ENEMY_ELEMENTS.length)];
      this.boss.elementColors = ELEMENT_COLORS[this.boss.element];
      this.boss.color = this.boss.elementColors.body;
    }
    this.bossActive = true;
    this.bossMessage = 180;
    this.effects.push(new Effect(this.boss.x + 28, this.boss.y + 28, this.boss.element ? this.boss.elementColors.particle : '#f44', 25, 6, 25));
    SFX.bossSpawn();
    SFX.bossRoar();
    this.showWaveMessage(this.boss.name + ` (${this.wave}/${TOTAL_WAVES})`);
    // Boss entrance phrase
    this.ninjaResponseActive = false;
    const bPhrase = getBattlePhrase(waveDef.boss, this.player.ninjaType, this.boss.element);
    if (bPhrase) {
      this.phraseText = bPhrase;
      this.phraseTimer = 150;
      this.phraseMaxTimer = 150;
      this.phraseColor = this.boss.element ? ELEMENT_COLORS[this.boss.element].accent : '#faa';
      this.phraseSource = this.boss;
      // Schedule ninja response
      const nResp = getNinjaResponse(this.player.ninjaType, waveDef.boss, this.boss.element);
      if (nResp) {
        this.ninjaResponseText = nResp;
        this.ninjaResponseTimer = -90;
        this.ninjaResponseColor = this.player.type.accentColor;
        this.ninjaResponseSource = this.player;
      }
    }
  }

  // ── Orb Bucket Generation ──
  _generateOrbBuckets() {
    const pl = this.player;

    // How far behind the expected curve is the player?
    let cumDrops = 0;
    for (let i = 0; i < this.wave && i < WAVE_DEFS.length; i++) {
      cumDrops += WAVE_DEFS[i].killsForBoss + (i + 2);
    }
    const expectedAll = cumDrops * (0.10 + 0.36 + 0.10 + 0.06 + 0.03 + 0.04 + 0.04 + 0.03 + 0.02);
    const actualAll = (pl.maxHp - 10) + pl.maxShield / 2 + (pl.maxShurikens - 3) +
      pl.bonusDamage + pl.bonusElemental + pl.bonusSpeed + pl.bonusReach +
      pl.bonusArmor + pl.bonusMana;
    const deficit = Math.max(0, expectedAll - actualAll);
    const deficitRatio = expectedAll > 0 ? Math.min(1, deficit / expectedAll) : 1;
    const permTotal = pl.bonusDamage + pl.bonusElemental + pl.bonusSpeed + pl.bonusReach + pl.bonusArmor + pl.bonusMana;

    // Orb pricing — element=50 is the reference unit
    // Budget: 1 element minimum (50), 2 elements max (100) when no perms
    // Scales up with wave and deficit
    const baseBudget = 50 + this.wave * 8;
    const budget = Math.round(baseBudget * (1 + deficitRatio * 0.6));

    const ORB_META = {
      heal:      { icon: '\u2665', color: '#f44', label: 'HP',       per: 3,  cost: 3 },
      maxhp:     { icon: '+',  color: '#4f4', label: 'MAX HP',   per: 1,  cost: 8 },
      shield:    { icon: '\u25c6', color: '#4af', label: 'SHIELD',   per: 2,  cost: 5 },
      damage:    { icon: '!',  color: '#f80', label: 'ATK',      per: 1,  cost: 18 },
      elDmg:     { icon: '\u2737', color: '#c4f', label: 'EL.DMG',  per: 1,  cost: 20 },
      speed:     { icon: '\u00bb', color: '#0f0', label: 'SPD',      per: 1,  cost: 16 },
      reach:     { icon: '\u2194', color: '#fa0', label: 'REACH',    per: 1,  cost: 16 },
      armor:     { icon: '\u25a0', color: '#88f', label: 'ARMOR',    per: 1,  cost: 18 },
      shuriken:  { icon: '\u2726', color: '#ccc', label: 'SHURIKEN', per: 1,  cost: 20 },
      ultcharge: { icon: '\u2605', color: '#ff0', label: 'ULT',      per: 50, cost: 6 },
      element:   { icon: '\u25c8', color: '#f0f', label: 'SPECIAL',  per: 1,  cost: 50 },
    };

    // Filter useless orbs
    const hpFull = pl.hp >= pl.maxHp;
    const shieldFull = pl.maxShield > 0 && pl.shield >= pl.maxShield;
