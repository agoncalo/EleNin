      mountain: ['shooter'],
      volcano: ['shooter'],
      castle: ['shooter'],
      skies: ['flyshooter', 'shooter'],
    };
    const commonByArea = {
      forest: ['walker', 'jumper', 'charger', 'bouncer', 'flyer'],
      mountain: ['charger', 'jumper', 'bouncer', 'flyer', 'walker'],
      volcano: ['charger', 'bouncer', 'jumper', 'flyer', 'walker'],
      castle: ['charger', 'bouncer', 'jumper', 'flyer', 'walker'],
      skies: ['flyer', 'charger', 'bouncer', 'jumper', 'walker'],
    };
    const specialByArea = {
      forest: ['shielded'],
      mountain: ['shielded', 'deflector'],
      volcano: ['shielded', 'attacker'],
      castle: ['deflector', 'protector', 'attacker', 'shielded'],
      skies: ['attacker', 'deflector', 'protector'],
    };
    const rangedTypes = new Set(['shooter', 'flyshooter']);
    const specialTypes = new Set(['shielded', 'deflector', 'protector', 'attacker']);
    const pick = list => list[idx % list.length];
    const mix = [];
    const add = type => {
      if (!type || mix.includes(type)) return;
      if (rangedTypes.has(type) && mix.some(t => rangedTypes.has(t))) return;
      if (specialTypes.has(type) && mix.some(t => specialTypes.has(t))) return;
      mix.push(type);
    };

    add(pick(rangedByArea[area] || rangedByArea.forest));

    if (specialTypes.has(boss)) add(boss);
    const shouldUseSpecial = !mix.some(t => specialTypes.has(t)) && ((idx + (element ? 1 : 0)) % 3 === 0);
    if (shouldUseSpecial) add(pick(specialByArea[area] || specialByArea.forest));

    const commonPool = commonByArea[area] || commonByArea.forest;
    if (!(boss === 'walker' && area !== 'forest') && !rangedTypes.has(boss) && !specialTypes.has(boss)) add(boss);
    for (let i = 0; mix.length < 3 && i < commonPool.length; i++) {
      add(commonPool[(idx + i) % commonPool.length]);
    }
    return mix.slice(0, 3);
  };
  const kindFor = (boss, element, area) => {
    if (boss === 'flyshooter' && element === 'ghost') return 'trueFinal';
    if (boss === 'flyshooter' && element === null) return 'finalBoss';
    if (specialBosses.has(boss)) return 'miniBoss';
    if (area === 'skies' || (area === 'castle' && element === 'ghost')) return 'bridgeBoss';
    return 'stage';
  };
  const objectiveFor = (boss, element, enemyTypes, idx) => {
    const targetType = (enemyTypes || []).find(type => type === boss) || (enemyTypes || [boss])[idx % Math.max(1, (enemyTypes || [boss]).length)];
    const typeName = { walker:'Brutes', shooter:'Gunners', jumper:'Leapers', bouncer:'Bouncers', charger:'Chargers',
                       shielded:'Guards', deflector:'Ronin', protector:'Aegis', attacker:'Nemesis',
                       flyer:'Flyers', flyshooter:'Overlords' }[targetType] || title(targetType);
    const seed = idx + boss.length + (element ? element.length : 0);
    const options = [
      { type: 'kills', label: 'Defeat Enemies', desc: 'Defeat enemies to fill the objective bar and draw out the boss.', icon: '' },
      { type: 'hunt', filter: { enemyType: targetType }, label: `Hunt ${typeName}`, desc: `Only ${typeName} kills fill the objective bar. One is always present.`, icon: '' },
      { type: 'survive', label: 'Survive', desc: 'Survival time fills the objective bar. Stay alive!', icon: '' },
      { type: 'zone', label: 'Hold the Zone', desc: 'Stand in the marked zone to fill the objective bar.', icon: '' },
      { type: 'collect', label: 'Collect Shurikens', desc: 'Pick up marked shuriken caches to fill the objective bar.', icon: '' },
      { type: 'defend', label: 'Defend the Samurai', desc: 'Keep the samurai alive while the objective bar fills.', icon: '' },
    ];
    if (boss === 'flyshooter' && (element === null || element === 'ghost')) return options[0];
    return options[seed % options.length];
  };
  const addRoom = (boss, element) => {
    const area = areaFor(boss, element);
    if (!byArea[area]) byArea[area] = [];
    const idx = byArea[area].length;
    const spec = MAP_AREAS[area];
    const offset = area === 'castle'
      ? castleOffsetFor(boss, element, idx)
      : area === 'skies'
        ? skyOffsetFor(boss, element, idx)
        : areaOffset(area, idx);
    const id = `${area}-${boss}-${elemId(element)}`;
    const enemyTypes = enemyMix(area, boss, element, idx);
    const room = {
      id,
      name: `${title(element)} ${BOSS_NAMES[boss] || boss.toUpperCase()}`,
      subtitle: spec.label,
      area,
      col: spec.centerCol + offset[0],
      row: spec.centerRow + offset[1],
      mapType: layoutFor(area, boss, element, idx),
      waveIdx: waveIdxFor(boss),
      bossType: boss,
      element,
      enemyTypes,
      kind: kindFor(boss, element, area),
      objective: objectiveFor(boss, element, enemyTypes, idx),
      navLinks: [],
      unlockOnPrimary: [],
      unlockOnSecondary: [],
    };
    if (id === MAP_START_ROOM_ID) {
      room.name = 'Forest Outpost';
      room.subtitle = 'Basic mission';
      room.enemyTypes = ['walker','shooter'];
      room.mapType = 'normal';
    }
    byArea[area].push(room);
    rooms.push(room);
  };
  for (const element of elementOrder) {
    for (const boss of bossOrder) addRoom(boss, element);
  }
  const byId = Object.fromEntries(rooms.map(r => [r.id, r]));
  const areaBounds = {};
  for (const room of rooms) {
    if (!areaBounds[room.area]) {
      areaBounds[room.area] = { minCol: room.col, maxCol: room.col, minRow: room.row, maxRow: room.row };
    } else {
      const b = areaBounds[room.area];
      b.minCol = Math.min(b.minCol, room.col);
      b.maxCol = Math.max(b.maxCol, room.col);
      b.minRow = Math.min(b.minRow, room.row);
      b.maxRow = Math.max(b.maxRow, room.row);
    }
  }
  const borderDistance = room => {
    const b = areaBounds[room.area];
    if (!b) return 0;
    return Math.min(room.col - b.minCol, b.maxCol - room.col, room.row - b.minRow, b.maxRow - room.row);
  };
  const navBridgeIds = {};
  const navBridgeDirs = {};
  const bridgeSourceIds = new Set();
  const bridgeTargetIds = new Set();
  const protectedBridgePairs = [];
  const addBridge = (fromId, toId, protectedBridge, forceDir) => {
    if (!fromId || !toId || fromId === toId) return;
    if (!navBridgeIds[fromId]) navBridgeIds[fromId] = [];
    if (!navBridgeIds[fromId].includes(toId)) navBridgeIds[fromId].push(toId);
    if (forceDir) navBridgeDirs[fromId + '|' + toId] = forceDir;
    bridgeSourceIds.add(fromId);
    bridgeTargetIds.add(toId);
    if (protectedBridge) protectedBridgePairs.push({ fromId, toId, dir: forceDir });
  };
  const edgeRooms = (area, side) => {
    const b = areaBounds[area];
    const areaRooms = rooms.filter(room => room.area === area);
    if (!b) return areaRooms;
    if (side === 'left') return areaRooms.filter(room => room.col === b.minCol);
    if (side === 'right') return areaRooms.filter(room => room.col === b.maxCol);
    if (side === 'up') return areaRooms.filter(room => room.row === b.minRow);
    if (side === 'down') return areaRooms.filter(room => room.row === b.maxRow);
    return areaRooms;
  };
  const bridgeScore = (from, to, fromSide, toSide) => {
    const dc = to.col - from.col;
    const dr = to.row - from.row;
    const horizontal = fromSide === 'left' || fromSide === 'right' || toSide === 'left' || toSide === 'right';
    const vertical = fromSide === 'up' || fromSide === 'down' || toSide === 'up' || toSide === 'down';
    const rowPenalty = horizontal ? Math.abs(dr) * 120 : 0;
    const colPenalty = vertical ? Math.abs(dc) * 120 : 0;
    const travel = Math.abs(dc) + Math.abs(dr);
    const depthPenalty = borderDistance(from) + borderDistance(to);
    return rowPenalty + colPenalty + travel + depthPenalty * 20;
  };
  const addAreaBridge = (fromArea, toArea, fromSide, toSide, count) => {
    const sources = edgeRooms(fromArea, fromSide).slice();
    const targets = edgeRooms(toArea, toSide).slice();
    const usedSources = new Set();
    const usedTargets = new Set();
    for (let i = 0; i < count; i++) {
      let best = null;
      let bestScore = Infinity;
      for (const from of sources) {
        if (bridgeSourceIds.has(from.id)) continue;
        if (usedSources.has(from.id)) continue;
        for (const to of targets) {
          if (bridgeTargetIds.has(to.id)) continue;
          if (usedTargets.has(to.id)) continue;
          const score = bridgeScore(from, to, fromSide, toSide);
          if (score < bestScore) {
            bestScore = score;
            best = { from, to };
          }
        }
      }
      if (!best) break;
      addBridge(best.from.id, best.to.id);
      usedSources.add(best.from.id);
      usedTargets.add(best.to.id);
    }
  };
  const hardestEdgeRoom = (area, side) => {
    const candidates = edgeRooms(area, side).filter(room => !bridgeSourceIds.has(room.id));
    let best = null;
    let bestScore = -Infinity;
    for (const room of candidates) {
      const areaRank = { forest: 1, mountain: 2, volcano: 2, castle: 3, skies: 5 };
      const kindRank = { stage: 0, bridgeBoss: 1, miniBoss: 2, finalBoss: 4, trueFinal: 5 };
      const score =
        (room.distance || 0) * 100 +
        (areaRank[room.area] || 1) * 40 +
        (kindRank[room.kind] || 0) * 30 +
        (room.element ? 15 : 0) +
        (room.waveIdx || 0);
      if (score > bestScore) {
        bestScore = score;
        best = room;
      }
    }
    return best;
  };
  const hardEdgeRooms = (area, side) => {
    return edgeRooms(area, side)
      .filter(room => !bridgeSourceIds.has(room.id))
      .sort((a, b) => {
        const kindRank = { stage: 0, bridgeBoss: 1, miniBoss: 2, finalBoss: 4, trueFinal: 5 };
        const score = room =>
          (kindRank[room.kind] || 0) * 100 +
          (room.element ? 40 : 0) +
          (room.waveIdx || 0);
        return score(b) - score(a);
      });
  };
  const addHardBridge = (fromArea, toArea, fromSide, toSide) => {
    const from = hardestEdgeRoom(fromArea, fromSide);
    const targets = edgeRooms(toArea, toSide).filter(room => !bridgeTargetIds.has(room.id));
    if (!from || !targets.length) return;
    let bestTarget = null;
    let bestScore = Infinity;
    for (const to of targets) {
      const score = bridgeScore(from, to, fromSide, toSide);
      if (score < bestScore) {
        bestScore = score;
        bestTarget = to;
      }
    }
    if (bestTarget) addBridge(from.id, bestTarget.id, true);
  };
  const addExplicitHardBridge = (fromArea, toArea, fromSide, toSide, index) => {
    const from = hardEdgeRooms(fromArea, fromSide)[index || 0];
    const targets = edgeRooms(toArea, toSide).filter(room => !bridgeTargetIds.has(room.id));
    if (!from || !targets.length) return;
    let bestTarget = null;
    let bestScore = Infinity;
    for (const to of targets) {
      const score = bridgeScore(from, to, fromSide, toSide);
      if (score < bestScore) {
        bestScore = score;
        bestTarget = to;
      }
    }
    if (bestTarget) addBridge(from.id, bestTarget.id);
  };
  const addPinnedBridge = (fromId, toId, dir) => {
    if (byId[fromId] && byId[toId]) addBridge(fromId, toId, true, dir);
  };
  addAreaBridge('forest', 'mountain', 'left', 'right', 2);
  addAreaBridge('forest', 'volcano', 'right', 'left', 2);
  addPinnedBridge('mountain-attacker-steel', 'skies-deflector-ghost', 'up');
  addPinnedBridge('volcano-flyer-fire', 'skies-protector-ghost', 'up');
  addAreaBridge('mountain', 'castle', 'up', 'down', 2);
  addAreaBridge('volcano', 'castle', 'up', 'down', 2);
  addAreaBridge('castle', 'skies', 'up', 'down', 2);
  const nearestInDirection = (room, candidates, dx, dy) => {
    let best = null;
    let bestScore = Infinity;
    for (const other of candidates) {
      if (other.id === room.id) continue;
      const dc = other.col - room.col;
      const dr = other.row - room.row;
      if (dx !== 0 && dc * dx <= 0) continue;
      if (dy !== 0 && dr * dy <= 0) continue;
      const primary = dx !== 0 ? Math.abs(dc) : Math.abs(dr);
      const offAxis = dx !== 0 ? Math.abs(dr) : Math.abs(dc);
      if (offAxis > 0 && borderDistance(other) >= borderDistance(room)) continue;
      const score = primary * 100 + offAxis * 45;
      if (score < bestScore) {
        bestScore = score;
        best = other;
      }
    }
    return best;
  };
  const dirKeyFor = (from, to) => {
    const dc = to.col - from.col;
    const dr = to.row - from.row;
    if (Math.abs(dc) >= Math.abs(dr)) return dc < 0 ? 'left' : 'right';
    return dr < 0 ? 'up' : 'down';
  };
  const oppositeDir = { left: 'right', right: 'left', up: 'down', down: 'up' };
  const sortedDirections = [
    ['left', -1, 0],
    ['right', 1, 0],
    ['up', 0, -1],
    ['down', 0, 1],
  ];
  for (const room of rooms) room.navDirs = {};
  const setNavPair = (from, to, dir) => {
    if (!from || !to || !dir) return false;
    const opp = oppositeDir[dir];
    if (!opp || from.navDirs[dir] || to.navDirs[opp]) return false;
    from.navDirs[dir] = to.id;
    to.navDirs[opp] = from.id;
    return true;
  };
  const clearNavPair = (from, dir) => {
    if (!from || !dir || !from.navDirs[dir]) return;
    const to = byId[from.navDirs[dir]];
    const opp = oppositeDir[dir];
    delete from.navDirs[dir];
    if (to && opp && to.navDirs[opp] === from.id) delete to.navDirs[opp];
  };
  const forceNavPair = (from, to, dir) => {
    if (!from || !to || !dir) return false;
    const opp = oppositeDir[dir];
    if (!opp) return false;
    clearNavPair(from, dir);
    clearNavPair(to, opp);
    from.navDirs[dir] = to.id;
    to.navDirs[opp] = from.id;
    return true;
  };
  for (const room of rooms) {
    const bridgeRooms = (navBridgeIds[room.id] || []).map(id => byId[id]).filter(Boolean);
    const areaRooms = rooms.filter(other => other.area === room.area);
    for (const bridge of bridgeRooms) {
      setNavPair(room, bridge, navBridgeDirs[room.id + '|' + bridge.id] || dirKeyFor(room, bridge));
    }
    for (const dir of sortedDirections) {
      const target = nearestInDirection(room, areaRooms, dir[1], dir[2]);
      if (target) setNavPair(room, target, dir[0]);
    }
  }
  for (const pair of protectedBridgePairs) {
    const from = byId[pair.fromId];
    const to = byId[pair.toId];
    forceNavPair(from, to, pair.dir || dirKeyFor(from, to));
  }
  for (const room of rooms) {
    room.navLinks = Object.values(room.navDirs).filter((id, idx, arr) => arr.indexOf(id) === idx);
    room.unlockOnPrimary = room.navLinks.slice();
  }
  const start = byId[MAP_START_ROOM_ID] || rooms[0];
  const reachableFromStart = () => {
    const seen = new Set();
    const queue = start ? [start] : [];
    if (start) seen.add(start.id);
    for (let qi = 0; qi < queue.length; qi++) {
      const room = queue[qi];
      for (const id of room.navLinks || []) {
        const next = byId[id];
        if (!next || seen.has(next.id)) continue;
        seen.add(next.id);
        queue.push(next);
      }
    }
    return seen;
  };
  let reachable = reachableFromStart();
  while (start && reachable.size < rooms.length) {
    let best = null;
    let bestScore = Infinity;
    for (const from of rooms) {
      if (!reachable.has(from.id)) continue;
      for (const to of rooms) {
        if (reachable.has(to.id)) continue;
        const dir = dirKeyFor(from, to);
        const opp = oppositeDir[dir];
        if (from.navDirs[dir] || to.navDirs[opp]) continue;
        const sameAreaPenalty = from.area === to.area ? 0 : 80;
        const score = Math.abs(from.col - to.col) * 10 + Math.abs(from.row - to.row) * 10 + sameAreaPenalty;
        if (score < bestScore) {
          bestScore = score;
          best = { from, to, dir };
        }
      }
    }
    if (!best) break;
    setNavPair(best.from, best.to, best.dir);
    for (const room of rooms) {
      room.navLinks = Object.values(room.navDirs).filter((id, idx, arr) => arr.indexOf(id) === idx);
      room.unlockOnPrimary = room.navLinks.slice();
    }
    reachable = reachableFromStart();
  }
  if (start) {
    const queue = [start];
    start.distance = 0;
    for (let qi = 0; qi < queue.length; qi++) {
      const room = queue[qi];
      for (const id of room.navLinks || []) {
        const next = byId[id];
        if (!next || next.distance !== undefined) continue;
        next.distance = room.distance + 1;
        queue.push(next);
      }
    }
  }
  for (const room of rooms) {
    if (room.distance === undefined) {
      room.distance = Math.max(1, Math.abs(room.col - (start ? start.col : 0)) + Math.abs(room.row - (start ? start.row : 0)));
    }
  }
  return rooms;
})();

// Helper to pick a random phrase
function pickPhrase(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getBattlePhrase(enemyType, ninjaType, element) {
  const data = BATTLE_PHRASES[enemyType];
  if (!data) return null;
  // Ninja-specific first (25% chance if available)
  if (ninjaType && data.ninjaEntrance && data.ninjaEntrance[ninjaType] && Math.random() < 0.25) {
    return pickPhrase(data.ninjaEntrance[ninjaType]);
  }
  // Element-specific (20% chance if available)

function getKillPhrase(enemyType, ninjaType, element) {
  const data = BATTLE_PHRASES[enemyType];

  if (element && data.elementKill && data.elementKill[element] && Math.random() < 0.2) {

  }
  return pickPhrase(data.kill);
}

function getNinjaResponse(ninjaType, enemyType, element) {
  const data = NINJA_RESPONSES[ninjaType];
  if (!data) return null;
  if (enemyType && data[enemyType]) return pickPhrase(data[enemyType]);

}

// ── Utility functions ────────────────────────────────────────

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// Hitstop
let hitstopFrames = 0;
function triggerHitstop(frames) { hitstopFrames = Math.max(hitstopFrames, frames); }

// Screen shake
let screenShakeX = 0, screenShakeY = 0, screenShakeTimer = 0, screenShakeIntensity = 0;
function triggerScreenShake(intensity, duration) {
  if (intensity > screenShakeIntensity) {
    screenShakeIntensity = intensity;
    screenShakeTimer = duration;
  }
}
function updateScreenShake() {
  if (screenShakeTimer > 0) {
    screenShakeTimer--;
    const t = screenShakeTimer / 10;
    screenShakeX = (Math.random() - 0.5) * 2 * screenShakeIntensity * Math.min(t, 1);
    screenShakeY = (Math.random() - 0.5) * 2 * screenShakeIntensity * Math.min(t, 1);
    if (screenShakeTimer <= 0) { screenShakeIntensity = 0; screenShakeX = 0; screenShakeY = 0; }
  }
}

// Line of sight: returns true if no blocks/platforms between two points
function hasLineOfSight(x0, y0, x1, y1, game) {
  const steps = Math.ceil(Math.hypot(x1 - x0, y1 - y0) / 8);
  for (let i = 1; i < steps; ++i) {
    const t = i / steps;
    const x = x0 + (x1 - x0) * t;
    const y = y0 + (y1 - y0) * t;
    const probe = { x: x - 4, y: y - 4, w: 8, h: 8 };
    for (const p of game.platforms) {
      if (!p.thin && rectOverlap(probe, p)) return false;
    }
    for (const b of game.stoneBlocks) {
      if (!b.done && rectOverlap(probe, b)) return false;
    }
  }
  return true;
}

// ── Shared combat helpers ────────────────────────────────────

// Damage all enemies/boss within a radius from a point
function damageInRadius(game, cx, cy, radius, damage, fromX) {
  for (const e of game.enemies) {
    if (e.dead) continue;
    const dx = (e.x + e.w / 2) - cx;
    const dy = (e.y + e.h / 2) - cy;
    if (Math.sqrt(dx * dx + dy * dy) < radius) {
      e.takeDamage(damage, game, fromX !== undefined ? fromX : cx);
    }
  }
  if (game.boss && !game.boss.dead) {
    const dx = (game.boss.x + game.boss.w / 2) - cx;
    const dy = (game.boss.y + game.boss.h / 2) - cy;
    if (Math.sqrt(dx * dx + dy * dy) < radius) {
      game.boss.takeDamage(damage, game, fromX !== undefined ? fromX : cx);
    }
  }
}

// Find nearest enemy or boss with line of sight from a point
function findNearestTarget(x, y, game, facing, preferBoss = false, ignoreLOS = false) {
  // Boss priority: if preferBoss and boss is alive, always target boss
  if (preferBoss && game.boss && !game.boss.dead) {
    return game.boss;
  }
  let nearest = null, bestDist = Infinity;
  for (const e of game.enemies) {
    if (e.dead) continue;
    if (e.friendly) continue; // Don't target friendly enemies
    if (!ignoreLOS && !hasLineOfSight(x, y, e.x + e.w / 2, e.y + e.h / 2, game)) continue;
    const dx = (e.x + e.w / 2) - x, dy = (e.y + e.h / 2) - y;
    // Skip enemies directly behind the ninja (~90° cone behind)
    if (facing && dx * facing < 0 && Math.abs(dy) < Math.abs(dx)) continue;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; nearest = e; }
  }
  if (game.boss && !game.boss.dead) {
    const losOk = ignoreLOS || hasLineOfSight(x, y, game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, game);
    if (losOk) {
      const dx = (game.boss.x + game.boss.w / 2) - x, dy = (game.boss.y + game.boss.h / 2) - y;
      if (!(facing && dx * facing < 0 && Math.abs(dy) < Math.abs(dx))) {
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; nearest = game.boss; }
      }
    }
  }
  return nearest;
}

// Fire a projectile at the nearest enemy or boss with line of sight
function fireProjectileAtNearestEnemy({
  x, y, game, speed = 8, color = '#ccc', damage = 1, owner = 'player', width = 8, height = 6, piercing = false, bouncy = false, facing = 0, preferBoss = false, ignoreLOS = false
}) {
  const nearest = findNearestTarget(x, y, game, facing, preferBoss, ignoreLOS);
  const fallbackDir = facing || 1;
  let vx = speed * fallbackDir, vy = 0;
  if (nearest) {
    const dx = (nearest.x + nearest.w / 2) - x;
    const dy = (nearest.y + nearest.h / 2) - y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 0) { vx = (dx / d) * speed; vy = (dy / d) * speed; }
  }
  const proj = new Projectile(x, y, vx, vy, color, damage, owner);
  proj.w = width;
  proj.h = height;
  proj.piercing = piercing;
  proj.bouncy = bouncy;
  game.projectiles.push(proj);
  return proj;
}

// Render an HP bar above an entity
function renderHpBar(ctx, cam, entity, barWidth) {
  const w = barWidth || entity.w;
  const sx = entity.x - cam.x;
  const sy = entity.y - cam.y;
  ctx.fillStyle = '#400';
  ctx.fillRect(sx, sy - 8, w, 4);
  ctx.fillStyle = entity.friendly ? '#4f4' : '#f44';
  ctx.fillRect(sx, sy - 8, w * (entity.hp / entity.maxHp), 4);
}

// Process burn DOT for an entity (enemy or boss)
function processBurn(entity, game) {
  if (entity.burnTimer <= 0) return;
  // Water element enemies: fully immune to burn
  if (entity.element === 'water') {
    entity.burnTimer = 0;
    return;
  }
  // Fire element enemies: burn heals them instead
  if (entity.element === 'fire') {
    entity.burnTimer = 0;
    const healAmt = Math.min(2, entity.maxHp - entity.hp);
    if (healAmt > 0) {
      entity.hp += healAmt;
      game.effects.push(new Effect(entity.x + entity.w / 2, entity.y + entity.h / 2, '#4f4', 4, 2, 8));
    }
    return;
  }
  entity.burnTimer--;
  if (entity.burnTimer % 5 === 0) {
    game.effects.push(new Effect(entity.x + entity.w / 2, entity.y + entity.h / 2, '#f63', 6, 2, 10));
  }
  if (entity.burnTimer % 30 === 0) {
    entity.hp -= 1;
    entity.flashTimer = 4;
    game.effects.push(new Effect(entity.x + entity.w / 2, entity.y + entity.h / 2, '#f93', 4, 2, 8));
    if (entity.hp <= 0) {
      entity.dead = true;
      entity.onDeath(game);
    }
  }
}

// Shield damage check — returns true if damage was fully absorbed by shield
function processShieldDamage(entity, amount, game, fromX) {
  if (entity.shieldHp <= 0 || fromX === undefined) return false;
  const hitFromFront = (fromX > entity.x + entity.w / 2) === (entity.facing === 1);
  if (!hitFromFront) return false;
  entity.shieldHp -= amount;
  entity.flashTimer = 4;
  game.effects.push(new Effect(entity.x + (entity.facing > 0 ? entity.w : 0), entity.y + entity.h / 2, '#5ff', 6, 3, 10));
  if (entity.shieldHp < 0) entity.shieldHp = 0;
  return true;
}

// ── Canvas-drawn item icons ──────────────────────────────────
// Draws a boss item icon centered at (cx, cy) with given size and color.
function drawItemIcon(ctx, itemId, cx, cy, size, color) {
  const s = size / 2; // half-size for convenience
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, size / 12);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch (itemId) {
    case 'pickaxe': {
      // Pickaxe: diagonal handle + head perpendicular to shaft
      // Handle (diagonal)
      ctx.strokeStyle = '#a87';
      ctx.lineWidth = Math.max(2, size / 8);
      ctx.beginPath();
      ctx.moveTo(s * 0.4, s * 0.7);
      ctx.lineTo(-s * 0.15, -s * 0.05);
      ctx.stroke();
      // Metal head — angled to match shaft, pointed left end curves down
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.65, s * 0.15);   // left pick point (curved down)
      ctx.lineTo(-s * 0.3, -s * 0.15);
      ctx.lineTo(s * 0.2, -s * 0.55);    // right blunt end (upper-right)
      ctx.lineTo(s * 0.3, -s * 0.35);
      ctx.lineTo(-s * 0.15, -s * 0.05);  // meets shaft top
      ctx.closePath();
      ctx.fill();
      // Shine
      ctx.strokeStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, 0);
      ctx.lineTo(s * 0.1, -s * 0.38);
      ctx.stroke();
      ctx.globalAlpha = 1;
      break;
    }
    case 'tripleShuriken': {
      // Three small 4-pointed stars in a spread
      const offsets = [[-s * 0.4, s * 0.15], [0, -s * 0.3], [s * 0.4, s * 0.15]];
      ctx.fillStyle = color;
      for (const [ox, oy] of offsets) {
        const r = s * 0.32;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
          const cr = i % 2 === 0 ? r : r * 0.35;
          ctx.lineTo(ox + Math.cos(a) * cr, oy + Math.sin(a) * cr);
        }
        ctx.closePath();
        ctx.fill();
      }
      break;
    }
    case 'homingShuriken': {
      // 4-pointed star with dashed circle reticle
      const r = s * 0.5;
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
        const cr = i % 2 === 0 ? r : r * 0.35;
        ctx.lineTo(Math.cos(a) * cr, Math.sin(a) * cr);
      }
      ctx.closePath();
      ctx.fill();
      // Reticle circle
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1, size / 14);
      ctx.setLineDash([size / 8, size / 8]);
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      break;
    }
    case 'vampireTeeth': {
      // Two fangs
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(-s * 0.5, -s * 0.4);
      ctx.lineTo(-s * 0.2, -s * 0.4);
      ctx.lineTo(-s * 0.35, s * 0.55);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.2, -s * 0.4);
      ctx.lineTo(s * 0.5, -s * 0.4);
      ctx.lineTo(s * 0.35, s * 0.55);
      ctx.closePath();
      ctx.fill();
      // Gum line
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.45, s * 0.7, s * 0.25, 0, Math.PI, 0);
      ctx.fill();
      // Blood drop
      ctx.fillStyle = '#f22';
      ctx.beginPath();
      ctx.arc(-s * 0.35, s * 0.65, s * 0.12, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'iaito': {
      // Katana blade
      ctx.save();
      ctx.rotate(-0.6);
      // Blade
      ctx.fillStyle = '#dde';
      ctx.beginPath();
      ctx.moveTo(-s * 0.05, -s * 0.9);
      ctx.lineTo(s * 0.08, -s * 0.85);
      ctx.lineTo(s * 0.06, s * 0.15);
      ctx.lineTo(-s * 0.06, s * 0.15);
      ctx.closePath();
      ctx.fill();
      // Edge shine
      ctx.strokeStyle = '#fff';
      ctx.globalAlpha = 0.6;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-s * 0.02, -s * 0.8);
      ctx.lineTo(-s * 0.03, s * 0.1);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Guard (tsuba)
      ctx.fillStyle = '#fc0';
      ctx.fillRect(-s * 0.18, s * 0.12, s * 0.36, s * 0.08);
      // Handle wrap
      ctx.fillStyle = '#624';
      ctx.fillRect(-s * 0.06, s * 0.22, s * 0.12, s * 0.55);
      // Handle wrapping lines
      ctx.strokeStyle = '#846';
      ctx.lineWidth = Math.max(1, size / 14);
      for (let i = 0; i < 4; i++) {
        const hy = s * 0.28 + i * s * 0.12;
        ctx.beginPath();
        ctx.moveTo(-s * 0.06, hy);
        ctx.lineTo(s * 0.06, hy + s * 0.06);
        ctx.stroke();
      }
      ctx.restore();
      break;
    }
    case 'spikedArmor': {
      // Hexagon with spikes
      ctx.fillStyle = '#444';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        ctx.lineTo(Math.cos(a) * s * 0.55, Math.sin(a) * s * 0.55);
      }
      ctx.closePath();
      ctx.fill();
      // Spikes
      ctx.fillStyle = color;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const a1 = a - 0.2, a2 = a + 0.2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a1) * s * 0.5, Math.sin(a1) * s * 0.5);
        ctx.lineTo(Math.cos(a) * s * 0.9, Math.sin(a) * s * 0.9);
        ctx.lineTo(Math.cos(a2) * s * 0.5, Math.sin(a2) * s * 0.5);
        ctx.closePath();
        ctx.fill();
      }
      break;
    }
    case 'redMagnet': {
      // Horseshoe magnet
      ctx.lineWidth = s * 0.3;
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.arc(0, -s * 0.05, s * 0.45, Math.PI, 0);
      ctx.stroke();
      // Legs
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.63, -s * 0.1, s * 0.3, s * 0.55);
      ctx.fillRect(s * 0.33, -s * 0.1, s * 0.3, s * 0.55);
      // Tips
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-s * 0.63, s * 0.35, s * 0.3, s * 0.2);
      ctx.fillRect(s * 0.33, s * 0.35, s * 0.3, s * 0.2);
      // Field lines
      ctx.strokeStyle = '#f88';
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.arc(0, s * 0.1, s * 0.2, Math.PI, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      break;
    }
    case 'x2Orb': {
      // Glowing orb with "x2"
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.65);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.3, color);
      grad.addColorStop(1, '#440');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      // x2 text
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.round(size * 0.4)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('x2', 0, 1);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      break;
    }
    case 'deathsKey': {
      // Ornate key
      ctx.save();
      ctx.rotate(0.3);
      // Shaft
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.06, -s * 0.15, s * 0.12, s * 0.85);
      // Teeth
      ctx.fillRect(s * 0.06, s * 0.4, s * 0.18, s * 0.08);
      ctx.fillRect(s * 0.06, s * 0.55, s * 0.14, s * 0.08);
      // Bow (ring)
      ctx.strokeStyle = color;

    }
    case 'charmFire':
    case 'charmGhost':
    case 'charmWater':
    case 'charmCrystal':
    case 'charmWind':
    case 'charmLightning':
    case 'charmSpiky': {
      // Diamond shape with inner element symbol
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.8);
      ctx.lineTo(s * 0.55, 0);
      ctx.lineTo(0, s * 0.8);
      ctx.lineTo(-s * 0.55, 0);
      ctx.closePath();
      ctx.fill();
      // Darker inner diamond

      ctx.beginPath();
      ctx.moveTo(0, -s * 0.45);
      ctx.lineTo(s * 0.3, 0);
      ctx.lineTo(0, s * 0.45);
      ctx.lineTo(-s * 0.3, 0);
      ctx.closePath();
      ctx.fill();
      // Element-specific inner detail
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.8;
      if (itemId === 'charmFire') {
        // Flame

        ctx.quadraticCurveTo(s * 0.2, 0, s * 0.1, -s * 0.15);
        ctx.quadraticCurveTo(s * 0.05, -s * 0.3, 0, -s * 0.35);
        ctx.quadraticCurveTo(-s * 0.05, -s * 0.3, -s * 0.1, -s * 0.15);
        ctx.quadraticCurveTo(-s * 0.2, 0, 0, s * 0.25);

        ctx.arc(0, -s * 0.05, s * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-s * 0.12, s * 0.07);
        ctx.lineTo(-s * 0.12, s * 0.22);
        ctx.quadraticCurveTo(-s * 0.06, s * 0.15, 0, s * 0.22);
        ctx.quadraticCurveTo(s * 0.06, s * 0.15, s * 0.12, s * 0.22);
        ctx.lineTo(s * 0.12, s * 0.07);
        ctx.closePath();
        ctx.fill();

        ctx.moveTo(0, -s * 0.25);
        ctx.quadraticCurveTo(s * 0.18, s * 0.05, 0, s * 0.2);
        ctx.quadraticCurveTo(-s * 0.18, s * 0.05, 0, -s * 0.25);
        ctx.fill();

        // Crystal shard
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.3);
        ctx.lineTo(s * 0.12, s * 0.05);
        ctx.lineTo(0, s * 0.25);
        ctx.lineTo(-s * 0.12, s * 0.05);
        ctx.closePath();
        ctx.fill();
      } else if (itemId === 'charmWind') {
        // Swirl lines
        ctx.lineWidth = Math.max(1, size / 14);
        ctx.strokeStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-s * 0.05, -s * 0.1, s * 0.15, -0.5, Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(s * 0.05, s * 0.05, s * 0.12, Math.PI - 0.5, 0);
        ctx.stroke();
      } else if (itemId === 'charmLightning') {
        // Lightning bolt
        ctx.beginPath();
        ctx.moveTo(s * 0.05, -s * 0.3);
        ctx.lineTo(-s * 0.1, -s * 0.02);
        ctx.lineTo(s * 0.04, -s * 0.02);
        ctx.lineTo(-s * 0.08, s * 0.3);
        ctx.lineTo(s * 0.12, s * 0.02);
        ctx.lineTo(-s * 0.02, s * 0.02);
        ctx.closePath();
        ctx.fill();
      } else if (itemId === 'charmSpiky') {
        // Spiky thorns / star burst
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a - 0.15) * s * 0.1, Math.sin(a - 0.15) * s * 0.1);
          ctx.lineTo(Math.cos(a) * s * 0.25, Math.sin(a) * s * 0.25);
          ctx.lineTo(Math.cos(a + 0.15) * s * 0.1, Math.sin(a + 0.15) * s * 0.1);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'leatherBoots': {
      // Boot shape
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.15, -s * 0.7);
      ctx.lineTo(s * 0.2, -s * 0.7);
      ctx.lineTo(s * 0.2, s * 0.2);
      ctx.lineTo(s * 0.65, s * 0.3);
      ctx.lineTo(s * 0.65, s * 0.6);
      ctx.lineTo(-s * 0.35, s * 0.6);
      ctx.lineTo(-s * 0.35, s * 0.3);
      ctx.lineTo(-s * 0.15, s * 0.15);
      ctx.closePath();
      ctx.fill();
      // Sole
      ctx.fillStyle = '#543';
      ctx.fillRect(-s * 0.35, s * 0.5, s * 1.0, s * 0.12);
      // Lace detail
      ctx.strokeStyle = '#dc9';
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.beginPath();
      ctx.moveTo(-s * 0.05, -s * 0.5);
      ctx.lineTo(s * 0.1, -s * 0.4);
      ctx.moveTo(-s * 0.05, -s * 0.3);
      ctx.lineTo(s * 0.1, -s * 0.2);
      ctx.stroke();
      break;
    }
    case 'friendsLetter': {
      // Envelope
      ctx.fillStyle = '#eed';
      ctx.fillRect(-s * 0.6, -s * 0.35, s * 1.2, s * 0.8);
      // Flap
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.6, -s * 0.35);
      ctx.lineTo(0, s * 0.15);
      ctx.lineTo(s * 0.6, -s * 0.35);
      ctx.closePath();
      ctx.fill();
      // Seal
      ctx.fillStyle = '#c44';
      ctx.beginPath();
      ctx.arc(0, s * 0.05, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      // Heart on seal
      ctx.fillStyle = '#f88';
      ctx.beginPath();
      ctx.arc(-s * 0.04, -s * 0.01, s * 0.06, 0, Math.PI * 2);
      ctx.arc(s * 0.04, -s * 0.01, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-s * 0.09, s * 0.02);
      ctx.lineTo(0, s * 0.1);
      ctx.lineTo(s * 0.09, s * 0.02);
      ctx.fill();
      break;
    }
    case 'theKunai': {
      // Kunai blade
      ctx.save();
      ctx.rotate(0.4);
      // Blade
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.85);
      ctx.lineTo(s * 0.18, s * 0.0);
      ctx.lineTo(0, s * 0.05);
      ctx.lineTo(-s * 0.18, s * 0.0);
      ctx.closePath();
      ctx.fill();
      // Edge highlight
      ctx.fillStyle = '#eee';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.85);
      ctx.lineTo(s * 0.06, -s * 0.1);
      ctx.lineTo(0, s * 0.0);
      ctx.closePath();
      ctx.fill();
      // Grip
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.06, s * 0.05, s * 0.12, s * 0.4);
      // Ring pommel
      ctx.strokeStyle = color;
      ctx.lineWidth = s * 0.08;
      ctx.beginPath();
      ctx.arc(0, s * 0.6, s * 0.15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      break;
    }
    case 'theCode': {
      // Code brackets / infinity loop
      ctx.strokeStyle = color;
      ctx.lineWidth = s * 0.15;
      // Left bracket {
      ctx.beginPath();
      ctx.arc(-s * 0.25, -s * 0.25, s * 0.25, -0.3, Math.PI * 0.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-s * 0.25, s * 0.25, s * 0.25, -Math.PI * 0.5, 0.3);
      ctx.stroke();
      // Right bracket }
      ctx.beginPath();
      ctx.arc(s * 0.25, -s * 0.25, s * 0.25, Math.PI * 0.5, Math.PI + 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(s * 0.25, s * 0.25, s * 0.25, Math.PI - 0.3, -Math.PI * 0.5);
      ctx.stroke();
      // Center dot
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    default: {
      // Fallback: colored circle with "?"
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.round(size * 0.45)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', 0, 1);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      break;
    }
  }

  ctx.restore();
}

// === js/audio.js ===
// ── Sound System (Web Audio API) ─────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function ensureAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
document.addEventListener('keydown', ensureAudio, { once: true });
document.addEventListener('click', ensureAudio, { once: true });
document.addEventListener('mousedown', ensureAudio, { once: true });
document.addEventListener('mousemove', ensureAudio, { once: true });
document.addEventListener('touchstart', ensureAudio, { once: true });
document.addEventListener('pointerdown', ensureAudio, { once: true });

const SFX = {
  muted: false,
  play(freq, type, duration, vol = 0.15, slide = 0) {
    if (this.muted) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + duration);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  },
  noise(duration, vol = 0.08) {
    if (this.muted) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    src.connect(g); g.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + duration);
    src.onended = () => { src.disconnect(); g.disconnect(); };
  },
  attack() { this.play(320, 'square', 0.08, 0.1, 200); },
  hit() { this.play(200, 'square', 0.1, 0.12, -100); this.noise(0.1, 0.1); },
  enemyDie() { this.play(400, 'square', 0.12, 0.1, -300); this.noise(0.1, 0.08); },
  playerHurt() { this.play(150, 'sawtooth', 0.2, 0.12, -80); },
  jump() { this.play(260, 'square', 0.1, 0.06, 180); },
  special() { this.play(500, 'triangle', 0.15, 0.1, 200); },
  parry() { this.play(800, 'square', 0.06, 0.12); this.play(1200, 'square', 0.08, 0.08); },
  parryFail() { this.play(200, 'triangle', 0.1, 0.06, -50); },
  shuriken() { this.play(600, 'triangle', 0.08, 0.06, 300); },
  bossDie() { this.play(300, 'sawtooth', 0.3, 0.15, -250); this.noise(0.3, 0.12); this.play(150, 'square', 0.4, 0.1, -100); },
  bossSpawn() { this.play(100, 'sawtooth', 0.3, 0.12, 100); this.play(200, 'square', 0.4, 0.08, 50); },
  wave() { this.play(440, 'triangle', 0.15, 0.1); setTimeout(() => this.play(660, 'triangle', 0.15, 0.1), 120); setTimeout(() => this.play(880, 'triangle', 0.2, 0.1), 240); },
  armor() { this.play(600, 'triangle', 0.1, 0.1); this.play(900, 'triangle', 0.15, 0.08); },
  chain() { this.play(700, 'square', 0.05, 0.08, 200); },
  slam() { this.play(80, 'sawtooth', 0.2, 0.15, -40); this.noise(0.15, 0.1); },
  pickup() { this.play(520, 'triangle', 0.08, 0.1); setTimeout(() => this.play(780, 'triangle', 0.1, 0.1), 80); },
  reflect() { this.play(1000, 'square', 0.06, 0.1, -400); },
  miss() { this.play(180, 'triangle', 0.12, 0.06, -60); },
  backstab() { this.play(300, 'sawtooth', 0.05, 0.1); this.play(600, 'square', 0.1, 0.12, 200); },
  counterSwish() { this.noise(0.18, 0.12); this.play(900, 'sawtooth', 0.15, 0.1, -600); this.play(400, 'triangle', 0.1, 0.08, 300); },
  victory() { [440,550,660,880].forEach((f,i) => setTimeout(() => this.play(f, 'triangle', 0.25, 0.12), i * 150)); },
  bossRoar() {
    // Deep, sustained growl — layered low oscillators + rumble
    this.play(38, 'sawtooth', 0.9, 0.2, -15);
    this.play(42, 'square', 0.8, 0.1, -10);
    this.play(55, 'sawtooth', 0.7, 0.14, -25);
    this.noise(0.7, 0.18);
    setTimeout(() => {
      this.play(32, 'sawtooth', 0.6, 0.18, -12);
      this.play(48, 'square', 0.5, 0.08, -18);
      this.noise(0.5, 0.14);
    }, 250);
    setTimeout(() => {
      this.play(28, 'sawtooth', 0.5, 0.15, -8);
      this.noise(0.4, 0.1);
    }, 550);
  },
};

// Boss type → music track mapping
const BOSS_MUSIC = {
  deflector: 'bossRonin',
  protector: 'bossProtector',
  flyshooter: 'bossOverlord',
  flyer: 'bossAirForce',
  bouncer: 'bossAirForce',
};

// General boss tracks cycled for non-specific bosses
const GENERAL_BOSS_TRACKS = ['boss', 'boss2', 'boss3'];

// ── Sequencer Engine ─────────────────────────────────────────
const Music = {
  playing: false,
  current: null,
  step: 0,
  master: null,
  timer: null,
  vol: 0.18,
  muted: false,

  _ntof(n) { return 440 * Math.pow(2, (n - 69) / 12); },

  _init() {
    if (this.master) return;
    this.master = audioCtx.createGain();
    this.master.gain.value = 0;
    this.master.connect(audioCtx.destination);
  },

  _osc(freq, type, dur, vol, slide) {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.linearRampToValueAtTime(vol * 0.4, t + dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g);
    g.connect(this.master);
    o.start();
    o.stop(t + dur);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  },

  _noise(dur, vol) {
    const t = audioCtx.currentTime;
    const len = Math.max(1, audioCtx.sampleRate * dur | 0);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const s = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    s.buffer = buf;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    s.connect(g);
    g.connect(this.master);
    s.start();
    s.stop(t + dur);
    s.onended = () => { s.disconnect(); g.disconnect(); };
  },

  _kick(vol) {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(30, t + 0.1);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g);
    g.connect(this.master);
    o.start();
    o.stop(t + 0.15);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  },

  _snare(vol) {
    this._noise(0.1, vol);
    this._osc(180, 'triangle', 0.06, vol * 0.4, -80);
  },

  play(name) {
    if (this.current === name && this.playing) return;
    const track = MUSIC_TRACKS[name];
    if (!track) return;
    this._init();

    if (this.timer) { clearInterval(this.timer); this.timer = null; }

    this.current = name;
    this.playing = true;
    this.step = 0;

    const t = audioCtx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(this.master.gain.value, t);
    this.master.gain.linearRampToValueAtTime(this.muted ? 0 : this.vol, t + 0.6);

    const interval = (60 / track.bpm / 4) * 1000;
    this.timer = setInterval(() => {
      if (audioCtx.state === 'suspended') return;
      if (this.muted) return;
      const s = this.step % track.len;
      const stepDur = 60 / track.bpm / 4;
      for (const ch of track.ch) {
        const val = ch.p[s % ch.p.length];
        if (!val) continue;
        if (ch.t === 'k') this._kick(ch.v || 0.1);
        else if (ch.t === 'h') this._noise(0.03, ch.v || 0.03);
        else if (ch.t === 's') this._snare(ch.v || 0.05);
        else this._osc(this._ntof(val), ch.w || 'triangle', ch.d || stepDur * 2, ch.v || 0.06, ch.s || 0);
      }
      this.step++;
    }, interval);
  },

  stop() {
    if (this.timer) { clearInterval(this.timer); this.timer = null; }
    if (this.master) {
      const t = audioCtx.currentTime;
      this.master.gain.cancelScheduledValues(t);
      this.master.gain.setValueAtTime(this.master.gain.value, t);
      this.master.gain.linearRampToValueAtTime(0, t + 0.5);
    }
    this.playing = false;
    this.current = null;
  },

  setMuted(m) {
    this.muted = m;
    if (this.master) {
      const t = audioCtx.currentTime;
      this.master.gain.cancelScheduledValues(t);
      this.master.gain.setValueAtTime(this.master.gain.value, t);
      this.master.gain.linearRampToValueAtTime(m ? 0 : this.vol, t + 0.3);
    }
  },
};

// ── Input ────────────────────────────────────────────────────
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  e.preventDefault();
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { e.preventDefault(); keys[e.code] = false; });
function consumePress(code) { if (justPressed[code]) { justPressed[code] = false; return true; } return false; }

// ── Focus management (itch.io iframe support) ────────────────
window.focus();
document.addEventListener('click', () => window.focus());
document.addEventListener('mousedown', () => window.focus());

// ── Mouse input ──────────────────────────────────────────────
function setupMouseInput(canvas) {
  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    ensureAudio();
    if (e.button === 0) { justPressed['MouseAttack'] = true; keys['MouseAttack'] = true; }
    if (e.button === 2) { justPressed['MouseSpecial'] = true; keys['MouseSpecial'] = true; }
    if (e.button === 1) { justPressed['MouseShuriken'] = true; keys['MouseShuriken'] = true; }
  });
  canvas.addEventListener('mouseup', e => {
    if (e.button === 0) keys['MouseAttack'] = false;
    if (e.button === 2) keys['MouseSpecial'] = false;
    if (e.button === 1) keys['MouseShuriken'] = false;
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    canvasMouseX = (e.clientX - rect.left) / rect.width * CANVAS_W;
    canvasMouseY = (e.clientY - rect.top) / rect.height * CANVAS_H;
  });
}

// Mouse position tracking (canvas-relative)
let canvasMouseX = -1, canvasMouseY = -1;

// Mouse wheel for ninja switching
let mouseWheelNinja = 0;
function setupMouseWheel(canvas) {
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    if (e.deltaY > 0) mouseWheelNinja = (mouseWheelNinja + 1) % 7;
    else mouseWheelNinja = (mouseWheelNinja + 6) % 7;
    justPressed['WheelSwitch'] = true;
  }, { passive: false });
}

// ── Touch input ──────────────────────────────────────────────
const touchState = { left: false, right: false, up: false, down: false, attack: false, special: false, shuriken: false };
const touchJust = { attack: false, special: false, shuriken: false, up: false };
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function getTouchZone(tx, ty, canvas) {
  const rect = canvas.getBoundingClientRect();
  const x = (tx - rect.left) / rect.width * CANVAS_W;
  const y = (ty - rect.top) / rect.height * CANVAS_H;
  if (x < CANVAS_W * 0.35 && y > CANVAS_H * 0.5) {
    const cx = CANVAS_W * 0.15, cy = CANVAS_H * 0.78;
    const dx = x - cx, dy = y - cy;
    if (Math.abs(dx) > Math.abs(dy)) return dx < 0 ? 'left' : 'right';
    return dy < 0 ? 'up' : 'down';
  }
  if (x > CANVAS_W * 0.65 && y > CANVAS_H * 0.5) {
    if (y < CANVAS_H * 0.68) return 'shuriken';
    if (x < CANVAS_W * 0.82) return 'attack';
    return 'special';
  }
  return null;
}

function setupTouchInput(canvas) {
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    ensureAudio();
    for (const t of e.changedTouches) {
      const zone = getTouchZone(t.clientX, t.clientY, canvas);
      if (zone) {
        touchState[zone] = true;
        if (zone === 'attack' || zone === 'special' || zone === 'shuriken' || zone === 'up') touchJust[zone] = true;
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchState.left = false; touchState.right = false; touchState.up = false; touchState.down = false;
    touchState.attack = false; touchState.special = false; touchState.shuriken = false;
    for (const t of e.touches) {
      const zone = getTouchZone(t.clientX, t.clientY, canvas);
      if (zone) touchState[zone] = true;
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
}

// ── Gamepad support ──────────────────────────────────────────
const gpState = { axes: [0,0,0,0], buttons: new Array(17).fill(false) };
const gpJust = new Array(17).fill(false);
const gpPrev = new Array(17).fill(false);

function pollGamepad() {
  const gp = navigator.getGamepads ? navigator.getGamepads()[0] : null;
  if (!gp) return;
  ensureAudio();
  gpState.axes[0] = gp.axes[0] || 0;
  gpState.axes[1] = gp.axes[1] || 0;
  for (let i = 0; i < gp.buttons.length && i < 17; i++) {
    const pressed = gp.buttons[i].pressed;
    gpJust[i] = pressed && !gpPrev[i];
    gpPrev[i] = pressed;
    gpState.buttons[i] = pressed;
  }
}

// Clear per-frame input state
function clearFrameInput() {
  for (const k in justPressed) justPressed[k] = false;
  touchJust.attack = false; touchJust.special = false; touchJust.shuriken = false; touchJust.up = false;
}

// ── Substitution Log (shadow ninja) ──────────────────────────
class SubstitutionLog {
  constructor(x, y, w, h) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.life = 90;
    this.maxLife = 90;
    this.vy = -1.5;
    this.rot = (Math.random() < 0.5 ? 1 : -1) * (0.02 + Math.random() * 0.03);
    this.angle = 0;
    this.cloudPuffs = [];
    for (let i = 0; i < 6; i++) {
      this.cloudPuffs.push({
        ox: (Math.random() - 0.5) * 24,
        oy: (Math.random() - 0.5) * 20,
        r: 6 + Math.random() * 10,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -0.3 - Math.random() * 0.8,
        life: 25 + Math.random() * 15
      });
    }
    this.done = false;
  }
  update() {
    this.life--;
    this.vy += 0.12;
    this.y += this.vy;
    this.angle += this.rot;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    const fade = Math.min(1, this.life / 20);
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const cx = sx + this.w / 2;
    const cy = sy + this.h / 2;
    const logW = this.w + 6;
    const logH = this.h + 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.angle);

    const lx = -logW / 2;
    const ly = -logH / 2;
    // Shadow
    ctx.globalAlpha = fade * 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, logH / 2 + 2, logW / 2 + 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Main log body (rounded rect)
    ctx.globalAlpha = fade * 0.95;
    ctx.fillStyle = '#9B6B3D';
    const r = 4;
    ctx.beginPath();
    ctx.moveTo(lx + r, ly);
    ctx.lineTo(lx + logW - r, ly);
    ctx.quadraticCurveTo(lx + logW, ly, lx + logW, ly + r);
    ctx.lineTo(lx + logW, ly + logH - r);
    ctx.quadraticCurveTo(lx + logW, ly + logH, lx + logW - r, ly + logH);
    ctx.lineTo(lx + r, ly + logH);
    ctx.quadraticCurveTo(lx, ly + logH, lx, ly + logH - r);
    ctx.lineTo(lx, ly + r);
    ctx.quadraticCurveTo(lx, ly, lx + r, ly);
    ctx.fill();
    // Darker edges
    ctx.globalAlpha = fade * 0.4;
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(lx + 1, ly, logW - 2, 3);
    ctx.fillRect(lx + 1, ly + logH - 3, logW - 2, 3);
    // Wood grain lines
    ctx.globalAlpha = fade * 0.3;
    ctx.strokeStyle = '#5C3A1E';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 4; i++) {
      const gy = ly + 5 + i * (logH / 5);
      ctx.beginPath();
      ctx.moveTo(lx + 3, gy);
      ctx.bezierCurveTo(lx + logW * 0.3, gy - 1.5, lx + logW * 0.6, gy + 1.5, lx + logW - 3, gy);
      ctx.stroke();
    }
    // Top end (cross-section ellipse with rings)
    ctx.globalAlpha = fade * 0.7;
    ctx.fillStyle = '#C4965A';
    ctx.beginPath();
    ctx.ellipse(0, ly + 2, logW / 2 - 1, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = fade * 0.4;
    ctx.strokeStyle = '#8B6B3D';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.ellipse(0, ly + 2, logW / 2 - 5, 2.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, ly + 2, logW / 2 - 9, 1.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Small knot
    ctx.globalAlpha = fade * 0.5;
    ctx.fillStyle = '#5C3A1E';
    ctx.beginPath();
    ctx.ellipse(-3 + logW * 0.15, logH * 0.45 - logH / 2, 2.5, 3, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // White smoke cloud
    const cloudCx = this.x + this.w / 2 - cam.x;
    const cloudCy = this.y + this.h / 2 - cam.y;
    for (const p of this.cloudPuffs) {
      p.ox += p.vx;
      p.oy += p.vy;
      p.r += 0.3;
      p.life--;
      if (p.life <= 0) continue;
      const a = Math.min(1, p.life / 10) * fade * 0.45;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cloudCx + p.ox, cloudCy + p.oy, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}
