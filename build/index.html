function getTierInfo(tierIdx) {
  if (tierIdx < ENEMY_TIERS.length) return { type: ENEMY_TIERS[tierIdx], big: false };
  return { type: ENEMY_TIERS[tierIdx % ENEMY_TIERS.length], big: true };
}
function getTierName(tierIdx) {
  const info = getTierInfo(tierIdx);
  return (info.big ? 'Big ' : '') + ENEMY_STATS[info.type].name;
}

// ── Battle Phrases ───────────────────────────────────────────
// Helper to pick a random phrase
function pickPhrase(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getBattlePhrase(enemyType, ninjaType, element) {
  const data = BATTLE_PHRASES[enemyType];
  if (!data) return null;
  // Ninja-specific first (25% chance if available)
  if (ninjaType && data.ninjaEntrance && data.ninjaEntrance[ninjaType] && Math.random() < 0.25) {
    return pickPhrase(data.ninjaEntrance[ninjaType]);
  }
  // Element-specific (20% chance if available)
  if (element && data.elementEntrance && data.elementEntrance[element] && Math.random() < 0.2) {
    return pickPhrase(data.elementEntrance[element]);
  }
  return pickPhrase(data.entrance);
}

function getKillPhrase(enemyType, ninjaType, element) {
  const data = BATTLE_PHRASES[enemyType];
  if (!data) return null;
  if (ninjaType && data.ninjaKill && data.ninjaKill[ninjaType] && Math.random() < 0.25) {
    return pickPhrase(data.ninjaKill[ninjaType]);
  }
  if (element && data.elementKill && data.elementKill[element] && Math.random() < 0.2) {
    return pickPhrase(data.elementKill[element]);
  }
  return pickPhrase(data.kill);
}

function getNinjaResponse(ninjaType, enemyType, element) {
  const data = NINJA_RESPONSES[ninjaType];
  if (!data) return null;
  if (enemyType && data[enemyType]) return pickPhrase(data[enemyType]);
  if (element && data['elem_' + element]) return pickPhrase(data['elem_' + element]);
  return data.general ? pickPhrase(data.general) : null;
}

function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function lerp(a, b, t) { return a + (b - a) * t; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// Hitstop
let hitstopFrames = 0;
function triggerHitstop(frames) { hitstopFrames = Math.max(hitstopFrames, frames); }

// Screen shake
let screenShakeX = 0, screenShakeY = 0, screenShakeTimer = 0, screenShakeIntensity = 0;
function triggerScreenShake(intensity, duration) {
  if (intensity > screenShakeIntensity) {
    screenShakeIntensity = intensity;
    screenShakeTimer = duration;
  }
}
function updateScreenShake() {
  if (screenShakeTimer > 0) {
    screenShakeTimer--;
    const t = screenShakeTimer / 10;
    screenShakeX = (Math.random() - 0.5) * 2 * screenShakeIntensity * Math.min(t, 1);
    screenShakeY = (Math.random() - 0.5) * 2 * screenShakeIntensity * Math.min(t, 1);
    if (screenShakeTimer <= 0) { screenShakeIntensity = 0; screenShakeX = 0; screenShakeY = 0; }
  }
}

// Line of sight: returns true if no blocks/platforms between two points
function hasLineOfSight(x0, y0, x1, y1, game) {
  const steps = Math.ceil(Math.hypot(x1 - x0, y1 - y0) / 8);
  for (let i = 1; i < steps; ++i) {
    const t = i / steps;
    const x = x0 + (x1 - x0) * t;
    const y = y0 + (y1 - y0) * t;
    const probe = { x: x - 4, y: y - 4, w: 8, h: 8 };
    for (const p of game.platforms) {
      if (!p.thin && rectOverlap(probe, p)) return false;
    }
    for (const b of game.stoneBlocks) {
      if (!b.done && rectOverlap(probe, b)) return false;
    }
  }
  return true;
}

// ── Shared combat helpers ────────────────────────────────────

// Damage all enemies/boss within a radius from a point
function damageInRadius(game, cx, cy, radius, damage, fromX) {
  for (const e of game.enemies) {
    if (e.dead) continue;
    const dx = (e.x + e.w / 2) - cx;
    const dy = (e.y + e.h / 2) - cy;
    if (Math.sqrt(dx * dx + dy * dy) < radius) {
      e.takeDamage(damage, game, fromX !== undefined ? fromX : cx);
    }
  }
  if (game.boss && !game.boss.dead) {
    const dx = (game.boss.x + game.boss.w / 2) - cx;
    const dy = (game.boss.y + game.boss.h / 2) - cy;
    if (Math.sqrt(dx * dx + dy * dy) < radius) {
      game.boss.takeDamage(damage, game, fromX !== undefined ? fromX : cx);
    }
  }
}

// Find nearest enemy or boss with line of sight from a point
function findNearestTarget(x, y, game, facing) {
  let nearest = null, bestDist = Infinity;
  for (const e of game.enemies) {
    if (e.dead) continue;
    if (e.friendly) continue; // Don't target friendly enemies
    if (!hasLineOfSight(x, y, e.x + e.w / 2, e.y + e.h / 2, game)) continue;
    const dx = (e.x + e.w / 2) - x, dy = (e.y + e.h / 2) - y;
    // Skip enemies directly behind the ninja (~90° cone behind)
    if (facing && dx * facing < 0 && Math.abs(dy) < Math.abs(dx)) continue;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; nearest = e; }
  }
  if (game.boss && !game.boss.dead) {
    if (hasLineOfSight(x, y, game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, game)) {
      const dx = (game.boss.x + game.boss.w / 2) - x, dy = (game.boss.y + game.boss.h / 2) - y;
      if (!(facing && dx * facing < 0 && Math.abs(dy) < Math.abs(dx))) {
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; nearest = game.boss; }
      }
    }
  }
  return nearest;
}

// Fire a projectile at the nearest enemy or boss with line of sight
function fireProjectileAtNearestEnemy({
  x, y, game, speed = 8, color = '#ccc', damage = 1, owner = 'player', width = 8, height = 6, piercing = false, bouncy = false, facing = 0
}) {
  const nearest = findNearestTarget(x, y, game, facing);
  const fallbackDir = facing || 1;
  let vx = speed * fallbackDir, vy = 0;
  if (nearest) {
    const dx = (nearest.x + nearest.w / 2) - x;
    const dy = (nearest.y + nearest.h / 2) - y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 0) { vx = (dx / d) * speed; vy = (dy / d) * speed; }
  }
  const proj = new Projectile(x, y, vx, vy, color, damage, owner);
  proj.w = width;
  proj.h = height;
  proj.piercing = piercing;
  proj.bouncy = bouncy;
  game.projectiles.push(proj);
  return proj;
}

// Render an HP bar above an entity
function renderHpBar(ctx, cam, entity, barWidth) {
  const w = barWidth || entity.w;
  const sx = entity.x - cam.x;
  const sy = entity.y - cam.y;
  ctx.fillStyle = '#400';
  ctx.fillRect(sx, sy - 8, w, 4);
  ctx.fillStyle = entity.friendly ? '#4f4' : '#f44';
  ctx.fillRect(sx, sy - 8, w * (entity.hp / entity.maxHp), 4);
}

// Process burn DOT for an entity (enemy or boss)
function processBurn(entity, game) {
  if (entity.burnTimer <= 0) return;
  // Water element enemies: fully immune to burn
  if (entity.element === 'water') {
    entity.burnTimer = 0;
    return;
  }
  // Fire element enemies: burn heals them instead
  if (entity.element === 'fire') {
    entity.burnTimer = 0;
    const healAmt = Math.min(2, entity.maxHp - entity.hp);
    if (healAmt > 0) {
      entity.hp += healAmt;
      game.effects.push(new Effect(entity.x + entity.w / 2, entity.y + entity.h / 2, '#4f4', 4, 2, 8));
    }
    return;
  }
  entity.burnTimer--;
  if (entity.burnTimer % 5 === 0) {
    game.effects.push(new Effect(entity.x + entity.w / 2, entity.y + entity.h / 2, '#f63', 6, 2, 10));
  }
  if (entity.burnTimer % 30 === 0) {
    entity.hp -= 1;
    entity.flashTimer = 4;
    game.effects.push(new Effect(entity.x + entity.w / 2, entity.y + entity.h / 2, '#f93', 4, 2, 8));
    if (entity.hp <= 0) {
      entity.dead = true;
      entity.onDeath(game);
    }
  }
}

// Shield damage check — returns true if damage was fully absorbed by shield
function processShieldDamage(entity, amount, game, fromX) {
  if (entity.shieldHp <= 0 || fromX === undefined) return false;
  const hitFromFront = (fromX > entity.x + entity.w / 2) === (entity.facing === 1);
  if (!hitFromFront) return false;
  entity.shieldHp -= amount;
  entity.flashTimer = 4;
  game.effects.push(new Effect(entity.x + (entity.facing > 0 ? entity.w : 0), entity.y + entity.h / 2, '#5ff', 6, 3, 10));
  if (entity.shieldHp < 0) entity.shieldHp = 0;
  return true;
}

// ── Canvas-drawn item icons ──────────────────────────────────
// Draws a boss item icon centered at (cx, cy) with given size and color.
function drawItemIcon(ctx, itemId, cx, cy, size, color) {
  const s = size / 2; // half-size for convenience
  ctx.save();
  ctx.translate(cx, cy);
  ctx.fillStyle = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(1, size / 12);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  switch (itemId) {
    case 'pickaxe': {
      // Pickaxe: diagonal handle + head perpendicular to shaft
      // Handle (diagonal)
      ctx.strokeStyle = '#a87';
      ctx.lineWidth = Math.max(2, size / 8);
      ctx.beginPath();
      ctx.moveTo(s * 0.4, s * 0.7);
      ctx.lineTo(-s * 0.15, -s * 0.05);
      ctx.stroke();
      // Metal head — angled to match shaft, pointed left end curves down
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.65, s * 0.15);   // left pick point (curved down)
      ctx.lineTo(-s * 0.3, -s * 0.15);
      ctx.lineTo(s * 0.2, -s * 0.55);    // right blunt end (upper-right)
      ctx.lineTo(s * 0.3, -s * 0.35);
      ctx.lineTo(-s * 0.15, -s * 0.05);  // meets shaft top
      ctx.closePath();
      ctx.fill();
      // Shine
      ctx.strokeStyle = '#fff';
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.beginPath();
      ctx.moveTo(-s * 0.4, 0);
      ctx.lineTo(s * 0.1, -s * 0.38);
      ctx.stroke();
      ctx.globalAlpha = 1;
      break;
    }
    case 'tripleShuriken': {
      // Three small 4-pointed stars in a spread
      const offsets = [[-s * 0.4, s * 0.15], [0, -s * 0.3], [s * 0.4, s * 0.15]];
      ctx.fillStyle = color;
      for (const [ox, oy] of offsets) {
        const r = s * 0.32;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
          const cr = i % 2 === 0 ? r : r * 0.35;
          ctx.lineTo(ox + Math.cos(a) * cr, oy + Math.sin(a) * cr);
        }
        ctx.closePath();
        ctx.fill();
      }
      break;
    }
    case 'homingShuriken': {
      // 4-pointed star with dashed circle reticle
      const r = s * 0.5;
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
        const cr = i % 2 === 0 ? r : r * 0.35;
        ctx.lineTo(Math.cos(a) * cr, Math.sin(a) * cr);
      }
      ctx.closePath();
      ctx.fill();
      // Reticle circle
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1, size / 14);
      ctx.setLineDash([size / 8, size / 8]);
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
      break;
    }
    case 'vampireTeeth': {
      // Two fangs
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(-s * 0.5, -s * 0.4);
      ctx.lineTo(-s * 0.2, -s * 0.4);
      ctx.lineTo(-s * 0.35, s * 0.55);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(s * 0.2, -s * 0.4);
      ctx.lineTo(s * 0.5, -s * 0.4);
      ctx.lineTo(s * 0.35, s * 0.55);
      ctx.closePath();
      ctx.fill();
      // Gum line
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(0, -s * 0.45, s * 0.7, s * 0.25, 0, Math.PI, 0);
      ctx.fill();
      // Blood drop
      ctx.fillStyle = '#f22';
      ctx.beginPath();
      ctx.arc(-s * 0.35, s * 0.65, s * 0.12, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    case 'iaito': {
      // Katana blade
      ctx.save();
      ctx.rotate(-0.6);
      // Blade
      ctx.fillStyle = '#dde';
      ctx.beginPath();
      ctx.moveTo(-s * 0.05, -s * 0.9);
      ctx.lineTo(s * 0.08, -s * 0.85);
      ctx.lineTo(s * 0.06, s * 0.15);
      ctx.lineTo(-s * 0.06, s * 0.15);
      ctx.closePath();
      ctx.fill();
      // Edge shine
      ctx.strokeStyle = '#fff';
      ctx.globalAlpha = 0.6;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-s * 0.02, -s * 0.8);
      ctx.lineTo(-s * 0.03, s * 0.1);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Guard (tsuba)
      ctx.fillStyle = '#fc0';
      ctx.fillRect(-s * 0.18, s * 0.12, s * 0.36, s * 0.08);
      // Handle wrap
      ctx.fillStyle = '#624';
      ctx.fillRect(-s * 0.06, s * 0.22, s * 0.12, s * 0.55);
      // Handle wrapping lines
      ctx.strokeStyle = '#846';
      ctx.lineWidth = Math.max(1, size / 14);
      for (let i = 0; i < 4; i++) {
        const hy = s * 0.28 + i * s * 0.12;
        ctx.beginPath();
        ctx.moveTo(-s * 0.06, hy);
        ctx.lineTo(s * 0.06, hy + s * 0.06);
        ctx.stroke();
      }
      ctx.restore();
      break;
    }
    case 'spikedArmor': {
      // Hexagon with spikes
      ctx.fillStyle = '#444';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        ctx.lineTo(Math.cos(a) * s * 0.55, Math.sin(a) * s * 0.55);
      }
      ctx.closePath();
      ctx.fill();
      // Spikes
      ctx.fillStyle = color;
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        const a1 = a - 0.2, a2 = a + 0.2;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a1) * s * 0.5, Math.sin(a1) * s * 0.5);
        ctx.lineTo(Math.cos(a) * s * 0.9, Math.sin(a) * s * 0.9);
        ctx.lineTo(Math.cos(a2) * s * 0.5, Math.sin(a2) * s * 0.5);
        ctx.closePath();
        ctx.fill();
      }
      break;
    }
    case 'redMagnet': {
      // Horseshoe magnet
      ctx.lineWidth = s * 0.3;
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.arc(0, -s * 0.05, s * 0.45, Math.PI, 0);
      ctx.stroke();
      // Legs
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.63, -s * 0.1, s * 0.3, s * 0.55);
      ctx.fillRect(s * 0.33, -s * 0.1, s * 0.3, s * 0.55);
      // Tips
      ctx.fillStyle = '#ddd';
      ctx.fillRect(-s * 0.63, s * 0.35, s * 0.3, s * 0.2);
      ctx.fillRect(s * 0.33, s * 0.35, s * 0.3, s * 0.2);
      // Field lines
      ctx.strokeStyle = '#f88';
      ctx.globalAlpha = 0.4;
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.arc(0, s * 0.1, s * 0.2, Math.PI, 0);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      break;
    }
    case 'x2Orb': {
      // Glowing orb with "x2"
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.65);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.3, color);
      grad.addColorStop(1, '#440');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      // x2 text
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.round(size * 0.4)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('x2', 0, 1);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      break;
    }
    case 'deathsKey': {
      // Ornate key
      ctx.save();
      ctx.rotate(0.3);
      // Shaft
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.06, -s * 0.15, s * 0.12, s * 0.85);
      // Teeth
      ctx.fillRect(s * 0.06, s * 0.4, s * 0.18, s * 0.08);
      ctx.fillRect(s * 0.06, s * 0.55, s * 0.14, s * 0.08);
      // Bow (ring)
      ctx.strokeStyle = color;
      ctx.lineWidth = s * 0.12;
      ctx.beginPath();
      ctx.arc(0, -s * 0.4, s * 0.28, 0, Math.PI * 2);
      ctx.stroke();
      // Gem in bow
      ctx.fillStyle = '#f4f';
      ctx.beginPath();
      ctx.arc(0, -s * 0.4, s * 0.12, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      break;
    }
    case 'protectiveCharm': {
      // Shield shape with plus
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.75);
      ctx.lineTo(s * 0.6, -s * 0.4);
      ctx.lineTo(s * 0.5, s * 0.25);
      ctx.lineTo(0, s * 0.7);
      ctx.lineTo(-s * 0.5, s * 0.25);
      ctx.lineTo(-s * 0.6, -s * 0.4);
      ctx.closePath();
      ctx.fill();
      // Inner cross
      ctx.fillStyle = '#fff';
      ctx.fillRect(-s * 0.07, -s * 0.35, s * 0.14, s * 0.6);
      ctx.fillRect(-s * 0.25, -s * 0.1, s * 0.5, s * 0.14);
      break;
    }
    case 'charmFire':
    case 'charmGhost':
    case 'charmWater':
    case 'charmCrystal':
    case 'charmWind':
    case 'charmLightning':
    case 'charmSpiky': {
      // Diamond shape with inner element symbol
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.8);
      ctx.lineTo(s * 0.55, 0);
      ctx.lineTo(0, s * 0.8);
      ctx.lineTo(-s * 0.55, 0);
      ctx.closePath();
      ctx.fill();
      // Darker inner diamond
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.45);
      ctx.lineTo(s * 0.3, 0);
      ctx.lineTo(0, s * 0.45);
      ctx.lineTo(-s * 0.3, 0);
      ctx.closePath();
      ctx.fill();
      // Element-specific inner detail
      ctx.fillStyle = '#fff';
      ctx.globalAlpha = 0.8;
      if (itemId === 'charmFire') {
        // Flame
        ctx.beginPath();
        ctx.moveTo(0, s * 0.25);
        ctx.quadraticCurveTo(s * 0.2, 0, s * 0.1, -s * 0.15);
        ctx.quadraticCurveTo(s * 0.05, -s * 0.3, 0, -s * 0.35);
        ctx.quadraticCurveTo(-s * 0.05, -s * 0.3, -s * 0.1, -s * 0.15);
        ctx.quadraticCurveTo(-s * 0.2, 0, 0, s * 0.25);
        ctx.fill();
      } else if (itemId === 'charmGhost') {
        // Ghost wisp / eye
        ctx.beginPath();
        ctx.arc(0, -s * 0.05, s * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-s * 0.12, s * 0.07);
        ctx.lineTo(-s * 0.12, s * 0.22);
        ctx.quadraticCurveTo(-s * 0.06, s * 0.15, 0, s * 0.22);
        ctx.quadraticCurveTo(s * 0.06, s * 0.15, s * 0.12, s * 0.22);
        ctx.lineTo(s * 0.12, s * 0.07);
        ctx.closePath();
        ctx.fill();
      } else if (itemId === 'charmWater') {
        // Water drop
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.25);
        ctx.quadraticCurveTo(s * 0.18, s * 0.05, 0, s * 0.2);
        ctx.quadraticCurveTo(-s * 0.18, s * 0.05, 0, -s * 0.25);
        ctx.fill();
      } else if (itemId === 'charmCrystal') {
        // Crystal shard
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.3);
        ctx.lineTo(s * 0.12, s * 0.05);
        ctx.lineTo(0, s * 0.25);
        ctx.lineTo(-s * 0.12, s * 0.05);
        ctx.closePath();
        ctx.fill();
      } else if (itemId === 'charmWind') {
        // Swirl lines
        ctx.lineWidth = Math.max(1, size / 14);
        ctx.strokeStyle = '#fff';
        ctx.beginPath();
        ctx.arc(-s * 0.05, -s * 0.1, s * 0.15, -0.5, Math.PI);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(s * 0.05, s * 0.05, s * 0.12, Math.PI - 0.5, 0);
        ctx.stroke();
      } else if (itemId === 'charmLightning') {
        // Lightning bolt
        ctx.beginPath();
        ctx.moveTo(s * 0.05, -s * 0.3);
        ctx.lineTo(-s * 0.1, -s * 0.02);
        ctx.lineTo(s * 0.04, -s * 0.02);
        ctx.lineTo(-s * 0.08, s * 0.3);
        ctx.lineTo(s * 0.12, s * 0.02);
        ctx.lineTo(-s * 0.02, s * 0.02);
        ctx.closePath();
        ctx.fill();
      } else if (itemId === 'charmSpiky') {
        // Spiky thorns / star burst
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a - 0.15) * s * 0.1, Math.sin(a - 0.15) * s * 0.1);
          ctx.lineTo(Math.cos(a) * s * 0.25, Math.sin(a) * s * 0.25);
          ctx.lineTo(Math.cos(a + 0.15) * s * 0.1, Math.sin(a + 0.15) * s * 0.1);
          ctx.closePath();
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      break;
    }
    case 'leatherBoots': {
      // Boot shape
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.15, -s * 0.7);
      ctx.lineTo(s * 0.2, -s * 0.7);
      ctx.lineTo(s * 0.2, s * 0.2);
      ctx.lineTo(s * 0.65, s * 0.3);
      ctx.lineTo(s * 0.65, s * 0.6);
      ctx.lineTo(-s * 0.35, s * 0.6);
      ctx.lineTo(-s * 0.35, s * 0.3);
      ctx.lineTo(-s * 0.15, s * 0.15);
      ctx.closePath();
      ctx.fill();
      // Sole
      ctx.fillStyle = '#543';
      ctx.fillRect(-s * 0.35, s * 0.5, s * 1.0, s * 0.12);
      // Lace detail
      ctx.strokeStyle = '#dc9';
      ctx.lineWidth = Math.max(1, size / 16);
      ctx.beginPath();
      ctx.moveTo(-s * 0.05, -s * 0.5);
      ctx.lineTo(s * 0.1, -s * 0.4);
      ctx.moveTo(-s * 0.05, -s * 0.3);
      ctx.lineTo(s * 0.1, -s * 0.2);
      ctx.stroke();
      break;
    }
    case 'friendsLetter': {
      // Envelope
      ctx.fillStyle = '#eed';
      ctx.fillRect(-s * 0.6, -s * 0.35, s * 1.2, s * 0.8);
      // Flap
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(-s * 0.6, -s * 0.35);
      ctx.lineTo(0, s * 0.15);
      ctx.lineTo(s * 0.6, -s * 0.35);
      ctx.closePath();
      ctx.fill();
      // Seal
      ctx.fillStyle = '#c44';
      ctx.beginPath();
      ctx.arc(0, s * 0.05, s * 0.15, 0, Math.PI * 2);
      ctx.fill();
      // Heart on seal
      ctx.fillStyle = '#f88';
      ctx.beginPath();
      ctx.arc(-s * 0.04, -s * 0.01, s * 0.06, 0, Math.PI * 2);
      ctx.arc(s * 0.04, -s * 0.01, s * 0.06, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-s * 0.09, s * 0.02);
      ctx.lineTo(0, s * 0.1);
      ctx.lineTo(s * 0.09, s * 0.02);
      ctx.fill();
      break;
    }
    case 'theKunai': {
      // Kunai blade
      ctx.save();
      ctx.rotate(0.4);
      // Blade
      ctx.fillStyle = '#bbb';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.85);
      ctx.lineTo(s * 0.18, s * 0.0);
      ctx.lineTo(0, s * 0.05);
      ctx.lineTo(-s * 0.18, s * 0.0);
      ctx.closePath();
      ctx.fill();
      // Edge highlight
      ctx.fillStyle = '#eee';
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.85);
      ctx.lineTo(s * 0.06, -s * 0.1);
      ctx.lineTo(0, s * 0.0);
      ctx.closePath();
      ctx.fill();
      // Grip
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.06, s * 0.05, s * 0.12, s * 0.4);
      // Ring pommel
      ctx.strokeStyle = color;
      ctx.lineWidth = s * 0.08;
      ctx.beginPath();
      ctx.arc(0, s * 0.6, s * 0.15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
      break;
    }
    case 'theCode': {
      // Code brackets / infinity loop
      ctx.strokeStyle = color;
      ctx.lineWidth = s * 0.15;
      // Left bracket {
      ctx.beginPath();
      ctx.arc(-s * 0.25, -s * 0.25, s * 0.25, -0.3, Math.PI * 0.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(-s * 0.25, s * 0.25, s * 0.25, -Math.PI * 0.5, 0.3);
      ctx.stroke();
      // Right bracket }
      ctx.beginPath();
      ctx.arc(s * 0.25, -s * 0.25, s * 0.25, Math.PI * 0.5, Math.PI + 0.3);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(s * 0.25, s * 0.25, s * 0.25, Math.PI - 0.3, -Math.PI * 0.5);
      ctx.stroke();
      // Center dot
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.1, 0, Math.PI * 2);
      ctx.fill();
      break;
    }
    default: {
      // Fallback: colored circle with "?"
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.font = `bold ${Math.round(size * 0.45)}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', 0, 1);
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      break;
    }
  }

  ctx.restore();
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function ensureAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
document.addEventListener('keydown', ensureAudio, { once: true });
document.addEventListener('click', ensureAudio, { once: true });
document.addEventListener('mousedown', ensureAudio, { once: true });
document.addEventListener('mousemove', ensureAudio, { once: true });
document.addEventListener('touchstart', ensureAudio, { once: true });
document.addEventListener('pointerdown', ensureAudio, { once: true });

const SFX = {
  muted: false,
  play(freq, type, duration, vol = 0.15, slide = 0) {
    if (this.muted) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + duration);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  },
  noise(duration, vol = 0.08) {
    if (this.muted) return;
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    src.connect(g); g.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + duration);
    src.onended = () => { src.disconnect(); g.disconnect(); };
  },
  attack() { this.play(320, 'square', 0.08, 0.1, 200); },
  hit() { this.play(200, 'square', 0.1, 0.12, -100); this.noise(0.1, 0.1); },
  enemyDie() { this.play(400, 'square', 0.12, 0.1, -300); this.noise(0.1, 0.08); },
  playerHurt() { this.play(150, 'sawtooth', 0.2, 0.12, -80); },
  jump() { this.play(260, 'square', 0.1, 0.06, 180); },
  special() { this.play(500, 'triangle', 0.15, 0.1, 200); },
  parry() { this.play(800, 'square', 0.06, 0.12); this.play(1200, 'square', 0.08, 0.08); },
  parryFail() { this.play(200, 'triangle', 0.1, 0.06, -50); },
  shuriken() { this.play(600, 'triangle', 0.08, 0.06, 300); },
  bossDie() { this.play(300, 'sawtooth', 0.3, 0.15, -250); this.noise(0.3, 0.12); this.play(150, 'square', 0.4, 0.1, -100); },
  bossSpawn() { this.play(100, 'sawtooth', 0.3, 0.12, 100); this.play(200, 'square', 0.4, 0.08, 50); },
  wave() { this.play(440, 'triangle', 0.15, 0.1); setTimeout(() => this.play(660, 'triangle', 0.15, 0.1), 120); setTimeout(() => this.play(880, 'triangle', 0.2, 0.1), 240); },
  armor() { this.play(600, 'triangle', 0.1, 0.1); this.play(900, 'triangle', 0.15, 0.08); },
  chain() { this.play(700, 'square', 0.05, 0.08, 200); },
  slam() { this.play(80, 'sawtooth', 0.2, 0.15, -40); this.noise(0.15, 0.1); },
  pickup() { this.play(520, 'triangle', 0.08, 0.1); setTimeout(() => this.play(780, 'triangle', 0.1, 0.1), 80); },
  reflect() { this.play(1000, 'square', 0.06, 0.1, -400); },
  miss() { this.play(180, 'triangle', 0.12, 0.06, -60); },
  backstab() { this.play(300, 'sawtooth', 0.05, 0.1); this.play(600, 'square', 0.1, 0.12, 200); },
  counterSwish() { this.noise(0.18, 0.12); this.play(900, 'sawtooth', 0.15, 0.1, -600); this.play(400, 'triangle', 0.1, 0.08, 300); },
  victory() { [440,550,660,880].forEach((f,i) => setTimeout(() => this.play(f, 'triangle', 0.25, 0.12), i * 150)); },
  bossRoar() {
    // Deep, sustained growl — layered low oscillators + rumble
    this.play(38, 'sawtooth', 0.9, 0.2, -15);
    this.play(42, 'square', 0.8, 0.1, -10);
    this.play(55, 'sawtooth', 0.7, 0.14, -25);
    this.noise(0.7, 0.18);
    setTimeout(() => {
      this.play(32, 'sawtooth', 0.6, 0.18, -12);
      this.play(48, 'square', 0.5, 0.08, -18);
      this.noise(0.5, 0.14);
    }, 250);
    setTimeout(() => {
      this.play(28, 'sawtooth', 0.5, 0.15, -8);
      this.noise(0.4, 0.1);
    }, 550);
  },
};

const BOSS_MUSIC = {
  deflector: 'bossRonin',
  protector: 'bossProtector',
  flyshooter: 'bossOverlord',
  flyer: 'bossAirForce',
  bouncer: 'bossAirForce',
};

// General boss tracks cycled for non-specific bosses
const GENERAL_BOSS_TRACKS = ['boss', 'boss2', 'boss3'];

// ── Sequencer Engine ─────────────────────────────────────────
const Music = {
  playing: false,
  current: null,
  step: 0,
  master: null,
  timer: null,
  vol: 0.18,
  muted: false,

  _ntof(n) { return 440 * Math.pow(2, (n - 69) / 12); },

  _init() {
    if (this.master) return;
    this.master = audioCtx.createGain();
    this.master.gain.value = 0;
    this.master.connect(audioCtx.destination);
  },

  _osc(freq, type, dur, vol, slide) {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.linearRampToValueAtTime(vol * 0.4, t + dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g);
    g.connect(this.master);
    o.start();
    o.stop(t + dur);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  },

  _noise(dur, vol) {
    const t = audioCtx.currentTime;
    const len = Math.max(1, audioCtx.sampleRate * dur | 0);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const s = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    s.buffer = buf;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    s.connect(g);
    g.connect(this.master);
    s.start();
    s.stop(t + dur);
    s.onended = () => { s.disconnect(); g.disconnect(); };
  },

  _kick(vol) {
    const t = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(30, t + 0.1);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g);
    g.connect(this.master);
    o.start();
    o.stop(t + 0.15);
    o.onended = () => { o.disconnect(); g.disconnect(); };
  },

  _snare(vol) {
    this._noise(0.1, vol);
    this._osc(180, 'triangle', 0.06, vol * 0.4, -80);
  },

  play(name) {
    if (this.current === name && this.playing) return;
    const track = MUSIC_TRACKS[name];
    if (!track) return;
    this._init();

    if (this.timer) { clearInterval(this.timer); this.timer = null; }

    this.current = name;
    this.playing = true;
    this.step = 0;

    const t = audioCtx.currentTime;
    this.master.gain.cancelScheduledValues(t);
    this.master.gain.setValueAtTime(this.master.gain.value, t);
    this.master.gain.linearRampToValueAtTime(this.muted ? 0 : this.vol, t + 0.6);

    const interval = (60 / track.bpm / 4) * 1000;
    this.timer = setInterval(() => {
      if (audioCtx.state === 'suspended') return;
      if (this.muted) return;
      const s = this.step % track.len;
      const stepDur = 60 / track.bpm / 4;
      for (const ch of track.ch) {
        const val = ch.p[s % ch.p.length];
        if (!val) continue;
        if (ch.t === 'k') this._kick(ch.v || 0.1);
        else if (ch.t === 'h') this._noise(0.03, ch.v || 0.03);
        else if (ch.t === 's') this._snare(ch.v || 0.05);
        else this._osc(this._ntof(val), ch.w || 'triangle', ch.d || stepDur * 2, ch.v || 0.06, ch.s || 0);
      }
      this.step++;
    }, interval);
  },

  stop() {
    if (this.timer) { clearInterval(this.timer); this.timer = null; }
    if (this.master) {
      const t = audioCtx.currentTime;
      this.master.gain.cancelScheduledValues(t);
      this.master.gain.setValueAtTime(this.master.gain.value, t);
      this.master.gain.linearRampToValueAtTime(0, t + 0.5);
    }
    this.playing = false;
    this.current = null;
  },

  setMuted(m) {
    this.muted = m;
    if (this.master) {
      const t = audioCtx.currentTime;
      this.master.gain.cancelScheduledValues(t);
      this.master.gain.setValueAtTime(this.master.gain.value, t);
      this.master.gain.linearRampToValueAtTime(m ? 0 : this.vol, t + 0.3);
    }
  },
};

// === js/input.js ===
// ── Input ────────────────────────────────────────────────────
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  e.preventDefault();
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { e.preventDefault(); keys[e.code] = false; });
function consumePress(code) { if (justPressed[code]) { justPressed[code] = false; return true; } return false; }

// ── Focus management (itch.io iframe support) ────────────────
window.focus();
document.addEventListener('click', () => window.focus());
document.addEventListener('mousedown', () => window.focus());

// ── Mouse input ──────────────────────────────────────────────
function setupMouseInput(canvas) {
  canvas.addEventListener('mousedown', e => {
    e.preventDefault();
    ensureAudio();
    if (e.button === 0) { justPressed['MouseAttack'] = true; keys['MouseAttack'] = true; }
    if (e.button === 2) { justPressed['MouseSpecial'] = true; keys['MouseSpecial'] = true; }
    if (e.button === 1) { justPressed['MouseShuriken'] = true; keys['MouseShuriken'] = true; }
  });
  canvas.addEventListener('mouseup', e => {
    if (e.button === 0) keys['MouseAttack'] = false;
    if (e.button === 2) keys['MouseSpecial'] = false;
    if (e.button === 1) keys['MouseShuriken'] = false;
  });
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    canvasMouseX = (e.clientX - rect.left) / rect.width * CANVAS_W;
    canvasMouseY = (e.clientY - rect.top) / rect.height * CANVAS_H;
  });
}

// Mouse position tracking (canvas-relative)
let canvasMouseX = -1, canvasMouseY = -1;

// Mouse wheel for ninja switching
let mouseWheelNinja = 0;
function setupMouseWheel(canvas) {
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    if (e.deltaY > 0) mouseWheelNinja = (mouseWheelNinja + 1) % 7;
    else mouseWheelNinja = (mouseWheelNinja + 6) % 7;
    justPressed['WheelSwitch'] = true;
  }, { passive: false });
}

// ── Touch input ──────────────────────────────────────────────
const touchState = { left: false, right: false, up: false, down: false, attack: false, special: false, shuriken: false };
const touchJust = { attack: false, special: false, shuriken: false, up: false };
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function getTouchZone(tx, ty, canvas) {
  const rect = canvas.getBoundingClientRect();
  const x = (tx - rect.left) / rect.width * CANVAS_W;
  const y = (ty - rect.top) / rect.height * CANVAS_H;
  if (x < CANVAS_W * 0.35 && y > CANVAS_H * 0.5) {
    const cx = CANVAS_W * 0.15, cy = CANVAS_H * 0.78;
    const dx = x - cx, dy = y - cy;
    if (Math.abs(dx) > Math.abs(dy)) return dx < 0 ? 'left' : 'right';
    return dy < 0 ? 'up' : 'down';
  }
  if (x > CANVAS_W * 0.65 && y > CANVAS_H * 0.5) {
    if (y < CANVAS_H * 0.68) return 'shuriken';
    if (x < CANVAS_W * 0.82) return 'attack';
    return 'special';
  }
  return null;
}

function setupTouchInput(canvas) {
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    ensureAudio();
    for (const t of e.changedTouches) {
      const zone = getTouchZone(t.clientX, t.clientY, canvas);
      if (zone) {
        touchState[zone] = true;
        if (zone === 'attack' || zone === 'special' || zone === 'shuriken' || zone === 'up') touchJust[zone] = true;
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchState.left = false; touchState.right = false; touchState.up = false; touchState.down = false;
    touchState.attack = false; touchState.special = false; touchState.shuriken = false;
    for (const t of e.touches) {
      const zone = getTouchZone(t.clientX, t.clientY, canvas);
      if (zone) touchState[zone] = true;
    }
  }, { passive: false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
}

// ── Gamepad support ──────────────────────────────────────────
const gpState = { axes: [0,0,0,0], buttons: new Array(17).fill(false) };
const gpJust = new Array(17).fill(false);
const gpPrev = new Array(17).fill(false);

function pollGamepad() {
  const gp = navigator.getGamepads ? navigator.getGamepads()[0] : null;
  if (!gp) return;
  ensureAudio();
  gpState.axes[0] = gp.axes[0] || 0;
  gpState.axes[1] = gp.axes[1] || 0;
  for (let i = 0; i < gp.buttons.length && i < 17; i++) {
    const pressed = gp.buttons[i].pressed;
    gpJust[i] = pressed && !gpPrev[i];
    gpPrev[i] = pressed;
    gpState.buttons[i] = pressed;
  }
}

// Clear per-frame input state
function clearFrameInput() {
  for (const k in justPressed) justPressed[k] = false;
  touchJust.attack = false; touchJust.special = false; touchJust.shuriken = false; touchJust.up = false;
}

// ── Substitution Log (shadow ninja) ──────────────────────────
class SubstitutionLog {
  constructor(x, y, w, h) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.life = 90;
    this.maxLife = 90;
    this.vy = -1.5;
    this.rot = (Math.random() < 0.5 ? 1 : -1) * (0.02 + Math.random() * 0.03);
    this.angle = 0;
    this.cloudPuffs = [];
    for (let i = 0; i < 6; i++) {
      this.cloudPuffs.push({
        ox: (Math.random() - 0.5) * 24,
        oy: (Math.random() - 0.5) * 20,
        r: 6 + Math.random() * 10,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -0.3 - Math.random() * 0.8,
        life: 25 + Math.random() * 15
      });
    }
    this.done = false;
  }
  update() {
    this.life--;
    this.vy += 0.12;
    this.y += this.vy;
    this.angle += this.rot;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    const fade = Math.min(1, this.life / 20);
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const cx = sx + this.w / 2;
    const cy = sy + this.h / 2;
    const logW = this.w + 6;
    const logH = this.h + 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.angle);

    const lx = -logW / 2;
    const ly = -logH / 2;
    // Shadow
    ctx.globalAlpha = fade * 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, logH / 2 + 2, logW / 2 + 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Main log body (rounded rect)
    ctx.globalAlpha = fade * 0.95;
    ctx.fillStyle = '#9B6B3D';
    const r = 4;
    ctx.beginPath();
    ctx.moveTo(lx + r, ly);
    ctx.lineTo(lx + logW - r, ly);
    ctx.quadraticCurveTo(lx + logW, ly, lx + logW, ly + r);
    ctx.lineTo(lx + logW, ly + logH - r);
    ctx.quadraticCurveTo(lx + logW, ly + logH, lx + logW - r, ly + logH);
    ctx.lineTo(lx + r, ly + logH);
    ctx.quadraticCurveTo(lx, ly + logH, lx, ly + logH - r);
    ctx.lineTo(lx, ly + r);
    ctx.quadraticCurveTo(lx, ly, lx + r, ly);
    ctx.fill();
    // Darker edges
    ctx.globalAlpha = fade * 0.4;
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(lx + 1, ly, logW - 2, 3);
    ctx.fillRect(lx + 1, ly + logH - 3, logW - 2, 3);
    // Wood grain lines
    ctx.globalAlpha = fade * 0.3;
    ctx.strokeStyle = '#5C3A1E';
    ctx.lineWidth = 0.8;
    for (let i = 0; i < 4; i++) {
      const gy = ly + 5 + i * (logH / 5);
      ctx.beginPath();
      ctx.moveTo(lx + 3, gy);
      ctx.bezierCurveTo(lx + logW * 0.3, gy - 1.5, lx + logW * 0.6, gy + 1.5, lx + logW - 3, gy);
      ctx.stroke();
    }
    // Top end (cross-section ellipse with rings)
    ctx.globalAlpha = fade * 0.7;
    ctx.fillStyle = '#C4965A';
    ctx.beginPath();
    ctx.ellipse(0, ly + 2, logW / 2 - 1, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = fade * 0.4;
    ctx.strokeStyle = '#8B6B3D';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.ellipse(0, ly + 2, logW / 2 - 5, 2.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, ly + 2, logW / 2 - 9, 1.5, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Small knot
    ctx.globalAlpha = fade * 0.5;
    ctx.fillStyle = '#5C3A1E';
    ctx.beginPath();
    ctx.ellipse(-3 + logW * 0.15, logH * 0.45 - logH / 2, 2.5, 3, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // White smoke cloud
    const cloudCx = this.x + this.w / 2 - cam.x;
    const cloudCy = this.y + this.h / 2 - cam.y;
    for (const p of this.cloudPuffs) {
      p.ox += p.vx;
      p.oy += p.vy;
      p.r += 0.3;
      p.life--;
      if (p.life <= 0) continue;
      const a = Math.min(1, p.life / 10) * fade * 0.45;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cloudCx + p.ox, cloudCy + p.oy, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ── Smoke Grenade (shadow ninja) ─────────────────────────────
class SmokeGrenade {
  constructor(x, y, platforms) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 4;
    this.vy = -4 - Math.random() * 3;
    this.landed = false;
    this.platforms = platforms;
    this.life = 300; // 5 seconds
    this.maxLife = 300;
    this.radius = 60;
    this.done = false;
    this.puffs = [];
  }
  update() {
    if (!this.landed) {
      this.vy += 0.35;
      this.x += this.vx;
      this.y += this.vy;
      // Check platform collision when falling
      if (this.vy > 0) {
        for (const p of this.platforms) {
          if (this.x > p.x && this.x < p.x + p.w &&
              this.y >= p.y && this.y - this.vy < p.y + 4) {
            this.y = p.y;
            this.landed = true;
            break;
          }
        }
      }
      return;
    }
    this.life--;
    if (this.life <= 0) this.done = true;
    // Spawn smoke puffs
    if (this.life > 30 && Math.random() < 0.4) {
      this.puffs.push({
        ox: (Math.random() - 0.5) * this.radius * 1.2,
        oy: (Math.random() - 0.5) * 20 - 5,
        r: 4 + Math.random() * 8,
        vy: -0.2 - Math.random() * 0.5,
        life: 20 + Math.random() * 15
      });
    }
    for (let i = this.puffs.length - 1; i >= 0; i--) {
      const p = this.puffs[i];
      p.oy += p.vy;
      p.r += 0.15;
      p.life--;
      if (p.life <= 0) this.puffs.splice(i, 1);
    }
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;

    // Draw the grenade body while airborne
    if (!this.landed) {
      const spin = this.graceTimer * 0.3;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(spin);
      // Body
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fill();
      // Top cap
      ctx.fillStyle = '#555';
      ctx.fillRect(-2, -8, 4, 4);
      // Fuse spark
      ctx.fillStyle = '#fa0';
      ctx.globalAlpha = 0.6 + Math.random() * 0.4;
      ctx.beginPath();
      ctx.arc(0, -9, 2 + Math.random(), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
      return;
    }

    const fade = Math.min(1, this.life / 30);
    // Ground haze
    ctx.globalAlpha = fade * 0.15;
    ctx.fillStyle = '#c8b8d8';
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.radius, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // Landed grenade body (fading)
    if (this.life > this.maxLife - 30) {
      const gFade = (this.life - (this.maxLife - 30)) / 30;
      ctx.globalAlpha = gFade * 0.8;
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(sx, sy - 3, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#555';
      ctx.fillRect(sx - 2, sy - 11, 4, 4);
    }
    // Smoke puffs
    for (const p of this.puffs) {
      const a = Math.min(1, p.life / 8) * fade * 0.35;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(sx + p.ox, sy + p.oy, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ── Effect (particles) ───────────────────────────────────────
class Effect {
  constructor(x, y, color, count, speed, life) {
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + 1;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - 1,
        life: life + Math.random() * life * 0.5,
        color,
        size: randInt(2, 5)
      });
    }
    this.done = false;
  }
  update() {
    let alive = 0;
    for (const p of this.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
      if (p.life > 0) alive++;
    }
    if (alive === 0) this.done = true;
  }
  render(ctx, cam) {
    for (const p of this.particles) {
      if (p.life <= 0) continue;
      ctx.globalAlpha = Math.min(1, p.life / 10);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - cam.x, p.y - cam.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

// ── FlamePool (fire ninja ground flame) ──────────────────────
class FlamePool {
  constructor(x, y, damage) {
    this.x = x; this.y = y;
    this.w = 28; this.h = 12;
    this.damage = damage;
    this.life = 180;
    this.maxLife = 180;
    this.done = false;
    this.hitTimer = 0;
  }
  update(game) {
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    if (this.hitTimer > 0) this.hitTimer--;
    if (this.hitTimer <= 0) {
      for (const e of game.enemies) {
        if (!e.dead && rectOverlap(this, e)) {
          e.takeDamage(this.damage, game, this.x + this.w / 2);
          e.burnTimer = Math.max(e.burnTimer || 0, 60);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h, '#f80', 4, 2, 8));
          this.hitTimer = 20;
        }
      }
      if (game.boss && !game.boss.dead && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.damage, game, this.x + this.w / 2);
        game.boss.burnTimer = Math.max(game.boss.burnTimer || 0, 60);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h, '#f80', 4, 2, 8));
        this.hitTimer = 20;
      }
    }
  }
  render(ctx, cam) {
    const alpha = Math.min(1, this.life / 30);
    const cx = this.x + this.w / 2 - cam.x;
    const cy = this.y + this.h / 2 - cam.y;
    // Flickering flame glow
    ctx.globalAlpha = alpha * 0.4;
    ctx.fillStyle = '#f80';
    ctx.beginPath();
    ctx.arc(cx, cy - 4, 14 + Math.sin(this.life * 0.3) * 3, 0, Math.PI * 2);
    ctx.fill();
    // Core
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = '#fc3';
    ctx.beginPath();
    ctx.arc(cx, cy - 2, 8 + Math.sin(this.life * 0.5) * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class KanjiEffect {
  constructor(x, y, color, cam) {
    this.sx = x - (cam ? cam.x : 0);
    this.sy = y - (cam ? cam.y : 0);
    this.color = color;
    this.life = 80; this.maxLife = 80; this.done = false;
  }
  update() { this.life--; if (this.life <= 0) this.done = true; }
  render(ctx, cam) {
    const progress = 1 - this.life / this.maxLife;
    const scale = progress < 0.15 ? progress / 0.15 : 1;
    const alpha = this.life < 30 ? this.life / 30 : 1;
    const cx = this.sx;
    const cy = this.sy - progress * 20;

    // Full-screen dark overlay for dramatic contrast
    const overlayAlpha = alpha * 0.4;
    ctx.save();
    ctx.globalAlpha = overlayAlpha;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = alpha;
    const fontSize = Math.floor(60 * scale);
    ctx.font = `bold ${fontSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 25 + 10 * Math.sin(Date.now() * 0.01);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.strokeText('死', cx, cy);
    ctx.fillStyle = this.color;
    ctx.fillText('死', cx, cy);
    // Second pass for extra glow intensity
    ctx.globalAlpha = alpha * 0.5;
    ctx.shadowBlur = 40;
    ctx.fillText('死', cx, cy);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

class TextEffect {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 40; this.done = false;
  }
  update() { this.y -= 1.2; this.life--; if (this.life <= 0) this.done = true; }
  render(ctx, cam) {
    ctx.globalAlpha = Math.min(1, this.life / 15);
    ctx.fillStyle = this.color;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(this.text, this.x - cam.x, this.y - cam.y);
    ctx.globalAlpha = 1;
  }
}

class DamageNumber {
  constructor(x, y, amount, element) {
    this.x = x + (Math.random() - 0.5) * 14;
    this.y = y - 4 + (Math.random() - 0.5) * 6;
    this.amount = Math.round(amount);
    this.text = String(this.amount);
    const elColors = {
      fire: '#f93', ghost: '#c8a', water: '#6af', crystal: '#aef',
      wind: '#bfb', lightning: '#ff8', spiky: '#f86', physical: '#faa',
    };
    this.color = element && elColors[element] ? elColors[element] : '#fff';
    this.baseSize = Math.min(24, 10 + Math.ceil(amount / 4));
    this.life = 40;
    this.maxLife = 40;
    this.vy = -1.8;
    this.done = false;
    this.scale = 1.6;
  }
  update() {
    this.y += this.vy;
    this.vy *= 0.96;
    this.scale = Math.max(1, this.scale - 0.1);
    this.life--;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    const alpha = this.life < 12 ? this.life / 12 : 1;
    const sz = Math.round(this.baseSize * this.scale);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${sz}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText(this.text, this.x - cam.x + 1, this.y - cam.y + 1);
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, this.x - cam.x, this.y - cam.y);
    ctx.restore();
  }
}

// ── x2 Orb Break Check ──────────────────────────────────────
function checkX2OrbBreak(pl, game, ex, ey) {
  if (pl.x2OrbCounter >= 100 && pl.items && pl.items.x2Orb) {
    pl.items.x2Orb = false;
    pl.x2OrbBreaking = 60; // 1-second shatter animation
    // Shatter particles (yellow/gold fragments)
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const speed = 2 + Math.random() * 3;
      game.effects.push(new Effect(
        pl.x + pl.w / 2, pl.y + pl.h / 2,
        i % 2 === 0 ? '#ff0' : '#fa0', 6, 2 + Math.random() * 2, 30
      ));
    }
    game.effects.push(new TextEffect(pl.x + pl.w / 2, pl.y - 20, 'x2 Orb BROKE!', '#f44'));
    // Glass shatter sound
    SFX.play(1200, 'square', 0.06, 0.12, -800);
    SFX.noise(0.15, 0.12);
    SFX.play(800, 'triangle', 0.1, 0.08, -400);
  }
}

// ── Orb (item drop) ──────────────────────────────────────────
class Orb {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    // Size by rarity: T1=common, T2=uncommon, T3=mid, T4=rare
    const tierRadius = { heal: 5, shield: 6, maxhp: 7, shuriken: 7, ultcharge: 7, damage: 8, elDmg: 8, speed: 8, reach: 8, armor: 9, element: 9 };
    this.radius = tierRadius[type] || 5;
    this.w = this.radius * 2; this.h = this.radius * 2;
    this.vy = -3;
    this.life = 480;
    this.done = false;
    this.grounded = false;
    this.vx = 0;
    this.rare = ['damage', 'elDmg', 'speed', 'reach', 'armor', 'element'].includes(type);
    this.tick = 0;
  }
  update(game) {
    if (this.done) return;
    this.life--;
    this.tick++;
    if (this.life <= 0) { this.done = true; return; }
    const _bonusLabel = { shuriken: 'SHURIKEN', ultcharge: 'ULT CHARGE', damage: 'ATTACK', elDmg: 'ELEMENTAL', speed: 'SPEED', reach: 'REACH', armor: 'ARMOR', element: 'SPECIAL' };
    const _bonusColor = { shuriken: '#ccc', ultcharge: '#ff0', damage: '#f80', elDmg: '#c4f', speed: '#0f0', reach: '#fa0', armor: '#88f', element: '#f0f' };

    // Attraction to player if nearby
    const pl = game.player;
    const px = pl.x + pl.w / 2;
    const py = pl.y + pl.h / 2;
    const ox = this.x + this.w / 2;
    const oy = this.y + this.h / 2;
    const dx = px - ox;
    const dy = py - oy;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Collectors: chain strikes, golems, trimerangs, bubbles attract orbs to player
    const magnetRange = pl.items && pl.items.redMagnet ? 240 : 64;
    let attracted = dist < magnetRange;
    if (!attracted) {
      // Chain strikes auto-grab
      if (pl.chainStriking || pl.stormChaining) {
        if (dist < 200) {
          this.done = true;
          SFX.pickup();
          if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(5);
          const _m = (pl.items && pl.items.x2Orb) ? 2 : 1;
          if (_m === 2) { pl.x2OrbCounter++; checkX2OrbBreak(pl, game, ox, oy); }
          switch (this.type) {
            case 'heal': pl.hp = Math.min(pl.hp + 3 * _m, pl.maxHp); game.effects.push(new Effect(ox, oy, '#f44', 6, 2, 10)); break;
            case 'maxhp': pl.maxHp += 1 * _m; pl.hp = Math.min(pl.hp + 1 * _m, pl.maxHp); game.effects.push(new Effect(ox, oy, '#4f4', 8, 3, 12)); break;
            case 'damage': pl.bonusDamage += 1 * _m; game.effects.push(new Effect(ox, oy, '#f80', 8, 3, 12)); break;
            case 'elDmg': pl.bonusElemental += 1 * _m; game.effects.push(new Effect(ox, oy, '#c4f', 8, 3, 12)); break;
            case 'shield': pl.maxShield += 2 * _m; pl.shield = Math.min(pl.shield + 3 * _m, pl.maxShield); game.effects.push(new Effect(ox, oy, '#4af', 8, 3, 12)); break;
            case 'shuriken': pl.maxShurikens += 1 * _m; pl.shurikens = Math.min(pl.shurikens + 1 * _m, pl.maxShurikens); game.effects.push(new Effect(ox, oy, '#ccc', 6, 2, 10)); break;
            case 'speed': pl.bonusSpeed += 1 * _m; game.effects.push(new Effect(ox, oy, '#0f0', 8, 3, 12)); break;
            case 'reach': pl.bonusReach += 1 * _m; game.effects.push(new Effect(ox, oy, '#fa0', 8, 3, 12)); break;
            case 'ultcharge': if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(50 * _m); game.effects.push(new Effect(ox, oy, '#ff0', 8, 3, 12)); break;
            case 'armor': pl.bonusArmor += 1 * _m; game.effects.push(new Effect(ox, oy, '#88f', 8, 3, 12)); break;
            case 'element': pl.bonusMana += 1 * _m; pl.maxMana += 1 * _m; pl.mana = pl.maxMana; game.effects.push(new Effect(ox, oy, '#f0f', 8, 3, 12)); break;
          }
          if (_bonusLabel[this.type]) game.effects.push(new TextEffect(ox, oy - 15, '+' + _bonusLabel[this.type], _bonusColor[this.type]));
          return;
        }
      }
    }

    if (attracted) {
      const attractStrength = 0.7;
      this.vx += (dx / dist) * attractStrength;
      this.vy += (dy / dist) * attractStrength * 0.5;
      const maxSpeed = 6;
      const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
      if (speed > maxSpeed) {
        this.vx = this.vx * maxSpeed / speed;
        this.vy = this.vy * maxSpeed / speed;
      }
      this.x += this.vx;
      this.y += this.vy;
    }

    // Pickup
    if (rectOverlap(this, game.player)) {
      this.done = true;
      SFX.pickup();
      const pl = game.player;
      if (!pl.ultimateReady && !pl.ultimateActive) {
        pl.addUltimateCharge(5);
      }
      const _m = (pl.items && pl.items.x2Orb) ? 2 : 1;
      if (_m === 2) { pl.x2OrbCounter++; checkX2OrbBreak(pl, game, pl.x + pl.w/2, pl.y + pl.h/2); }
      switch (this.type) {
        case 'heal':
          pl.hp = Math.min(pl.hp + 3 * _m, pl.maxHp);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f44', 6, 2, 10));
          break;
        case 'maxhp':
          pl.maxHp += 1 * _m;
          pl.hp = Math.min(pl.hp + 1 * _m, pl.maxHp);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#4f4', 8, 3, 12));
          break;
        case 'damage':
          pl.bonusDamage += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f80', 8, 3, 12));
          break;
        case 'elDmg':
          pl.bonusElemental += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#c4f', 8, 3, 12));
          break;
        case 'shield':
          pl.maxShield += 2 * _m;
          pl.shield = Math.min(pl.shield + 3 * _m, pl.maxShield);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#4af', 8, 3, 12));
          break;
        case 'shuriken':
          pl.maxShurikens += 1 * _m;
          pl.shurikens = Math.min(pl.shurikens + 1 * _m, pl.maxShurikens);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#ccc', 6, 2, 10));
          break;
        case 'speed':
          pl.bonusSpeed += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#0f0', 8, 3, 12));
          break;
        case 'reach':
          pl.bonusReach += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#fa0', 8, 3, 12));
          break;
        case 'ultcharge':
          if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(50 * _m);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#ff0', 8, 3, 12));
          break;
        case 'armor':
          pl.bonusArmor += 1 * _m;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#88f', 8, 3, 12));
          break;
        case 'element':
          pl.bonusMana += 1 * _m;
          pl.maxMana += 1 * _m;
          pl.mana = pl.maxMana;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f0f', 8, 3, 12));
          break;
      }
      if (_bonusLabel[this.type]) game.effects.push(new TextEffect(pl.x + pl.w/2, pl.y - 10, '+' + _bonusLabel[this.type], _bonusColor[this.type]));
    }

    // Collector pickups: golems, trimerangs, bubbles grab orbs for the player
    if (!this.done) {
      let collected = false;
      let cx = ox, cy = oy;
      // Trimerangs (wind)
      if (!collected && pl.ninjaType === 'wind' && game.trimerangs) {
        for (const t of game.trimerangs) {
          if (t.done) continue;
          const td = Math.sqrt((t.x - ox) ** 2 + (t.y - oy) ** 2);
          if (td < t.radius + 8) { collected = true; cx = t.x; cy = t.y; break; }
        }
      }
      // Bubbles (bubble)
      if (!collected && pl.ninjaType === 'bubble') {
        for (const b of game.bubbles) {
          if (b.done) continue;
          if (rectOverlap(this, b)) { collected = true; cx = b.x + b.w / 2; cy = b.y + b.h / 2; break; }
        }
      }
      if (collected) {
        this.done = true;
        SFX.pickup();
        if (!pl.ultimateReady && !pl.ultimateActive) {
          pl.addUltimateCharge(5);
        }
        switch (this.type) {
          case 'heal':
            pl.hp = Math.min(pl.hp + 3, pl.maxHp);
            game.effects.push(new Effect(cx, cy, '#f44', 6, 2, 10));
            break;
          case 'maxhp':
            pl.maxHp += 1;
            pl.hp = Math.min(pl.hp + 1, pl.maxHp);
            game.effects.push(new Effect(cx, cy, '#4f4', 8, 3, 12));
            break;
          case 'damage':
            pl.bonusDamage += 1;
            game.effects.push(new Effect(cx, cy, '#f80', 8, 3, 12));
            break;
          case 'elDmg':
            pl.bonusElemental += 1;
            game.effects.push(new Effect(cx, cy, '#c4f', 8, 3, 12));
            break;
          case 'shield':
            pl.maxShield += 2;
            pl.shield = Math.min(pl.shield + 3, pl.maxShield);
            game.effects.push(new Effect(cx, cy, '#4af', 8, 3, 12));
            break;
          case 'shuriken':
            pl.maxShurikens += 1;
            pl.shurikens = Math.min(pl.shurikens + 1, pl.maxShurikens);
            game.effects.push(new Effect(cx, cy, '#ccc', 6, 2, 10));
            break;
          case 'speed':
            pl.bonusSpeed += 1;
            game.effects.push(new Effect(cx, cy, '#0f0', 8, 3, 12));
            break;
          case 'reach':
            pl.bonusReach += 1;
            game.effects.push(new Effect(cx, cy, '#fa0', 8, 3, 12));
            break;
          case 'ultcharge':
            if (!pl.ultimateReady && !pl.ultimateActive) pl.addUltimateCharge(50);
            game.effects.push(new Effect(cx, cy, '#ff0', 8, 3, 12));
            break;
          case 'armor':
            pl.bonusArmor += 1;
            game.effects.push(new Effect(cx, cy, '#88f', 8, 3, 12));
            break;
          case 'element':
            pl.bonusMana += 1;
            pl.maxMana += 1;
            pl.mana = pl.maxMana;
            game.effects.push(new Effect(cx, cy, '#f0f', 8, 3, 12));
            break;
        }
        if (_bonusLabel[this.type]) game.effects.push(new TextEffect(cx, cy - 15, '+' + _bonusLabel[this.type], _bonusColor[this.type]));
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const flash = this.life < 90 && Math.floor(this.life / 6) % 2;
    if (flash) return;
    const colors = { heal: '#f44', maxhp: '#4f4', damage: '#f80', elDmg: '#c4f', shield: '#4af', shuriken: '#ccc', speed: '#0f0', reach: '#fa0', ultcharge: '#ff0', armor: '#88f', element: '#f0f' };
    const r = this.radius;
    const cx = sx + r;
    const cy = sy + r;
    // Rainbow color for element orb
    const orbColor = this.type === 'element' ? 'hsl(' + (this.tick * 3 % 360) + ',100%,60%)' : colors[this.type];
    // Rare orb: pulsing outer glow + rotating sparkles
    if (this.rare) {
      const pulse = 1 + 0.2 * Math.sin(this.tick * 0.1);
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = orbColor;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 2.2 * pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 4; i++) {
        const angle = this.tick * 0.05 + i * Math.PI / 2;
        const spx = cx + Math.cos(angle) * r * 1.8;
        const spy = cy + Math.sin(angle) * r * 1.8;
        ctx.beginPath();
        ctx.arc(spx, spy, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = orbColor;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(cx, cy, r + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    const fontSize = Math.max(8, r * 1.4) | 0;
    ctx.font = 'bold ' + fontSize + 'px monospace';
    const icons = { heal: '♥', maxhp: '+', damage: '!', elDmg: '✷', shield: '◆', shuriken: '✦', speed: '»', reach: '↔', ultcharge: '★', armor: '■', element: '◈' };
    ctx.fillText(icons[this.type], cx - fontSize * 0.35, cy + fontSize * 0.35);
  }
}

// ── BossItem (boss drop pickup) ──────────────────────────────
class BossItem {
  constructor(x, y, itemId) {
    this.x = x; this.y = y;
    this.w = 16; this.h = 16;
    this.vy = -4;
    this.vx = 0;
    this.itemId = itemId;
    this.def = BOSS_ITEMS[itemId];
    this.life = 9999; // doesn't expire
    this.done = false;
    this.grounded = false;
    this.bobTimer = 0;
  }
  update(game) {
    if (this.done) return;
    this.bobTimer++;
    // Gravity until grounded
    if (!this.grounded) {
      this.vy += 0.3;
      this.y += this.vy;
      this.x += this.vx;
      for (const p of game.platforms) {
        if (this.vy > 0 && this.y + this.h > p.y && this.y + this.h - this.vy <= p.y &&
            this.x + this.w > p.x && this.x < p.x + p.w) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
          break;
        }
      }
    }
    // Attraction to player
    const pl = game.player;
    const px = pl.x + pl.w / 2, py = pl.y + pl.h / 2;
    const ox = this.x + this.w / 2, oy = this.y + this.h / 2;
    const dx = px - ox, dy = py - oy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 80) {
      const s = 1.2;
      this.x += (dx / dist) * s;
      this.y += (dy / dist) * s;
    }
    // Pickup
    if (rectOverlap(this, pl)) {
      this.done = true;
      SFX.victory();
      triggerHitstop(8);
      pl.items[this.itemId] = true;
      if (this.itemId === 'deathsKey') pl.deathsKeyUsed = false;
      // A Friend's Letter: if RONIN boss is active, make it friendly (fade handled in boss update)
      if (this.itemId === 'friendsLetter' && game.boss && !game.boss.dead && game.boss.bossType === 'deflector') {
        game.boss.friendly = true;
        game.boss.friendlyFade = 120;
        game.boss.vx = 0;
        game.effects.push(new TextEffect(game.boss.x + game.boss.w / 2, game.boss.y - 20, 'FRIEND!', '#fda'));
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#fda', 25, 6, 25));
        recordBestiaryKill(game.boss.bossType, false, true);
      }
      game.itemPickupOverlay = { itemId: this.itemId, timer: 180 };
      game.effects.push(new Effect(ox, oy, this.def.color, 20, 5, 25));
      game.effects.push(new Effect(ox, oy, '#fff', 12, 3, 20));
      // Record vault discovery
      recordItemFound(this.itemId);
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y + Math.sin(this.bobTimer * 0.06) * 4;
    const cx = sx + this.w / 2, cy = sy + this.h / 2;
    // Outer glow ring
    const glowA = 0.25 + Math.sin(this.bobTimer * 0.08) * 0.15;
    ctx.globalAlpha = glowA;
    const rGrad = ctx.createRadialGradient(cx, cy, 4, cx, cy, 22);
    rGrad.addColorStop(0, this.def.color);
    rGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = rGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI * 2);
    ctx.fill();
    // Rotating sparkle rays
    ctx.globalAlpha = glowA * 0.6;
    ctx.strokeStyle = this.def.color;
    ctx.lineWidth = 1;
    const angle = this.bobTimer * 0.04;
    for (let i = 0; i < 4; i++) {
      const a = angle + i * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * 10, cy + Math.sin(a) * 10);
      ctx.lineTo(cx + Math.cos(a) * 18, cy + Math.sin(a) * 18);
      ctx.stroke();
    }
    // Box with gradient
    ctx.globalAlpha = 1;
    const bGrad = ctx.createLinearGradient(sx, sy, sx, sy + this.h);
    bGrad.addColorStop(0, '#333');
    bGrad.addColorStop(1, '#111');
    ctx.fillStyle = bGrad;
    ctx.fillRect(sx, sy, this.w, this.h);
    ctx.strokeStyle = this.def.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, this.w, this.h);
    // Icon
    ctx.shadowColor = this.def.color;
    ctx.shadowBlur = 6;
    drawItemIcon(ctx, this.itemId, cx, cy, this.w * 0.8, this.def.color);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

// ── SlamRing (ground slam shockwave) ─────────────────────────
class SlamRing {
  constructor(x, y, color, accentColor) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.accentColor = accentColor;
    this.radius = 8;
    this.maxRadius = 100;
    this.life = 20;
    this.maxLife = 20;
    this.done = false;
  }
  update() {
    this.life--;
    this.radius += (this.maxRadius - 8) / this.maxLife;
    if (this.life <= 0) this.done = true;
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const alpha = this.life / this.maxLife;
    // Outer ring
    ctx.save();
    ctx.globalAlpha = alpha * 0.6;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.radius, this.radius * 0.35, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Inner ring
    ctx.globalAlpha = alpha * 0.4;
    ctx.strokeStyle = this.accentColor;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(sx, sy, this.radius * 0.7, this.radius * 0.25, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ── EarthCrater (persistent damaging ground crater from earth slam) ──
class EarthCrater {
  constructor(x, y, damage, game) {
    this.x = x;
    this.y = y;
    this.damage = damage;
    this.game = game;
    this.radius = 60;
    this.life = 180;
    this.maxLife = 180;
    this.done = false;
    this.hitTimer = 0;
    // Pre-generate random rock chunks jutting out of the ground
    this.rocks = [];
    for (let i = 0; i < 7; i++) {
      const spread = (i / 6 - 0.5) * 2; // -1 to 1 across the width
      const rx = spread * this.radius * (0.6 + Math.random() * 0.4);
      const rw = 6 + Math.random() * 10;
      const rh = 10 + Math.random() * 18;
      const tilt = (Math.random() - 0.5) * 0.4;
      const shade = Math.floor(Math.random() * 3); // 0=dark, 1=mid, 2=light
      this.rocks.push({ rx, rw, rh, tilt, shade });
    }
  }
  update() {
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    if (this.hitTimer > 0) this.hitTimer--;
    if (this.hitTimer <= 0) {
      const game = this.game;
      const cx = this.x, cy = this.y;
      const r = this.radius;
      for (const e of game.enemies) {
        if (e.dead) continue;
        const dx = (e.x + e.w / 2) - cx;
        const dy = (e.y + e.h) - cy;
        if (dx * dx + dy * dy < r * r && Math.abs(dy) < 24) {
          e.takeDamage(this.damage, game, cx, 'physical');
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h, '#a87', 4, 2, 6));
          this.hitTimer = 30;
          break;
        }
      }
      if (this.hitTimer <= 0 && game.boss && !game.boss.dead) {
        const dx = (game.boss.x + game.boss.w / 2) - cx;
        const dy = (game.boss.y + game.boss.h) - cy;
        if (dx * dx + dy * dy < r * r && Math.abs(dy) < 24) {
          game.boss.takeDamage(this.damage, game, cx, 'physical');
          game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h, '#a87', 4, 2, 6));
          this.hitTimer = 30;
        }
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const alpha = Math.min(1, this.life / 30);
    const colors = ['#5a3a1a', '#8b5e3c', '#c8a878'];
    ctx.save();
    ctx.globalAlpha = alpha;
    // Draw each rock chunk jutting upward from the ground
    for (const rock of this.rocks) {
      const bx = sx + rock.rx;
      const by = sy;
      ctx.save();
      ctx.translate(bx, by);
      ctx.rotate(rock.tilt);
      // Rock body — irregular polygon pointing up
      ctx.fillStyle = colors[rock.shade];
      ctx.beginPath();
      ctx.moveTo(-rock.rw / 2, 0);
      ctx.lineTo(-rock.rw * 0.3, -rock.rh);
      ctx.lineTo(rock.rw * 0.2, -rock.rh * 0.85);
      ctx.lineTo(rock.rw / 2, 0);
      ctx.closePath();
      ctx.fill();
      // Highlight edge
      ctx.strokeStyle = '#e8d0b0';
      ctx.lineWidth = 1;
      ctx.globalAlpha = alpha * 0.5;
      ctx.beginPath();
      ctx.moveTo(-rock.rw * 0.3, -rock.rh);
      ctx.lineTo(rock.rw * 0.2, -rock.rh * 0.85);
      ctx.stroke();
      // Dark edge
      ctx.strokeStyle = '#3a2210';
      ctx.globalAlpha = alpha * 0.6;
      ctx.beginPath();
      ctx.moveTo(-rock.rw / 2, 0);
      ctx.lineTo(-rock.rw * 0.3, -rock.rh);
      ctx.stroke();
      ctx.globalAlpha = alpha;
      ctx.restore();
    }
    // Dust/debris at base
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = '#a08060';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 2, this.radius * 0.7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ── SpinningScythe (orbiting scythe during shadow chain strike) ──
class SpinningScythe {
  constructor(owner, isUlt, game) {
    this.owner = owner;
    this.game = game;
    this.sc = isUlt ? 1.5 : 1.2;
    this.damage = owner.type.attackDamage + owner.bonusElemental;
    // World position — starts offset from owner
    const angle = Math.random() * Math.PI * 2;
    this.x = owner.x + owner.w / 2 + Math.cos(angle) * 60;
    this.y = owner.y + owner.h / 2 + Math.sin(angle) * 40;
    // Hitbox size for collision
    this.w = 48 * this.sc;
    this.h = 48 * this.sc;
    // Drift velocity — wanders on its own
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 1.5;
    this.driftTimer = 0;
    this.spinAngle = 0;
    this.spinSpeed = 0.3;
    this.done = false;
    this.fadeAlpha = 1;
    this.life = 180; // minimum 3 seconds at 60fps
    this.chaining = true; // extends life while true
    this.returning = false;
    this.returnTimer = 0;
    this.hitCooldowns = new Map(); // target -> frames until can hit again
  }
  recall() {
    this.chaining = false;
    // Don't start fading until minimum life expires
  }
  update() {
    // While chaining, reset life to at least 180 so it persists
    if (this.chaining) {
      this.life = Math.max(this.life, 180);
    } else {
      this.life--;
    }
    // Start return fade in last 25 frames
    if (!this.chaining && this.life <= 25) {
      this.returning = true;
      this.returnTimer = this.life;
      this.fadeAlpha = Math.max(0, this.life / 25);
      this.spinSpeed = 0.45;
    }
    if (this.life <= 0) { this.done = true; return; }

    // Wander — change drift direction periodically
    this.driftTimer--;
    if (this.driftTimer <= 0) {
      this.driftTimer = 30 + Math.random() * 40;
      this.vx = (Math.random() - 0.5) * 3;
      this.vy = (Math.random() - 0.5) * 2;
    }
    this.x += this.vx;
    this.y += this.vy;

    // Soft leash — gently pulled toward owner if too far
    const ox = this.owner.x + this.owner.w / 2;
    const oy = this.owner.y + this.owner.h / 2;
    const dx = ox - this.x, dy = oy - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const leashDist = this.chaining ? 120 : 80;
    if (dist > leashDist) {
      const pull = 0.03 * (dist - leashDist) / dist;
      this.vx += dx * pull;
      this.vy += dy * pull;
    }
    // Dampen velocity
    this.vx *= 0.97;
    this.vy *= 0.97;

    // Bob up and down slowly
    this.y += Math.sin(Date.now() * 0.004) * 0.3;

    this.spinAngle += this.spinSpeed;

    // Hit detection — damage enemies and boss
    // Hitbox centered on scythe position
    const hb = { x: this.x - this.w / 2, y: this.y - this.h / 2, w: this.w, h: this.h };
    // Tick down cooldowns
    for (const [target, cd] of this.hitCooldowns) {
      if (cd <= 1) this.hitCooldowns.delete(target);
      else this.hitCooldowns.set(target, cd - 1);
    }
    const game = this.game;
    if (game) {
      for (const e of game.enemies) {
        if (!e.dead && !this.hitCooldowns.has(e) && rectOverlap(hb, e)) {
          e.takeDamage(this.damage, game, this.x);
          this.hitCooldowns.set(e, 20);
          game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a4e', 8, 3, 10));
          triggerHitstop(2);
        }
      }
      if (game.boss && !game.boss.dead && !this.hitCooldowns.has(game.boss) && rectOverlap(hb, game.boss)) {
        game.boss.takeDamage(this.damage, game, this.x);
        this.hitCooldowns.set(game.boss, 20);
        game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#a4e', 10, 4, 12));
        triggerHitstop(2);
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const px = this.x - cam.x;
    const py = this.y - cam.y;
    const sc = this.sc;
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.008);
    ctx.save();
    ctx.globalAlpha = 0.9 * this.fadeAlpha;
    ctx.translate(px, py);
    ctx.rotate(this.spinAngle);
    // Purple spin trail
    ctx.globalAlpha = 0.12 * this.fadeAlpha;
    ctx.fillStyle = '#a040ff';
    ctx.shadowColor = '#c060ff';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(0, 0, 30 * sc, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 0.9 * this.fadeAlpha;
    // Handle
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.moveTo(-20 * sc, -2);
    ctx.lineTo(20 * sc, -1);
    ctx.lineTo(20 * sc, 1);
    ctx.lineTo(-20 * sc, 2);
    ctx.closePath();
    ctx.fill();
    // Grip wraps
    ctx.fillStyle = '#6a2a8a';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-14 + i * 9, -2.5, 4, 5);
    }
    // Blade 1
    ctx.fillStyle = '#ddd';
    ctx.shadowColor = '#a040ff';
    ctx.shadowBlur = 14 * pulse;
    ctx.beginPath();
    ctx.moveTo(18 * sc, -2);
    ctx.bezierCurveTo(28 * sc, -10 * sc, 32 * sc, -24 * sc, 20 * sc, -36 * sc);
    ctx.bezierCurveTo(16 * sc, -22 * sc, 18 * sc, -11 * sc, 18 * sc, -2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(160,64,255,0.35)';
    ctx.fill();
    // Blade 2 (opposite)
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.moveTo(-18 * sc, 2);
    ctx.bezierCurveTo(-28 * sc, 10 * sc, -32 * sc, 24 * sc, -20 * sc, 36 * sc);
    ctx.bezierCurveTo(-16 * sc, 22 * sc, -18 * sc, 11 * sc, -18 * sc, 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(160,64,255,0.35)';
    ctx.fill();
    // Edge glow
    ctx.strokeStyle = '#c080ff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(18 * sc, -2);
    ctx.bezierCurveTo(28 * sc, -10 * sc, 32 * sc, -24 * sc, 20 * sc, -36 * sc);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-18 * sc, 2);
    ctx.bezierCurveTo(-28 * sc, 10 * sc, -32 * sc, 24 * sc, -20 * sc, 36 * sc);
    ctx.stroke();
    ctx.shadowBlur = 0;
    // Center gem
    ctx.fillStyle = '#c060ff';
    ctx.shadowColor = '#e080ff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(0, 0, 3.5 * sc, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// === js/entities.js ===
// ── Platform ─────────────────────────────────────────────────
class Platform {
  constructor(x, y, w, h, color) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.color = color || '#666';
    this.thin = false;
  }
  render(ctx, cam) {
    ctx.fillStyle = this.color;
    if (this.thin) {
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 4);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      for (let dx = 0; dx < this.w; dx += 12) {
        ctx.fillRect(this.x - cam.x + dx, this.y - cam.y, 6, 2);
      }
    } else {
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, this.h);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 3);
    }
  }
}

// ── Spike (environmental hazard) ─────────────────────────────
class Spike {
  constructor(x, y, w) {
    this.x = x; this.y = y;
    this.w = w; this.h = 12;
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    ctx.fillStyle = '#c33';
    const spikeW = 12;
    for (let dx = 0; dx < this.w; dx += spikeW) {
      ctx.beginPath();
      ctx.moveTo(sx + dx, sy + this.h);
      ctx.lineTo(sx + dx + spikeW / 2, sy);
      ctx.lineTo(sx + dx + spikeW, sy + this.h);
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillStyle = '#f66';
    for (let dx = 0; dx < this.w; dx += spikeW) {
      ctx.fillRect(sx + dx + spikeW / 2 - 1, sy, 2, 3);
    }
  }
}

// === js/stone.js ===
// ── Earth Constructs (Earth ninja ability) ───────────────────

// ── EarthWall — trapezoid wall, blocks projectiles, can be punched to launch ──
class EarthWall {
  constructor(x, y, wave) {
    this.w = TILE; this.h = TILE * 3;
    this.x = x; this.y = y;
    this.wave = wave;
    this.hp = 6; this.maxHp = 6;
    this.vx = 0; this.vy = 0;
    this.grounded = false;
    this.done = false;
    this.launched = false;
    this.damageCd = 0;
    this.hitSet = new Set();
    this.topW = TILE * 0.7;
    this.botW = TILE * 1.4;
    this.launchDmg = 5 * wave;
  }
  isCollidable() { return !this.launched; }
  takeDamage(amt) { if (this.damageCd <= 0) { this.hp -= amt; this.damageCd = 20; } }
  launch(facing) {
    this.vx = facing * 9;
    this.vy = -1;
    this.launched = true;
  }
  update(game) {
