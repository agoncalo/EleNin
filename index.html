<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EleNin – Elemental Ninja Platformer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
canvas { border: 2px solid #333; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; }
</style>
</head>
<body>
<div id="top-ui" style="width:100vw;display:flex;justify-content:center;align-items:center;flex-direction:column;position:absolute;top:0;left:0;z-index:10;pointer-events:none;">
  <div id="title-controls" style="width:960px;max-width:100vw;display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
    <span id="elenin-title" style="font-family:monospace;font-weight:bold;font-size:1.5em;color:#fff;letter-spacing:2px;">EleNin</span>
    <span id="controls-hint" style="font-family:monospace;font-size:1em;color:#ccc;">WASD/Arrows=Move  Z/J=Attack  X/K=Special  V=Ultimate  C/L=Shuriken  1-6=Switch</span>
  </div>
  <div id="shuriken-bar" style="margin:0 auto;display:flex;justify-content:center;align-items:center;height:28px;"></div>
</div>
<canvas id="game"></canvas>

<!-- Module scripts in dependency order -->
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/effects.js"></script>
<script src="js/entities.js"></script>
<script src="js/stone.js"></script>
<script src="js/bubble.js"></script>
<script src="js/projectile.js"></script>
<script src="js/player.js"></script>
<script src="js/enemy.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
</body>
</html>
