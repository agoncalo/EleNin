<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EleNin – Elemental Ninja Platformer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
canvas { border: 2px solid #333; image-rendering: pixelated; max-width: 100vw; max-height: 100vh; object-fit: contain; }
</style>

<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  Trimerang (Wind Ninja special)
// ============================================================
class Trimerang {
  constructor(x, y, vx, vy, owner) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.owner = owner;
    this.radius = 18;
    this.angle = 0;
    this.spin = 0.22 + Math.random() * 0.08;
    this.life = 9999;
    this.done = false;
    this.hitSet = new Set();
    this.turnSpeed = 0.012 + Math.random() * 0.008;
    this.turnDir = Math.random() < 0.5 ? 1 : -1;
    // (Wind trail logic moved to update method)
  }
  update(game) {
    // WindPower full: add wind trail effect to enemies (update every frame)
    // Only show wind tail if enemy is facing the player
    if (game.player && game.player.ninjaType === 'wind' && game.player.windPower >= 10) {
      const px = game.player.x + game.player.w / 2;
      const cx = this.x + this.w / 2;
      this.facingPlayer = (this.facing > 0 && px > cx) || (this.facing < 0 && px < cx);
      if (this.facingPlayer) {
        if (!this.windTrails) this.windTrails = [];
        // Place tail behind enemy (opposite facing)
        const tailX = this.facing > 0 ? this.x - 10 : this.x + this.w + 10;
        const tailY = this.y + this.h/2;
        this.windTrails.push({
          x: tailX,
          y: tailY,
          facing: this.facing,
          w: this.w,
          h: this.h,
          life: 22
        });
        if (this.windTrails.length > 12) this.windTrails.shift();
      } else {
        this.windTrails = [];
      }
    } else {
      this.facingPlayer = false;
      this.windTrails = [];
    }
    // Slow turning
    let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    const angleVel = Math.atan2(this.vy, this.vx);
    const newAngle = angleVel + this.turnDir * this.turnSpeed;
    // Air drag: slow down gradually
    speed *= 0.985;
    // Always accelerate toward player
    const pl = game.player;
    const dx = (pl.x + pl.w/2) - this.x;
    const dy = (pl.y + pl.h/2) - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const accel = Math.min(0.18, dist / 900);
    const ax = (dx / dist) * accel;
    const ay = (dy / dist) * accel;
    this.vx += ax;
    this.vy += ay;
    // Cap speed
    const maxSpeed = 10;
    const newSpd = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (newSpd > maxSpeed) {
      this.vx *= maxSpeed / newSpd;
      this.vy *= maxSpeed / newSpd;
    }
    speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    this.x += this.vx;
    this.y += this.vy;
    this.angle += this.spin;
    this.life--;
    // Damage enemies
    for (const e of game.enemies) {
      if (!e.dead && !this.hitSet.has(e) && Math.hypot((e.x + e.w/2) - this.x, (e.y + e.h/2) - this.y) < this.radius + Math.max(e.w, e.h)/2) {
        e.takeDamage(3 + game.player.windPower, game, this.x);
        this.hitSet.add(e);
        game.effects.push(new Effect(this.x, this.y, '#bfb', 8, 3, 10));
      }
    }
    // Damage boss
    if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && Math.hypot((game.boss.x + game.boss.w/2) - this.x, (game.boss.y + game.boss.h/2) - this.y) < this.radius + Math.max(game.boss.w, game.boss.h)/2) {
      game.boss.takeDamage(3 + game.player.windPower, game, this.x);
      this.hitSet.add(game.boss);
      game.effects.push(new Effect(this.x, this.y, '#bfb', 10, 4, 12));
    }
    // If player touches it, end
    if (Math.hypot((pl.x + pl.w/2) - this.x, (pl.y + pl.h/2) - this.y) < this.radius + Math.max(pl.w, pl.h)/2) {
      this.done = true;
      game.effects.push(new Effect(this.x, this.y, '#fff', 12, 4, 16));
    }
    // If destroyed by other means, push effect once
    if (!this._destroyEffect && this.done) {
      game.effects.push(new Effect(this.x, this.y, '#bff', 14, 4, 18));
      this._destroyEffect = true;
    }
    // Never despawn for out of bounds
  }
  render(ctx, cam) {
    ctx.save();
    ctx.translate(this.x - cam.x, this.y - cam.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = 0.92;
    // Draw spinning trimerang (triangle with 3 arms)
    ctx.beginPath();
    let a = 0;
    ctx.moveTo(Math.cos(a) * this.radius, Math.sin(a) * this.radius);
    for (let i = 1; i <= 3; i++) {
      a = (i * Math.PI * 2) / 3;
      ctx.lineTo(Math.cos(a) * this.radius, Math.sin(a) * this.radius);
    }
    ctx.closePath();
    ctx.fillStyle = '#bfb';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}
//  EleNin – Single-file HTML5 Elemental Ninja Platformer
//  No external libraries. Pure Canvas + JS.
// ============================================================

// ── Constants ────────────────────────────────────────────────
const CANVAS_W = 960;
const CANVAS_H = 540;
const TILE = 32;
const GRAVITY = 0.55;
const MAX_FALL = 12;
const FIXED_DT = 1000 / 60; // 60 fps timestep

// Hitstop
let hitstopFrames = 0;
function triggerHitstop(frames) { hitstopFrames = Math.max(hitstopFrames, frames); }

// ── Sound System (Web Audio API) ─────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function ensureAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }
document.addEventListener('keydown', ensureAudio, { once: true });
document.addEventListener('click', ensureAudio, { once: true });

const SFX = {
  play(freq, type, duration, vol = 0.15, slide = 0) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.linearRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + duration);
  },
  noise(duration, vol = 0.08) {
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    src.connect(g); g.connect(audioCtx.destination);
    src.start(); src.stop(audioCtx.currentTime + duration);
  },
  attack() { this.play(320, 'square', 0.08, 0.1, 200); },
  hit() { this.play(200, 'square', 0.1, 0.12, -100); this.noise(0.1, 0.1); },
  enemyDie() { this.play(400, 'square', 0.12, 0.1, -300); this.noise(0.1, 0.08); },
  playerHurt() { this.play(150, 'sawtooth', 0.2, 0.12, -80); },
  jump() { this.play(260, 'square', 0.1, 0.06, 180); },
  special() { this.play(500, 'triangle', 0.15, 0.1, 200); },
  parry() { this.play(800, 'square', 0.06, 0.12); this.play(1200, 'square', 0.08, 0.08); },
  parryFail() { this.play(200, 'triangle', 0.1, 0.06, -50); },
  shuriken() { this.play(600, 'triangle', 0.08, 0.06, 300); },
  bossDie() { this.play(300, 'sawtooth', 0.3, 0.15, -250); this.noise(0.3, 0.12); this.play(150, 'square', 0.4, 0.1, -100); },
  bossSpawn() { this.play(100, 'sawtooth', 0.3, 0.12, 100); this.play(200, 'square', 0.4, 0.08, 50); },
  wave() { this.play(440, 'triangle', 0.15, 0.1); setTimeout(() => this.play(660, 'triangle', 0.15, 0.1), 120); setTimeout(() => this.play(880, 'triangle', 0.2, 0.1), 240); },
  armor() { this.play(600, 'triangle', 0.1, 0.1); this.play(900, 'triangle', 0.15, 0.08); },
  chain() { this.play(700, 'square', 0.05, 0.08, 200); },
  slam() { this.play(80, 'sawtooth', 0.2, 0.15, -40); this.noise(0.15, 0.1); },
  pickup() { this.play(520, 'triangle', 0.08, 0.1); setTimeout(() => this.play(780, 'triangle', 0.1, 0.1), 80); },
  reflect() { this.play(1000, 'square', 0.06, 0.1, -400); },
  miss() { this.play(180, 'triangle', 0.12, 0.06, -60); },
  backstab() { this.play(300, 'sawtooth', 0.05, 0.1); this.play(600, 'square', 0.1, 0.12, 200); },
  victory() { [440,550,660,880].forEach((f,i) => setTimeout(() => this.play(f, 'triangle', 0.25, 0.12), i * 150)); },
};

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// ── Input ────────────────────────────────────────────────────
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
function consumePress(code) { if (justPressed[code]) { justPressed[code] = false; return true; } return false; }

// ── Mouse input ──────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  ensureAudio();
  if (e.button === 0) { justPressed['MouseAttack'] = true; keys['MouseAttack'] = true; }
  if (e.button === 2) { justPressed['MouseSpecial'] = true; keys['MouseSpecial'] = true; }
  if (e.button === 1) { justPressed['MouseShuriken'] = true; keys['MouseShuriken'] = true; }
});
canvas.addEventListener('mouseup', e => {
  if (e.button === 0) keys['MouseAttack'] = false;
  if (e.button === 2) keys['MouseSpecial'] = false;
  if (e.button === 1) keys['MouseShuriken'] = false;
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Mouse wheel for ninja switching
let mouseWheelNinja = 0;
const NINJA_ORDER = ['fire','earth','bubble','shadow','crystal','wind'];
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY > 0) mouseWheelNinja = (mouseWheelNinja + 1) % 6;
  else mouseWheelNinja = (mouseWheelNinja + 5) % 6;
  justPressed['WheelSwitch'] = true;
}, { passive: false });

// ── Touch input ──────────────────────────────────────────────
const touchState = { left: false, right: false, up: false, down: false, attack: false, special: false, shuriken: false };
const touchJust = { attack: false, special: false, shuriken: false, up: false };
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function getTouchZone(tx, ty) {
  // Map touch coords to canvas coords
  const rect = canvas.getBoundingClientRect();
  const x = (tx - rect.left) / rect.width * CANVAS_W;
  const y = (ty - rect.top) / rect.height * CANVAS_H;
  // Left side: D-pad (bottom-left quadrant)
  if (x < CANVAS_W * 0.35 && y > CANVAS_H * 0.5) {
    const cx = CANVAS_W * 0.15, cy = CANVAS_H * 0.78;
    const dx = x - cx, dy = y - cy;
    if (Math.abs(dx) > Math.abs(dy)) return dx < 0 ? 'left' : 'right';
    return dy < 0 ? 'up' : 'down';
  }
  // Right side: action buttons
  if (x > CANVAS_W * 0.65 && y > CANVAS_H * 0.5) {
    if (y < CANVAS_H * 0.68) return 'shuriken';
    if (x < CANVAS_W * 0.82) return 'attack';
    return 'special';
  }
  return null;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  for (const t of e.changedTouches) {
    const zone = getTouchZone(t.clientX, t.clientY);
    if (zone) {
      touchState[zone] = true;
      if (zone === 'attack' || zone === 'special' || zone === 'shuriken' || zone === 'up') touchJust[zone] = true;
    }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  // Reset all touches and re-scan remaining
  touchState.left = false; touchState.right = false; touchState.up = false; touchState.down = false;
  touchState.attack = false; touchState.special = false; touchState.shuriken = false;
  for (const t of e.touches) {
    const zone = getTouchZone(t.clientX, t.clientY);
    if (zone) touchState[zone] = true;
  }
}, { passive: false });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ── Gamepad support ──────────────────────────────────────────
const gpState = { axes: [0,0,0,0], buttons: new Array(17).fill(false) };
const gpJust = new Array(17).fill(false);
const gpPrev = new Array(17).fill(false);

function pollGamepad() {
  const gp = navigator.getGamepads ? navigator.getGamepads()[0] : null;
  if (!gp) return;
  ensureAudio();
  gpState.axes[0] = gp.axes[0] || 0;
  gpState.axes[1] = gp.axes[1] || 0;
  for (let i = 0; i < gp.buttons.length && i < 17; i++) {
    const pressed = gp.buttons[i].pressed;
    gpJust[i] = pressed && !gpPrev[i];
    gpPrev[i] = pressed;
    gpState.buttons[i] = pressed;
  }
}
// Gamepad button map (Standard Gamepad):
// 0=A(South) 1=B(East) 2=X(West) 3=Y(North)
// 4=LB 5=RB 6=LT 7=RT
// 8=Select 9=Start
// 12=DpadUp 13=DpadDown 14=DpadLeft 15=DpadRight
const GP_ATTACK = 0;   // A / Cross
const GP_SPECIAL = 2;  // X / Square
const GP_SHURIKEN = 1; // B / Circle
const GP_JUMP = 3;     // Y / Triangle (also A)
const GP_SLAM = 13;    // Dpad Down
const GP_LB = 4;
const GP_RB = 5;

// ── Utility ──────────────────────────────────────────────────
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// Line of sight: returns true if no blocks/platforms between (x0, y0) and (x1, y1)
function hasLineOfSight(x0, y0, x1, y1, game) {
  // Step along the line and check for collision with platforms or stone blocks
  const steps = Math.ceil(Math.hypot(x1 - x0, y1 - y0) / 8);
  for (let i = 1; i < steps; ++i) {
    const t = i / steps;
    const x = x0 + (x1 - x0) * t;
    const y = y0 + (y1 - y0) * t;
    const probe = { x: x - 4, y: y - 4, w: 8, h: 8 };
    for (const p of game.platforms) {
      if (!p.thin && rectOverlap(probe, p)) return false;
    }
    for (const b of game.stoneBlocks) {
      if (!b.done && rectOverlap(probe, b)) return false;
    }
  }
  return true;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ============================================================
//  Orb (item drop)
// ============================================================
class Orb {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.w = 10; this.h = 10;
    this.vy = -3;
    this.type = type; // 'heal', 'maxhp', 'damage'
    this.life = 480; // 8 seconds
    this.done = false;
    this.grounded = false;
  }
  update(game) {
    if (this.done) return;
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    if (!this.grounded) {
      this.vy += 0.3;
      if (this.vy > 6) this.vy = 6;
      this.y += this.vy;
      for (const p of game.platforms) {
        if (rectOverlap(this, p) && this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h; this.vy = 0; this.grounded = true;
        }
      }
    }
    // Pickup
    if (rectOverlap(this, game.player)) {
      this.done = true;
      SFX.pickup();
      const pl = game.player;
      switch (this.type) {
        case 'heal':
          pl.hp = Math.min(pl.hp + 3, pl.maxHp);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f44', 6, 2, 10));
          break;
        case 'maxhp':
          pl.maxHp += 1;
          pl.hp = Math.min(pl.hp + 1, pl.maxHp);
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#4f4', 8, 3, 12));
          break;
        case 'damage':
          pl.bonusDamage += 1;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#f80', 8, 3, 12));
          break;
        case 'shield':
          pl.maxShield += 3;
          pl.shield = pl.maxShield;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#4af', 8, 3, 12));
          break;
        case 'shuriken':
          pl.shurikens += 3;
          game.effects.push(new Effect(pl.x + pl.w/2, pl.y + pl.h/2, '#ccc', 6, 2, 10));
          break;
      }
    }
  }
  render(ctx, cam) {
    if (this.done) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    const flash = this.life < 90 && Math.floor(this.life / 6) % 2;
    if (flash) return;
    const colors = { heal: '#f44', maxhp: '#4f4', damage: '#f80', shield: '#4af', shuriken: '#ccc' };
    ctx.fillStyle = colors[this.type];
    ctx.beginPath();
    ctx.arc(sx + 5, sy + 5, 5, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(sx + 5, sy + 5, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Icon
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    const icons = { heal: '♥', maxhp: '+', damage: '!', shield: '◆', shuriken: '✦' };
    ctx.fillText(icons[this.type], sx + 1, sy + 9);
  }
}

// ============================================================
//  Effect (particles)
// ============================================================
class Effect {
  constructor(x, y, color, count, speed, life) {
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = Math.random() * speed + 1;
      this.particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - 1,
        life: life + Math.random() * life * 0.5,
        color,
        size: randInt(2, 5)
      });
    }
    this.done = false;
  }
  update() {
    let alive = 0;
    for (const p of this.particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      p.life--;
      if (p.life > 0) alive++;
    }
    if (alive === 0) this.done = true;
  }
  render(ctx, cam) {
    for (const p of this.particles) {
      if (p.life <= 0) continue;
      ctx.globalAlpha = Math.min(1, p.life / 10);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - cam.x, p.y - cam.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }
}

class TextEffect {
  constructor(x, y, text, color) {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 40; this.done = false;
  }
  update() { this.y -= 1.2; this.life--; if (this.life <= 0) this.done = true; }
  render(ctx, cam) {
    ctx.globalAlpha = Math.min(1, this.life / 15);
    ctx.fillStyle = this.color;
    ctx.font = 'bold 14px monospace';
    ctx.fillText(this.text, this.x - cam.x, this.y - cam.y);
    ctx.globalAlpha = 1;
  }
}

// ============================================================
//  Platform
// ============================================================
class Platform {
  constructor(x, y, w, h, color) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.color = color || '#666';
    this.thin = false; // solid by default
  }
  render(ctx, cam) {
    ctx.fillStyle = this.color;
    if (this.thin) {
      // Thin platform: just a thin line with dashes
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 4);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      for (let dx = 0; dx < this.w; dx += 12) {
        ctx.fillRect(this.x - cam.x + dx, this.y - cam.y, 6, 2);
      }
    } else {
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, this.h);
      // 8-bit highlight
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 3);
    }
  }
}

// ============================================================
//  Spike (environmental hazard)
// ============================================================
class Spike {
  constructor(x, y, w) {
    this.x = x; this.y = y;
    this.w = w; this.h = 12;
  }
  render(ctx, cam) {
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    ctx.fillStyle = '#c33';
    const spikeW = 12;
    for (let dx = 0; dx < this.w; dx += spikeW) {
      ctx.beginPath();
      ctx.moveTo(sx + dx, sy + this.h);
      ctx.lineTo(sx + dx + spikeW / 2, sy);
      ctx.lineTo(sx + dx + spikeW, sy + this.h);
      ctx.closePath();
      ctx.fill();
    }
    // Bright tips
    ctx.fillStyle = '#f66';
    for (let dx = 0; dx < this.w; dx += spikeW) {
      ctx.fillRect(sx + dx + spikeW / 2 - 1, sy, 2, 3);
    }
  }
}

// ============================================================
//  Stone Constructs (Earth ninja ability)
// ============================================================
class StoneConstruct {
  constructor(x, y, w, h, hp = 3) {
    this.x = x; this.y = y;
    this.w = w; this.h = h;
    this.hp = hp;
    this.maxHp = hp;
    this.vx = 0; this.vy = 0;
    this.grounded = false;
    this.done = false;
    this.thrown = false;
    this.powered = false;
    this.hitCooldown = 0;
  }
  takeDamage(amt) { if (this.hitCooldown <= 0) { this.hp -= amt; this.hitCooldown = 30; } }
  canBeThrown() { return true; }
  blockProjectiles() { return true; }
  update(game) {
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL) this.vy = MAX_FALL;
    this.x += this.vx;
    this.y += this.vy;
    this.vx *= 0.9;
    this.grounded = false;
    if (this.hitCooldown > 0) this.hitCooldown--;
    // Collide with platforms
    for (const p of game.platforms) {
      if (rectOverlap(this, p)) {
        if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
          if (Math.abs(this.vx) < 0.5) this.thrown = false;
        }
      }
    }
    // Collide with other constructs
    for (const other of game.stoneBlocks) {
      if (other === this || other.done) continue;
      if (rectOverlap(this, other)) {
        if (this.vy > 0 && this.y + this.h - this.vy <= other.y + 4) {
          this.y = other.y - this.h;
          this.vy = 0;
          this.grounded = true;
          if (Math.abs(this.vx) < 0.5) this.thrown = false;
        }
        else if (this.vx > 0 && this.x + this.w - this.vx <= other.x + 4) {
          this.x = other.x - this.w;
          this.vx = 0;
        } else if (this.vx < 0 && this.x - this.vx >= other.x + other.w - 4) {
          this.x = other.x + other.w;
          this.vx = 0;
        }
      }
    }
    // Out-of-bounds check: if below ground, mark as done
    if (this.y > CANVAS_H + 100) {
      this.done = true;
    }
    // Take damage on contact with enemies
    for (const e of game.enemies) {
      if (!e.dead && rectOverlap(this, e)) {
        this.takeDamage(1);
      }
    }
    if (this.hp <= 0) { this.explode(game); }
  }
  explode(game) {
    this.done = true;
    game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#a87', 15, 5, 18));
    game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#f93', 10, 4, 14));
    // AoE damage to enemies only
    for (const e of game.enemies) {
      if (!e.dead) {
        const dx = (e.x + e.w/2) - (this.x + this.w/2);
        const dy = (e.y + e.h/2) - (this.y + this.h/2);
        if (Math.sqrt(dx*dx + dy*dy) < 70) {
          e.takeDamage(this.powered ? 5 : 3, game, this.x + this.w/2);
        }
      }
    }
    // Also damage boss
    if (game.boss && !game.boss.dead) {
      const dx = (game.boss.x + game.boss.w/2) - (this.x + this.w/2);
      const dy = (game.boss.y + game.boss.h/2) - (this.y + this.h/2);
      if (Math.sqrt(dx*dx + dy*dy) < 80) {
        game.boss.takeDamage(this.powered ? 5 : 3, game, this.x + this.w/2);
      }
    }
    triggerHitstop(4);
  }
  render(ctx, cam) {
    ctx.fillStyle = this.powered ? '#7ec850' : '#3a7a3a';
    ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, this.h);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(this.x - cam.x, this.y - cam.y, this.w, 3);
    // Green HP bar styled exactly like enemies
    // HP bar
    if (this.hp < this.maxHp) {
      const sx = this.x - cam.x;
      const sy = this.y - cam.y;
      ctx.fillStyle = '#040';
      ctx.fillRect(sx, sy - 8, this.w, 4);
      ctx.fillStyle = '#4f4';
      ctx.fillRect(sx, sy - 8, this.w * (this.hp / this.maxHp), 4);
    }
  }
}

class StonePillar extends StoneConstruct {

class StoneSpike extends StoneConstruct {
  constructor(x, y) {
    super(x, y, TILE, TILE, 10);
  }
  update(game) {
    super.update(game);
    // Damage enemies standing on spike
    for (const e of game.enemies) {
      if (!e.dead && rectOverlap(this, e)) {
        e.takeDamage(3, game);
        game.effects.push(new Effect(e.x + e.w/2, e.y + e.h, '#f33', 8, 2, 10));
      }
    }
    // Damage boss standing on spike
    if (game.boss && !game.boss.dead && rectOverlap(this, game.boss) && game.boss.vy >= 0) {
      game.boss.takeDamage(3, game);
      game.effects.push(new Effect(game.boss.x + game.boss.w/2, game.boss.y + game.boss.h, '#f33', 12, 3, 14));
    }
  }
  render(ctx, cam) {
    ctx.fillStyle = '#6c8';
    ctx.beginPath();
    ctx.moveTo(this.x - cam.x, this.y + this.h - cam.y);
    ctx.lineTo(this.x + this.w/2 - cam.x, this.y - cam.y);
    ctx.lineTo(this.x + this.w - cam.x, this.y + this.h - cam.y);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.stroke();
    if (this.hp < this.maxHp) {
      const sx = this.x - cam.x;
      const sy = this.y - cam.y;
      ctx.fillStyle = '#040';
      ctx.fillRect(sx, sy - 8, this.w, 4);
      ctx.fillStyle = '#4f4';
      ctx.fillRect(sx, sy - 8, this.w * (this.hp / this.maxHp), 4);
    }
  }
}

class StoneGolem extends StoneConstruct {

    for (const e of game.enemies) {
      if (!e.dead && rectOverlap(this, e)) {

    if (this.hp < this.maxHp) {

// ============================================================
//  Bubble (Bubble ninja ability)
// ============================================================
class Bubble {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 32; this.h = 32;
    this.life = 360; // 6 seconds
    this.done = false;
    this.bobPhase = Math.random() * Math.PI * 2;
    this.baseY = y;
    this.consumed = false; // becomes true once player touches it
  }
  update(game) {
    this.bobPhase += 0.03;
    this.y = this.baseY + Math.sin(this.bobPhase) * 5;
    // Slowly float upward
    this.baseY -= 0.15;
    this.life--;
    if (this.life <= 0) {
      this.pop(game);
    }
    for (const e of game.enemies) {
      if (!e.dead && rectOverlap(this, e)) {
        e.takeDamage(2, game);
      }
    }
    if (game.boss && !game.boss.dead && rectOverlap(this, game.boss)) {
      game.boss.takeDamage(2, game);
    }
  }
  pop(game) {
    this.done = true;
    let damage = 1;
    for (const b of game.bubbles) {
      if(!b.done) damage += 1;
    }
    game.effects.push(new Effect(this.x + 16, this.y + 16, '#6af', 8, 3, 15));
    // Damage enemies nearby
    for (const e of game.enemies) {
      if (!e.dead) {
        const dx = (e.x + e.w / 2) - (this.x + 16);
        const dy = (e.y + e.h / 2) - (this.y + 16);
        if (Math.sqrt(dx * dx + dy * dy) < 80) {
          e.takeDamage(2, game);
        }
      }
    }
    // Fire projectile at nearest target
    const cx = this.x + 16, cy = this.y + 16;
    let nearest = null, bestDist = Infinity;
    for (const e of game.enemies) {
      if (e.dead) continue;
      if (!hasLineOfSight(cx, cy, e.x + e.w / 2, e.y + e.h / 2, game)) continue;
      const dx = (e.x + e.w / 2) - cx, dy = (e.y + e.h / 2) - cy;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; nearest = e; }
    }
    if (game.boss && !game.boss.dead) {
      if (hasLineOfSight(cx, cy, game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, game)) {
        const dx = (game.boss.x + game.boss.w / 2) - cx, dy = (game.boss.y + game.boss.h / 2) - cy;
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; nearest = game.boss; }
      }
    }
    if (nearest) {
      const dx = (nearest.x + nearest.w / 2) - cx;
      const dy = (nearest.y + nearest.h / 2) - cy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 0) {
        game.projectiles.push(new Projectile(cx, cy, (dx / d) * 6, (dy / d) * 6, '#4af', damage, 'player'));
      }
    }
  }
  render(ctx, cam) {
    const alpha = this.life < 60 ? this.life / 60 : 1;
    ctx.globalAlpha = alpha * (this.consumed ? 0.3 : 0.5);
    ctx.fillStyle = this.consumed ? '#8cf' : '#4af';
    ctx.beginPath();
    ctx.arc(this.x + 16 - cam.x, this.y + 16 - cam.y, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#8cf';
    ctx.lineWidth = 2;
    ctx.stroke();
    // shine
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = alpha * 0.5;
    ctx.beginPath();
    ctx.arc(this.x + 9 - cam.x, this.y + 9 - cam.y, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================================
//  Projectile
// ============================================================
class Projectile {
  constructor(x, y, vx, vy, color, damage, owner) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.w = 8; this.h = 6;
    this.color = color;
    this.damage = damage;
    this.owner = owner; // 'player' or 'enemy'
    this.done = false;
    this.life = 180;
    this.reflected = false;
    this.bouncy = false;
    this.piercing = false;
    this.hitSet = new Set();
  }
  update(game) {
    if (this.bouncy) this.vy += 0.15;
    this.x += this.vx;
    this.y += this.vy;
    this.life--;
    if (this.life <= 0) { this.done = true; return; }
    // Hit platforms (skip thin platforms)
    for (const p of game.platforms) {
      if (p.thin) continue;
      if (rectOverlap(this, p)) {
        if (this.bouncy && this.life > 30) {
          if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 6) {
            this.y = p.y - this.h; this.vy = -this.vy * 0.75;
          } else if (this.vy < 0) {
            this.vy = -this.vy * 0.75;
          } else {
            this.vx = -this.vx * 0.75;
          }
          this.life -= 25;
          return;
        }
        this.done = true;
        game.effects.push(new Effect(this.x, this.y, this.color, 4, 2, 10));
        return;
      }
    }
    // Hit stone blocks (power them up)
    if(this.owner === 'enemy') {
      for (const b of game.stoneBlocks) {
        if (!b.done && rectOverlap(this, b)) {
          b.powered = true;
          this.done = true;
          game.effects.push(new Effect(this.x, this.y, '#ff0', 6, 2, 12));
          return;
        }
      }
    }
    if (this.owner === 'player') {
      for (const e of game.enemies) {
        if (!e.dead && !this.hitSet.has(e) && rectOverlap(this, e)) {
          e.takeDamage(this.damage, game, this.x);
          this.hitSet.add(e);
          if (!this.piercing) { this.done = true; return; }
          game.effects.push(new Effect(this.x, this.y, this.color, 4, 2, 8));
        }
      }
      // Hit boss
      if (game.boss && !game.boss.dead && !this.hitSet.has(game.boss) && rectOverlap(this, game.boss)) {
        game.boss.takeDamage(this.damage, game, this.x);
        this.hitSet.add(game.boss);
        if (!this.piercing) { this.done = true; return; }
        game.effects.push(new Effect(this.x, this.y, this.color, 4, 2, 8));
      }
    } else {
      const pl = game.player;
      if (rectOverlap(this, pl)) {
        pl.takeDamage(this.damage, game);
        this.done = true;
      }
    }
  }
  render(ctx, cam) {
    const sx = this.x - cam.x, sy = this.y - cam.y;
    if (this.piercing) {
      // Big fireball glow
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(sx + this.w/2, sy + this.h/2, this.w * 0.9, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.fillStyle = this.color;
    ctx.fillRect(sx, sy, this.w, this.h);
    // trail
    ctx.globalAlpha = 0.4;
    ctx.fillRect(this.x - this.vx - cam.x, this.y - this.vy - cam.y, this.w, this.h);
    if (this.piercing) {
      ctx.globalAlpha = 0.2;
      ctx.fillRect(this.x - this.vx*2 - cam.x, this.y - this.vy*2 - cam.y, this.w, this.h);
    }
    ctx.globalAlpha = 1;
  }
}

// ============================================================
//  Player
// ============================================================
class Player {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.w = 24; this.h = 32;
    this.vx = 0; this.vy = 0;
    this.facing = 1; // 1 right, -1 left
    this.grounded = false;
    this.hp = 10;
    this.maxHp = 10;
    this.shield = 0;
    this.maxShield = 0;
    this.ninjaType = 'fire';
    this.invincibleTimer = 0;
    this.bonusDamage = 0;

    // Double jump
    this.jumpsLeft = 2;
    this.maxJumps = 2;

    // Wall climb / slide
    this.onWall = 0; // -1 left wall, 1 right wall, 0 none
    this.wallSlideTimer = 0;

    // Attack state
    this.attacking = false;
    this.attackTimer = 0;
    this.attackCooldown = 0;
    this.attackBox = null;

    // Special state
    this.specialCooldown = 0;

    // Fire ninja state
    this.comboMeter = 0;
    this.comboTimer = 0;
    this.fireArmor = false;
    this.fireArmorTimer = 0;

    // Bubble ninja state
    this.bubbleBuffTimer = 0; // frames of floatiness/speed buff remaining

    // Shadow ninja state
    this.shadowStealth = 0; // time in stealth accumulation
    this.backstabReady = false;
    this.afterimages = [];
    this.lastDamageTick = 0;
    this.lastEnemyTouch = 0;
    this.wasInAir = false;
    this.shadowLandTimer = 0;
    this.chainStriking = false;
    this.chainTargets = [];
    this.chainTimer = 0;
    this.chainHit = new Set();
    this.shadowAttackHit = false;

    // Crystal ninja state
    this.parrying = false;
    this.parryTimer = 0;
    this.parryVisualTimer = 0;
    this.parryCombo = 0;
    this.parryComboTimer = 0;

    // Wind ninja state
    this.windPower = 0;
    this.windDashing = false;
    this.windDashTimer = 0;
    this.windTrails = [];
    this.windFullTrails = [];

    // Next-hit-double system
    this.nextHitDouble = false;

    // Shadow instakill threshold (gradual, caps at 15)
    this.shadowKillThreshold = 0;

    // Shurikens
    this.shurikens = 3;

    // Ground slam
    this.slamming = false;
  }

  get type() { return NINJA_TYPES[this.ninjaType]; }

  switchNinja(type) {
    if (this.ninjaType === type) return;
    this.ninjaType = type;
    this.comboMeter = 0;
    this.comboTimer = 0;
    this.fireArmor = false;
    this.fireArmorTimer = 0;
    this.bubbleBuffTimer = 0;
    this.backstabReady = false;
    this.shadowStealth = 0;
    this.chainStriking = false;
    this.parrying = false;
    this.parryCombo = 0;
    this.parryComboTimer = 0;
    this.windPower = 0;
    this.windDashing = false;
    this.windDashTimer = 0;
  }

  update(game) {
    const t = this.type;

    // Bubble buff decay
    if (this.bubbleBuffTimer > 0) this.bubbleBuffTimer--;

    // ── Movement ──
    let moveX = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left || gpState.axes[0] < -0.3) moveX = -1;
    if (keys['ArrowRight'] || keys['KeyD'] || touchState.right || gpState.axes[0] > 0.3) moveX = 1;
    // Wind dash overrides normal movement
    if (!this.windDashing) {
      const speedMult = (this.bubbleBuffTimer > 0) ? 1.35 : 1;
      this.vx = moveX * t.speed * speedMult;
    }
    if (moveX !== 0) this.facing = moveX;

    // Jump (double jump + bubble bonus jump)
    const maxJ = this.maxJumps + (this.bubbleBuffTimer > 0 ? 1 : 0);
    const jumpPress = consumePress('ArrowUp') || consumePress('KeyW') || consumePress('Space') || touchJust.up || gpJust[GP_JUMP];
    if (jumpPress && this.jumpsLeft > 0) {
      SFX.jump();
      // Wall jump: kick off wall
      if (this.onWall !== 0 && !this.grounded) {
        this.vy = t.jumpPower * 0.9;
        this.vx = -this.onWall * 6;
        this.facing = -this.onWall;
        this.jumpsLeft = Math.max(this.jumpsLeft - 1, 1); // wall jump preserves one air jump
        this.onWall = 0;
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#fff', 4, 2, 6));
      } else {
        const isDoubleJump = !this.grounded && this.jumpsLeft < maxJ;
        this.vy = t.jumpPower * (isDoubleJump ? 0.85 : 1);
        this.grounded = false;
        this.jumpsLeft--;
        if (isDoubleJump) {
          game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h, '#fff', 5, 2, 8));
        }
      }
    }

    // ── Ground slam ──
    const holdingDown = keys['ArrowDown'] || keys['KeyS'] || touchState.down || gpState.buttons[GP_SLAM] || gpState.axes[1] > 0.7;
    if (holdingDown && !this.grounded && !this.slamming) {
      this.slamming = true;
      this.vx = 0;
    }
    if (this.slamming) {
      this.vy = 16; // fast downward
    }

    // Gravity (reduced when bubble buff active = floatiness)
    const grav = (this.bubbleBuffTimer > 0) ? GRAVITY * 0.55 : GRAVITY;
    if (!this.slamming) {
      this.vy += grav;
    }
    const maxFall = (this.bubbleBuffTimer > 0) ? MAX_FALL * 0.65 : MAX_FALL;
    if (this.vy > maxFall && !this.slamming) this.vy = maxFall;

    // Apply velocity
    this.x += this.vx;
    this.y += this.vy;

    // ── Platform collision ──
    this.grounded = false;
    this.onWall = 0;
    for (const p of game.platforms) {
      if (rectOverlap(this, p)) {
        // Thin platforms: only collide from above, skip if holding down to drop through
        if (p.thin) {
          if (this.vy > 0 && !holdingDown && !this.slamming && this.y + this.h - this.vy <= p.y + 4) {
            this.y = p.y - this.h;
            this.vy = 0;
            this.grounded = true;
            this.jumpsLeft = maxJ;
          }
          continue;
        }
        // Falling down onto platform
        if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
          this.y = p.y - this.h;
          this.vy = 0;
          this.grounded = true;
          this.jumpsLeft = maxJ;
        }
        // Head bump
        else if (this.vy < 0 && this.y - this.vy >= p.y + p.h - 4) {
          this.y = p.y + p.h;
          this.vy = 0;
        }
        // Side collision → wall detection
        else if (this.vx > 0) {
          this.x = p.x - this.w;
          this.onWall = 1;
          if (this.windDashing) { this.windDashing = false; this.windDashTimer = 0; this.vx = 0; this.nextHitDouble = true; triggerHitstop(6); game.effects.push(new Effect(this.x + this.w, this.y + this.h / 2, '#bfb', 12, 5, 15)); }
        } else if (this.vx < 0) {
          this.x = p.x + p.w;
          this.onWall = -1;
          if (this.windDashing) { this.windDashing = false; this.windDashTimer = 0; this.vx = 0; this.nextHitDouble = true; triggerHitstop(6); game.effects.push(new Effect(this.x, this.y + this.h / 2, '#bfb', 12, 5, 15)); }
        }
      }
    }

    for (const b of game.stonePillars) {
      if (b.done) continue;
      if (rectOverlap(this, b)) {
        // Landing on top
        if (this.vy > 0 && this.y + this.h - this.vy <= b.y + 4) {
          this.y = b.y - this.h;
          this.vy = 0;
          this.grounded = true;
          this.jumpsLeft = maxJ;
        }
        // Head bump
        else if (this.vy < 0 && this.y - this.vy >= b.y + b.h - 4) {
          this.y = b.y + b.h;
          this.vy = 0;
        }
        // Side collision → wall detection
        else if (this.vx > 0) {
          this.x = b.x - this.w;
          this.onWall = 1;
        } else if (this.vx < 0) {
          this.x = b.x + b.w;
          this.onWall = -1;
        }
      }
    }

    // Wall slide: slow fall when touching wall and holding toward it
    if (this.onWall !== 0 && !this.grounded && this.vy > 0) {
      const holdingToward = (this.onWall === 1 && moveX > 0) || (this.onWall === -1 && moveX < 0);
      if (holdingToward) {
        this.vy = Math.min(this.vy, 2); // slow slide
        this.jumpsLeft = maxJ; // wall resets jumps
        // Wall dust
        if (game.tick % 8 === 0) {
          game.effects.push(new Effect(
            this.x + (this.onWall > 0 ? this.w : 0), this.y + this.h / 2,
            '#aaa', 2, 1, 6
          ));
        }
      }
    }

    // ── Ground slam landing ──
    if (this.slamming && this.grounded) {
      this.slamming = false;
      triggerHitstop(8);
      SFX.slam();
      if(this.ninjaType === 'bubble') {
        for(const b of game.bubbles) {
          if(!b.done) {
            b.pop(game);
          }
        }
      }
      let slamDmg = t.attackDamage + this.bonusDamage + 2;
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h, '#fa0', 16, 5, 18));
      // Damage nearby enemies
      for (const e of game.enemies) {
        if (e.dead) continue;
        const dx = (e.x + e.w / 2) - (this.x + this.w / 2);
        const dy = (e.y + e.h / 2) - (this.y + this.h / 2);
        if (Math.sqrt(dx * dx + dy * dy) < 100) {
          e.takeDamage(slamDmg, game, this.x + this.w / 2);
          e.vy = -5;
          e.vx = Math.sign(dx) * 4;
        }
        slamDmg *= 0.9; // damage falloff for multiple enemies
      }
      // Damage boss
      if (game.boss && !game.boss.dead) {
        const dx = (game.boss.x + game.boss.w / 2) - (this.x + this.w / 2);
        const dy = (game.boss.y + game.boss.h / 2) - (this.y + this.h / 2);
        if (Math.sqrt(dx * dx + dy * dy) < 100) {
          game.boss.takeDamage(slamDmg, game, this.x + this.w / 2);
        }
      }
    }

    // ── Spike collision ──
    for (const s of game.spikes) {
      if (rectOverlap(this, s)) {
        this.takeDamage(2, game);
        this.vy = -8;
        //this.y = s.y - this.h - 2;
        break;
      }
    }

    // Bubble buff collision — touching a bubble grants floatiness/speed/jump buff
    for (const b of game.bubbles) {
      if (!b.done && !b.consumed && rectOverlap(this, b)) {
        b.consumed = true;
        b.life = Math.min(b.life, 90); // bubble fades after consumed
        this.bubbleBuffTimer = 240; // 4 seconds of buff
        this.jumpsLeft = Math.min(this.jumpsLeft + 1, maxJ); // bonus jump
        game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#6af', 8, 3, 12));
      }
    }

    // ── Timers ──
    if (this.invincibleTimer > 0) this.invincibleTimer--;
    if (this.attackCooldown > 0) this.attackCooldown--;
    if (this.specialCooldown > 0) this.specialCooldown--;

    // ── Attack ──
    if (this.attacking) {
      this.attackTimer--;
      if (this.attackTimer <= 0) {
        // Shadow: reset stealth if attack missed
        if (this.ninjaType === 'shadow' && !this.shadowAttackHit) {
          this.shadowStealth = 0;
          this.backstabReady = false;
          game.effects.push(new TextEffect(this.x + this.w / 2 - 14, this.y - 10, 'MISS!', '#f55'));
          SFX.miss();
        }
        this.attacking = false;
        this.attackBox = null;
      } else {
        // Check hits
        for (const e of game.enemies) {
          if (!e.dead && this.attackBox && rectOverlap(this.attackBox, e)) {
            let dmg = t.attackDamage + this.bonusDamage;
            // Shadow: instakill if enemy HP <= threshold, or backstab
            if (this.ninjaType === 'shadow') {
              if (this.backstabReady || e.hp <= this.shadowKillThreshold) {
                dmg = 9999;
                SFX.backstab();
                // Start chain strike before consuming backstab
                if (this.backstabReady && !this.chainStriking) {
                  this.chainStriking = true;
                  this.chainTimer = 6;
                  this.chainHit = new Set();
                  this.chainHit.add(e);
                }
                this.backstabReady = false;
                this.shadowStealth = 0;
                game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#a4e', 20, 5, 20));
              }
            }
            // Fire: double damage vs burning enemies
            if (this.ninjaType === 'fire' && e.burnTimer > 0) {
              dmg *= 2;
            }
            // Next hit double (earth block hit, bubble use, wind dodge)
            if (this.nextHitDouble) {
              dmg *= 2;
              this.nextHitDouble = false;
              game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#ff0', 8, 3, 10));
            }
            // Bubble buff: +1 damage while active
            if (this.bubbleBuffTimer > 0) {
              dmg += 1;
            }
            // Crystal parry combo bonus
            if (this.ninjaType === 'crystal') {
              dmg += Math.floor(this.parryCombo / 2);
            }
            // Wind power bonus
            if (this.ninjaType === 'wind') {
              dmg += this.windPower;
            }
            e.takeDamage(dmg, game, this.x + this.w / 2);
            e.hitCooldown = 15;

            if (this.ninjaType === 'crystal') {
              for(const other of game.enemies) {
                if(other !== e && !other.dead && other.freezeTimer >= 1) {
                  other.takeDamage(dmg * 0.75, game, this.x + this.w / 2);
                }
              }
            }

            if (this.ninjaType === 'shadow') this.shadowAttackHit = true;
            SFX.hit();
            triggerHitstop(4);
            // Fire combo
            if (this.ninjaType === 'fire') {
              this.comboMeter = Math.min(this.comboMeter + 1, 10);
              this.comboTimer = 180;
              // Apply burn when combo is full
              if (this.comboMeter >= 10) {
                e.burnTimer = 150; // 2.5 seconds of burn
              }
              if (this.comboMeter >= 8 && !this.fireArmor) {
                this.fireArmor = true;
                this.fireArmorTimer = 300;
                SFX.armor();
                game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f93', 15, 4, 20));
              }
            }
          }
        }

        // Attack stone blocks (Earth ability) → push them
        for (const b of game.stoneBlocks) {
          if (!b.done && this.attackBox && rectOverlap(this.attackBox, b)) {
            b.vx = this.facing * 8;
            b.vy = -2;
            b.thrown = true;
            b.takeDamage(1, game);
            // Earth: next attack does double damage after hitting a block
            this.nextHitDouble = true;
          }
        }
        // Pop bubbles with attack
        for (const b of game.bubbles) {
          if (!b.done && this.attackBox && rectOverlap(this.attackBox, b)) {
            b.pop(game);
          }
        }
        // Hit boss
        if (game.boss && !game.boss.dead && this.attackBox && rectOverlap(this.attackBox, game.boss)) {
          let dmg = t.attackDamage + this.bonusDamage;
          if (this.ninjaType === 'shadow' && this.backstabReady) {
            dmg = 9999;
            if (!this.chainStriking) {
              this.chainStriking = true;
              this.chainTimer = 6;
              this.chainHit = new Set();
              this.chainHit.add(game.boss);
            }
            this.backstabReady = false;
            this.shadowStealth = 0;
            game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#a4e', 20, 5, 20));
          }
          if (this.ninjaType === 'fire' && game.boss.burnTimer > 0) dmg *= 2;
          if (this.nextHitDouble) { dmg *= 2; this.nextHitDouble = false; game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#ff0', 8, 3, 10));
          }
          if (this.bubbleBuffTimer > 0) dmg += 1;
          if (this.ninjaType === 'crystal') dmg += Math.floor(this.parryCombo / 2);
          if (this.ninjaType === 'wind') dmg += this.windPower;
          game.boss.takeDamage(dmg, game, this.x + this.w / 2);
          if (this.ninjaType === 'shadow') this.shadowAttackHit = true;
          triggerHitstop(5);
        }
      }
    }

    if ((consumePress('KeyZ') || consumePress('KeyJ') || consumePress('MouseAttack') || touchJust.attack || gpJust[GP_ATTACK]) && !this.attacking && this.attackCooldown <= 0) {
      this.shadowAttackHit = false;
      this.attack(game);
    }

    // ── Special ability ──
    if ((consumePress('KeyX') || consumePress('KeyK') || consumePress('MouseSpecial') || touchJust.special || gpJust[GP_SPECIAL]) && this.specialCooldown <= 0) {
      this.useSpecial(game);
    }

    // ── Throw shuriken — aims at nearest target ──
    if ((consumePress('KeyC') || consumePress('KeyL') || consumePress('MouseShuriken') || touchJust.shuriken || gpJust[GP_SHURIKEN]) && this.shurikens > 0) {
      SFX.shuriken();
      this.shurikens--;
      const dmg = t.attackDamage + this.bonusDamage;
      const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
      let nearest = null, bestDist = Infinity;
      for (const e of game.enemies) {
        if (e.dead) continue;
        if (!hasLineOfSight(cx, cy, e.x + e.w / 2, e.y + e.h / 2, game)) continue;
        const dx = (e.x + e.w / 2) - cx, dy = (e.y + e.h / 2) - cy;
        const d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; nearest = e; }
      }
      if (game.boss && !game.boss.dead) {
        if (hasLineOfSight(cx, cy, game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, game)) {
          const dx = (game.boss.x + game.boss.w / 2) - cx, dy = (game.boss.y + game.boss.h / 2) - cy;
          const d = dx * dx + dy * dy;
          if (d < bestDist) { bestDist = d; nearest = game.boss; }
        }
      }
      let svx = this.facing * 8, svy = 0;
      if (nearest) {
        const dx = (nearest.x + nearest.w / 2) - cx;
        const dy = (nearest.y + nearest.h / 2) - cy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 0) { svx = (dx / d) * 8; svy = (dy / d) * 8; }
      }
      game.projectiles.push(new Projectile(cx, cy, svx, svy, '#ccc', dmg, 'player'));
      game.effects.push(new Effect(cx, cy, '#ccc', 4, 2, 6));
    }

    // ── Fire ninja: combo decay & fire armor ──
    if (this.ninjaType === 'fire') {
      if (this.comboTimer > 0) this.comboTimer--;
      else if (this.comboMeter > 0) { this.comboMeter--; this.comboTimer = 60; }
      if (this.fireArmor) {
        this.fireArmorTimer--;
        if (this.fireArmorTimer <= 0) { this.fireArmor = false; this.comboMeter = 0; }
        // Fire big piercing fireballs periodically
        if (this.fireArmorTimer % 20 === 0) {
          const t = this.type;
          const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
          const dmg = t.attackDamage + this.bonusDamage + 2;
          let nearest = null, bestDist = Infinity;
          for (const e of game.enemies) {
            if (e.dead) continue;
            if (!hasLineOfSight(cx, cy, e.x + e.w / 2, e.y + e.h / 2, game)) continue;
            const dx = (e.x + e.w / 2) - cx, dy = (e.y + e.h / 2) - cy;
            const d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; nearest = e; }
          }
          if (game.boss && !game.boss.dead) {
            if (hasLineOfSight(cx, cy, game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, game)) {
              const dx = (game.boss.x + game.boss.w / 2) - cx, dy = (game.boss.y + game.boss.h / 2) - cy;
              const d = dx * dx + dy * dy;
              if (d < bestDist) { bestDist = d; nearest = game.boss; }
            }
          }
          let svx = this.facing * 8, svy = 0;
          if (nearest) {
            const dx = (nearest.x + nearest.w / 2) - cx;
            const dy = (nearest.y + nearest.h / 2) - cy;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > 0) { svx = (dx / d) * 8; svy = (dy / d) * 8; }
          }
          const p = new Projectile(cx, cy, svx, svy, '#f93', dmg, 'player');
          p.w = 14; p.h = 10;
          p.piercing = true;
          p.life = 120;
          game.projectiles.push(p);
          game.effects.push(new Effect(cx, cy, '#f80', 4, 2, 6));
        }
        // Damage nearby enemies
        for (const e of game.enemies) {
          if (!e.dead && e.hitCooldown <= 0) {
            const dx = (e.x + e.w / 2) - (this.x + this.w / 2);
            const dy = (e.y + e.h / 2) - (this.y + this.h / 2);
            if (Math.sqrt(dx * dx + dy * dy) < 50) {
              e.takeDamage(1, game);
              e.hitCooldown = 30;
            }
          }
        }
      }
    }

    // ── Shadow ninja: chain strike ──
    if (this.ninjaType === 'shadow' && this.chainStriking) {
      this.chainTimer--;
      if (this.chainTimer <= 0) {
        // Find nearest unhit target within range
        let nearest = null;
        let nearDist = 200;
        const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
        for (const e of game.enemies) {
          if (e.dead || this.chainHit.has(e)) continue;
          const dx = (e.x + e.w / 2) - cx, dy = (e.y + e.h / 2) - cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < nearDist) { nearDist = d; nearest = e; }
        }
        if (!nearest && game.boss && !game.boss.dead && !this.chainHit.has(game.boss)) {
          const dx = (game.boss.x + game.boss.w / 2) - cx, dy = (game.boss.y + game.boss.h / 2) - cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < nearDist) { nearest = game.boss; }
        }
        if (nearest) {
          // Teleport behind target
          const behind = (nearest.x + nearest.w / 2) > cx ? -1 : 1;
          this.x = nearest.x + (behind > 0 ? nearest.w + 4 : -this.w - 4);
          this.y = nearest.y + nearest.h / 2 - this.h / 2;
          this.facing = -behind;
          this.vx = 0; this.vy = 0;
          // Afterimage at old position
          this.afterimages.push({ x: cx - this.w / 2, y: cy - this.h / 2, life: 12 });
          // Deal damage
          let dmg = this.type.attackDamage + this.bonusDamage;
          if (this.backstabReady || (nearest.hp !== undefined && nearest.hp <= this.shadowKillThreshold)) {
            dmg = 9999;
          }
          nearest.takeDamage(dmg, game, this.x + this.w / 2);
          this.chainHit.add(nearest);
          SFX.chain();
          game.effects.push(new Effect(nearest.x + nearest.w / 2, nearest.y + nearest.h / 2, '#a4e', 10, 4, 12));
          triggerHitstop(3);
          this.invincibleTimer = Math.max(this.invincibleTimer, 8);
          this.chainTimer = 6; // delay before next chain
        } else {
          // No more targets — end chain
          this.chainStriking = false;
          this.backstabReady = false;
          this.shadowStealth = 0;
        }
      }
    }

    // ── Shadow ninja: stealth accumulation ──
    if (this.ninjaType === 'shadow') {
      const now = game.tick;
      if (now - this.lastDamageTick > 60 && now - this.lastEnemyTouch > 60) {
        this.shadowStealth = Math.min(this.shadowStealth + 1, 300);
        // Gradually increase kill threshold (every 60 frames of stealth, +1, cap 15)
        if (this.shadowStealth % 60 === 0 && this.shadowKillThreshold < 15) {
          this.shadowKillThreshold++;
        }
        if (this.shadowStealth > 240 && !this.backstabReady) { // 4 seconds
          this.backstabReady = true;
          game.effects.push(new Effect(this.x + this.w / 2, this.y, '#a4e', 10, 3, 15));
        }
      } else {
        this.shadowStealth = 0;
        this.backstabReady = false;
        this.shadowKillThreshold = 0;
      }
      // Check enemy touch
      for (const e of game.enemies) {
        if (!e.dead && rectOverlap(this, e)) {
          this.lastEnemyTouch = now;
        }
      }
      // Afterimages — only when not heavily stealthed
      if (this.shadowStealth < 180 && (Math.abs(this.vx) > 0.5 || Math.abs(this.vy) > 1)) {
        this.afterimages.push({ x: this.x, y: this.y, life: 8 });
      }
      this.afterimages = this.afterimages.filter(a => { a.life--; return a.life > 0; });
      // Landing detection for visual clue
      if (this.shadowLandTimer > 0) this.shadowLandTimer--;
      if (!this.grounded) {
        this.wasInAir = true;
      } else if (this.wasInAir) {
        this.wasInAir = false;
        this.shadowLandTimer = 12;
        // Landing dust puff — visual clue
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h, '#726', 6, 2, 10));
      }
    }

    // ── Crystal ninja: parry state ──
    if (this.ninjaType === 'crystal') {
      if (this.parryVisualTimer > 0) this.parryVisualTimer--;
      if (this.parrying) {
        this.parryTimer--;
        if (this.parryTimer <= 0) this.parrying = false;
        // Check projectiles to reflect
        for (const proj of game.projectiles) {
          if (proj.owner === 'enemy' && !proj.reflected && !proj.done) {
            // Parry hitbox around player
            const parryBox = {
              x: this.x - 12, y: this.y - 8,
              w: this.w + 24, h: this.h + 16
            };
            if (rectOverlap(proj, parryBox)) {
              // Find nearest enemy to aim at
              let nearestE = null;
              let nearestDist = Infinity;
              for (const e of game.enemies) {
                if (e.dead) continue;
                const edx = (e.x + e.w/2) - (this.x + this.w/2);
                const edy = (e.y + e.h/2) - (this.y + this.h/2);
                const ed = Math.sqrt(edx*edx + edy*edy);
                if (ed < nearestDist) { nearestDist = ed; nearestE = e; }
              }
              // Also consider boss
              if (game.boss && !game.boss.dead) {
                const bdx = (game.boss.x + game.boss.w/2) - (this.x + this.w/2);
                const bdy = (game.boss.y + game.boss.h/2) - (this.y + this.h/2);
                const bd = Math.sqrt(bdx*bdx + bdy*bdy);
                if (bd < nearestDist) { nearestDist = bd; nearestE = game.boss; }
              }
              const reflectSpeed = 6;
              if (nearestE) {
                const tdx = (nearestE.x + nearestE.w/2) - proj.x;
                const tdy = (nearestE.y + nearestE.h/2) - proj.y;
                const td = Math.sqrt(tdx*tdx + tdy*tdy);
                proj.vx = (tdx/td) * reflectSpeed;
                proj.vy = (tdy/td) * reflectSpeed;
              } else {
                proj.vx = this.facing * reflectSpeed;
                proj.vy = -1;
              }
              proj.owner = 'player';
              proj.damage += this.parryCombo;
              proj.reflected = true;
              proj.color = '#0ff';
              SFX.reflect();
              this.parryCombo++;
              this.parryComboTimer = 300;
              this.nextHitDouble = true;
              game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#aff', 12, 4, 15));
            }
          }
        }
      }
      if (this.parryComboTimer > 0) this.parryComboTimer--;
      else this.parryCombo = 0;
    }

    // ── Wind ninja: passive power buildup & dash tracking ──
    if (this.ninjaType === 'wind') {
      if (this.windDashTimer > 0) this.windDashTimer--;
      if (this.windDashing && this.windDashTimer <= 0) {
        this.windDashing = false;
        // Wind: next attack does double damage after dodge
        this.nextHitDouble = true;
      }
      // Power builds passively while not taking damage
      if (game.tick - this.lastDamageTick > 60) {
        // Gain 1 power every 2 seconds (120 frames)
        if (game.tick % 120 === 0) {
          this.windPower = Math.min(this.windPower + 1, 10);
        }
      }
      // Wind trails while dashing or moving fast
      if (this.windDashing) {
        this.windTrails.push({ x: this.x, y: this.y, life: 15 });
        // Damage enemies while dashing through them
        for (const e of game.enemies) {
          if (!e.dead && e.damageIframes <= 0 && rectOverlap(this, e)) {
            const dmg = t.attackDamage + this.bonusDamage + this.windPower;
            e.takeDamage(dmg, game, this.x + this.w / 2);
            e.hitCooldown = 15;
            triggerHitstop(4);
            game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#bfb', 10, 4, 12));
          }
        }
      } else if (Math.abs(this.vx) > 3) {
        this.windTrails.push({ x: this.x, y: this.y, life: 8 });
      }
      this.windTrails = this.windTrails.filter(t => { t.life--; return t.life > 0; });
      // Windy/shaky trail when windPower is full
      if (this.windPower >= 10) {
        // Rectangles come out in all directions, move outward up to half the screen width, matching player size
        const angle = Math.random() * Math.PI * 2;
        const screenHalf = 480; // Half of 960px canvas
        this.windFullTrails.push({
          x: this.x + this.w/2,
          y: this.y + this.h/2,
          angle: angle,
          age: 0,
          life: 22
        });
        if (this.windFullTrails.length > 16) this.windFullTrails.shift();
      } else {
        this.windFullTrails = [];
      }
      for (const t of this.windFullTrails) t.life--;
      this.windFullTrails = this.windFullTrails.filter(t => t.life > 0);
    }

    // Fall into pit → take damage and respawn
    if (this.y > 2000) {
      this.x = 100; this.y = 200;
      this.vx = 0; this.vy = 0;
      this.takeDamage(2, game);
    }
  }

  attack(game) {
    this.attacking = true;
    this.attackTimer = 10;
    this.attackCooldown = 15;
    SFX.attack();
    // Shadow ninja: bigger attack when fully invisible
    const shadowFullStealth = this.ninjaType === 'shadow' && this.shadowStealth >= 240;
    const reach = shadowFullStealth ? 50 : 30;
    const vertExtra = shadowFullStealth ? 10 : 0;
    this.attackBox = {
      x: this.facing > 0 ? this.x + this.w : this.x - reach,
      y: this.y + 4 - vertExtra,
      w: reach,
      h: this.h - 8 + vertExtra * 2
    };
    game.effects.push(new Effect(
      this.attackBox.x + (this.facing > 0 ? reach / 2 : reach / 2),
      this.attackBox.y + (this.h - 8) / 2,
      this.type.accentColor, 5, 3, 8
    ));
  }

  useSpecial(game) {
    this.specialCooldown = 60;
    SFX.special();
    switch (this.ninjaType) {
      case 'fire':
        // Dash forward + fireball (auto-aims at nearest)
        this.vx = this.facing * 12;
        this.vy = -3;
        {
          const cx = this.x + this.w / 2, cy = this.y + this.h / 2;
          let nearest = null, bestDist = Infinity;
          for (const e of game.enemies) {
            if (e.dead) continue;
            if(!hasLineOfSight(cx, cy, e.x + e.w / 2, e.y + e.h / 2, game)) continue;
            const dx = (e.x + e.w / 2) - cx, dy = (e.y + e.h / 2) - cy;
            const d = dx * dx + dy * dy;
            if (d < bestDist) { bestDist = d; nearest = e; }
          }
          if (game.boss && !game.boss.dead) {
            if (hasLineOfSight(cx, cy, game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, game)) {
              const dx = (game.boss.x + game.boss.w / 2) - cx, dy = (game.boss.y + game.boss.h / 2) - cy;
              const d = dx * dx + dy * dy;

              if (d < bestDist) { bestDist = d; nearest = game.boss; }
            }
          }
          let fvx = this.facing * 7, fvy = 0;
          if (nearest) {
            const dx = (nearest.x + nearest.w / 2) - cx;
            const dy = (nearest.y + nearest.h / 2) - cy;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d > 0) { fvx = (dx / d) * 7; fvy = (dy / d) * 7; }
          }
          game.projectiles.push(new Projectile(cx, cy, fvx, fvy, '#f93', 3, 'player'));
          game.effects.push(new Effect(cx, cy, '#f93', 10, 4, 15));
        }
        break;
      case 'earth': {
        // Create stone block in front — stacks on existing blocks
        let spawnX = this.x + this.facing * 40;
        let baseY = this.y;
        // Find the nearest block or platform within 1.5 tiles vertically
        let supportY = null;
        let minDist = TILE * 1.5;
        // Check stone blocks
        for (const other of game.stoneBlocks) {
          if (!other.done && Math.abs(other.x - spawnX) < TILE) {
            let dist = Math.abs(other.y - baseY);
            if (dist < minDist) {
              minDist = dist;
              supportY = other.y;
            }
          }
        }
        // Check platforms
        for (const p of game.platforms) {
          if (!p.thin && spawnX + TILE > p.x && spawnX < p.x + p.w) {
            let dist = Math.abs(p.y - baseY);
            if (dist < minDist) {
              minDist = dist;
              supportY = p.y;
            }
          }
        }
        // If no support found within threshold, use original baseY
        if (supportY === null) supportY = baseY;

        // Randomly summon one of three constructs
        let constructType = Math.floor(Math.random() * 3);
        let construct;
        if (constructType === 0) {
          // StonePillar: base should sit on supportY
          let pillarY = supportY - TILE * 3; // pillar is 3 tiles tall
          construct = new StonePillar(spawnX, pillarY + TILE); // constructor expects y for top, so add TILE
          game.stonePillars.push(construct);
        } else if (constructType === 1) {
          // StoneSpike: 1 tile tall, base on supportY
          construct = new StoneSpike(spawnX, supportY - TILE + 4); // +4 for visual alignment
        } else {
          // StoneGolem: 1 tile tall, base on supportY
          construct = new StoneGolem(spawnX, supportY - TILE, this.facing);
        }
        game.stoneBlocks.push(construct);
        game.effects.push(new Effect(spawnX + TILE/2, supportY, '#a87', 8, 2, 12));
        break;
      }
      case 'bubble':
        // Spawn floating bubbles semi-randomly where player aims
        for (let i = 0; i < 3; i++) {
          const randOffX = randInt(-30, 30);
          const randOffY = randInt(-20, 20);
          game.bubbles.push(new Bubble(
            this.x + this.facing * (50 + i * 50) + randOffX,
            this.y - 20 - i * 25 + randOffY
          ));
        }
        // Bubble: next attack does double damage
        this.nextHitDouble = true;
        break;
      case 'shadow':
        // Quick dash / blink
        this.x += this.facing * 80;
        this.invincibleTimer = 15;
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#a4e', 12, 3, 12));
        break;
      case 'crystal': {
        // Check if any enemy/boss is showing "!" (threatening)
        let canParry = false;
        for (const e of game.enemies) {
          if (e.dead) continue;
          if (e.type === 'shooter' || e.type === 'flyshooter') continue;
          const dx = (e.x + e.w / 2) - (this.x + this.w / 2);
          const dy = (e.y + e.h / 2) - (this.y + this.h / 2);
          if (Math.sqrt(dx * dx + dy * dy) < 80 && e.hitCooldown <= 0) { canParry = true; break; }
        }
        if (!canParry && game.boss && !game.boss.dead) {
          const dx = (game.boss.x + game.boss.w / 2) - (this.x + this.w / 2);
          const dy = (game.boss.y + game.boss.h / 2) - (this.y + this.h / 2);
          if (Math.sqrt(dx * dx + dy * dy) < 100 && game.boss.hitCooldown <= 0) canParry = true;
        }
        // Animation always plays
        this.parryVisualTimer = 20;
        game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, canParry ? '#aff' : '#889', 12, 4, 15));
        // Only activate real parry if "!" is showing
        if (!canParry) { SFX.parryFail(); break; }
        SFX.parry();
        this.parrying = true;
        this.parryTimer = 20;
        this.nextHitDouble = true;
        // Push back all nearby enemies
        for (const e of game.enemies) {
          if (e.dead) continue;
          const dx = (e.x + e.w / 2) - (this.x + this.w / 2);
          const dy = (e.y + e.h / 2) - (this.y + this.h / 2);
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            const pushDir = dx >= 0 ? 1 : -1;
            e.vx = pushDir * 14;
            e.vy = -6;
            e.freezeTimer = 45;
            this.parryCombo++;
            this.parryComboTimer = 300;
            game.effects.push(new Effect(e.x + e.w / 2, e.y + e.h / 2, '#0ff', 6, 3, 10));
          }
        }
        // Push boss too
        if (game.boss && !game.boss.dead) {
          const dx = (game.boss.x + game.boss.w / 2) - (this.x + this.w / 2);
          const dy = (game.boss.y + game.boss.h / 2) - (this.y + this.h / 2);
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            game.boss.vx = (dx >= 0 ? 1 : -1) * 10;
            game.boss.vy = -4;
            game.boss.freezeTimer = 30;
            this.parryCombo++;
            this.parryComboTimer = 300;
            game.effects.push(new Effect(game.boss.x + game.boss.w / 2, game.boss.y + game.boss.h / 2, '#0ff', 8, 3, 12));
          }
        }
        break;
      }
      case 'wind':
        // Wind special: throw trimerang toward nearest enemy
        if (!game.trimerangs) game.trimerangs = [];
        const px = this.x + this.w / 2 + this.facing * 32;
        const py = this.y + this.h / 2;
        const speed = 7 + this.windPower * 0.5;
        // Always throw in facing direction, no line of sight or target check
        const vx = this.facing * speed;
        const vy = -2 + Math.random() * 4;
        game.trimerangs.push(new Trimerang(px, py, vx, vy, 'player'));
        SFX.special();
        break;
    }
  }

  takeDamage(amount, game) {
    if (this.invincibleTimer > 0) return;
    // Wind ninja: 50% dodge chance when windPower is full (for normal hits)
    if (this.ninjaType === 'wind' && this.windPower >= 10 && Math.random() < 0.5) {
      game.effects.push(new TextEffect(this.x + this.w/2, this.y - 10, 'EVADE', '#8cf'));
      triggerHitstop(2);
      return;
    }
    // Play bad sound if wind ninja is hit at full windPower
    if (this.ninjaType === 'wind' && this.windPower >= 10 && typeof SFX !== 'undefined' && SFX.play) {
      SFX.play(80, 'sawtooth', 0.18, 0.22, -60);
      SFX.noise(0.18, 0.18);
    }
    // If wind ninja is hit (not dodged), destroy all trimerangs
    if (this.ninjaType === 'wind' && game.trimerangs) {
      for (const t of game.trimerangs) t.done = true;
    }
    // Crystal parry blocks damage
    if (this.ninjaType === 'crystal' && this.parrying) return;
    // Fire armor blocks damage
    if (this.fireArmor) return;
    // Shield absorbs damage first
    if (this.shield > 0) {
      const absorbed = Math.min(this.shield, amount);
      this.shield -= absorbed;
      amount -= absorbed;
      game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#4af', 6, 2, 10));
      if (amount <= 0) {
        this.invincibleTimer = 45;
        this.lastDamageTick = game.tick;
        this.windPower = 0;
        triggerHitstop(4);
        return;
      }
    }
    this.hp -= amount;
    this.invincibleTimer = 45;
    this.lastDamageTick = game.tick;
    this.windPower = 0;
    SFX.playerHurt();
    triggerHitstop(6);
    game.effects.push(new Effect(this.x + this.w / 2, this.y + this.h / 2, '#f44', 8, 3, 12));
    if (this.hp <= 0) {
      this.hp = this.maxHp;
      this.x = 100; this.y = 200;
      this.vx = 0; this.vy = 0;
      game.deaths++;
      game.lives--;
      if (game.lives <= 0) {
        game.gameOver = true;
      }
    }
  }

  render(ctx, cam) {
    const t = this.type;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;

    // Wind trails
    if (this.ninjaType === 'wind') {
      // Normal wind trails
      for (const wt of this.windTrails) {
        ctx.globalAlpha = wt.life / 15 * 0.4;
        ctx.fillStyle = '#bfb';
        ctx.fillRect(wt.x - cam.x, wt.y - cam.y, this.w, this.h);
      }
      // Windy/shaky trail when windPower is full
      if (this.windPower >= 10 && this.windFullTrails && this.windFullTrails.length > 0) {
        for (const t of this.windFullTrails) {
          // Move outward as they age, up to half the screen width, in all directions
          t.age = (t.age || 0) + 1;
          const progress = t.age / 22;
          const maxOutward = 480; // Half of 960px canvas
          const outwardX = t.x + Math.cos(t.angle) * maxOutward * progress;
          const outwardY = t.y + Math.sin(t.angle) * maxOutward * progress;
          ctx.save();
          ctx.globalAlpha = 0.07 * (t.life / 22);
          ctx.fillStyle = '#bff';
          // Rectangle matches player size, moves far outward in all directions
          ctx.fillRect(
            outwardX - cam.x - this.w/2,
            outwardY - cam.y - this.h/2,
            this.w,
            this.h
          );
          ctx.restore();
        }
      }
      ctx.globalAlpha = 1;
    }

    // Shadow afterimages
    if (this.ninjaType === 'shadow') {
      const stealthFade = Math.max(0, 1 - this.shadowStealth / 200);
      for (const a of this.afterimages) {
        ctx.globalAlpha = (a.life / 20) * 0.2 * stealthFade;
        ctx.fillStyle = '#527';
        ctx.fillRect(a.x - cam.x, a.y - cam.y, this.w, this.h);
      }
      ctx.globalAlpha = 1;
    }

    // Shadow progressive invisibility — fades to completely invisible
    if (this.ninjaType === 'shadow') {
      // Map stealth 0..300 to alpha 0.6..0.0
      const stealthRatio = Math.min(this.shadowStealth / 300, 1);
      let shadowAlpha = 0.6 * (1 - stealthRatio);
      // Landing clue: briefly show a faint silhouette
      if (this.shadowLandTimer > 0) {
        shadowAlpha = Math.max(shadowAlpha, 0.25 * (this.shadowLandTimer / 12));
      }
      if (shadowAlpha <= 0.01) {
        // Completely invisible — skip rendering the sprite entirely
        // Only show backstab indicator and attack slash
        ctx.globalAlpha = 1;
        if (this.backstabReady) {
          ctx.fillStyle = '#f0f';
          ctx.font = '10px monospace';
          ctx.fillText('BACKSTAB!', sx - 8, sy - 8);
        }
        if (this.attacking && this.attackBox) {
          ctx.globalAlpha = 0.3;
          ctx.fillStyle = this.type.accentColor;
          ctx.fillRect(this.attackBox.x - cam.x, this.attackBox.y - cam.y, this.attackBox.w, this.attackBox.h);
          ctx.globalAlpha = 1;
        }
        return;
      }
      ctx.globalAlpha = shadowAlpha;
    }

    // Blink when invincible
    if (this.invincibleTimer > 0 && Math.floor(this.invincibleTimer / 3) % 2) {
      ctx.globalAlpha = 0.3;
    }

    // Fire armor glow
    if (this.fireArmor) {
      ctx.fillStyle = 'rgba(255,150,50,0.35)';
      ctx.fillRect(sx - 4, sy - 4, this.w + 8, this.h + 8);
    }

    // Bubble buff glow
    if (this.bubbleBuffTimer > 0) {
      ctx.fillStyle = 'rgba(80,160,255,0.25)';
      ctx.fillRect(sx - 3, sy - 3, this.w + 6, this.h + 6);
    }

    // Body
    ctx.fillStyle = t.color;
    ctx.fillRect(sx, sy, this.w, this.h);

    // Eyes
    ctx.fillStyle = '#fff';
    const eyeX = this.facing > 0 ? sx + 14 : sx + 4;
    ctx.fillRect(eyeX, sy + 8, 6, 6);
    ctx.fillStyle = '#222';
    ctx.fillRect(this.facing > 0 ? eyeX + 3 : eyeX, sy + 10, 3, 3);

    // Headband
    ctx.fillStyle = t.accentColor;
    ctx.fillRect(sx, sy + 5, this.w, 3);

    // Backstab indicator
    if (this.ninjaType === 'shadow' && this.backstabReady) {
      ctx.fillStyle = '#f0f';
      ctx.font = '10px monospace';
      ctx.fillText('BACKSTAB!', sx - 8, sy - 8);
    }

    // Fire armor indicator
    if (this.fireArmor) {
      const pulse = Math.sin(Date.now() * 0.008) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#f93';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('ARMOR!', sx - 4, sy - 8);
      ctx.globalAlpha = 1;
    }

    // Wind power indicator
    if (this.ninjaType === 'wind' && this.windPower > 0) {
      ctx.strokeStyle = `rgba(180,255,180,${0.3 + this.windPower * 0.07})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(sx - 3, sy - 3, this.w + 6, this.h + 6);
    }

    // Parry shield
    if (this.ninjaType === 'crystal' && this.parryVisualTimer > 0) {
      ctx.strokeStyle = this.parrying ? '#0ff' : '#667';
      ctx.lineWidth = 3;
      ctx.strokeRect(sx - 8, sy - 4, this.w + 16, this.h + 8);
    }

    // Wall slide indicator
    if (this.onWall !== 0 && !this.grounded && this.vy > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      const wx = this.onWall > 0 ? sx + this.w - 2 : sx;
      ctx.fillRect(wx, sy + 4, 3, this.h - 8);
      // Scratch marks
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = 'rgba(200,200,200,0.3)';
        ctx.fillRect(wx, sy + 6 + i * 9, 2, 5);
      }
    }

    ctx.globalAlpha = 1;

    // Attack slash
    if (this.attacking && this.attackBox) {
      // Sword blade
      const swordLen = 20;
      const swordW = 4;
      const swordX = this.facing > 0 ? sx + this.w : sx - swordLen;
      const swordY = sy + 10;
      ctx.fillStyle = '#dde';
      ctx.fillRect(swordX, swordY, swordLen, swordW);
      // Hilt
      ctx.fillStyle = t.accentColor;
      ctx.fillRect(this.facing > 0 ? sx + this.w - 2 : sx, swordY - 3, 4, swordW + 6);
      // Slash effect (uses hitbox)
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = t.accentColor;
      ctx.fillRect(this.attackBox.x - cam.x, this.attackBox.y - cam.y, this.attackBox.w, this.attackBox.h);
      ctx.globalAlpha = 1;
    }
  }
}

//  Enemy tier system
// ============================================================
const ENEMY_TIERS = ['walker', 'shooter', 'jumper', 'bouncer', 'shielded', 'flyer', 'flyshooter'];
const ENEMY_STATS = {
  walker:     { color: '#a55', hp: 3, dmg: 3, name: 'Walker' },
  shooter:    { color: '#aa5', hp: 3, dmg: 3, name: 'Shooter' },
  jumper:     { color: '#a8a', hp: 4, dmg: 4, name: 'Jumper' },
  bouncer:    { color: '#a5a', hp: 5, dmg: 4, name: 'Bouncer' },
  shielded:   { color: '#5a8', hp: 6, dmg: 4, name: 'Shielded' },
  flyer:      { color: '#8c5', hp: 2, dmg: 5, name: 'Flyer' },
  flyshooter: { color: '#c85', hp: 3, dmg: 5, name: 'Fly-Shooter' }
};

function getTierInfo(tierIdx) {
  if (tierIdx < ENEMY_TIERS.length) return { type: ENEMY_TIERS[tierIdx], big: false };
  return { type: ENEMY_TIERS[tierIdx % ENEMY_TIERS.length], big: true };
}
function getTierName(tierIdx) {
  const info = getTierInfo(tierIdx);
  return (info.big ? 'Big ' : '') + ENEMY_STATS[info.type].name;
}
