// ============================================================
//  Enemy base
// ============================================================
class Enemy {
  constructor(x, y, type, big, wave) {
    const base = ENEMY_STATS[type];
    this.type = type;
    this.big = !!big;
    this.wave = wave || 1;
    this.w = big ? 42 : 28;
    this.h = big ? 42 : 28;
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    const hpBonus = Math.floor((this.wave - 1) * 1.5);
    this.hp = (big ? base.hp * 2 : base.hp) + hpBonus;
    this.maxHp = this.hp;
    this.contactDmg = (big ? base.dmg + 2 : base.dmg) + Math.floor((this.wave - 1) * 0.5);
    this.color = base.color;
    this.facing = Math.random() < 0.5 ? -1 : 1;
    this.dead = false;
    this.hitCooldown = 0;
    this.shootTimer = randInt(0, 40);
    this.jumpTimer = randInt(0, 40);
    this.patrolLeft = x - 100;
    this.patrolRight = x + 100;
    this.flashTimer = 0;
    this.damageIframes = 0;
    this.burnTimer = 0;
    this.flying = (type === 'flyer' || type === 'flyshooter');
    this.shieldHp = (type === 'shielded') ? (big ? 5 : 3) : 0;
    this.shieldMax = this.shieldHp;
    this.hoverPhase = Math.random() * Math.PI * 2;
    this.edgeAware = (type === 'walker' || type === 'shooter' || type === 'shielded' || type === 'bouncer');
    this.onPlatform = null;
    this.freezeTimer = 0;
  }

  update(game) {
    if (this.dead) return;
    if (this.freezeTimer > 0) { this.freezeTimer--; this.vx = 0; this.vy = 0; return; }
    if (this.hitCooldown > 0) this.hitCooldown--;
    if (this.flashTimer > 0) this.flashTimer--;
    if (this.damageIframes > 0) this.damageIframes--;
    // Burn DOT
    if (this.burnTimer > 0) {
      this.burnTimer--;
      if (this.burnTimer % 30 === 0) {
        this.hp -= 1;
        this.flashTimer = 4;
        game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#f93', 4, 2, 8));
        if (this.hp <= 0) { this.dead = true; this.onDeath(game); }
      }
    }
    const speed = this.big ? 2.4 : 1.9;
    // Shadow stealth: enemies can't see the player when highly stealthed
    const playerStealthed = game.player.ninjaType === 'shadow' && game.player.shadowStealth > 180;
    const px = playerStealthed ? (this.x + this.facing * 100) : (game.player.x + game.player.w / 2);
    const py = playerStealthed ? (this.y) : (game.player.y + game.player.h / 2);
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;

    // Gravity (not for flyers)
    if (!this.flying) {
      this.vy += GRAVITY;
      if (this.vy > MAX_FALL) this.vy = MAX_FALL;
    }

    // WindPower full: increase resistance if moving toward player
    let windResist = 1;
    if (game.player.ninjaType === 'wind' && game.player.windPower >= 10) {
      // For ground enemies, check if moving toward player
      const towardPlayer = (this.facing > 0 && px > cx) || (this.facing < 0 && px < cx);
      if (towardPlayer) windResist = 0.45; // reduce speed by 55%
    }
    switch (this.type) {
      case 'walker':
        this.vx = this.facing * speed * windResist;
        if (this.x <= this.patrolLeft) this.facing = 1;
        if (this.x >= this.patrolRight) this.facing = -1;
        break;
      case 'shooter':
        this.vx = this.facing * speed * 0.5 * windResist;
        if (this.x <= this.patrolLeft) this.facing = 1;
        if (this.x >= this.patrolRight) this.facing = -1;
        this.shootTimer++;
        if (this.shootTimer >= (this.big ? 70 : 90)) {
          this.shootTimer = 0;
          const dx = px - cx, dy = py - cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 400 && d > 0) {
            game.projectiles.push(new Projectile(cx, cy, (dx/d)*4, (dy/d)*4, '#ff4', 2 + Math.floor((this.wave - 1) * 0.5), 'enemy'));
          }
        }
        break;
      case 'jumper':
        this.vx = this.facing * speed * 1.2 * windResist;
        if (this.x <= this.patrolLeft) this.facing = 1;
        if (this.x >= this.patrolRight) this.facing = -1;
        this.jumpTimer++;
        if (this.jumpTimer >= (this.big ? 55 : 75) && this.vy < 1) {
          this.vy = this.big ? -11 : -9;
          this.jumpTimer = 0;
        }
        break;
      case 'bouncer':
        this.vx = this.facing * speed * 0.6 * windResist;
        if (this.x <= this.patrolLeft) this.facing = 1;
        if (this.x >= this.patrolRight) this.facing = -1;
        this.shootTimer++;
        if (this.shootTimer >= (this.big ? 80 : 100)) {
          this.shootTimer = 0;
          const dx = px - cx, dy = py - cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 450 && d > 0) {
            const p = new Projectile(cx, cy, (dx/d)*3.5, (dy/d)*3 - 2, '#f6f', 2 + Math.floor((this.wave - 1) * 0.5), 'enemy');
            p.bouncy = true;
            game.projectiles.push(p);
          }
        }
        break;
      case 'shielded':
        this.vx = this.facing * speed * 0.7 * windResist;
        if (this.x <= this.patrolLeft) this.facing = 1;
        if (this.x >= this.patrolRight) this.facing = -1;
        // Face player when close
        if (Math.abs(px - cx) < 180) this.facing = px > cx ? 1 : -1;
        break;
      case 'flyer': {
        this.hoverPhase += 0.03;
        const fdx = px - cx, fdy = py - cy;
        const fd = Math.sqrt(fdx * fdx + fdy * fdy);
        if (fd > 50) {
          // Only apply wind resistance if flying toward player
          let flyResist = windResist;
          if (!(game.player.ninjaType === 'wind' && game.player.windPower >= 10 && ((fdx > 0 && px > cx) || (fdx < 0 && px < cx)))) flyResist = 1;
          this.vx = (fdx / fd) * speed * 1.6 * flyResist;
          this.vy = (fdy / fd) * speed * 1.6 * flyResist + Math.sin(this.hoverPhase) * 0.5;
        } else {
          this.vx *= 0.92; this.vy = Math.sin(this.hoverPhase) * 1.5;
        }
        this.facing = fdx > 0 ? 1 : -1;
        break;
      }
      case 'flyshooter': {
        this.hoverPhase += 0.025;
        const sdx = px - cx, sdy = (py - 80) - cy;
        const sd = Math.sqrt(sdx * sdx + sdy * sdy);
        if (sd > 40) {
          // Only apply wind resistance if flying toward player
          let flyResist = windResist;
          if (!(game.player.ninjaType === 'wind' && game.player.windPower >= 10 && ((sdx > 0 && px > cx) || (sdx < 0 && px < cx)))) flyResist = 1;
          this.vx = (sdx / sd) * speed * 1.2 * flyResist;
          this.vy = (sdy / sd) * speed * 1.2 * flyResist + Math.sin(this.hoverPhase) * 0.4;
        } else {
          this.vx *= 0.92; this.vy = Math.sin(this.hoverPhase) * 1;
        }
        this.facing = sdx > 0 ? 1 : -1;
        this.shootTimer++;
        if (this.shootTimer >= (this.big ? 60 : 80)) {
          this.shootTimer = 0;
          const adx = px - cx, ady = py - cy;
          const ad = Math.sqrt(adx * adx + ady * ady);
          if (ad < 500 && ad > 0) {
            game.projectiles.push(new Projectile(cx, cy, (adx/ad)*4, (ady/ad)*4, '#fa4', 2 + Math.floor((this.wave - 1) * 0.5), 'enemy'));
          }
        }
        break;
      }
    }

    // Apply velocity
    this.x += this.vx;
    this.y += this.vy;

    // Platform collision (ground enemies only)
    if (!this.flying) {
      this.onPlatform = null;
      for (const p of game.platforms) {
        if (p.thin) continue;
        if (rectOverlap(this, p)) {
          if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
            this.y = p.y - this.h;
            this.vy = 0;
            this.onPlatform = p;
          }
        }
      }
      // Edge-aware: turn around at platform edges (skip small platforms)
      if (this.edgeAware && this.onPlatform && this.onPlatform.w >= 80) {
        const p = this.onPlatform;
        if (this.x + this.w / 2 < p.x + 8) this.facing = 1;
        if (this.x + this.w / 2 > p.x + p.w - 8) this.facing = -1;
      }
    } else {
      // Keep flyers in bounds
      if (this.y < -50) this.y = -50;
      if (this.y > 460) this.y = 460;
    }

    // Keep in level bounds
    if (this.x < 0) { this.x = 0; this.vx = Math.abs(this.vx); this.facing = 1; }
    if (this.x + this.w > 3200) { this.x = 3200 - this.w; this.vx = -Math.abs(this.vx); this.facing = -1; }

    // Respawn if fell off bottom
    if (this.y > 700) { this.y = -40; this.vy = 0; this.x = Math.max(40, Math.min(3140, this.x)); return; }

    // Contact damage
    if (this.hitCooldown <= 0 && rectOverlap(this, game.player) && !this.slamming) {
      const kbDir = Math.sign(game.player.x + game.player.w / 2 - (this.x + this.w / 2)) || 1;
      const kbStr = this.big ? 9 : 5;
      game.player.vx = kbDir * kbStr;
      game.player.vy = this.big ? -5 : -4;
      game.player.takeDamage(this.contactDmg, game);
      this.hitCooldown = 30;
    }
  }

  takeDamage(amount, game, fromX) {
    if (this.dead) return;
    if (this.damageIframes > 0) return;
    // Shielded: frontal hits absorbed by shield
    if (this.shieldHp > 0 && fromX !== undefined) {
      const hitFromFront = (fromX > this.x + this.w / 2) === (this.facing === 1);
      if (hitFromFront) {
        this.shieldHp -= amount;
        this.flashTimer = 4;
        game.effects.push(new Effect(
          this.x + (this.facing > 0 ? this.w : 0), this.y + this.h / 2, '#5ff', 5, 2, 8
        ));
        if (this.shieldHp < 0) this.shieldHp = 0;
        return;
      }
    }
    this.hp -= amount;
    this.flashTimer = 6;
    this.damageIframes = 15;
    // Knockback — lighter types get pushed more, big enemies resist
    const kbBase = { walker: 5, shooter: 6, jumper: 4, bouncer: 3, shielded: 2, flyer: 7, flyshooter: 7 };
    let kb = (kbBase[this.type] || 4) * (this.big ? 0.5 : 1);
    const dir = (fromX !== undefined) ? Math.sign(this.x + this.w / 2 - fromX) : this.facing * -1;
    this.vx = dir * kb;
    if (!this.flying) this.vy = -2;
    if (this.hp <= 0) {
      this.dead = true;
      this.onDeath(game);
    }
  }

  onDeath(game) {
    game.waveKills++;
    game.totalKills++;
    SFX.enemyDie();
    triggerHitstop(this.big ? 7 : 5);
    game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, this.color, this.big ? 18 : 12, 4, 18));
    // Drop orb
    const r = Math.random();
    if (r < 0.35) {
      game.orbs.push(new Orb(this.x + this.w/2 - 5, this.y, 'heal'));
    } else if (r < 0.48) {
      game.orbs.push(new Orb(this.x + this.w/2 - 5, this.y, 'maxhp'));
    } else if (r < 0.58) {
      game.orbs.push(new Orb(this.x + this.w/2 - 5, this.y, 'damage'));
    } else if (r < 0.66) {
      game.orbs.push(new Orb(this.x + this.w/2 - 5, this.y, 'shield'));
    } else if (r < 0.78) {
      game.orbs.push(new Orb(this.x + this.w/2 - 5, this.y, 'shuriken'));
    }
  }

  render(ctx, cam, game) {
    // WindPower full: render wind trail
    // Wind tail afterimage effect (only when facing player)
    if (this.windTrails && this.windTrails.length && this.facingPlayer) {
      for (let i = 0; i < this.windTrails.length; ++i) {
        const t = this.windTrails[i];
        ctx.save();
        const alpha = 0.13 * (t.life / 22);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#bff';
        // Draw a stretched ellipse for a tail
        ctx.beginPath();
        ctx.ellipse(t.x - cam.x, t.y - cam.y, t.w * 0.7, t.h * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      // Fade trail
      this.windTrails = this.windTrails.filter(t => { t.life--; return t.life > 0; });
    }
    if (this.dead) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;
    // Blink during damage iframes
    if (this.damageIframes > 0 && Math.floor(this.damageIframes / 3) % 2) return;
    // Main body
    ctx.fillStyle = this.freezeTimer > 0 ? '#88eeff' : (this.flashTimer > 0 ? '#fff' : this.color);
    ctx.fillRect(sx, sy, this.w, this.h);

    // Freeze effect overlay
    if (this.freezeTimer > 0) {
      ctx.globalAlpha = 0.4 + 0.2 * Math.sin(this.freezeTimer * 0.2);
      ctx.fillStyle = '#aaf';
      ctx.fillRect(sx, sy, this.w, this.h);
      ctx.globalAlpha = 1;
    }

    // Burn effect overlay
    if (this.burnTimer > 0) {
      ctx.globalAlpha = 0.3 + 0.15 * Math.sin(this.burnTimer * 0.3);
      ctx.fillStyle = '#f93';
      ctx.fillRect(sx, sy, this.w, this.h);
      ctx.globalAlpha = 1;
    }

    // Big border
    if (this.big) {
      ctx.strokeStyle = '#ff0';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx + 1, sy + 1, this.w - 2, this.h - 2);
    }

    // Eyes
    const eo = this.big ? 6 : 4;
    const es = this.big ? 7 : 5;
    ctx.fillStyle = '#fff';
    const eyeX = this.facing > 0 ? sx + this.w - eo - es : sx + eo;
    ctx.fillRect(eyeX, sy + eo + 2, es, es);
    ctx.fillStyle = '#200';
    const ps = this.big ? 4 : 3;
    ctx.fillRect(this.facing > 0 ? eyeX + es - ps : eyeX, sy + eo + 4, ps, ps);

    // Type accents
    switch (this.type) {
      case 'shooter':
        ctx.fillStyle = '#ff4';
        ctx.fillRect(this.facing > 0 ? sx + this.w : sx - 6, sy + this.h/2 - 2, 6, 4);
        break;
      case 'jumper':
        ctx.fillStyle = '#ff0';
        ctx.fillRect(sx + 4, sy + this.h - 3, 6, 5);
        ctx.fillRect(sx + this.w - 10, sy + this.h - 3, 6, 5);
        break;
      case 'bouncer':
        ctx.fillStyle = '#f6f';
        ctx.fillRect(sx + 2, sy, this.w - 4, 3);
        ctx.fillRect(this.facing > 0 ? sx + this.w : sx - 8, sy + this.h/2 - 3, 8, 6);
        break;
      case 'shielded':
        if (this.shieldHp > 0) {
          ctx.fillStyle = `rgba(100,220,255,${0.4 + 0.2 * (this.shieldHp / this.shieldMax)})`;
          ctx.fillRect(this.facing > 0 ? sx + this.w - 3 : sx, sy - 2, 5, this.h + 4);
        }
        ctx.fillStyle = '#5a8';
        ctx.fillRect(sx + 2, sy, this.w - 4, 3);
        break;
      case 'flyer':
        ctx.fillStyle = '#bdb';
        ctx.fillRect(sx - 5, sy + 4, 5, this.h - 8);
        ctx.fillRect(sx + this.w, sy + 4, 5, this.h - 8);
        break;
      case 'flyshooter':
        ctx.fillStyle = '#dba';
        ctx.fillRect(sx - 5, sy + 4, 5, this.h - 8);
        ctx.fillRect(sx + this.w, sy + 4, 5, this.h - 8);
        ctx.fillStyle = '#fa4';
        ctx.fillRect(this.facing > 0 ? sx + this.w : sx - 6, sy + this.h/2 - 2, 6, 4);
        break;
    }

    // Melee sword (shown when just hit player)
    if (this.hitCooldown > 20 && this.type !== 'shooter' && this.type !== 'flyshooter') {
      const sl = this.big ? 16 : 12;
      const sw = this.big ? 4 : 3;
      const swordX = this.facing > 0 ? sx + this.w : sx - sl;
      const swordY = sy + this.h / 2 - sw / 2;
      ctx.fillStyle = '#ccd';
      ctx.fillRect(swordX, swordY, sl, sw);
      ctx.fillStyle = this.color;
      ctx.fillRect(this.facing > 0 ? sx + this.w - 2 : sx, swordY - 2, 3, sw + 4);
    }

    // HP bar
    if (this.hp < this.maxHp) {
      ctx.fillStyle = '#400';
      ctx.fillRect(sx, sy - 8, this.w, 4);
      ctx.fillStyle = '#f44';
      ctx.fillRect(sx, sy - 8, this.w * (this.hp / this.maxHp), 4);
    }

    // Shield pips
    if (this.type === 'shielded' && this.shieldMax > 0) {
      for (let i = 0; i < this.shieldMax; i++) {
        ctx.fillStyle = i < this.shieldHp ? '#5ff' : '#234';
        ctx.fillRect(sx + i * 7 + 2, sy - 14, 5, 3);
      }
    }
  }
}

// ============================================================
//  Boss (wave-based variation)
// ============================================================
const BOSS_NAMES = {
  walker:'BRUTE', shooter:'GUNNER', jumper:'LEAPER',
  bouncer:'BOUNCER', shielded:'GUARDIAN', flyer:'SWOOPER', flyshooter:'OVERLORD'
};

class Boss {
  constructor(x, y, bossType, wave) {
    this.bossType = bossType;
    this.wave = wave;
    this.x = x; this.y = y;
    this.w = 56; this.h = 56;
    this.vx = 0; this.vy = 0;
    this.hp = 25 + wave * 15; this.maxHp = this.hp;
    this.facing = -1;
    this.dead = false;
    this.hitCooldown = 0;
    this.flashTimer = 0;
    this.phase = 1;
    this.actionTimer = 0;
    this.state = 'chase';
    this.stateTimer = 0;
    this.grounded = false;
    this.flying = (bossType === 'flyer' || bossType === 'flyshooter');
    this.hoverPhase = 0;
    this.shieldHp = (bossType === 'shielded') ? 6 : 0;
    this.shieldMax = this.shieldHp;
    this.damageIframes = 0;
    this.freezeTimer = 0;
    this.stuckTimer = 0;
    this.phaseThrough = 0;
    this.lastX = x;
    this.lastY = y;
    const colors = {
      walker:'#c33', shooter:'#cc5', jumper:'#c8c',
      bouncer:'#c5c', shielded:'#5cc', flyer:'#8c5', flyshooter:'#c85'
    };
    this.color = colors[bossType] || '#c33';
    this.name = (BOSS_NAMES[bossType] || 'BIG') + ' BOSS';
  }

  update(game) {
    if (this.dead) return;
    if (this.hitCooldown > 0) this.hitCooldown--;
    if (this.flashTimer > 0) this.flashTimer--;
    if (this.damageIframes > 0) this.damageIframes--;
    if (this.freezeTimer > 0) { this.freezeTimer--; this.vx = 0; this.vy = 0; return; }
    this.phase = this.hp <= this.maxHp / 2 ? 2 : 1;
    const speed = (this.phase === 2 ? 3.2 : 2.2) + this.wave * 0.25;

    if (this.flying) {
      this.hoverPhase += 0.03;
    } else {
      this.vy += GRAVITY;
      if (this.vy > MAX_FALL) this.vy = MAX_FALL;
    }

    const px = game.player.x + game.player.w / 2;
    const py = game.player.y + game.player.h / 2;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    const dx = px - cx;
    const dy = py - cy;
    this.facing = dx > 0 ? 1 : -1;
    this.stateTimer++;
    this.actionTimer++;

    const canShoot = (this.bossType === 'shooter' || this.bossType === 'bouncer' || this.bossType === 'flyshooter');
    const isJumpy = (this.bossType === 'jumper');

    if (this.flying) {
      // Flying boss AI
      switch (this.state) {
        case 'chase': {
          const tdx = dx, tdy = (py - (this.bossType === 'flyshooter' ? 90 : 30)) - cy;
          const td = Math.sqrt(tdx*tdx + tdy*tdy);
          if (td > 30) {
            this.vx = (tdx/td) * speed;
            this.vy = (tdy/td) * speed + Math.sin(this.hoverPhase) * 0.5;
          } else {
            this.vx *= 0.9; this.vy = Math.sin(this.hoverPhase) * 1.5;
          }
          if (this.actionTimer > 100) {
            this.state = canShoot ? 'shoot' : 'swoop';
            this.stateTimer = 0; this.actionTimer = 0;
          }
          break;
        }
        case 'swoop':
          if (this.stateTimer === 1) { this.vx = this.facing * 8; this.vy = 5; }
          if (this.stateTimer > 30) {
            this.vy = -3;
            if (this.stateTimer > 45) {
              this.state = 'chase'; this.stateTimer = 0; this.actionTimer = 0;
            }
          }
          break;
        case 'shoot':
          this.vx *= 0.9; this.vy = Math.sin(this.hoverPhase) * 1;
          if (this.stateTimer === 15 || this.stateTimer === 30 || (this.phase === 2 && this.stateTimer === 45)) {
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d > 0) {
              const p = new Projectile(cx, cy, (dx/d)*5, (dy/d)*5, '#f44', 3 + Math.floor((this.wave - 1) * 0.5), 'enemy');
              if (this.bossType === 'bouncer') p.bouncy = true;
              game.projectiles.push(p);
            }
          }
          if (this.stateTimer > 60) {
            this.state = 'chase'; this.stateTimer = 0; this.actionTimer = 0;
          }
          break;
      }
      if (this.y < -80) this.y = -80;
      if (this.y > 440) this.y = 440;
    } else {
      // Ground boss AI
      switch (this.state) {
        case 'chase':
          this.vx = this.facing * speed;
          if (this.actionTimer > (isJumpy ? 60 : 110) && this.grounded) {
            const r = Math.random();
            if (canShoot && r < 0.4) this.state = 'shoot';
            else this.state = 'jump';
            this.stateTimer = 0; this.actionTimer = 0;
          }
          break;
        case 'jump':
          if (this.stateTimer === 1) {
            this.vy = isJumpy ? -14 : -12;
            this.vx = this.facing * (isJumpy ? 7 : 5);
          }
          if (this.stateTimer > 10 && this.grounded) {
            game.effects.push(new Effect(cx, this.y + this.h, '#f84', 15, 5, 15));
            if (Math.abs(dx) < 80 && Math.abs(dy) < 60) {
              const kbDir = Math.sign(game.player.x - cx) || 1;
              game.player.vx = kbDir * 10;
              game.player.vy = -5;
              game.player.takeDamage(4 + Math.floor((this.wave - 1) * 0.5), game);
            }
            this.state = 'chase'; this.stateTimer = 0; this.actionTimer = 0;
          }
          break;
        case 'shoot':
          this.vx = 0;
          if (this.stateTimer === 15 || this.stateTimer === 35 || (this.phase === 2 && this.stateTimer === 50)) {
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d > 0) {
              const p = new Projectile(cx, cy, (dx/d)*5, (dy/d)*5, '#f44', 3 + Math.floor((this.wave - 1) * 0.5), 'enemy');
              if (this.bossType === 'bouncer') p.bouncy = true;
              game.projectiles.push(p);
            }
          }
          if (this.stateTimer > 65) {
            this.state = 'chase'; this.stateTimer = 0; this.actionTimer = 0;
          }
          break;
      }
    }

    // Apply velocity
    this.x += this.vx;
    this.y += this.vy;

    // Stuck detection — if boss barely moved for a while, phase through platforms
    if (this.phaseThrough > 0) this.phaseThrough--;
    if (!this.flying) {
      const movedX = Math.abs(this.x - this.lastX);
      const movedY = Math.abs(this.y - this.lastY);
      if (movedX < 1 && movedY < 1 && this.state === 'chase') {
        this.stuckTimer++;
      } else {
        this.stuckTimer = Math.max(0, this.stuckTimer - 2);
      }
      if (this.stuckTimer > 120) {
        this.phaseThrough = 60;
        this.stuckTimer = 0;
      }
      this.lastX = this.x;
      this.lastY = this.y;
    }

    // Platform collision (ground bosses)
    if (!this.flying) {
      this.grounded = false;
      for (const p of game.platforms) {
        if (rectOverlap(this, p)) {
          if (this.vy > 0 && this.y + this.h - this.vy <= p.y + 4) {
            this.y = p.y - this.h;
            this.vy = 0;
            this.grounded = true;
          } else if (this.phaseThrough > 0) {
            // Boss is phasing through — skip side/ceiling collisions to unstick
          } else if (this.vy < 0 && this.y - this.vy >= p.y + p.h - 4) {
            this.y = p.y + p.h;
            this.vy = 0;
          } else if (this.vx > 0) {
            this.x = p.x - this.w;
          } else if (this.vx < 0) {
            this.x = p.x + p.w;
          }
        }
      }
    }

    // Keep boss in level bounds
    if (this.x < 0) { this.x = 0; this.vx = Math.abs(this.vx); this.facing = 1; }
    if (this.x + this.w > 3200) { this.x = 3200 - this.w; this.vx = -Math.abs(this.vx); this.facing = -1; }
    if (this.y > 700) { this.y = -40; this.vy = 0; }

    // Contact damage
    if (this.hitCooldown <= 0 && rectOverlap(this, game.player)) {
      const kbDir = Math.sign(game.player.x + game.player.w / 2 - (this.x + this.w / 2)) || 1;
      game.player.vx = kbDir * 10;
      game.player.vy = -5;
      game.player.takeDamage(4 + Math.floor((this.wave - 1) * 0.5), game);
      this.hitCooldown = 45;
    }
  }

  takeDamage(amount, game, fromX) {
    if (this.dead) return;
    if (this.damageIframes > 0) return;
    // Shield check
    if (this.shieldHp > 0 && fromX !== undefined) {
      const hitFromFront = (fromX > this.x + this.w / 2) === (this.facing === 1);
      if (hitFromFront) {
        this.shieldHp -= amount;
        this.flashTimer = 4;
        game.effects.push(new Effect(this.x + (this.facing > 0 ? this.w : 0), this.y + this.h/2, '#5ff', 6, 3, 10));
        if (this.shieldHp < 0) this.shieldHp = 0;
        return;
      }
    }
    this.hp -= amount;
    this.flashTimer = 8;
    this.damageIframes = 12;
    game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#f88', 6, 3, 10));
    // Boss knockback (slight — bosses are heavy)
    const bDir = (fromX !== undefined) ? Math.sign(this.x + this.w / 2 - fromX) : this.facing * -1;
    this.vx += bDir * 2;
    if (this.hp <= 0) {
      this.dead = true;
      SFX.bossDie();
      triggerHitstop(10);
      game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#f44', 30, 6, 30));
      game.effects.push(new Effect(this.x + this.w/2, this.y + this.h/2, '#ff0', 20, 5, 25));
    }
  }

  render(ctx, cam, game) {
    if (this.dead) return;
    const sx = this.x - cam.x;
    const sy = this.y - cam.y;

    // Aura
    ctx.fillStyle = this.phase === 2 ? 'rgba(255,50,50,0.25)' : 'rgba(200,50,50,0.12)';
    ctx.fillRect(sx - 6, sy - 6, this.w + 12, this.h + 12);

    // Body
    ctx.fillStyle = this.freezeTimer > 0 ? '#88eeff' : (this.flashTimer > 0 ? '#fff' : (this.phase === 2 ? '#d11' : this.color));
    ctx.fillRect(sx, sy, this.w, this.h);

    // Freeze effect overlay
    if (this.freezeTimer > 0) {
      ctx.globalAlpha = 0.4 + 0.2 * Math.sin(this.freezeTimer * 0.2);
      ctx.fillStyle = '#aaf';
      ctx.fillRect(sx, sy, this.w, this.h);
      ctx.globalAlpha = 1;
    }

    // Flying wings
    if (this.flying) {
      ctx.fillStyle = this.color;
      ctx.fillRect(sx - 8, sy + 6, 8, this.h - 12);
      ctx.fillRect(sx + this.w, sy + 6, 8, this.h - 12);
    }

    // Shield
    if (this.shieldHp > 0) {
      ctx.fillStyle = `rgba(100,220,255,${0.5 + 0.2 * (this.shieldHp / this.shieldMax)})`;
      ctx.fillRect(this.facing > 0 ? sx + this.w - 4 : sx, sy - 4, 6, this.h + 8);
    }

    // Eyes
    ctx.fillStyle = '#ff0';
    const eyeX = this.facing > 0 ? sx + 28 : sx + 6;
    ctx.fillRect(eyeX, sy + 14, 8, 8);
    ctx.fillRect(eyeX + 14, sy + 14, 8, 8);
    ctx.fillStyle = '#200';
    ctx.fillRect(eyeX + 2, sy + 17, 4, 4);
    ctx.fillRect(eyeX + 16, sy + 17, 4, 4);

    // Crown / horns
    ctx.fillStyle = '#ff0';
    ctx.fillRect(sx + 8, sy - 6, 6, 8);
    ctx.fillRect(sx + this.w - 14, sy - 6, 6, 8);
    ctx.fillRect(sx + this.w / 2 - 3, sy - 10, 6, 12);

    if (this.phase === 2) {
      ctx.fillStyle = '#f44';
      ctx.font = '10px monospace';
      ctx.fillText('ENRAGED!', sx + this.w/2 - 28, sy - 14);
    }

    // Crystal ninja: melee warning "!" when boss is close
    if (game && game.player && game.player.ninjaType === 'crystal') {
      const dx = (this.x + this.w / 2) - (game.player.x + game.player.w / 2);
      const dy = (this.y + this.h / 2) - (game.player.y + game.player.h / 2);
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100 && this.hitCooldown <= 0) {
        const pulse = Math.sin(game.tick * 0.3) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 18px monospace';
        ctx.fillText('!', sx + this.w / 2 - 5, sy - 18);
        ctx.globalAlpha = 1;
      }
    }

    // Boss melee sword (shown when just hit player)
    if (this.hitCooldown > 30) {
      const sl = 24;
      const sw = 5;
      const swordX = this.facing > 0 ? sx + this.w : sx - sl;
      const swordY = sy + this.h / 2 - sw / 2;
      ctx.fillStyle = '#dde';
      ctx.fillRect(swordX, swordY, sl, sw);
      ctx.fillStyle = this.color;
      ctx.fillRect(this.facing > 0 ? sx + this.w - 3 : sx, swordY - 3, 4, sw + 6);
    }
  }
}

// ============================================================
//  Game
// ============================================================
class Game {
  constructor() {
    this.tick = 0;
    this.camera = { x: 0, y: 0 };
    this.player = new Player(100, 300);
    this.platforms = [];
    this.enemies = [];
    this.projectiles = [];
    this.effects = [];
    this.stoneBlocks = [];
    this.stonePillars = [];
    this.bubbles = [];
    this.orbs = [];
    this.fireTrails = [];
    this.spikes = [];
    this.trimerangs = [];
    this.deaths = 0;
    this.lives = 3;
    this.gameOver = false;

    // Wave / spawn system
    this.wave = 1;
    this.waveKills = 0;
    this.totalKills = 0;
    this.maxEnemies = 32;
    this.spawnTimer = 0;
    this.spawnInterval = 50;    // frames between spawns
    this.boss = null;
    this.bossActive = false;
    this.bossMessage = 0;
    this.waveMessage = '';
    this.waveMessageTimer = 0;
    this.gameWon = false;

    this.buildLevel();
    this.showWaveMessage('Wave 1/' + TOTAL_WAVES + ' — Fight!');
  }

  showWaveMessage(text) {
    this.waveMessage = text;
    this.waveMessageTimer = 180;
  }

  buildLevel() {
    const P = (x, y, w, h, c) => this.platforms.push(new Platform(x, y, w, h, c));
    const TP = (x, y, w) => { const p = new Platform(x, y, w, 6, '#997'); p.thin = true; this.platforms.push(p); };
    const S = (x, y, w) => this.spikes.push(new Spike(x, y, w));

    // Ground
    P(0, 480, 3200, 60, '#555');

    // Lower platforms
    P(200, 400, 160, 16, '#666');
    P(450, 360, 120, 16, '#666');
    P(650, 320, 140, 16, '#666');
    P(900, 380, 120, 16, '#666');
    P(1100, 340, 160, 16, '#666');

    // Mid platforms
    P(300, 260, 120, 16, '#777');
    P(550, 220, 100, 16, '#777');
    P(780, 180, 140, 16, '#777');
    P(1050, 240, 140, 16, '#777');
    P(1300, 200, 120, 16, '#777');

    // High platforms
    P(400, 140, 100, 16, '#888');
    P(700, 100, 140, 16, '#888');
    P(1000, 130, 120, 16, '#888');

    // Extended area
    P(1500, 420, 200, 16, '#666');
    P(1750, 360, 160, 16, '#666');
    P(1950, 300, 140, 16, '#666');
    P(2150, 380, 120, 16, '#666');
    P(2350, 320, 180, 16, '#666');
    P(2600, 400, 200, 16, '#666');
    P(2850, 350, 160, 16, '#666');

    // L-shaped platforms
    P(150, 440, 80, 16, '#686'); P(150, 380, 16, 60, '#686');
    P(830, 260, 16, 70, '#686'); P(830, 260, 90, 16, '#686');
    P(1400, 370, 80, 16, '#686'); P(1464, 310, 16, 60, '#686');
    P(2050, 240, 16, 70, '#686'); P(2050, 240, 90, 16, '#686');
    P(2750, 280, 80, 16, '#686'); P(2750, 280, 16, 70, '#686');

    // ── Vertical walls (interior) ──
    P(580, 380, 16, 100, '#555');   // wall near start
    P(1200, 300, 16, 180, '#555');  // mid divider
    P(1850, 350, 16, 130, '#555'); // extended area wall
    P(2500, 280, 16, 200, '#555'); // far wall

    // ── Thin passable platforms ──
    TP(120, 340, 100);
    TP(350, 310, 80);
    TP(500, 280, 90);
    TP(730, 250, 100);
    TP(950, 290, 80);
    TP(1150, 200, 100);
    TP(1550, 340, 120);
    TP(1700, 280, 100);
    TP(2000, 220, 110);
    TP(2300, 260, 100);
    TP(2650, 300, 120);
    TP(2900, 250, 100);

    // ── Spikes ──
    S(560, 468, 48);     // ground spikes near first wall
    S(1180, 468, 48);    // ground spikes near mid divider
    S(1830, 468, 48);    // ground spikes near extended wall
    S(2480, 468, 48);    // ground spikes near far wall
    S(700, 84, 48);      // spikes on top of high platform
    S(1300, 184, 36);    // spikes on mid platform edge

    // Boundary walls
    P(-32, 0, 32, 540, '#444');
    P(3200, 0, 32, 540, '#444');
  }

  spawnEnemy() {
    const waveDef = WAVE_DEFS[this.wave - 1];
    // Weighted random pick from pool
    let totalW = 0;
    for (const e of waveDef.pool) totalW += e.weight;
    let r = Math.random() * totalW;
    let pick = waveDef.pool[0];
    for (const e of waveDef.pool) {
      r -= e.weight;
      if (r <= 0) { pick = e; break; }
    }
    const isFlying = (pick.type === 'flyer' || pick.type === 'flyshooter');
    const side = Math.random() < 0.5 ? -1 : 1;
    let x = this.player.x + side * randInt(350, 550);
    let y = isFlying ? randInt(50, 250) : -40;
    x = Math.max(40, Math.min(3140, x));
    const e = new Enemy(x, y, pick.type, !!pick.big, this.wave);
    this.enemies.push(e);
    this.effects.push(new Effect(x + e.w / 2, y + e.h / 2, '#fff', 6, 3, 10));
  }

  spawnBoss() {
    const waveDef = WAVE_DEFS[this.wave - 1];
    this.boss = new Boss(this.player.x + 300, 300, waveDef.boss, this.wave);
    this.bossActive = true;
    this.bossMessage = 180;
    this.effects.push(new Effect(this.boss.x + 28, this.boss.y + 28, '#f44', 25, 6, 25));
    SFX.bossSpawn();
    this.showWaveMessage(this.boss.name + ` (${this.wave}/${TOTAL_WAVES})`);
  }

  advanceWave() {
    if (this.wave >= TOTAL_WAVES) {
      this.gameWon = true;
      this.boss = null;
      this.bossActive = false;
      this.showWaveMessage('VICTORY!');
      SFX.victory();
      return;
    }
    this.wave++;
    this.waveKills = 0;
    this.boss = null;
    this.bossActive = false;
    this.projectiles = [];
    this.spawnTimer = -120; // brief breather
    SFX.wave();
    this.showWaveMessage(`Wave ${this.wave}/${TOTAL_WAVES} — Fight!`);
  }

  update() {
    this.tick++;
    pollGamepad();

    // Restart on R key (when game won or game over)
    if ((this.gameWon || this.gameOver) && (consumePress('KeyR') || gpJust[9])) {
      Object.assign(this, new Game());
      return;
    }
    if (this.gameWon || this.gameOver) return;

    // Ninja switching (1–6, mouse wheel, LB/RB)
    if (consumePress('Digit1')) this.player.switchNinja('fire');
    if (consumePress('Digit2')) this.player.switchNinja('earth');
    if (consumePress('Digit3')) this.player.switchNinja('bubble');
    if (consumePress('Digit4')) this.player.switchNinja('shadow');
    if (consumePress('Digit5')) this.player.switchNinja('crystal');
    if (consumePress('Digit6')) this.player.switchNinja('wind');
    // Mouse wheel switching
    if (justPressed['WheelSwitch']) {
      justPressed['WheelSwitch'] = false;
      this.player.switchNinja(NINJA_ORDER[mouseWheelNinja]);
    }
    // Gamepad LB/RB to cycle ninjas
    if (gpJust[GP_LB]) {
      const idx = NINJA_ORDER.indexOf(this.player.ninjaType);
      this.player.switchNinja(NINJA_ORDER[(idx + 5) % 6]);
    }
    if (gpJust[GP_RB]) {
      const idx = NINJA_ORDER.indexOf(this.player.ninjaType);
      this.player.switchNinja(NINJA_ORDER[(idx + 1) % 6]);
    }

    // Cheat: + to skip wave
    if (consumePress('Equal') || consumePress('NumpadAdd')) {
      if (this.boss && !this.boss.dead) this.boss.hp = 0;
      this.advanceWave();
    }

    // Cheat: - to spawn boss (Minus or NumpadSubtract)
    if ((consumePress('Minus') || consumePress('NumpadSubtract')) && !this.bossActive) {
      this.spawnBoss();
    }

    this.player.update(this);

    for (const e of this.enemies) e.update(this);
    if (this.boss && !this.boss.dead) this.boss.update(this);
    for (const p of this.projectiles) p.update(this);
    if (this.trimerangs) {
      for (const t of this.trimerangs) t.update(this);
      this.trimerangs = this.trimerangs.filter(t => !t.done);
    }
    for (const e of this.effects) e.update();
    for (const b of this.stoneBlocks) b.update(this);
    for (const b of this.bubbles) b.update(this);
    for (const o of this.orbs) o.update(this);

    // Fire trail update
    if (this.player.ninjaType === 'fire' && this.player.grounded && Math.abs(this.player.vx) > 1) {
      if (this.tick % 4 === 0) {
        this.fireTrails.push({ x: this.player.x + this.player.w / 2, y: this.player.y + this.player.h, life: 90 });
      }
    }
    for (const ft of this.fireTrails) {
      ft.life--;
      // Burn enemies standing on fire trail
      if (ft.life % 20 === 0) {
        for (const e of this.enemies) {
          if (!e.dead && Math.abs(e.x + e.w/2 - ft.x) < 16 && Math.abs(e.y + e.h - ft.y) < 12) {
            e.burnTimer = Math.max(e.burnTimer, 60);
          }
        }
      }
    }
    this.fireTrails = this.fireTrails.filter(ft => ft.life > 0);

    // ── Wave / spawn logic ──
    if (!this.gameWon) {
      const waveDef = WAVE_DEFS[this.wave - 1];

      if (!this.bossActive) {
        // Check if kill threshold reached → spawn boss
        if (this.waveKills >= waveDef.killsForBoss) {
          this.spawnBoss();
        } else {
          // Continuously spawn enemies up to cap
          const aliveCount = this.enemies.filter(e => !e.dead).length;
          this.spawnTimer++;
          if (this.spawnTimer >= this.spawnInterval && aliveCount < this.maxEnemies) {
            this.spawnTimer = 0;
            this.spawnEnemy();
          }
        }
      } else {
        // During boss: spawn fewer enemies
        const aliveCount = this.enemies.filter(e => !e.dead).length;
        this.spawnTimer++;
        if (this.spawnTimer >= this.spawnInterval && aliveCount < 4) {
          this.spawnTimer = 0;
          this.spawnEnemy();
        }
      }

      // Boss defeated → advance wave
      if (this.boss && this.boss.dead) {
        this.advanceWave();
      }
    }

    if (this.bossMessage > 0) this.bossMessage--;
    if (this.waveMessageTimer > 0) this.waveMessageTimer--;

    // Cleanup
    this.enemies = this.enemies.filter(e => !e.dead);
    this.projectiles = this.projectiles.filter(p => !p.done);
    this.effects = this.effects.filter(e => !e.done);
    this.stoneBlocks = this.stoneBlocks.filter(b => !b.done);
    this.bubbles = this.bubbles.filter(b => !b.done);
    this.orbs = this.orbs.filter(o => !o.done);

    // Camera follows player (smooth)
    const targetCamX = this.player.x + this.player.w / 2 - CANVAS_W / 2;
    const targetCamY = this.player.y + this.player.h / 2 - CANVAS_H / 2;
    this.camera.x = lerp(this.camera.x, targetCamX, 0.08);
    this.camera.y = lerp(this.camera.y, targetCamY, 0.08);
    this.camera.x = Math.max(0, Math.min(this.camera.x, 3200 - CANVAS_W));
    this.camera.y = Math.max(-100, Math.min(this.camera.y, 540 - CANVAS_H));
  }

  render() {
    const cam = this.camera;

    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
    grad.addColorStop(0, '#0a0a2e');
    grad.addColorStop(1, '#1a1a3e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Background stars
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < 50; i++) {
      const sx = ((i * 137 + 50) % 3200) - cam.x * 0.3;
      const sy = ((i * 97 + 30) % 400);
      if (sx > -5 && sx < CANVAS_W + 5) {
        ctx.fillRect(sx, sy, 2, 2);
      }
    }

    // Background mountains
    ctx.fillStyle = '#1a1a3a';
    for (let i = 0; i < 3200; i += 200) {
      const bx = i - cam.x * 0.2;
      if (bx > -200 && bx < CANVAS_W + 200) {
        ctx.beginPath();
        ctx.moveTo(bx, 480 - cam.y);
        ctx.lineTo(bx + 100, 300 - cam.y);
        ctx.lineTo(bx + 200, 480 - cam.y);
        ctx.fill();
      }
    }

    // Platforms
    for (const p of this.platforms) p.render(ctx, cam);

    // Spikes
    for (const s of this.spikes) s.render(ctx, cam);

    // Fire trails
    for (const ft of this.fireTrails) {
      const alpha = Math.min(1, ft.life / 30) * 0.6;
      ctx.globalAlpha = alpha;
      const flicker = Math.sin(ft.life * 0.5) * 2;
      ctx.fillStyle = ft.life > 50 ? '#f93' : (ft.life > 25 ? '#e52' : '#a30');
      ctx.fillRect(ft.x - 4 - cam.x, ft.y - 6 + flicker - cam.y, 8, 6);
      ctx.fillStyle = '#ff0';
      ctx.fillRect(ft.x - 2 - cam.x, ft.y - 8 + flicker - cam.y, 4, 4);
    }
    ctx.globalAlpha = 1;

    // Stone blocks
    for (const b of this.stoneBlocks) b.render(ctx, cam);

    // Bubbles
    for (const b of this.bubbles) b.render(ctx, cam);

    // Orbs
    for (const o of this.orbs) o.render(ctx, cam);

    // Enemies
    for (const e of this.enemies) e.render(ctx, cam, this);

    // Boss
    if (this.boss && !this.boss.dead) this.boss.render(ctx, cam, this);

    // Player
    this.player.render(ctx, cam);

    // Low HP red overlay
    if (this.player.hp / this.player.maxHp <= 0.33 && !this.gameOver) {
      ctx.save();
      ctx.globalAlpha = 0.05 + 0.15 * (1 - this.player.hp / this.player.maxHp);
      ctx.fillStyle = '#f22';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.restore();
    }

    // Projectiles
    for (const p of this.projectiles) p.render(ctx, cam);
    if (this.trimerangs) for (const t of this.trimerangs) t.render(ctx, cam);

    // Effects
    for (const e of this.effects) e.render(ctx, cam);

    // ── UI ──
    this.renderUI();
  }

  renderUI() {
    const pl = this.player;
    const t = pl.type;

    // Dark panel
    // ── Bottom center HUD ──
    const ninjaKeys = ['fire', 'earth', 'bubble', 'shadow', 'crystal', 'wind'];
    const barX = CANVAS_W / 2 - 156;
    const barY = CANVAS_H - 40;

    // HP bar (left of ninja bar)
    const hpX = barX - 80;

    // Shield bar (top, only if has shield)
    let hpTop = barY - 2;
    if (pl.maxShield > 0) {
      ctx.fillStyle = '#4af'; ctx.font = '7px monospace';
      ctx.fillText(`Shield ${pl.shield}/${pl.maxShield}`, hpX, hpTop - 18);
      ctx.fillStyle = '#124';
      ctx.fillRect(hpX, hpTop - 14, 70, 5);
      ctx.fillStyle = '#4af';
      ctx.fillRect(hpX, hpTop - 14, 70 * (pl.shield / pl.maxShield), 5);
    }

    // HP bar
    ctx.fillStyle = '#fff'; ctx.font = '8px monospace';
    ctx.fillText(`${pl.hp}/${pl.maxHp}`, hpX, hpTop - 4);
    ctx.fillStyle = '#400';
    ctx.fillRect(hpX, hpTop, 70, 8);
    ctx.fillStyle = '#e44';
    ctx.fillRect(hpX, hpTop, 70 * (pl.hp / pl.maxHp), 8);

    // Ninja-specific meter (below HP bar)
    const meterLX = hpX;
    const meterLY = hpTop + 12;
    if (pl.ninjaType === 'fire') {
      ctx.fillStyle = '#420'; ctx.fillRect(meterLX, meterLY, 70, 5);
      ctx.fillStyle = '#f93'; ctx.fillRect(meterLX, meterLY, 70 * (pl.comboMeter / 10), 5);
      if (pl.fireArmor) { ctx.fillStyle = '#f93'; ctx.font = '7px monospace'; ctx.fillText('ARMOR', meterLX, meterLY + 12); }
    } else if (pl.ninjaType === 'earth') {
      ctx.fillStyle = '#a87'; ctx.font = '7px monospace'; ctx.fillText(`Blocks:${this.stoneBlocks.length}`, meterLX, meterLY + 5);
    } else if (pl.ninjaType === 'bubble') {
      ctx.fillStyle = '#234'; ctx.fillRect(meterLX, meterLY, 70, 5);
      ctx.fillStyle = '#6af'; ctx.fillRect(meterLX, meterLY, 70 * Math.min(1, pl.bubbleBuffTimer / 240), 5);
      if (pl.bubbleBuffTimer > 0) { ctx.fillStyle = '#6af'; ctx.font = '7px monospace'; ctx.fillText('FLOAT', meterLX, meterLY + 12); }
    } else if (pl.ninjaType === 'shadow') {
      ctx.fillStyle = '#a4e'; ctx.font = '7px monospace';
      if (pl.backstabReady) {
        ctx.fillText('BACKSTAB!', meterLX, meterLY + 5);
      } else {
        ctx.fillText(`Stealth:${Math.min(100, Math.floor(pl.shadowStealth / 3))}%`, meterLX, meterLY + 5);
        if (pl.shadowKillThreshold > 0) { ctx.fillStyle = '#c6f'; ctx.fillText(`Kill≤${pl.shadowKillThreshold}HP`, meterLX, meterLY + 14); }
      }
    } else if (pl.ninjaType === 'crystal') {
      ctx.fillStyle = '#234'; ctx.fillRect(meterLX, meterLY, 70, 5);
      ctx.fillStyle = '#0ff'; ctx.fillRect(meterLX, meterLY, 70 * Math.min(1, pl.parryCombo / 10), 5);
      if (pl.parrying) { ctx.fillStyle = '#0ff'; ctx.font = '7px monospace'; ctx.fillText('PARRY', meterLX, meterLY + 12); }
    } else if (pl.ninjaType === 'wind') {
      ctx.fillStyle = '#242'; ctx.fillRect(meterLX, meterLY, 70, 5);
      ctx.fillStyle = '#8d8'; ctx.fillRect(meterLX, meterLY, 70 * (pl.windPower / 10), 5);
      if (pl.windDashing) { ctx.fillStyle = '#bfb'; ctx.font = '7px monospace'; ctx.fillText('DASH', meterLX, meterLY + 12); }
    }

    // ATK + Special (right of ninja bar)
    const rightX = barX + 6 * 52 + 10;
    const baseDmg = t.attackDamage;
    let bonusText = '';
    let totalDmg = baseDmg + pl.bonusDamage;
    if (pl.bonusDamage > 0) bonusText += `+${pl.bonusDamage}`;
    if (pl.bubbleBuffTimer > 0) bonusText += '+1';
    if (pl.ninjaType === 'crystal' && pl.parryCombo > 0) { const cb = Math.floor(pl.parryCombo / 2); totalDmg += cb; if (cb > 0) bonusText += `+${cb}`; }
    if (pl.ninjaType === 'wind' && pl.windPower > 0) { totalDmg += pl.windPower; bonusText += `+${pl.windPower}`; }
    if (pl.ninjaType === 'shadow' && pl.backstabReady) { bonusText = ' KILL!'; totalDmg = 9999; }
    if (pl.nextHitDouble) bonusText += ' x2!';
    ctx.fillStyle = pl.nextHitDouble ? '#ff0' : '#f80'; ctx.font = 'bold 9px monospace';
    ctx.fillText(`ATK ${baseDmg}${bonusText}`, rightX, barY + 8);
    if (pl.specialCooldown > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '8px monospace';
      ctx.fillText(`X:${Math.ceil(pl.specialCooldown / 60 * 100)}%`, rightX, barY + 20);
    } else {
      ctx.fillStyle = '#8f8'; ctx.font = '8px monospace';
      ctx.fillText('X:RDY', rightX, barY + 20);
    }
    // Shuriken count
    ctx.fillStyle = pl.shurikens > 0 ? '#ccc' : '#555'; ctx.font = '8px monospace';
    ctx.fillText(`C:\u2726${pl.shurikens}`, rightX, barY + 32);

    // Ninja name (centered above bar)
    ctx.fillStyle = t.color; ctx.font = 'bold 9px monospace';
    const nameW = ctx.measureText(t.name).width;
    ctx.fillText(t.name, CANVAS_W / 2 - nameW / 2, barY - 4);

    for (let i = 0; i < 6; i++) {
      const nt = NINJA_TYPES[ninjaKeys[i]];
      const bx = barX + i * 52;
      const selected = pl.ninjaType === ninjaKeys[i];
      ctx.fillStyle = selected ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, barY, 48, 28);
      if (selected) {
        ctx.strokeStyle = nt.color;
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, barY, 48, 28);
      }
      ctx.fillStyle = nt.color;
      ctx.fillRect(bx + 4, barY + 4, 12, 12);
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.fillText(`${i + 1}`, bx + 20, barY + 14);
      ctx.font = '8px monospace';
      ctx.fillText(ninjaKeys[i].substring(0, 4), bx + 20, barY + 23);
    }

    // Controls hint
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = '10px monospace';
    ctx.fillText('WASD/Arrows=Move  Z/J=Attack  X/K=Special  C/L=Shuriken  1-6=Switch', CANVAS_W / 2 - 215, CANVAS_H - 60);

    // ── Death counter + Lives (top left) ──
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(8, 8, 130, 24);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(8, 8, 130, 24);
    ctx.fillStyle = '#f66';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(`Deaths: ${this.deaths}`, 16, 25);
    ctx.fillStyle = '#4f4';
    for (let i = 0; i < this.lives; i++) {
      ctx.fillText('\u2665', 100 + i * 12, 25);
    }

    // ── Wave info panel (top right) ──
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(CANVAS_W - 175, 8, 167, 36);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.strokeRect(CANVAS_W - 175, 8, 167, 36);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px monospace';
    ctx.fillText(`Wave ${this.wave}/${TOTAL_WAVES}`, CANVAS_W - 167, 24);
    ctx.font = '10px monospace';
    ctx.fillStyle = '#ccc';
    ctx.fillText(`Kills: ${this.totalKills}`, CANVAS_W - 167, 38);

    // ── Big progress bar (top center) ──
    // EleNin title
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.font = 'bold 14px monospace';
    const titleTxt = 'EleNin';
    const titleW = ctx.measureText(titleTxt).width;
    ctx.fillText(titleTxt, CANVAS_W / 2 - titleW / 2, 8);

    if (!this.gameWon && !(this.boss && !this.boss.dead)) {
      const pbW = 400, pbH = 18;
      const pbX = CANVAS_W / 2 - pbW / 2;
      const pbY = 10;
      const waveDef = WAVE_DEFS[this.wave - 1];
      const pct = this.bossActive ? 1 : Math.min(1, this.waveKills / waveDef.killsForBoss);
      // Background
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(pbX - 2, pbY - 2, pbW + 4, pbH + 4);
      // Empty bar
      ctx.fillStyle = '#222';
      ctx.fillRect(pbX, pbY, pbW, pbH);
      // Filled bar
      const barColor = this.bossActive ? '#f44' : `hsl(${30 + pct * 90}, 80%, 50%)`;
      ctx.fillStyle = barColor;
      ctx.fillRect(pbX, pbY, pbW * pct, pbH);
      // Border
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(pbX, pbY, pbW, pbH);
      // Text on bar
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px monospace';
      const label = this.bossActive
        ? `BOSS ${this.wave}/${TOTAL_WAVES}`
        : `${this.waveKills}/${waveDef.killsForBoss}`;
      const tw = ctx.measureText(label).width;
      ctx.fillText(label, CANVAS_W / 2 - tw / 2, pbY + 14);
    }

    // Boss HP bar (top center)
    if (this.boss && !this.boss.dead) {
      const bw = 300;
      const bx = CANVAS_W / 2 - bw / 2;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(bx - 4, 6, bw + 8, 24);
      ctx.fillStyle = '#f44';
      ctx.font = 'bold 12px monospace';
      const bossLabel = `${this.boss.name} [${this.wave}/${TOTAL_WAVES}]`;
      ctx.fillText(bossLabel, bx, 20);
      const labelW = ctx.measureText(bossLabel).width + 8;
      ctx.fillStyle = '#400';
      ctx.fillRect(bx + labelW, 10, bw - labelW, 14);
      ctx.fillStyle = this.boss.phase === 2 ? '#f22' : '#e44';
      ctx.fillRect(bx + labelW, 10, (bw - labelW) * (this.boss.hp / this.boss.maxHp), 14);
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.fillText(`${this.boss.hp}/${this.boss.maxHp}`, bx + bw - 55, 21);
    }

    // Wave / boss message (center screen)
    if (this.waveMessageTimer > 0) {
      ctx.globalAlpha = Math.min(1, this.waveMessageTimer / 30);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px monospace';
      const tw = ctx.measureText(this.waveMessage).width;
      ctx.fillText(this.waveMessage, CANVAS_W / 2 - tw / 2, CANVAS_H / 2 - 60);
      ctx.globalAlpha = 1;
    }

    // Touch controls overlay (only on touch devices)
    if (isTouchDevice) {
      ctx.globalAlpha = 0.25;
      // D-pad (bottom-left)
      const dcx = CANVAS_W * 0.15, dcy = CANVAS_H * 0.78;
      const ds = 28;
      ctx.fillStyle = touchState.up ? '#fff' : '#888';
      ctx.fillRect(dcx - ds/2, dcy - ds*1.6, ds, ds); // up
      ctx.fillStyle = touchState.down ? '#fff' : '#888';
      ctx.fillRect(dcx - ds/2, dcy + ds*0.6, ds, ds); // down
      ctx.fillStyle = touchState.left ? '#fff' : '#888';
      ctx.fillRect(dcx - ds*1.6, dcy - ds/2, ds, ds); // left
      ctx.fillStyle = touchState.right ? '#fff' : '#888';
      ctx.fillRect(dcx + ds*0.6, dcy - ds/2, ds, ds); // right
      // Labels
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px monospace';
      ctx.fillText('\u25B2', dcx - 5, dcy - ds*0.9);
      ctx.fillText('\u25BC', dcx - 5, dcy + ds*1.3);
      ctx.fillText('\u25C0', dcx - ds*1.3, dcy + 4);
      ctx.fillText('\u25B6', dcx + ds*0.9, dcy + 4);
      // Action buttons (bottom-right)
      const abx = CANVAS_W * 0.82, aby = CANVAS_H * 0.78;
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = touchState.attack ? '#f44' : '#844';
      ctx.beginPath(); ctx.arc(abx - 30, aby, 22, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = touchState.special ? '#44f' : '#448';
      ctx.beginPath(); ctx.arc(abx + 30, aby, 22, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = touchState.shuriken ? '#ff4' : '#884';
      ctx.beginPath(); ctx.arc(abx, aby - 40, 18, 0, Math.PI * 2); ctx.fill();
      // Labels
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('ATK', abx - 40, aby + 4);
      ctx.fillText('SPC', abx + 18, aby + 4);
      ctx.fillText('SHR', abx - 12, aby - 36);
      ctx.globalAlpha = 1;
    }

    // Victory screen
    if (this.gameWon) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = '#4f4';
      ctx.font = 'bold 36px monospace';
      const vt = 'VICTORY!';
      const vtw = ctx.measureText(vt).width;
      ctx.fillText(vt, CANVAS_W / 2 - vtw / 2, CANVAS_H / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '16px monospace';
      const st = `Kills: ${this.totalKills}  Deaths: ${this.deaths}`;
      const stw = ctx.measureText(st).width;
      ctx.fillText(st, CANVAS_W / 2 - stw / 2, CANVAS_H / 2 + 10);
      ctx.fillStyle = '#aaa';
      ctx.font = '12px monospace';
      const rt = 'Press R to restart';
      const rtw = ctx.measureText(rt).width;
      ctx.fillText(rt, CANVAS_W / 2 - rtw / 2, CANVAS_H / 2 + 40);
    }

    // Game Over screen
    if (this.gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.fillStyle = '#f44';
      ctx.font = 'bold 36px monospace';
      const got = 'GAME OVER';
      const gotw = ctx.measureText(got).width;
      ctx.fillText(got, CANVAS_W / 2 - gotw / 2, CANVAS_H / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '16px monospace';
      const gost = `Wave: ${this.wave}/${TOTAL_WAVES}  Kills: ${this.totalKills}  Deaths: ${this.deaths}`;
      const gostw = ctx.measureText(gost).width;
      ctx.fillText(gost, CANVAS_W / 2 - gostw / 2, CANVAS_H / 2 + 10);
      ctx.fillStyle = '#aaa';
      ctx.font = '12px monospace';
      const gort = 'Press R to restart';
      const gortw = ctx.measureText(gort).width;
      ctx.fillText(gort, CANVAS_W / 2 - gortw / 2, CANVAS_H / 2 + 40);
    }
  }
}

// ============================================================
//  Game Loop (fixed timestep)
// ============================================================
const game = new Game();
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  const delta = timestamp - lastTime;
  lastTime = timestamp;
  accumulator += delta;

  // Cap accumulator to prevent spiral of death
  if (accumulator > 200) accumulator = 200;

  while (accumulator >= FIXED_DT) {
    if (hitstopFrames > 0) {
      hitstopFrames--;
      // During hitstop: skip game update but still consume input
      for (const k in justPressed) justPressed[k] = false;
      touchJust.attack = false; touchJust.special = false; touchJust.shuriken = false; touchJust.up = false;
      accumulator -= FIXED_DT;
      continue;
    }
    game.update();
    accumulator -= FIXED_DT;
    // Clear justPressed after each logical frame
    for (const k in justPressed) justPressed[k] = false;
    touchJust.attack = false; touchJust.special = false; touchJust.shuriken = false; touchJust.up = false;
  }

  game.render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(ts => {
  lastTime = ts;
  gameLoop(ts);
});
</script>
